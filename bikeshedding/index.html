"use strict";

/* ================= モデル =================
   1957年、C・ノースコート・パーキンソンが著書『パーキンソンの法則』で示した寓話
   ——ある財務委員会は、1000万ポンドの原子炉契約をわずか2.5分で承認する一方、
   350ポンドの自転車置き場の色は45分、21ポンドのお茶菓子代は75分議論しても
   結論が出なかった——にもとづく、「議題にかける時間は、それに伴う金額・専門性に
   反比例する」という観察(俗称ビケシェッディング/Law of Triviality)を表す簡易モデル。
   「本来かけるべき時間の目安」(ideal)は議題の専門性・重要度が増すほど増加すると仮定し、
   「実際にかけられがちな時間」(actual)は、誰もが意見を持てる身近な議題ほど増加する
   というパーキンソンの観察の方向性にもとづき、専門性が増すほど減少すると仮定する。
   両曲線は厳密な実証研究の再現ではなく、観察の方向性を示す独自の簡易モデルである。
   一方、原子炉・自転車置き場・お茶菓子代の実際の所要時間(2.5分・45分・75分)は
   パーキンソンの著書に基づく実話(の紹介)である。
*/
const STAKES_MIN = 0, STAKES_MAX = 100;
const TOTAL_MIN = 15, TOTAL_MAX = 180;
const IDEAL_MIN = 5, IDEAL_MAX = 55;
const ACTUAL_MAX = 60, ACTUAL_FLOOR = 2;
const MAX_GAP = 55; // stakes=0 のときの本来値との最大乖離幅の目安(%pt)

function idealShareOf(stakes) { return IDEAL_MIN + stakes * 0.5; }
function actualShareOf(stakes) { return Math.max(ACTUAL_FLOOR, ACTUAL_MAX - stakes * 0.6); }
function gapOf(stakes) { return actualShareOf(stakes) - idealShareOf(stakes); }
function scoreOf(stakes) { return Math.max(0, Math.min(100, Math.round(100 - (Math.abs(gapOf(stakes)) / MAX_GAP) * 100))); }
function tierOf(stakes) {
  const g = gapOf(stakes);
  if (g > 25) return 0;
  if (g > 10) return 1;
  if (g >= -10) return 2;
  if (g >= -25) return 3;
  return 4;
}
function assess(stakes, total) {
  const idealShare = idealShareOf(stakes);
  const actualShare = actualShareOf(stakes);
  const idealMin = (idealShare / 100) * total;
  const actualMin = (actualShare / 100) * total;
  const gap = actualShare - idealShare;
  const score = scoreOf(stakes);
  const band = tierOf(stakes);
  return { idealShare, actualShare, idealMin, actualMin, gap, score, band };
}

/* ---- 1957年の実話にもとづく3つのプリセット ---- */

  heroLead: "In 1957, British historian C. Northcote Parkinson told a parable in his book Parkinson's Law about a finance committee with three agenda items: a £10 million contract to build a nuclear reactor, a £350 bicycle shed, and a £21-a-year budget for refreshments. The outcome was counterintuitive. The massive reactor contract was approved in two and a half minutes. The bike shed, something everyone felt qualified to have an opinion on, was debated for 45 minutes. And the trivial refreshments budget ran on for an hour and fifteen minutes — without even reaching a decision. As Parkinson put it, \"the time spent on any item of the agenda will be in inverse proportion to the sum involved.\" Nobody feels qualified to challenge a topic that's too technical, while everyone has an opinion on something familiar. This later became known in software engineering as \"bikeshedding.\" Move the \"expertise and stakes required by the topic\" dial to see how the ideal discussion time and the actual discussion time drift apart.",
  consoleLabel: "AGENDA CONSOLE",
  sumLabel: "Gap from the ideal",
  scoreLabel: "Time-allocation soundness score",
  stakesName: "Expertise / stakes required by the topic", stakesSub: "0 = a familiar topic anyone can weigh in on, 100 = a highly technical topic only specialists can judge",
  totalName: "Total meeting length", totalSub: "Total length of the meeting this agenda item is part of",
  numLabel: "Value",
  resetBtn: "Reset",
  presetReactorBtn: "Real example: the reactor contract (2.5 min)",
  presetShedBtn: "Real example: the bike shed color (45 min)",
  presetCoffeeBtn: "Real example: the refreshments budget (75 min)",
  chartCaption: "The green line is the ideal discussion time; the red line is the actual discussion time people tend to spend. As expertise/stakes rise, the two lines pull apart — familiar topics get over-discussed, technical ones get under-discussed.",
  chartNote: "These two curves are an original, simplified model reflecting the direction of Parkinson's observation — not a statistically validated research finding. The real durations for the reactor, bike shed, and refreshments items (2.5, 45, and 75 minutes) are a real anecdote from Parkinson's own book.",
  bsYTitle: "Share of meeting time (%)", bsXTitle: "Expertise / stakes required by the topic",
  legendIdeal: "Ideal discussion time",
  legendActual: "Actual discussion time (tends to happen)",
  idealCardLabel: "Ideal discussion time",
  actualCardLabel: "Actual discussion time (tends to happen)",
  hint: (stakes, total, a) => `At an expertise/stakes level of ${stakes}, the ideal discussion time is about ${a.idealShare.toFixed(0)}% of the meeting (about ${a.idealMin.toFixed(0)} min). The actual time it tends to get is about ${a.actualShare.toFixed(0)}% (about ${a.actualMin.toFixed(0)} min).`,
  hintPreset: {
    reactor: (a) => `In the real anecdote, the £10 million reactor contract was approved in just 2.5 minutes (about 2% of the meeting) — too technical for anyone to feel qualified to object. On this simulator's own scale, a topic at this stakes level tends to actually get about ${a.actualShare.toFixed(0)}% (${a.actualMin.toFixed(0)} min), while roughly double that, about ${a.idealShare.toFixed(0)}% (${a.idealMin.toFixed(0)} min), would arguably be warranted.`,
    shed: (a) => `In the real anecdote, the £350 bike shed color was debated for 45 minutes — a familiar topic everyone felt entitled to an opinion on. On this simulator's own scale, a topic at this stakes level tends to actually get about ${a.actualShare.toFixed(0)}% (${a.actualMin.toFixed(0)} min), against an ideal of about ${a.idealShare.toFixed(0)}% (${a.idealMin.toFixed(0)} min).`,
    coffee: (a) => `In the real anecdote, the £21-a-year refreshments budget ran for an hour and fifteen minutes and still wasn't resolved — the smaller the sum, the more everyone feels free to chime in. On this simulator's own scale, a topic at this stakes level tends to actually get about ${a.actualShare.toFixed(0)}% (${a.actualMin.toFixed(0)} min), while the ideal would only be about ${a.idealShare.toFixed(0)}% (${a.idealMin.toFixed(0)} min).`,
  },
  comments: [
    "A textbook case of \"bikeshedding.\" A familiar topic anyone can weigh in on is getting far more time than it warrants.",
    "Familiar topics are getting somewhat more time than they warrant.",
    "The ideal discussion time and the actual discussion time are roughly balanced.",
    "A technical topic may be getting somewhat less scrutiny than it warrants.",
    "A concerning state: the topic is too technical for anyone to object, and it tends to get approved with far less scrutiny than it warrants.",
  ],
  adviceHeading: "How to actually deal with this",
  adviceIntro: "Parkinson's Law (1957) isn't a rigorous empirical study — it's a satirical observation of British bureaucracy. But the underlying pattern, that topics everyone can weigh in on drag on while highly technical topics sail through with too little scrutiny, is probably familiar from real workplaces. Bike-shed colors and variable-naming conventions can get debated endlessly, while technical architecture decisions and large contracts can get approved without enough scrutiny simply because few people feel qualified to challenge them. The latter usually matters more to the organization, and deserves attention.",
  adviceItems: [
    "Timebox discussion of familiar, everyone-has-an-opinion topics in advance",
    "Move topics anyone can weigh in on out of the meeting entirely — assign a clear decision-maker and resolve them asynchronously",
    "For highly technical topics, circulate materials in advance and gather input from experts before the meeting",
    "Don't treat \"no objections\" as \"no problems\" — deliberately assign a reviewer for the most technically complex proposals",
  ],
  booksH: "Recommended reading",
  books: [
    { tag: "MEETING CULTURE", title: "Toyota's 30-Minute Meetings (トヨタの会議は30分)", desc: "By Daihei Yamamoto. A practitioner's take on the very modern problem of wasted meeting time, built around Toyota's culture of \"the ability to decide.\"", link: "View on Amazon →", url: "https://amzn.to/4fw9KyY" },
    { tag: "ORGANIZATIONAL BEHAVIOR", title: "Parkinson's Law", desc: "C. Northcote Parkinson's 1957 original — the book where the bicycle-shed-and-reactor parable behind this page's model first appeared.", link: "View on Amazon →", url: "https://amzn.to/4eZ0jYO" },
  ],
  toneBtn: "🔥 Developer mode",
  toneNote: "* Joke mode. Switch back to standard before client meetings.",
  shareText: "The bike shed color takes 45 minutes, the reactor contract takes 2? — Bikeshedding Simulator",
  shareHashtags: "DevSimLab",
},
};

/* ================= 開発者モード上書き辞書 ================= */
const DEV = {
ja: {
  hint: (stakes, total, a) => `専門性${stakes}。実際にかけられがちな時間約${a.actualMin.toFixed(0)}分。variable名を\`data\`にするか\`items\`にするかで30分溶けたPRレビュー、心当たりありませんか。`,
  hintPreset: {
    reactor: (a) => `本番DBの移行スクリプト、誰もレビューできる人がいなくて「まあ動いたしヨシ!」でマージされたやつ。実際にかけられがちな時間約${a.actualMin.toFixed(0)}分。`,
    shed: (a) => `インデントはタブかスペースか。Slackのスレッドが200件を超えたやつ。実際にかけられがちな時間約${a.actualMin.toFixed(0)}分。`,
    coffee: (a) => `絵文字リアクションのルール制定に費やされた会議、あなたのチームにもありませんか。実際にかけられがちな時間約${a.actualMin.toFixed(0)}分、まだ結論出てません。`,
  },
  comments: [
    "変数名の議論で1時間溶けた。ロジックのレビューは3分で終わった。",
    "PRのコメント欄がリンター設定の話で盛り上がっている。本題のバグは未指摘。",
    "たまには本題から逸れずに終わる会議もある。奇跡。",
    "アーキテクチャ設計、詳しい人が1人しかいないので「じゃあお願いします」で終わった。",
    "本番障害対応の設計変更、誰も止められないまま深夜にマージされた。",
  ],
},
en: {
  hint: (stakes, total, a) => `Expertise ${stakes}. Actual time it tends to get: ~${a.actualMin.toFixed(0)} min. Sound familiar if a PR review burned 30 minutes on \`data\` vs \`items\`?`,
  hintPreset: {
    reactor: (a) => `The prod DB migration script nobody could review, merged with a "well, it ran, ship it." Actual time it tends to get: ~${a.actualMin.toFixed(0)} min.`,
    shed: (a) => `Tabs vs spaces. The Slack thread that hit 200 replies. Actual time it tends to get: ~${a.actualMin.toFixed(0)} min.`,
    coffee: (a) => `The meeting spent entirely on emoji-reaction etiquette rules — sound familiar? Actual time it tends to get: ~${a.actualMin.toFixed(0)} min, and still unresolved.`,
  },
  comments: [
    "An hour burned on a variable name. The actual logic review took three minutes.",
    "The PR comments are all about linter config. Nobody flagged the actual bug.",
    "Once in a while, a meeting actually stays on topic. A small miracle.",
    "Only one person understands the architecture, so it ends with \"okay, you decide.\"",
    "A production-incident fix got merged at 2am because nobody could push back.",
  ],
},
};

let LANG = "ja";
let TONE = "std";
const T = () => (TONE === "dev" ? { ...I18N[LANG], ...DEV[LANG] } : I18N[LANG]);

let stakes = 50;
let total = 60;

/* ================= チャート描画 ================= */
const NS = "http://www.w3.org/2000/svg";
const el = (tag, attrs) => {
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
};
const PW = 640, PH = 240, PAD_L = 40, PAD_R = 16, PAD_T = 30, PAD_B = 42;
const Y_MAX = 100;
const xOf = (s) => PAD_L + ((s - STAKES_MIN) / (STAKES_MAX - STAKES_MIN)) * (PW - PAD_L - PAD_R);
const sOfX = (x) => {
  const frac = (x - PAD_L) / (PW - PAD_L - PAD_R);
  const raw = STAKES_MIN + frac * (STAKES_MAX - STAKES_MIN);
  return Math.min(STAKES_MAX, Math.max(STAKES_MIN, Math.round(raw / 5) * 5));
};
const yOf = (v) => PAD_T + (1 - Math.min(v, Y_MAX) / Y_MAX) * (PH - PAD_T - PAD_B);

function drawChart() {
  const t = T();
  const gridLayer = document.getElementById("bsGridLayer");
  gridLayer.innerHTML = "";
  [0, 20, 40, 60, 80, 100].forEach((v) => {
    const y = yOf(v);
    gridLayer.appendChild(el("line", { class: "bs-grid", x1: PAD_L, y1: y, x2: PW - PAD_R, y2: y }));
    const label = el("text", { class: "bs-axis-label", x: PAD_L - 6, y: y + 3, "text-anchor": "end" });
    label.textContent = v + "%";
    gridLayer.appendChild(label);
  });
  for (let s = STAKES_MIN; s <= STAKES_MAX; s += 20) {
    const x = xOf(s);
    gridLayer.appendChild(el("line", { class: "bs-tick", x1: x, y1: PAD_T, x2: x, y2: PH - PAD_B }));
    const label = el("text", { class: "bs-axis-label", x, y: PH - PAD_B + 14, "text-anchor": s === STAKES_MIN ? "start" : s === STAKES_MAX ? "end" : "middle" });
    label.textContent = s;
    gridLayer.appendChild(label);
  }
  const yTitle = el("text", { class: "bs-axis-title", x: 2, y: 12 });
  yTitle.textContent = t.bsYTitle;
  gridLayer.appendChild(yTitle);
  const xTitle = el("text", { class: "bs-axis-title", x: PW / 2, y: PH - 4, "text-anchor": "middle" });
  xTitle.textContent = t.bsXTitle;
  gridLayer.appendChild(xTitle);

  const idealPts = [], actualPts = [];
  for (let s = STAKES_MIN; s <= STAKES_MAX; s += 2) {
    idealPts.push(`${xOf(s)},${yOf(idealShareOf(s))}`);
    actualPts.push(`${xOf(s)},${yOf(actualShareOf(s))}`);
  }
  document.getElementById("bsLineIdeal").setAttribute("d", "M " + idealPts.join(" L "));
  document.getElementById("bsLineActual").setAttribute("d", "M " + actualPts.join(" L "));

  const dotsLayer = document.getElementById("bsDotsLayer");
  dotsLayer.innerHTML = "";
  for (let s = STAKES_MIN; s <= STAKES_MAX; s += 20) {
    dotsLayer.appendChild(el("circle", { class: "bs-dot", cx: xOf(s), cy: yOf(idealShareOf(s)), fill: "var(--q)" }));
    dotsLayer.appendChild(el("circle", { class: "bs-dot", cx: xOf(s), cy: yOf(actualShareOf(s)), fill: "var(--alert)" }));
  }

  const mx = xOf(stakes);
  const marker = document.getElementById("bsMarker");
  marker.setAttribute("x1", mx); marker.setAttribute("x2", mx);
  marker.setAttribute("y1", PAD_T); marker.setAttribute("y2", PH - PAD_B);

  const idealY = yOf(idealShareOf(stakes));
  const actualY = yOf(actualShareOf(stakes));
  document.getElementById("bsPointIdeal").setAttribute("cx", mx);
  document.getElementById("bsPointIdeal").setAttribute("cy", idealY);
  document.getElementById("bsPointActual").setAttribute("cx", mx);
  document.getElementById("bsPointActual").setAttribute("cy", actualY);

  const labelAnchor = mx > PW - PAD_R - 55 ? "end" : mx < PAD_L + 55 ? "start" : "middle";
  const labelDx = labelAnchor === "end" ? -10 : labelAnchor === "start" ? 10 : 0;
  const clampY = (y) => Math.max(PAD_T + 10, Math.min(PH - PAD_B - 4, y));
  const idealIsHigher = idealY <= actualY;

  const labelIdeal = document.getElementById("bsLabelIdeal");
  labelIdeal.setAttribute("x", mx + labelDx);
  labelIdeal.setAttribute("y", clampY(idealIsHigher ? idealY - 10 : idealY + 20));
  labelIdeal.setAttribute("text-anchor", labelAnchor);
  labelIdeal.textContent = Math.round(idealShareOf(stakes)) + "%";

  const labelActual = document.getElementById("bsLabelActual");
  labelActual.setAttribute("x", mx + labelDx);
  labelActual.setAttribute("y", clampY(idealIsHigher ? actualY + 20 : actualY - 10));
  labelActual.setAttribute("text-anchor", labelAnchor);
  labelActual.textContent = Math.round(actualShareOf(stakes)) + "%";

  const hit = document.getElementById("bsMarkerHit");
  hit.setAttribute("x", PAD_L); hit.setAttribute("y", 0);
  hit.setAttribute("width", PW - PAD_L - PAD_R); hit.setAttribute("height", PH);
}

/* ================= 描画 ================= */
function render() {
  const t = T();
  const a = assess(stakes, total);

  drawChart();

  const gapLabel = (a.gap >= 0 ? "+" : "") + Math.round(a.gap) + "pt";
  document.getElementById("sumVal").textContent = gapLabel;
  document.getElementById("idealCardVal").textContent = t.htmlLang === "ja" ? `${a.idealMin.toFixed(0)}分` : `${a.idealMin.toFixed(0)} min`;
  document.getElementById("actualCardVal").textContent = t.htmlLang === "ja" ? `${a.actualMin.toFixed(0)}分` : `${a.actualMin.toFixed(0)} min`;
  document.getElementById("hint").textContent = t.hint(stakes, total, a);

  document.getElementById("stakesReadout").textContent = stakes;
  document.getElementById("totalReadout").textContent = t.htmlLang === "ja" ? `${total}分` : `${total} min`;
  if (document.activeElement !== document.getElementById("stakesSlider")) document.getElementById("stakesSlider").value = stakes;
  if (document.activeElement !== document.getElementById("stakesNum")) document.getElementById("stakesNum").value = stakes;
  if (document.activeElement !== document.getElementById("totalSlider")) document.getElementById("totalSlider").value = total;
  if (document.activeElement !== document.getElementById("totalNum")) document.getElementById("totalNum").value = total;

  const scoreEl = document.getElementById("scoreVal");
  scoreEl.textContent = a.score;
  scoreEl.className = "score-val mono" + (a.score < 45 ? " danger" : a.score < 65 ? " warn" : "");
  document.getElementById("scoreComment").textContent = t.comments[a.band];

  DevSimLab.renderShare(document.getElementById("shareBtns"), {
    url: "https://sakuichi.github.io/dev-sim-lab/bikeshedding/",
    shareText: t.shareText,
    shareHashtags: t.shareHashtags,
  });
}

/* ================= 静的コンテンツの言語適用 ================= */
function applyStaticText() {
  const t = T();
  document.title = t.docTitle;
  document.querySelector('meta[name="description"]').setAttribute("content", t.heroLead);
  document.getElementById("heroTitle").innerHTML = t.heroTitle;
  document.getElementById("heroLead").textContent = t.heroLead;
  document.getElementById("consoleLabel").textContent = t.consoleLabel;
  document.getElementById("sumLabel").textContent = t.sumLabel;
  document.getElementById("scoreLabel").textContent = t.scoreLabel;
  document.getElementById("stakesName").textContent = t.stakesName;
  document.getElementById("stakesSub").textContent = t.stakesSub;
  document.getElementById("totalName").textContent = t.totalName;
  document.getElementById("totalSub").textContent = t.totalSub;
  document.getElementById("numLabel1").textContent = t.numLabel;
  document.getElementById("numLabel2").textContent = t.numLabel;
  document.getElementById("stakesSlider").setAttribute("aria-label", t.stakesName);
  document.getElementById("totalSlider").setAttribute("aria-label", t.totalName);
  document.getElementById("numLabel1").setAttribute("aria-label", `${t.stakesName} ${t.numLabel}`);
  document.getElementById("numLabel2").setAttribute("aria-label", `${t.totalName} ${t.numLabel}`);
  document.getElementById("resetBtn").textContent = t.resetBtn;
  document.getElementById("presetReactorBtn").textContent = t.presetReactorBtn;
  document.getElementById("presetShedBtn").textContent = t.presetShedBtn;
  document.getElementById("presetCoffeeBtn").textContent = t.presetCoffeeBtn;
  document.getElementById("chartCaption").textContent = t.chartCaption;
  document.getElementById("chartNote").textContent = t.chartNote;
  document.getElementById("legendIdeal").textContent = t.legendIdeal;
  document.getElementById("legendActual").textContent = t.legendActual;
  document.getElementById("idealCardLabel").textContent = t.idealCardLabel;
  document.getElementById("actualCardLabel").textContent = t.actualCardLabel;

  document.getElementById("secAdvice").innerHTML = `
    <h2>${t.adviceHeading}</h2>
    <p>${t.adviceIntro}</p>
    <ul>${t.adviceItems.map((i) => `<li>${i}</li>`).join("")}</ul>
  `;

  document.getElementById("booksH").textContent = t.booksH;
  const booksGrid = document.getElementById("booksGrid");
  booksGrid.innerHTML = "";
  t.books.forEach((b) => {
    const div = document.createElement("div");
    div.className = "book";
    div.innerHTML = `<span class="tag">${b.tag}</span><h3>${b.title}</h3><p>${b.desc}</p>
      <a href="${b.url}" target="_blank" rel="noopener nofollow sponsored">${b.link}</a>`;
    booksGrid.appendChild(div);
  });

  DevSimLab.renderRelated(document.getElementById("relatedGrid"), { exclude: "bikeshedding" });
}

/* ================= イベント ================= */
document.getElementById("stakesSlider").addEventListener("input", (e) => { stakes = +e.target.value; render(); });
document.getElementById("stakesNum").addEventListener("change", (e) => {
  stakes = Math.min(STAKES_MAX, Math.max(STAKES_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("totalSlider").addEventListener("input", (e) => { total = +e.target.value; render(); });
document.getElementById("totalNum").addEventListener("change", (e) => {
  total = Math.min(TOTAL_MAX, Math.max(TOTAL_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("resetBtn").addEventListener("click", () => {
  stakes = 50; total = 60;
  document.getElementById("hint").textContent = "";
  render();
});
function applyPreset(key) {
  const p = PRESETS[key];
  stakes = p.stakes; total = p.total;
  render();
  const a = assess(stakes, total);
  document.getElementById("hint").textContent = T().hintPreset[key](a);
}
document.getElementById("presetReactorBtn").addEventListener("click", () => applyPreset("reactor"));
document.getElementById("presetShedBtn").addEventListener("click", () => applyPreset("shed"));
document.getElementById("presetCoffeeBtn").addEventListener("click", () => applyPreset("coffee"));

/* ---- drag the marker directly on the chart ---- */
const bsChart = document.getElementById("bsChart");
function svgPoint(evt) {
  const pt = bsChart.createSVGPoint();
  pt.x = evt.clientX; pt.y = evt.clientY;
  return pt.matrixTransform(bsChart.getScreenCTM().inverse());
}
let dragging = false;
function startDrag(evt) {
  dragging = true;
  bsChart.setPointerCapture(evt.pointerId);
  document.getElementById("bsMarker").classList.add("dragging");
  document.getElementById("bsMarkerHit").classList.add("dragging");
  updateFromPointer(evt);
  evt.preventDefault();
}
function updateFromPointer(evt) {
  const p = svgPoint(evt);
  stakes = sOfX(p.x);
  render();
}
document.getElementById("bsMarkerHit").addEventListener("pointerdown", startDrag);
bsChart.addEventListener("pointermove", (evt) => { if (dragging) updateFromPointer(evt); });
["pointerup", "pointercancel"].forEach((ev) => bsChart.addEventListener(ev, () => {
  dragging = false;
  document.getElementById("bsMarker").classList.remove("dragging");
  document.getElementById("bsMarkerHit").classList.remove("dragging");
}));

DevSimLab.initChrome({
  onRender: (lang, tone) => {
    LANG = lang; TONE = tone;
    applyStaticText();
    render();
  },
});
</script>
