"use strict";

/* ================= モデル =================
   「木のブランコ」風刺画——顧客が説明したもの、営業が売ったもの、設計されたもの、
   実装されたもの…がすべて食い違い、最終コマ「顧客が本当に必要だったもの」には
   シンプルなタイヤのブランコが描かれる。記録に残る最古の出典はロンドン大学
   計算センター(ULCC)のニュースレター#53(1973年3月)で作者不詳。1960年代末から
   非公式に流通していたとみられ、以後IBM研修資料などで世界中に広まった。
   真面目な背骨はBrooks "No Silver Bullet"(1987)の一文:
   「ソフトウェアシステム構築で最も難しいのは、何を作るかを正確に決めることである」。
   XY問題(社内Q&Aで質問者が手段を聞く)との違い: 本ページは顧客が「自分で考えた
   最強の仕様」を要求として持ち込む場面を扱う。課題から掘り直せば、より良い解
   (開発不要を含む)があり得る。
   モデル: 仕様どおりの完成率は常に95%(完成はする)。本来の課題の解決度は
   solvedOf(dig, artic) = 0.9 * (artic + (dig/100) * (100-artic) * 0.85)
   ——顧客の言語化精度(artic)なりの下限から、課題を掘る(dig)ことで回復する。
   数値は方向性を示す独自の簡易モデルであり、実証値ではない。
*/
const DIG_MIN = 0, DIG_MAX = 100;
const ARTIC_MIN = 20, ARTIC_MAX = 80;
const SPEC_DONE = 95;

function specDoneOf() { return SPEC_DONE; }
function solvedOf(dig, artic) { return 0.9 * (artic + (dig / 100) * (100 - artic) * 0.85); }
function scoreOf(dig, artic) { return Math.round(solvedOf(dig, artic)); }
function tierOf(dig, artic) {
  const s = solvedOf(dig, artic);
  if (s >= 80) return 4;
  if (s >= 65) return 3;
  if (s >= 50) return 2;
  if (s >= 35) return 1;
  return 0;
}
function boxTierOf(dig) { return Math.min(4, Math.floor(dig / 20)); }
function assess(dig, artic) {
  const spec = specDoneOf();
  const solved = solvedOf(dig, artic);
  const gap = spec - solved;
  const score = scoreOf(dig, artic);
  const band = tierOf(dig, artic);
  const box = boxTierOf(dig);
  return { spec, solved, gap, score, band, box };
}

  hintScenario: (artic, a) => `\"Just build exactly this\" — and exactly this gets built (${a.spec}%). But the real problem ends up only about ${a.solved.toFixed(0)}% solved. The cartoon's final panel — \"what the customer really needed\" — is only reachable by digging.`,
  comments: [

  books: [
    { tag: "CUSTOMER JOBS", title: "The Mom Test", desc: "Rob Fitzpatrick. The developer-favorite handbook on asking customers questions that uncover the real problem — even when they've already decided on a solution.", link: "View on Amazon →", url: "https://amzn.to/3SWiRAg" },
  ],

/* ================= 開発者モード上書き辞書 ================= */
const DEV = {
ja: {
  hint: (dig, artic, a) => `掘り度${dig}。解決度${a.solved.toFixed(0)}%。検収は通った。ユーザーは使っていない。ログイン数、先月比±0(先月はゼロ)。`,
  hintScenario: (artic, a) => `「Excelでできてることを、そのままWebにしてくれ」。そのまま作った。今、全員がWebからExcelにエクスポートして使っている。解決度${a.solved.toFixed(0)}%。`,
  comments: [
    "納品完了。要件定義書との一致率100%。課題との一致率は測定していない。",
    "「言われたとおりに作りました」は、開発側の免罪符であって、顧客の満足ではない。",
    "「なぜこの機能が?」と聞いたら「前の担当者が決めた」と言われた。前の担当者はもういない。",
    "ヒアリングで仕様の3割が消えた。顧客が一番驚いていた。「たしかに、要らないですねこれ」。",
    "提案: 「これ、開発しなくても既存機能の設定変更でできます」。受注額はゼロ、信頼は無限大。",
  ],
},
en: {
  hint: (dig, artic, a) => `Digging ${dig}. Solved ${a.solved.toFixed(0)}%. Acceptance passed. Nobody uses it. Logins vs last month: ±0 (last month was zero).`,
  hintScenario: (artic, a) => `"Just make the web version of what we do in Excel." So we did. Everyone now exports from the web back to Excel. Solved: ${a.solved.toFixed(0)}%.`,
  comments: [
    "Delivered. Match rate with the requirements doc: 100%. Match rate with the problem: unmeasured.",
    "\"We built what you asked for\" is the vendor's alibi, not the customer's satisfaction.",
    "Asked why the feature exists. \"The previous manager decided.\" The previous manager is gone.",
    "One interview deleted 30% of the spec. The customer was the most surprised: \"you're right, we don't need this.\"",
    "The proposal: \"no development needed — a settings change covers this.\" Deal size: zero. Trust: infinite.",
  ],
},
};

let LANG = "ja";
let TONE = "std";
const T = () => (TONE === "dev" ? { ...I18N[LANG], ...DEV[LANG] } : I18N[LANG]);

let dig = 30;
let artic = 50;

/* ================= チャート描画 ================= */
const NS = "http://www.w3.org/2000/svg";
const el = (tag, attrs) => {
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
};
const PW = 640, PH = 240, PAD_L = 40, PAD_R = 16, PAD_T = 30, PAD_B = 42;
const Y_MAX = 100;
const xOf = (v) => PAD_L + ((v - DIG_MIN) / (DIG_MAX - DIG_MIN)) * (PW - PAD_L - PAD_R);
const gOfX = (x) => {
  const frac = (x - PAD_L) / (PW - PAD_L - PAD_R);
  const raw = DIG_MIN + frac * (DIG_MAX - DIG_MIN);
  return Math.min(DIG_MAX, Math.max(DIG_MIN, Math.round(raw / 5) * 5));
};
const yOf = (v) => PAD_T + (1 - Math.min(v, Y_MAX) / Y_MAX) * (PH - PAD_T - PAD_B);

function drawChart() {
  const t = T();
  const gridLayer = document.getElementById("tsGridLayer");
  gridLayer.innerHTML = "";
  [0, 20, 40, 60, 80, 100].forEach((v) => {
    const y = yOf(v);
    gridLayer.appendChild(el("line", { class: "ts-grid", x1: PAD_L, y1: y, x2: PW - PAD_R, y2: y }));
    const label = el("text", { class: "ts-axis-label", x: PAD_L - 6, y: y + 3, "text-anchor": "end" });
    label.textContent = v + "%";
    gridLayer.appendChild(label);
  });
  for (let v = DIG_MIN; v <= DIG_MAX; v += 20) {
    const x = xOf(v);
    gridLayer.appendChild(el("line", { class: "ts-tick", x1: x, y1: PAD_T, x2: x, y2: PH - PAD_B }));
    const label = el("text", { class: "ts-axis-label", x, y: PH - PAD_B + 14, "text-anchor": v === DIG_MIN ? "start" : v === DIG_MAX ? "end" : "middle" });
    label.textContent = v;
    gridLayer.appendChild(label);
  }
  const yTitle = el("text", { class: "ts-axis-title", x: 2, y: 12 });
  yTitle.textContent = t.tsYTitle;
  gridLayer.appendChild(yTitle);
  const xTitle = el("text", { class: "ts-axis-title", x: PW / 2, y: PH - 4, "text-anchor": "middle" });
  xTitle.textContent = t.tsXTitle;
  gridLayer.appendChild(xTitle);

  const specY = yOf(SPEC_DONE);
  document.getElementById("tsLineSpec").setAttribute("d", `M ${PAD_L} ${specY} L ${PW - PAD_R} ${specY}`);
  const specLabel = document.getElementById("tsSpecLabel");
  specLabel.setAttribute("x", PAD_L + 4);
  specLabel.setAttribute("y", specY - 6);
  specLabel.textContent = t.tsSpecTag;

  const solvedPts = [];
  for (let v = DIG_MIN; v <= DIG_MAX; v += 2) {
    solvedPts.push(`${xOf(v)},${yOf(solvedOf(v, artic))}`);
  }
  document.getElementById("tsLineSolved").setAttribute("d", "M " + solvedPts.join(" L "));

  const dotsLayer = document.getElementById("tsDotsLayer");
  dotsLayer.innerHTML = "";
  for (let v = DIG_MIN; v <= DIG_MAX; v += 20) {
    dotsLayer.appendChild(el("circle", { class: "ts-dot", cx: xOf(v), cy: yOf(solvedOf(v, artic)), fill: "var(--alert)" }));
  }

  const mx = xOf(dig);
  const marker = document.getElementById("tsMarker");
  marker.setAttribute("x1", mx); marker.setAttribute("x2", mx);
  marker.setAttribute("y1", PAD_T); marker.setAttribute("y2", PH - PAD_B);

  const py = yOf(solvedOf(dig, artic));
  document.getElementById("tsPointSolved").setAttribute("cx", mx);
  document.getElementById("tsPointSolved").setAttribute("cy", py);

  const labelAnchor = mx > PW - PAD_R - 55 ? "end" : mx < PAD_L + 55 ? "start" : "middle";
  const labelDx = labelAnchor === "end" ? -10 : labelAnchor === "start" ? 10 : 0;
  const labelEl = document.getElementById("tsLabelSolved");
  labelEl.setAttribute("x", mx + labelDx);
  labelEl.setAttribute("y", Math.max(PAD_T + 10, py + 20));
  labelEl.setAttribute("text-anchor", labelAnchor);
  labelEl.textContent = Math.round(solvedOf(dig, artic)) + "%";

  const hit = document.getElementById("tsMarkerHit");
  hit.setAttribute("x", PAD_L); hit.setAttribute("y", 0);
  hit.setAttribute("width", PW - PAD_L - PAD_R); hit.setAttribute("height", PH);
}

/* ================= 描画 ================= */
function render() {
  const t = T();
  const a = assess(dig, artic);

  drawChart();

  document.getElementById("sumVal").textContent = `${Math.round(a.solved)}%`;
  document.getElementById("specCardVal").textContent = `${a.spec}%`;
  document.getElementById("solvedCardVal").textContent = `${Math.round(a.solved)}%`;
  document.getElementById("hint").textContent = t.hint(dig, artic, a);
  document.getElementById("scenarioBoxText").textContent = t.scenarios[a.box];

  document.getElementById("digReadout").textContent = dig;
  document.getElementById("articReadout").textContent = artic;
  if (document.activeElement !== document.getElementById("digSlider")) document.getElementById("digSlider").value = dig;
  if (document.activeElement !== document.getElementById("digNum")) document.getElementById("digNum").value = dig;
  if (document.activeElement !== document.getElementById("articSlider")) document.getElementById("articSlider").value = artic;
  if (document.activeElement !== document.getElementById("articNum")) document.getElementById("articNum").value = artic;

  const scoreEl = document.getElementById("scoreVal");
  scoreEl.textContent = a.score;
  scoreEl.className = "score-val mono" + (a.score < 50 ? " danger" : a.score < 65 ? " warn" : "");
  document.getElementById("scoreComment").textContent = t.comments[a.band];

  DevSimLab.renderShare(document.getElementById("shareBtns"), {
    url: "https://sakuichi.github.io/dev-sim-lab/tire-swing/",
    shareText: t.shareText,
    shareHashtags: t.shareHashtags,
  });
}

/* ================= 静的コンテンツの言語適用 ================= */
function applyStaticText() {
  const t = T();
  document.title = t.docTitle;
  document.querySelector('meta[name="description"]').setAttribute("content", t.heroLead);
  document.getElementById("heroTitle").innerHTML = t.heroTitle;
  document.getElementById("heroLead").textContent = t.heroLead;
  document.getElementById("consoleLabel").textContent = t.consoleLabel;
  document.getElementById("sumLabel").textContent = t.sumLabel;
  document.getElementById("scoreLabel").textContent = t.scoreLabel;
  document.getElementById("digName").textContent = t.digName;
  document.getElementById("digSub").textContent = t.digSub;
  document.getElementById("articName").textContent = t.articName;
  document.getElementById("articSub").textContent = t.articSub;
  document.getElementById("numLabel1").textContent = t.numLabel;
  document.getElementById("numLabel2").textContent = t.numLabel;
  document.getElementById("digSlider").setAttribute("aria-label", t.digName);
  document.getElementById("articSlider").setAttribute("aria-label", t.articName);
  document.getElementById("numLabel1").setAttribute("aria-label", `${t.digName} ${t.numLabel}`);
  document.getElementById("numLabel2").setAttribute("aria-label", `${t.articName} ${t.numLabel}`);
  document.getElementById("resetBtn").textContent = t.resetBtn;
  document.getElementById("scenarioBtn").textContent = t.scenarioBtn;
  document.getElementById("chartCaption").textContent = t.chartCaption;
  document.getElementById("chartNote").textContent = t.chartNote;
  document.getElementById("legendSpec").textContent = t.legendSpec;
  document.getElementById("legendSolved").textContent = t.legendSolved;
  document.getElementById("scenarioBoxTitle").textContent = t.scenarioBoxTitle;
  document.getElementById("specCardLabel").textContent = t.specCardLabel;
  document.getElementById("solvedCardLabel").textContent = t.solvedCardLabel;

  document.getElementById("secAdvice").innerHTML = `
    <h2>${t.adviceHeading}</h2>
    <p>${t.adviceIntro}</p>
    <ul>${t.adviceItems.map((i) => `<li>${i}</li>`).join("")}</ul>
  `;

  document.getElementById("booksH").textContent = t.booksH;
  const booksGrid = document.getElementById("booksGrid");
  booksGrid.innerHTML = "";
  t.books.forEach((b) => {
    const div = document.createElement("div");
    div.className = "book";
    div.innerHTML = `<span class="tag">${b.tag}</span><h3>${b.title}</h3><p>${b.desc}</p>
      <a href="${b.url}" target="_blank" rel="noopener nofollow sponsored">${b.link}</a>`;
    booksGrid.appendChild(div);
  });

  DevSimLab.renderRelated(document.getElementById("relatedGrid"), { exclude: "tire-swing" });
}

/* ================= イベント ================= */
document.getElementById("digSlider").addEventListener("input", (e) => { dig = +e.target.value; render(); });
document.getElementById("digNum").addEventListener("change", (e) => {
  dig = Math.min(DIG_MAX, Math.max(DIG_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("articSlider").addEventListener("input", (e) => { artic = +e.target.value; render(); });
document.getElementById("articNum").addEventListener("change", (e) => {
  artic = Math.min(ARTIC_MAX, Math.max(ARTIC_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("resetBtn").addEventListener("click", () => {
  dig = 30; artic = 50;
  document.getElementById("hint").textContent = "";
  render();
});
document.getElementById("scenarioBtn").addEventListener("click", () => {
  dig = 0;
  render();
  const a = assess(dig, artic);
  document.getElementById("hint").textContent = T().hintScenario(artic, a);
});

/* ---- drag the marker directly on the chart ---- */
const tsChart = document.getElementById("tsChart");
function svgPoint(evt) {
  const pt = tsChart.createSVGPoint();
  pt.x = evt.clientX; pt.y = evt.clientY;
  return pt.matrixTransform(tsChart.getScreenCTM().inverse());
}
let dragging = false;
function startDrag(evt) {
  dragging = true;
  tsChart.setPointerCapture(evt.pointerId);
  document.getElementById("tsMarker").classList.add("dragging");
  document.getElementById("tsMarkerHit").classList.add("dragging");
  updateFromPointer(evt);
  evt.preventDefault();
}
function updateFromPointer(evt) {
  const p = svgPoint(evt);
  dig = gOfX(p.x);
  render();
}
document.getElementById("tsMarkerHit").addEventListener("pointerdown", startDrag);
tsChart.addEventListener("pointermove", (evt) => { if (dragging) updateFromPointer(evt); });
["pointerup", "pointercancel"].forEach((ev) => tsChart.addEventListener(ev, () => {
  dragging = false;
  document.getElementById("tsMarker").classList.remove("dragging");
  document.getElementById("tsMarkerHit").classList.remove("dragging");
}));

DevSimLab.initChrome({
  onRender: (lang, tone) => {
    LANG = lang; TONE = tone;
    applyStaticText();
    render();
  },
});
</script>
