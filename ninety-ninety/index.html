"use strict";

/* ================= モデル =================
   「90-90ルール」——「コードの最初の90%は開発期間の最初の90%を消費する。
   残りの10%のコードが、もう一つの90%を消費する」。
   ベル研究所のTom Cargillの言葉として、Jon BentleyがCommunications of the ACM
   1985年9月号のBumper-Sticker Computer Scienceコラム(Programming Pearls連載)で
   紹介し広まった。当初はRule of Credibilityと呼ばれたが定着しなかった。
   ホフスタッターの法則(見積もり全体の自己言及的超過)に対し、本ページは
   「進捗報告の非線形性」——報告される90%に残作業の大半が隠れている——を扱う。
   モデル: 経過時間 t(当初見積もり比%)に対し、
     報告進捗 = t (t<=90) / 90 + 10*(t-90)/(90*m) (t>90、上限100)
   完了に必要な実時間 totalTime = 90 + 90*m (m=最後の10%の重さ。m=1でCargillの
   言うとおり当初の180%)。実際の完了率 = 100*t/totalTime。
   数値は方向性を示す演出であり、実測値の再現ではない。
*/
const ELAPSED_MIN = 0, ELAPSED_MAX = 180;
const MILE_MIN = 0.5, MILE_MAX = 2.0;

function totalTimeOf(m) { return 90 + 90 * m; }
function progressOf(t, m) {
  if (t <= 90) return t;
  return Math.min(100, 90 + (10 * (t - 90)) / (90 * m));
}
function actualOf(t, m) { return Math.min(100, (100 * t) / totalTimeOf(m)); }
function remainingAt90Of(m) { return 90 * m; }
function gapOf(t, m) { return progressOf(t, m) - actualOf(t, m); }
function scoreOf(t, m) { return Math.round(actualOf(t, m)); }
function tierOf(t, m) {
  const g = gapOf(t, m);
  if (g < 5) return 4;
  if (g < 15) return 3;
  if (g < 25) return 2;
  if (g < 35) return 1;
  return 0;
}
function assess(t, m) {
  const reported = progressOf(t, m);
  const actual = actualOf(t, m);
  const gap = gapOf(t, m);
  const total = totalTimeOf(m);
  const score = scoreOf(t, m);
  const band = tierOf(t, m);
  return { reported, actual, gap, total, score, band };
}

    "When you hear \"90% done,\" ask for the list of what remains. If it can't be enumerated, it isn't 90%",
    "Start integrating before the last 10% begins (continuous integration) — hidden work found early is small work",
  ],
  booksH: "Recommended reading",
  books: [
    { tag: "SCHEDULE & QUALITY", title: "The Mythical Man-Month", desc: "Frederick P. Brooks Jr. \"How does a project get to be a year late? One day at a time.\" The classic on how schedules quietly dissolve.", link: "View on Amazon →", url: "https://amzn.to/3R0mWTt" },
  ],
  toneBtn: "🔥 Developer mode",
  toneNote: "* Joke mode. Switch back to standard before client meetings.",
  shareText: "We're 90% done (same as last week, and the week before) — Ninety-Ninety Rule Simulator",
  shareHashtags: "DevSimLab",
},
};

/* ================= 開発者モード上書き辞書 ================= */
const DEV = {
ja: {
  hint: (t, m, a) => `経過${t}%。報告${a.reported.toFixed(0)}%、実際${a.actual.toFixed(0)}%。「あとはテストだけです」——そのテストで何が見つかるかは、まだ誰も知らない。`,
  hintScenario: (m, a) => `進捗90%、3週目。ガントチャートの最後のバーだけが、毎週少しずつ右に伸びている。誰もそのことには触れない。実際の完了率${a.actual.toFixed(0)}%。`,
  comments: [
    "「実質もう終わってます」。実質、が仕事をしている文章は信用してはいけない。",
    "残り10%の内訳: 統合、テスト、例外処理、性能、ドキュメント、そして本物の10%。",
    "「動いた!」の歓声から「終わった」の安堵まで、もう一つのプロジェクトぶんの距離がある。",
    "残タスクが列挙で報告されるようになった。90%が90%を意味する日は近い。",
    "「完了の定義」が壁に貼ってある。デプロイまで含まれている。この定例は退屈で、素晴らしい。",
  ],
},
en: {
  hint: (t, m, a) => `Elapsed ${t}%. Reported ${a.reported.toFixed(0)}%, actual ${a.actual.toFixed(0)}%. "Just testing left" — what the testing will find, nobody knows yet.`,
  hintScenario: (m, a) => `90% done, week three. Only the last bar of the Gantt chart keeps quietly stretching rightward each week. Nobody mentions it. Actual completion: ${a.actual.toFixed(0)}%.`,
  comments: [
    "\"It's basically done.\" Never trust a sentence where \"basically\" is doing the work.",
    "The remaining 10%: integration, tests, error handling, performance, docs — and then the actual 10%.",
    "Between the cheer of \"it works!\" and the relief of \"it's done\" lies approximately one more project.",
    "Remaining work is now reported as a list. The day 90% means 90% is near.",
    "The definition of done is taped to the wall. It includes deployment. This standup is boring, and it is beautiful.",
  ],
},
};

let LANG = "ja";
let TONE = "std";
const T = () => (TONE === "dev" ? { ...I18N[LANG], ...DEV[LANG] } : I18N[LANG]);

let elapsed = 90;
let mile = 1.0;

/* ================= チャート描画 ================= */
const NS = "http://www.w3.org/2000/svg";
const el = (tag, attrs) => {
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
};
const PW = 640, PH = 240, PAD_L = 40, PAD_R = 16, PAD_T = 30, PAD_B = 42;
const Y_MAX = 100;
const xOf = (t) => PAD_L + ((t - ELAPSED_MIN) / (ELAPSED_MAX - ELAPSED_MIN)) * (PW - PAD_L - PAD_R);
const tOfX = (x) => {
  const frac = (x - PAD_L) / (PW - PAD_L - PAD_R);
  const raw = ELAPSED_MIN + frac * (ELAPSED_MAX - ELAPSED_MIN);
  return Math.min(ELAPSED_MAX, Math.max(ELAPSED_MIN, Math.round(raw / 5) * 5));
};
const yOf = (v) => PAD_T + (1 - Math.min(v, Y_MAX) / Y_MAX) * (PH - PAD_T - PAD_B);

function drawChart() {
  const t = T();
  const gridLayer = document.getElementById("nnGridLayer");
  gridLayer.innerHTML = "";
  [0, 20, 40, 60, 80, 100].forEach((v) => {
    const y = yOf(v);
    gridLayer.appendChild(el("line", { class: "nn-grid", x1: PAD_L, y1: y, x2: PW - PAD_R, y2: y }));
    const label = el("text", { class: "nn-axis-label", x: PAD_L - 6, y: y + 3, "text-anchor": "end" });
    label.textContent = v + "%";
    gridLayer.appendChild(label);
  });
  for (let v = ELAPSED_MIN; v <= ELAPSED_MAX; v += 30) {
    const x = xOf(v);
    gridLayer.appendChild(el("line", { class: "nn-tick", x1: x, y1: PAD_T, x2: x, y2: PH - PAD_B }));
    const label = el("text", { class: "nn-axis-label", x, y: PH - PAD_B + 14, "text-anchor": v === ELAPSED_MIN ? "start" : v === ELAPSED_MAX ? "end" : "middle" });
    label.textContent = v;
    gridLayer.appendChild(label);
  }
  const yTitle = el("text", { class: "nn-axis-title", x: 2, y: 12 });
  yTitle.textContent = t.nnYTitle;
  gridLayer.appendChild(yTitle);
  const xTitle = el("text", { class: "nn-axis-title", x: PW / 2, y: PH - 4, "text-anchor": "middle" });
  xTitle.textContent = t.nnXTitle;
  gridLayer.appendChild(xTitle);

  /* original-estimate (100%) vertical reference */
  const estX = xOf(100);
  const est = document.getElementById("nnEstLine");
  est.setAttribute("x1", estX); est.setAttribute("x2", estX);
  est.setAttribute("y1", PAD_T); est.setAttribute("y2", PH - PAD_B);
  const estLabel = document.getElementById("nnEstLabel");
  estLabel.setAttribute("x", estX + 4);
  estLabel.setAttribute("y", PAD_T + 12);
  estLabel.textContent = t.nnEstTag;

  const repPts = [], actPts = [];
  for (let v = ELAPSED_MIN; v <= ELAPSED_MAX; v += 2) {
    repPts.push(`${xOf(v)},${yOf(progressOf(v, mile))}`);
    actPts.push(`${xOf(v)},${yOf(actualOf(v, mile))}`);
  }
  document.getElementById("nnLineReported").setAttribute("d", "M " + repPts.join(" L "));
  document.getElementById("nnLineActual").setAttribute("d", "M " + actPts.join(" L "));

  const dotsLayer = document.getElementById("nnDotsLayer");
  dotsLayer.innerHTML = "";
  for (let v = ELAPSED_MIN; v <= ELAPSED_MAX; v += 30) {
    dotsLayer.appendChild(el("circle", { class: "nn-dot", cx: xOf(v), cy: yOf(progressOf(v, mile)), fill: "var(--alert)" }));
  }

  const mx = xOf(elapsed);
  const marker = document.getElementById("nnMarker");
  marker.setAttribute("x1", mx); marker.setAttribute("x2", mx);
  marker.setAttribute("y1", PAD_T); marker.setAttribute("y2", PH - PAD_B);

  const repY = yOf(progressOf(elapsed, mile));
  const actY = yOf(actualOf(elapsed, mile));
  document.getElementById("nnPointReported").setAttribute("cx", mx);
  document.getElementById("nnPointReported").setAttribute("cy", repY);
  document.getElementById("nnPointActual").setAttribute("cx", mx);
  document.getElementById("nnPointActual").setAttribute("cy", actY);

  const labelAnchor = mx > PW - PAD_R - 55 ? "end" : mx < PAD_L + 55 ? "start" : "middle";
  const labelDx = labelAnchor === "end" ? -10 : labelAnchor === "start" ? 10 : 0;
  const clampY = (y) => Math.max(PAD_T + 10, Math.min(PH - PAD_B - 4, y));
  const repIsHigher = repY <= actY;

  const labelRep = document.getElementById("nnLabelReported");
  labelRep.setAttribute("x", mx + labelDx);
  labelRep.setAttribute("y", clampY(repIsHigher ? repY - 10 : repY + 20));
  labelRep.setAttribute("text-anchor", labelAnchor);
  labelRep.textContent = Math.round(progressOf(elapsed, mile)) + "%";

  const labelAct = document.getElementById("nnLabelActual");
  labelAct.setAttribute("x", mx + labelDx);
  labelAct.setAttribute("y", clampY(repIsHigher ? actY + 20 : actY - 10));
  labelAct.setAttribute("text-anchor", labelAnchor);
  labelAct.textContent = Math.round(actualOf(elapsed, mile)) + "%";

  const hit = document.getElementById("nnMarkerHit");
  hit.setAttribute("x", PAD_L); hit.setAttribute("y", 0);
  hit.setAttribute("width", PW - PAD_L - PAD_R); hit.setAttribute("height", PH);
}

/* ================= 描画 ================= */
function render() {
  const t = T();
  const a = assess(elapsed, mile);

  drawChart();

  const remain = remainingAt90Of(mile);
  document.getElementById("sumVal").textContent = t.htmlLang === "ja" ? `当初の${remain.toFixed(0)}%ぶん` : `${remain.toFixed(0)}% of the estimate`;
  document.getElementById("reportedCardVal").textContent = `${Math.round(a.reported)}%`;
  document.getElementById("actualCardVal").textContent = `${Math.round(a.actual)}%`;
  document.getElementById("hint").textContent = t.hint(elapsed, mile, a);

  document.getElementById("elapsedReadout").textContent = `${elapsed}%`;
  document.getElementById("mileReadout").textContent = `×${mile.toFixed(1)}`;
  if (document.activeElement !== document.getElementById("elapsedSlider")) document.getElementById("elapsedSlider").value = elapsed;
  if (document.activeElement !== document.getElementById("elapsedNum")) document.getElementById("elapsedNum").value = elapsed;
  if (document.activeElement !== document.getElementById("mileSlider")) document.getElementById("mileSlider").value = mile;
  if (document.activeElement !== document.getElementById("mileNum")) document.getElementById("mileNum").value = mile;

  const scoreEl = document.getElementById("scoreVal");
  scoreEl.textContent = a.score;
  scoreEl.className = "score-val mono" + (a.gap >= 25 ? " danger" : a.gap >= 15 ? " warn" : "");
  document.getElementById("scoreComment").textContent = t.comments[a.band];

  DevSimLab.renderShare(document.getElementById("shareBtns"), {
    url: "https://sakuichi.github.io/dev-sim-lab/ninety-ninety/",
    shareText: t.shareText,
    shareHashtags: t.shareHashtags,
  });
}

/* ================= 静的コンテンツの言語適用 ================= */
function applyStaticText() {
  const t = T();
  document.title = t.docTitle;
  document.querySelector('meta[name="description"]').setAttribute("content", t.heroLead);
  document.getElementById("heroTitle").innerHTML = t.heroTitle;
  document.getElementById("heroLead").textContent = t.heroLead;
  document.getElementById("consoleLabel").textContent = t.consoleLabel;
  document.getElementById("sumLabel").textContent = t.sumLabel;
  document.getElementById("scoreLabel").textContent = t.scoreLabel;
  document.getElementById("elapsedName").textContent = t.elapsedName;
  document.getElementById("elapsedSub").textContent = t.elapsedSub;
  document.getElementById("mileName").textContent = t.mileName;
  document.getElementById("mileSub").textContent = t.mileSub;
  document.getElementById("numLabel1").textContent = t.numLabel;
  document.getElementById("numLabel2").textContent = t.numLabel;
  document.getElementById("elapsedSlider").setAttribute("aria-label", t.elapsedName);
  document.getElementById("mileSlider").setAttribute("aria-label", t.mileName);
  document.getElementById("numLabel1").setAttribute("aria-label", `${t.elapsedName} ${t.numLabel}`);
  document.getElementById("numLabel2").setAttribute("aria-label", `${t.mileName} ${t.numLabel}`);
  document.getElementById("resetBtn").textContent = t.resetBtn;
  document.getElementById("scenarioBtn").textContent = t.scenarioBtn;
  document.getElementById("chartCaption").textContent = t.chartCaption;
  document.getElementById("chartNote").textContent = t.chartNote;
  document.getElementById("legendReported").textContent = t.legendReported;
  document.getElementById("legendActual").textContent = t.legendActual;
  document.getElementById("reportedCardLabel").textContent = t.reportedCardLabel;
  document.getElementById("actualCardLabel").textContent = t.actualCardLabel;

  document.getElementById("secAdvice").innerHTML = `
    <h2>${t.adviceHeading}</h2>
    <p>${t.adviceIntro}</p>
    <ul>${t.adviceItems.map((i) => `<li>${i}</li>`).join("")}</ul>
  `;

  document.getElementById("booksH").textContent = t.booksH;
  const booksGrid = document.getElementById("booksGrid");
  booksGrid.innerHTML = "";
  t.books.forEach((b) => {
    const div = document.createElement("div");
    div.className = "book";
    div.innerHTML = `<span class="tag">${b.tag}</span><h3>${b.title}</h3><p>${b.desc}</p>
      <a href="${b.url}" target="_blank" rel="noopener nofollow sponsored">${b.link}</a>`;
    booksGrid.appendChild(div);
  });

  DevSimLab.renderRelated(document.getElementById("relatedGrid"), { exclude: "ninety-ninety" });
}

/* ================= イベント ================= */
document.getElementById("elapsedSlider").addEventListener("input", (e) => { elapsed = +e.target.value; render(); });
document.getElementById("elapsedNum").addEventListener("change", (e) => {
  elapsed = Math.min(ELAPSED_MAX, Math.max(ELAPSED_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("mileSlider").addEventListener("input", (e) => { mile = +e.target.value; render(); });
document.getElementById("mileNum").addEventListener("change", (e) => {
  mile = Math.min(MILE_MAX, Math.max(MILE_MIN, Math.round(+e.target.value * 10) / 10));
  render();
});
document.getElementById("resetBtn").addEventListener("click", () => {
  elapsed = 90; mile = 1.0;
  document.getElementById("hint").textContent = "";
  render();
});
document.getElementById("scenarioBtn").addEventListener("click", () => {
  elapsed = 90;
  render();
  const a = assess(elapsed, mile);
  document.getElementById("hint").textContent = T().hintScenario(mile, a);
});

/* ---- drag the time cursor directly on the chart ---- */
const nnChart = document.getElementById("nnChart");
function svgPoint(evt) {
  const pt = nnChart.createSVGPoint();
  pt.x = evt.clientX; pt.y = evt.clientY;
  return pt.matrixTransform(nnChart.getScreenCTM().inverse());
}
let dragging = false;
function startDrag(evt) {
  dragging = true;
  nnChart.setPointerCapture(evt.pointerId);
  document.getElementById("nnMarker").classList.add("dragging");
  document.getElementById("nnMarkerHit").classList.add("dragging");
  updateFromPointer(evt);
  evt.preventDefault();
}
function updateFromPointer(evt) {
  const p = svgPoint(evt);
  elapsed = tOfX(p.x);
  render();
}
document.getElementById("nnMarkerHit").addEventListener("pointerdown", startDrag);
nnChart.addEventListener("pointermove", (evt) => { if (dragging) updateFromPointer(evt); });
["pointerup", "pointercancel"].forEach((ev) => nnChart.addEventListener(ev, () => {
  dragging = false;
  document.getElementById("nnMarker").classList.remove("dragging");
  document.getElementById("nnMarkerHit").classList.remove("dragging");
}));

DevSimLab.initChrome({
  onRender: (lang, tone) => {
    LANG = lang; TONE = tone;
    applyStaticText();
    render();
  },
});
</script>
