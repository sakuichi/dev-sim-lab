<script>
"use strict";

/* ================= モデル =================
   SRE(Site Reliability Engineering)の実務でよく言われる経験則
   「信頼性を1ナイン(桁)上げるごとに、必要なコストはおおよそ1桁増える」を
   簡易的に数式化したモデル。Googleの『SRE サイトリライアビリティエンジニアリング』では
   100%は正しい目標ではなく、100%に近づくほど限界コストは増大し、
   限界価値(利用者にとっての体感的なメリット)はゼロに近づいていくと説明されている。
   ここでの費用倍率(10^(n-1))は説明のための簡易化であり、実際の費用構造を
   再現した精緻なモデルではない。
*/
const NINE_MIN = 1, NINE_MAX = 6;
const NINES = [
  { n: 1, reliability: 0.90, label: "90%", failOneIn: 10 },
  { n: 2, reliability: 0.99, label: "99%", failOneIn: 100 },
  { n: 3, reliability: 0.999, label: "99.9%", failOneIn: 1000 },
  { n: 4, reliability: 0.9999, label: "99.99%", failOneIn: 10000 },
  { n: 5, reliability: 0.99999, label: "99.999%", failOneIn: 100000 },
  { n: 6, reliability: 0.999999, label: "99.9999%", failOneIn: 1000000 },
];
function nineOf(n) { return NINES[n - 1]; }
function costMultiplierOf(n) { return Math.pow(10, n - 1); }
function scoreOf(n) { return Math.max(0, Math.min(100, Math.round(100 - Math.abs(n - 3.5) * 32))); }
function assess(n) {
  const nine = nineOf(n);
  const cost = costMultiplierOf(n);
  const score = scoreOf(n);
  const band = n <= 1 ? 0 : n === 2 ? 1 : (n === 3 || n === 4) ? 2 : n === 5 ? 3 : 4;
  return { nine, cost, score, band };
}

/* ================= 開発者モード上書き辞書 ================= */

  hint: (a) => `${a.nine.label}を目指す。コストは${a.cost.toLocaleString()}倍。営業が「バグ0いけますよね?」と聞いてくる会議室の空気を思い出してほしい。`,

let LANG = "ja";
let TONE = "std";
const T = () => (TONE === "dev" ? { ...I18N[LANG], ...DEV[LANG] } : I18N[LANG]);

let nineIdx = 3;

/* ================= チャート描画(対数軸) ================= */
const NS = "http://www.w3.org/2000/svg";
const el = (tag, attrs) => {
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
};
const PW = 640, PH = 240, PAD_L = 46, PAD_R = 16, PAD_T = 34, PAD_B = 42;
const LOG_MIN = 0, LOG_MAX = 5; // cost 10^0 .. 10^5
const xOf = (n) => PAD_L + ((n - NINE_MIN) / (NINE_MAX - NINE_MIN)) * (PW - PAD_L - PAD_R);
const nOfX = (x) => {
  const frac = (x - PAD_L) / (PW - PAD_L - PAD_R);
  const raw = NINE_MIN + frac * (NINE_MAX - NINE_MIN);
  return Math.min(NINE_MAX, Math.max(NINE_MIN, Math.round(raw)));
};
const yOf = (cost) => PAD_T + (1 - (Math.log10(cost) - LOG_MIN) / (LOG_MAX - LOG_MIN)) * (PH - PAD_T - PAD_B);

function drawChart() {
  const t = T();
  const gridLayer = document.getElementById("zbGridLayer");
  gridLayer.innerHTML = "";
  [1, 10, 100, 1000, 10000, 100000].forEach((v) => {
    const y = yOf(v);
    gridLayer.appendChild(el("line", { class: "zb-grid", x1: PAD_L, y1: y, x2: PW - PAD_R, y2: y }));
    const label = el("text", { class: "zb-axis-label", x: PAD_L - 6, y: y + 3, "text-anchor": "end" });
    label.textContent = v.toLocaleString() + "×";
    gridLayer.appendChild(label);
  });
  NINES.forEach((nine) => {
    const x = xOf(nine.n);
    gridLayer.appendChild(el("line", { class: "zb-tick", x1: x, y1: PAD_T, x2: x, y2: PH - PAD_B }));
    const label = el("text", { class: "zb-axis-label", x, y: PH - PAD_B + 14, "text-anchor": nine.n === NINE_MIN ? "start" : nine.n === NINE_MAX ? "end" : "middle" });
    label.textContent = nine.label;
    gridLayer.appendChild(label);
  });
  const yTitle = el("text", { class: "zb-axis-title", x: 2, y: 14 });
  yTitle.textContent = t.zbYTitle;
  gridLayer.appendChild(yTitle);
  const xTitle = el("text", { class: "zb-axis-title", x: PW / 2, y: PH - 4, "text-anchor": "middle" });
  xTitle.textContent = t.zbXTitle;
  gridLayer.appendChild(xTitle);

  const pts = NINES.map((nine) => `${xOf(nine.n)},${yOf(costMultiplierOf(nine.n))}`);
  document.getElementById("zbLine").setAttribute("d", "M " + pts.join(" L "));
  document.getElementById("zbArea").setAttribute("d", "M " + xOf(NINE_MIN) + "," + yOf(1) + " L " + pts.join(" L ") + " L " + xOf(NINE_MAX) + "," + yOf(1) + " Z");

  const dotsLayer = document.getElementById("zbDotsLayer");
  dotsLayer.innerHTML = "";
  NINES.forEach((nine) => {
    dotsLayer.appendChild(el("circle", { class: "zb-dot", cx: xOf(nine.n), cy: yOf(costMultiplierOf(nine.n)) }));
  });

  const infLabel = document.getElementById("zbInfLabel");
  infLabel.setAttribute("x", PW - PAD_R);
  infLabel.setAttribute("y", PAD_T - 10);
  infLabel.setAttribute("text-anchor", "end");
  infLabel.textContent = t.infLabel;

  const mx = xOf(nineIdx), my = yOf(costMultiplierOf(nineIdx));
  const marker = document.getElementById("zbMarker");
  marker.setAttribute("x1", mx); marker.setAttribute("x2", mx);
  marker.setAttribute("y1", my); marker.setAttribute("y2", PH - PAD_B);

  const hit = document.getElementById("zbMarkerHit");
  hit.setAttribute("x", PAD_L); hit.setAttribute("y", 0);
  hit.setAttribute("width", PW - PAD_L - PAD_R); hit.setAttribute("height", PH);
}

/* ================= 描画 ================= */
function render() {
  const t = T();
  const a = assess(nineIdx);

  drawChart();

  document.getElementById("sumVal").textContent = a.nine.label;
  document.getElementById("costCardVal").textContent = t.htmlLang === "ja" ? `${a.cost.toLocaleString()}倍` : `${a.cost.toLocaleString()}×`;
  document.getElementById("rateCardVal").textContent = t.htmlLang === "ja" ? `${a.nine.failOneIn.toLocaleString()}件に1件` : `1 in ${a.nine.failOneIn.toLocaleString()}`;
  document.getElementById("hint").textContent = t.hint(a);

  document.getElementById("nineReadout").textContent = a.nine.label;
  if (document.activeElement !== document.getElementById("nineSlider")) document.getElementById("nineSlider").value = nineIdx;
  if (document.activeElement !== document.getElementById("nineNum")) document.getElementById("nineNum").value = nineIdx;

  const scoreEl = document.getElementById("scoreVal");
  scoreEl.textContent = a.score;
  scoreEl.className = "score-val mono" + (a.score < 45 ? " danger" : a.score < 65 ? " warn" : "");
  document.getElementById("scoreComment").textContent = t.comments[a.band];

  DevSimLab.renderShare(document.getElementById("shareBtns"), {
    url: "https://sakuichi.github.io/dev-sim-lab/zero-bugs/",
    shareText: t.shareText,
    shareHashtags: t.shareHashtags,
  });
}

/* ================= 静的コンテンツの言語適用 ================= */
function applyStaticText() {
  const t = T();
  document.title = t.docTitle;
  document.querySelector('meta[name="description"]').setAttribute("content", t.heroLead);
  document.getElementById("heroTitle").innerHTML = t.heroTitle;
  document.getElementById("heroLead").textContent = t.heroLead;
  document.getElementById("consoleLabel").textContent = t.consoleLabel;
  document.getElementById("sumLabel").textContent = t.sumLabel;
  document.getElementById("scoreLabel").textContent = t.scoreLabel;
  document.getElementById("nineName").textContent = t.nineName;
  document.getElementById("nineSub").textContent = t.nineSub;
  document.getElementById("numLabel1").textContent = t.numLabel;
  document.getElementById("nineSlider").setAttribute("aria-label", t.nineName);
  document.getElementById("numLabel1").setAttribute("aria-label", `${t.nineName} ${t.numLabel}`);
  document.getElementById("resetBtn").textContent = t.resetBtn;
  document.getElementById("scenarioBtn").textContent = t.scenarioBtn;
  document.getElementById("chartCaption").textContent = t.chartCaption;
  document.getElementById("chartNote").textContent = t.chartNote;
  document.getElementById("costCardLabel").textContent = t.costCardLabel;
  document.getElementById("rateCardLabel").textContent = t.rateCardLabel;

  document.getElementById("secAdvice").innerHTML = `
    <h2>${t.adviceHeading}</h2>
    <p>${t.adviceIntro}</p>
    <ul>${t.adviceItems.map((i) => `<li>${i}</li>`).join("")}</ul>
  `;

  document.getElementById("booksH").textContent = t.booksH;
  const booksGrid = document.getElementById("booksGrid");
  booksGrid.innerHTML = "";
  t.books.forEach((b) => {
    const div = document.createElement("div");
    div.className = "book";
    div.innerHTML = `<span class="tag">${b.tag}</span><h3>${b.title}</h3><p>${b.desc}</p>
      <a href="${b.url}" target="_blank" rel="noopener nofollow sponsored">${b.link}</a>`;
    booksGrid.appendChild(div);
  });

  DevSimLab.renderRelated(document.getElementById("relatedGrid"), { exclude: "zero-bugs" });
}

/* ================= イベント ================= */
document.getElementById("nineSlider").addEventListener("input", (e) => { nineIdx = +e.target.value; render(); });
document.getElementById("nineNum").addEventListener("change", (e) => {
  nineIdx = Math.min(NINE_MAX, Math.max(NINE_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("resetBtn").addEventListener("click", () => {
  nineIdx = 3;
  document.getElementById("hint").textContent = "";
  render();
});
document.getElementById("scenarioBtn").addEventListener("click", () => {
  nineIdx = 6;
  render();
  const a = assess(nineIdx);
  document.getElementById("hint").textContent = T().hintScenario(a);
});

/* ---- drag the marker directly on the chart (6 discrete nines) ---- */
const zbChart = document.getElementById("zbChart");
function svgPoint(evt) {
  const pt = zbChart.createSVGPoint();
  pt.x = evt.clientX; pt.y = evt.clientY;
  return pt.matrixTransform(zbChart.getScreenCTM().inverse());
}
let dragging = false;
function startDrag(evt) {
  dragging = true;
  zbChart.setPointerCapture(evt.pointerId);
  document.getElementById("zbMarker").classList.add("dragging");
  document.getElementById("zbMarkerHit").classList.add("dragging");
  updateFromPointer(evt);
  evt.preventDefault();
}
function updateFromPointer(evt) {
  const p = svgPoint(evt);
  nineIdx = nOfX(p.x);
  render();
}
document.getElementById("zbMarkerHit").addEventListener("pointerdown", startDrag);
zbChart.addEventListener("pointermove", (evt) => { if (dragging) updateFromPointer(evt); });
["pointerup", "pointercancel"].forEach((ev) => zbChart.addEventListener(ev, () => {
  dragging = false;
  document.getElementById("zbMarker").classList.remove("dragging");
  document.getElementById("zbMarkerHit").classList.remove("dragging");
}));

DevSimLab.initChrome({
  onRender: (lang, tone) => {
    LANG = lang; TONE = tone;
    applyStaticText();
    render();
  },
});
</script>
