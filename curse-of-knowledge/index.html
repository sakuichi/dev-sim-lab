"use strict";

/* ================= モデル =================
   「知識の呪縛(Curse of Knowledge)」を、Elizabeth Newton(1990)の有名な実験
   (曲のリズムを指でテーブルを叩いて伝える「タッパー」と、それを聞く「リスナー」)
   を起点にモデル化したもの。タッパーは「50%くらいは当ててくれるはず」と予測したが、
   実際に正解できたリスナーはわずか2.5%だった。
   デフォルト値(専門性0%・工夫0%)はこの実験の数値(想定50% / 実際2.5%)そのものに
   一致させている。専門性(specificity)が上がるほど、送り手の想定(sender)はむしろ
   楽観的になり(専門家ほど「これくらい常識」と感じやすいため)、受け手の実際の理解
   (receiver)はより大きく下がる。伝え方への工夫(effort)は受け手側の理解を押し上げる。
   これは特定の実証研究の数値をそのまま外挿したものではなく、方向性を示す簡易モデル。
*/
const SPEC_MIN = 0, SPEC_MAX = 100;
const EFFORT_MIN = 0, EFFORT_MAX = 100;

function senderAssumedOf(spec) { return 50 + spec * 0.2; }
function receiverActualOf(spec, effort) {
  return Math.max(0, Math.min(100, 2.5 - spec * 0.15 + effort * 0.6));
}
function gapOf(spec, effort) { return senderAssumedOf(spec) - receiverActualOf(spec, effort); }
function scoreOf(spec, effort) {
  const gap = Math.max(0, gapOf(spec, effort));
  return Math.max(0, Math.min(100, Math.round(100 - gap)));
}
function assess(spec, effort) {
  const sender = senderAssumedOf(spec);
  const receiver = receiverActualOf(spec, effort);
  const gap = gapOf(spec, effort);
  const score = scoreOf(spec, effort);
  const band = score >= 85 ? 0 : score >= 65 ? 1 : score >= 45 ? 2 : score >= 25 ? 3 : 4;
  return { sender, receiver, gap, score, band };
}

    "Only the person who wrote the meeting notes actually understands this.",
    "They said \"got it,\" but their eyes said otherwise.",
    "The dreaded \"wait, didn't I already explain this?\" conversation begins.",
  ],
},
};

let LANG = "ja";
let TONE = "std";
const T = () => (TONE === "dev" ? { ...I18N[LANG], ...DEV[LANG] } : I18N[LANG]);

let specificity = 0;
let effort = 0;

/* ================= チャート描画 ================= */
const NS = "http://www.w3.org/2000/svg";
const el = (tag, attrs) => {
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
};
const PW = 640, PH = 240, PAD_L = 40, PAD_R = 16, PAD_T = 30, PAD_B = 42;
const Y_MAX = 100;
const xOf = (s) => PAD_L + ((s - SPEC_MIN) / (SPEC_MAX - SPEC_MIN)) * (PW - PAD_L - PAD_R);
const sOfX = (x) => {
  const frac = (x - PAD_L) / (PW - PAD_L - PAD_R);
  const raw = SPEC_MIN + frac * (SPEC_MAX - SPEC_MIN);
  return Math.min(SPEC_MAX, Math.max(SPEC_MIN, Math.round(raw / 5) * 5));
};
const yOf = (v) => PAD_T + (1 - Math.min(v, Y_MAX) / Y_MAX) * (PH - PAD_T - PAD_B);

function drawChart() {
  const t = T();
  const gridLayer = document.getElementById("ckGridLayer");
  gridLayer.innerHTML = "";
  [0, 20, 40, 60, 80, 100].forEach((v) => {
    const y = yOf(v);
    gridLayer.appendChild(el("line", { class: "ck-grid", x1: PAD_L, y1: y, x2: PW - PAD_R, y2: y }));
    const label = el("text", { class: "ck-axis-label", x: PAD_L - 6, y: y + 3, "text-anchor": "end" });
    label.textContent = v + "%";
    gridLayer.appendChild(label);
  });
  for (let s = SPEC_MIN; s <= SPEC_MAX; s += 20) {
    const x = xOf(s);
    gridLayer.appendChild(el("line", { class: "ck-tick", x1: x, y1: PAD_T, x2: x, y2: PH - PAD_B }));
    const label = el("text", { class: "ck-axis-label", x, y: PH - PAD_B + 14, "text-anchor": s === SPEC_MIN ? "start" : s === SPEC_MAX ? "end" : "middle" });
    label.textContent = s + "%";
    gridLayer.appendChild(label);
  }
  const yTitle = el("text", { class: "ck-axis-title", x: 2, y: 12 });
  yTitle.textContent = t.ckYTitle;
  gridLayer.appendChild(yTitle);
  const xTitle = el("text", { class: "ck-axis-title", x: PW / 2, y: PH - 4, "text-anchor": "middle" });
  xTitle.textContent = t.ckXTitle;
  gridLayer.appendChild(xTitle);

  const senderPts = [], receiverPts = [], gapTop = [], gapBottom = [];
  for (let s = SPEC_MIN; s <= SPEC_MAX; s += 2) {
    senderPts.push(`${xOf(s)},${yOf(senderAssumedOf(s))}`);
    receiverPts.push(`${xOf(s)},${yOf(receiverActualOf(s, effort))}`);
    gapTop.push(`${xOf(s)},${yOf(senderAssumedOf(s))}`);
    gapBottom.unshift(`${xOf(s)},${yOf(receiverActualOf(s, effort))}`);
  }
  document.getElementById("ckLineSender").setAttribute("d", "M " + senderPts.join(" L "));
  document.getElementById("ckLineReceiver").setAttribute("d", "M " + receiverPts.join(" L "));
  document.getElementById("ckGap").setAttribute("d", "M " + gapTop.join(" L ") + " L " + gapBottom.join(" L ") + " Z");

  const dotsLayer = document.getElementById("ckDotsLayer");
  dotsLayer.innerHTML = "";
  for (let s = SPEC_MIN; s <= SPEC_MAX; s += 20) {
    dotsLayer.appendChild(el("circle", { class: "ck-dot", cx: xOf(s), cy: yOf(senderAssumedOf(s)), fill: "var(--d)" }));
    dotsLayer.appendChild(el("circle", { class: "ck-dot", cx: xOf(s), cy: yOf(receiverActualOf(s, effort)), fill: "var(--alert)" }));
  }

  const mx = xOf(specificity);
  const marker = document.getElementById("ckMarker");
  marker.setAttribute("x1", mx); marker.setAttribute("x2", mx);
  marker.setAttribute("y1", PAD_T); marker.setAttribute("y2", PH - PAD_B);

  const hit = document.getElementById("ckMarkerHit");
  hit.setAttribute("x", PAD_L); hit.setAttribute("y", 0);
  hit.setAttribute("width", PW - PAD_L - PAD_R); hit.setAttribute("height", PH);
}

/* ================= 描画 ================= */
function render() {
  const t = T();
  const a = assess(specificity, effort);

  drawChart();

  document.getElementById("sumVal").textContent = `${Math.max(0, a.gap).toFixed(1)}pt`;
  document.getElementById("senderCardVal").textContent = `${a.sender.toFixed(1)}%`;
  document.getElementById("receiverCardVal").textContent = `${a.receiver.toFixed(1)}%`;
  document.getElementById("hint").textContent = t.hint(specificity, effort, a);

  document.getElementById("specReadout").textContent = specificity + "%";
  document.getElementById("effortReadout").textContent = effort + "%";
  if (document.activeElement !== document.getElementById("specSlider")) document.getElementById("specSlider").value = specificity;
  if (document.activeElement !== document.getElementById("specNum")) document.getElementById("specNum").value = specificity;
  if (document.activeElement !== document.getElementById("effortSlider")) document.getElementById("effortSlider").value = effort;
  if (document.activeElement !== document.getElementById("effortNum")) document.getElementById("effortNum").value = effort;

  const scoreEl = document.getElementById("scoreVal");
  scoreEl.textContent = a.score;
  scoreEl.className = "score-val mono" + (a.score < 45 ? " danger" : a.score < 65 ? " warn" : "");
  document.getElementById("scoreComment").textContent = t.comments[a.band];

  DevSimLab.renderShare(document.getElementById("shareBtns"), {
    url: "https://sakuichi.github.io/dev-sim-lab/curse-of-knowledge/",
    shareText: t.shareText,
    shareHashtags: t.shareHashtags,
  });
}

/* ================= 静的コンテンツの言語適用 ================= */
function applyStaticText() {
  const t = T();
  document.title = t.docTitle;
  document.querySelector('meta[name="description"]').setAttribute("content", t.heroLead);
  document.getElementById("heroTitle").innerHTML = t.heroTitle;
  document.getElementById("heroLead").textContent = t.heroLead;
  document.getElementById("consoleLabel").textContent = t.consoleLabel;
  document.getElementById("sumLabel").textContent = t.sumLabel;
  document.getElementById("scoreLabel").textContent = t.scoreLabel;
  document.getElementById("specName").textContent = t.specName;
  document.getElementById("specSub").textContent = t.specSub;
  document.getElementById("effortName").textContent = t.effortName;
  document.getElementById("effortSub").textContent = t.effortSub;
  document.getElementById("numLabel1").textContent = t.numLabel;
  document.getElementById("numLabel2").textContent = t.numLabel;
  document.getElementById("specSlider").setAttribute("aria-label", t.specName);
  document.getElementById("effortSlider").setAttribute("aria-label", t.effortName);
  document.getElementById("numLabel1").setAttribute("aria-label", `${t.specName} ${t.numLabel}`);
  document.getElementById("numLabel2").setAttribute("aria-label", `${t.effortName} ${t.numLabel}`);
  document.getElementById("resetBtn").textContent = t.resetBtn;
  document.getElementById("scenarioBtn").textContent = t.scenarioBtn;
  document.getElementById("chartCaption").textContent = t.chartCaption;
  document.getElementById("chartNote").textContent = t.chartNote;
  document.getElementById("legendSender").textContent = t.legendSender;
  document.getElementById("legendReceiver").textContent = t.legendReceiver;
  document.getElementById("senderCardLabel").textContent = t.senderCardLabel;
  document.getElementById("receiverCardLabel").textContent = t.receiverCardLabel;

  document.getElementById("secAdvice").innerHTML = `
    <h2>${t.adviceHeading}</h2>
    <p>${t.adviceIntro}</p>
    <ul>${t.adviceItems.map((i) => `<li>${i}</li>`).join("")}</ul>
  `;

  document.getElementById("booksH").textContent = t.booksH;
  const booksGrid = document.getElementById("booksGrid");
  booksGrid.innerHTML = "";
  t.books.forEach((b) => {
    const div = document.createElement("div");
    div.className = "book";
    div.innerHTML = `<span class="tag">${b.tag}</span><h3>${b.title}</h3><p>${b.desc}</p>
      <a href="${b.url}" target="_blank" rel="noopener nofollow sponsored">${b.link}</a>`;
    booksGrid.appendChild(div);
  });

  DevSimLab.renderRelated(document.getElementById("relatedGrid"), { exclude: "curse-of-knowledge" });
}

/* ================= イベント ================= */
document.getElementById("specSlider").addEventListener("input", (e) => { specificity = +e.target.value; render(); });
document.getElementById("specNum").addEventListener("change", (e) => {
  specificity = Math.min(SPEC_MAX, Math.max(SPEC_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("effortSlider").addEventListener("input", (e) => { effort = +e.target.value; render(); });
document.getElementById("effortNum").addEventListener("change", (e) => {
  effort = Math.min(EFFORT_MAX, Math.max(EFFORT_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("resetBtn").addEventListener("click", () => {
  specificity = 0; effort = 0;
  document.getElementById("hint").textContent = "";
  render();
});
document.getElementById("scenarioBtn").addEventListener("click", () => {
  specificity = 100; effort = 0;
  render();
  const a = assess(specificity, effort);
  document.getElementById("hint").textContent = T().hintScenario(a);
});

/* ---- drag the marker directly on the chart ---- */
const ckChart = document.getElementById("ckChart");
function svgPoint(evt) {
  const pt = ckChart.createSVGPoint();
  pt.x = evt.clientX; pt.y = evt.clientY;
  return pt.matrixTransform(ckChart.getScreenCTM().inverse());
}
let dragging = false;
function startDrag(evt) {
  dragging = true;
  ckChart.setPointerCapture(evt.pointerId);
  document.getElementById("ckMarker").classList.add("dragging");
  document.getElementById("ckMarkerHit").classList.add("dragging");
  updateFromPointer(evt);
  evt.preventDefault();
}
function updateFromPointer(evt) {
  const p = svgPoint(evt);
  specificity = sOfX(p.x);
  render();
}
document.getElementById("ckMarkerHit").addEventListener("pointerdown", startDrag);
ckChart.addEventListener("pointermove", (evt) => { if (dragging) updateFromPointer(evt); });
["pointerup", "pointercancel"].forEach((ev) => ckChart.addEventListener(ev, () => {
  dragging = false;
  document.getElementById("ckMarker").classList.remove("dragging");
  document.getElementById("ckMarkerHit").classList.remove("dragging");
}));

DevSimLab.initChrome({
  onRender: (lang, tone) => {
    LANG = lang; TONE = tone;
    applyStaticText();
    render();
  },
});
</script>
