<script>
"use strict";

// Simulator metadata lives in one place: assets/common.js (DevSimLab.SIMS),
// shared by this landing page's card grid and every page's related-links section.
const SIMS = DevSimLab.SIMS;

const PAGE_I18N = {
  ja: {
    docTitle: "開発あるある図鑑 | ソフトウェア開発シミュレーターシリーズ",
    description: "品質・コスト・納期、人員計画、稼働率…ソフトウェア開発でよくある誤解を、インタラクティブなシミュレーターで体験できるシリーズサイト。",
    heroTitle: "「あるある」を、体験でわかる形に。",
    heroLead: "ソフトウェア開発の現場ではよく知られているのに、経営層やステークホルダーには伝わりにくい「あるある」を、インタラクティブなシミュレーターで体験できるシリーズです。1つの問い、1つのシミュレーター。気になるテーマから触ってみてください。",
    badgeLive: "公開中",
    badgeSoon: "準備中",
    shareText: "開発あるある図鑑 | ソフトウェア開発の「あるある」を体験できるシミュレーターシリーズ",
    shareHashtags: "開発あるある図鑑",
  },
  en: {
    docTitle: "Dev Sim Lab | Software Development Misconception Simulators",
    description: "A series of interactive simulators that make common software-development misconceptions — about quality, cost, delivery, staffing, and utilization — tangible for stakeholders.",
    heroTitle: "Things every engineer knows — now something you can feel.",
    heroLead: "Software teams know these patterns by heart, but they rarely land with management or stakeholders. This series turns each misconception into a hands-on simulator: one question, one simulator. Pick a topic and try it yourself.",
    badgeLive: "Live",
    badgeSoon: "Coming soon",
    shareText: "Dev Sim Lab — an interactive simulator series for common software development misconceptions",
    shareHashtags: "DevSimLab",
  },
};

const SITE_URL = "https://sakuichi.github.io/dev-sim-lab/";

function renderCards(lang) {
  const t = PAGE_I18N[lang];
  const grid = document.getElementById("simGrid");
  grid.innerHTML = "";
  SIMS.forEach((sim) => {
    const isLive = sim.status === "live";
    const el = document.createElement(isLive ? "a" : "div");
    el.className = "sim-card" + (isLive ? "" : " is-soon");
    if (isLive) el.href = sim.href;
    const badge = isLive ? t.badgeLive : t.badgeSoon;
    const content = sim[lang];
    el.innerHTML = `
      <span class="sim-badge${isLive ? " live" : ""}">${badge}</span>
      <div class="sim-eyebrow">${sim.id}</div>
      <h2>${content.title}</h2>
      <p>${content.desc}</p>
      <div class="sim-tags">${sim.tags[lang].map((tag) => `<span>${tag}</span>`).join("")}</div>
    `;
    grid.appendChild(el);
  });
}

function render(lang) {
  const t = PAGE_I18N[lang];
  document.title = t.docTitle;
  document.querySelector('meta[name="description"]').setAttribute("content", t.description);
  document.getElementById("heroTitle").textContent = t.heroTitle;
  document.getElementById("heroLead").textContent = t.heroLead;
  renderCards(lang);
  DevSimLab.renderShare(document.getElementById("shareBtns"), {
    url: SITE_URL,
    shareText: t.shareText,
    shareHashtags: t.shareHashtags,
  });
}

DevSimLab.initChrome({ onRender: (lang) => render(lang) });
</script>
</body>
</html>
