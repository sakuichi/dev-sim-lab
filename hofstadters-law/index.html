"use strict";

/* ================= モデル =================
   「ホフスタッターの法則」——"いつでも予想以上に時間がかかる。
   ホフスタッターの法則を考慮に入れても。"
   ダグラス・ホフスタッターが『ゲーデル、エッシャー、バッハ』(1979年、
   ピュリッツァー賞受賞)で、チェスコンピュータの実現予測が「あと10年」と
   言われ続けた文脈で提示した、自己言及的な経験則。
   真面目な裏付けは「計画錯誤(planning fallacy)」(Kahneman & Tversky, 1979)。
   Buehlerら(1994)の卒業論文研究では、学生の予測平均33.9日に対し実際は
   平均55.5日(約1.6倍)かかり、「99%確実」とした期日さえ大半が守れなかった。
   本モデルの超過係数 OVERRUN=1.6 はこの研究の比率を目安にした演出であり、
   実際の超過率はタスクや組織によって大きく異なる。
   自己言及の再現: バッファをどれだけ積んでも、実際の所要時間は
   「バッファ込みの予定」のさらに1.6倍になる——つまり法則を考慮した予定に対しても
   法則が適用される。その結果、予定/実際の比率(スコア)は何をしても変わらない。
*/
const EST_MIN = 5, EST_MAX = 60;
const BUF_MIN = 1.0, BUF_MAX = 3.0;
const OVERRUN = 1.6;

function plannedOf(est, buf) { return est * buf; }
function actualOf(est, buf) { return plannedOf(est, buf) * OVERRUN; }
function overrunDaysOf(est, buf) { return actualOf(est, buf) - plannedOf(est, buf); }
function scoreOf() { return Math.round((1 / OVERRUN) * 100); }
function tierOf(buf) {
  if (buf < 1.2) return 0;
  if (buf < 1.5) return 1;
  if (buf < 2.0) return 2;
  if (buf < 2.5) return 3;
  return 4;
}
function assess(est, buf) {
  const planned = plannedOf(est, buf);
  const actual = actualOf(est, buf);
  const overrun = overrunDaysOf(est, buf);
  const score = scoreOf();
  const band = tierOf(buf);
  return { planned, actual, overrun, score, band };
}

    "Hold buffer as a range from your historical distribution (median and bad-tail), not a flat multiplier",
    "Remember Buehler's students missed even their \"99% certain\" dates — separate committed deadlines from internal targets",
    "Log the reason every time you overrun and feed it into the next estimate — you can't beat the law, but you can narrow it",
  ],
  booksH: "Recommended reading",
  books: [
    { tag: "ORIGIN", title: "Gödel, Escher, Bach: An Eternal Golden Braid", desc: "Douglas Hofstadter. The Pulitzer-winning labyrinth of self-reference where the law first appeared.", link: "View on Amazon →", url: "https://amzn.to/4eWTfMb" },
    { tag: "DECISION MAKING", title: "Thinking, Fast and Slow", desc: "Daniel Kahneman. The classic by the researcher who named the planning fallacy, on exactly how our estimates go wrong.", link: "View on Amazon →", url: "https://amzn.to/4vV3CWL" },
  ],
  toneBtn: "🔥 Developer mode",
  toneNote: "* Joke mode. Switch back to standard before client meetings.",
  shareText: "You padded the estimate — so why is it late again? — Hofstadter's Law Simulator",
  shareHashtags: "DevSimLab",
},
};

/* ================= 開発者モード上書き辞書 ================= */
const DEV = {
ja: {
  hint: (est, buf, a) => `バッファ${buf.toFixed(1)}倍。予定${a.planned.toFixed(1)}日、実際${a.actual.toFixed(1)}日。「進捗どうですか」「順調です」(残り90%が残っている)。スコアは今日も63。`,
  hintScenario: (est, buf, a) => `前回の反省を活かしてバッファを1.6倍に。それでも${a.overrun.toFixed(1)}日超過。反省会の結論は今回も「次はバッファを積もう」。`,
  comments: [
    "「たぶん3日でできます」。この言葉が発された瞬間、6日コースが確定した。",
    "「余裕を見て1.2倍にしました」。その余裕は初日の環境構築で消えた。",
    "1.5倍のバッファ。祝日と障害対応とレビュー待ちが、静かに笑っている。",
    "2倍のバッファを申請したら「多すぎない?」と言われた。多くなかった。",
    "バッファ3倍。もはや見積もりではなく祈り。それでも足りないのがこの法則。",
  ],
},
en: {
  hint: (est, buf, a) => `Buffer ${buf.toFixed(1)}×. Plan ${a.planned.toFixed(1)} days, actual ${a.actual.toFixed(1)}. "How's progress?" "On track" (the remaining 90% remains). Score: 63, as always.`,
  hintScenario: (est, buf, a) => `Lessons learned from last time: buffer ×1.6. Still ${a.overrun.toFixed(1)} days over. The retro's conclusion, once again: "next time, let's add buffer."`,
  comments: [
    "\"Should take about three days.\" The moment those words were spoken, a six-day course was locked in.",
    "\"I added 20% to be safe.\" That safety evaporated during day-one environment setup.",
    "A 1.5× buffer. The holidays, the incident, and the review queue are quietly smiling.",
    "Requested a 2× buffer and got asked \"isn't that too much?\" It was not too much.",
    "A 3× buffer. At this point it's not an estimate, it's a prayer. And per the law, still not enough.",
  ],
},
};

let LANG = "ja";
let TONE = "std";
const T = () => (TONE === "dev" ? { ...I18N[LANG], ...DEV[LANG] } : I18N[LANG]);

let est = 20;
let buf = 1.2;

/* ================= チャート描画 ================= */
const NS = "http://www.w3.org/2000/svg";
const el = (tag, attrs) => {
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
};
const PW = 640, PH = 240, PAD_L = 44, PAD_R = 16, PAD_T = 30, PAD_B = 42;
/* Y軸は「見積もり×5」で動的にスケールする(グリッド線1本=見積もり1個ぶん)。
   実際の最大値は est×3×1.6=4.8est なので常に収まる。 */
const yMax = () => est * 5;
const xOf = (b) => PAD_L + ((b - BUF_MIN) / (BUF_MAX - BUF_MIN)) * (PW - PAD_L - PAD_R);
const bOfX = (x) => {
  const frac = (x - PAD_L) / (PW - PAD_L - PAD_R);
  const raw = BUF_MIN + frac * (BUF_MAX - BUF_MIN);
  return Math.min(BUF_MAX, Math.max(BUF_MIN, Math.round(raw * 10) / 10));
};
const yOf = (v) => PAD_T + (1 - Math.min(v, yMax()) / yMax()) * (PH - PAD_T - PAD_B);

function drawChart() {
  const t = T();
  const gridLayer = document.getElementById("hlGridLayer");
  gridLayer.innerHTML = "";
  [0, 1, 2, 3, 4, 5].map((i) => i * est).forEach((v) => {
    const y = yOf(v);
    gridLayer.appendChild(el("line", { class: "hl-grid", x1: PAD_L, y1: y, x2: PW - PAD_R, y2: y }));
    const label = el("text", { class: "hl-axis-label", x: PAD_L - 6, y: y + 3, "text-anchor": "end" });
    label.textContent = v;
    gridLayer.appendChild(label);
  });
  for (let b = 10; b <= 30; b += 5) {
    const bv = b / 10;
    const x = xOf(bv);
    gridLayer.appendChild(el("line", { class: "hl-tick", x1: x, y1: PAD_T, x2: x, y2: PH - PAD_B }));
    const label = el("text", { class: "hl-axis-label", x, y: PH - PAD_B + 14, "text-anchor": bv === BUF_MIN ? "start" : bv === BUF_MAX ? "end" : "middle" });
    label.textContent = "×" + bv.toFixed(1);
    gridLayer.appendChild(label);
  }
  const yTitle = el("text", { class: "hl-axis-title", x: 2, y: 12 });
  yTitle.textContent = t.hlYTitle;
  gridLayer.appendChild(yTitle);
  const xTitle = el("text", { class: "hl-axis-title", x: PW / 2, y: PH - 4, "text-anchor": "middle" });
  xTitle.textContent = t.hlXTitle;
  gridLayer.appendChild(xTitle);

  const plannedPts = [], actualPts = [];
  for (let b = 10; b <= 30; b += 1) {
    const bv = b / 10;
    plannedPts.push(`${xOf(bv)},${yOf(plannedOf(est, bv))}`);
    actualPts.push(`${xOf(bv)},${yOf(actualOf(est, bv))}`);
  }
  document.getElementById("hlLinePlanned").setAttribute("d", "M " + plannedPts.join(" L "));
  document.getElementById("hlLineActual").setAttribute("d", "M " + actualPts.join(" L "));

  const dotsLayer = document.getElementById("hlDotsLayer");
  dotsLayer.innerHTML = "";
  for (let b = 10; b <= 30; b += 5) {
    const bv = b / 10;
    dotsLayer.appendChild(el("circle", { class: "hl-dot", cx: xOf(bv), cy: yOf(plannedOf(est, bv)), fill: "var(--q)" }));
    dotsLayer.appendChild(el("circle", { class: "hl-dot", cx: xOf(bv), cy: yOf(actualOf(est, bv)), fill: "var(--alert)" }));
  }

  const mx = xOf(buf);
  const marker = document.getElementById("hlMarker");
  marker.setAttribute("x1", mx); marker.setAttribute("x2", mx);
  marker.setAttribute("y1", PAD_T); marker.setAttribute("y2", PH - PAD_B);

  const plannedY = yOf(plannedOf(est, buf));
  const actualY = yOf(actualOf(est, buf));
  document.getElementById("hlPointPlanned").setAttribute("cx", mx);
  document.getElementById("hlPointPlanned").setAttribute("cy", plannedY);
  document.getElementById("hlPointActual").setAttribute("cx", mx);
  document.getElementById("hlPointActual").setAttribute("cy", actualY);

  const labelAnchor = mx > PW - PAD_R - 55 ? "end" : mx < PAD_L + 55 ? "start" : "middle";
  const labelDx = labelAnchor === "end" ? -10 : labelAnchor === "start" ? 10 : 0;
  const clampY = (y) => Math.max(PAD_T + 10, Math.min(PH - PAD_B - 4, y));
  const dayLabel = (v) => (T().htmlLang === "ja" ? `${v.toFixed(1)}日` : `${v.toFixed(1)}d`);

  const labelPlanned = document.getElementById("hlLabelPlanned");
  labelPlanned.setAttribute("x", mx + labelDx);
  labelPlanned.setAttribute("y", clampY(plannedY + 20));
  labelPlanned.setAttribute("text-anchor", labelAnchor);
  labelPlanned.textContent = dayLabel(plannedOf(est, buf));

  const labelActual = document.getElementById("hlLabelActual");
  labelActual.setAttribute("x", mx + labelDx);
  labelActual.setAttribute("y", clampY(actualY - 10));
  labelActual.setAttribute("text-anchor", labelAnchor);
  labelActual.textContent = dayLabel(actualOf(est, buf));

  const hit = document.getElementById("hlMarkerHit");
  hit.setAttribute("x", PAD_L); hit.setAttribute("y", 0);
  hit.setAttribute("width", PW - PAD_L - PAD_R); hit.setAttribute("height", PH);
}

/* ================= 描画 ================= */
function render() {
  const t = T();
  const a = assess(est, buf);

  drawChart();

  const dayFmt = (v) => (t.htmlLang === "ja" ? `${v.toFixed(1)}日` : `${v.toFixed(1)} days`);
  document.getElementById("sumVal").textContent = "+" + dayFmt(a.overrun);
  document.getElementById("plannedCardVal").textContent = dayFmt(a.planned);
  document.getElementById("actualCardVal").textContent = dayFmt(a.actual);
  document.getElementById("hint").textContent = t.hint(est, buf, a);

  document.getElementById("estReadout").textContent = t.htmlLang === "ja" ? `${est}日` : `${est} days`;
  document.getElementById("bufReadout").textContent = `×${buf.toFixed(1)}`;
  if (document.activeElement !== document.getElementById("estSlider")) document.getElementById("estSlider").value = est;
  if (document.activeElement !== document.getElementById("estNum")) document.getElementById("estNum").value = est;
  if (document.activeElement !== document.getElementById("bufSlider")) document.getElementById("bufSlider").value = buf;
  if (document.activeElement !== document.getElementById("bufNum")) document.getElementById("bufNum").value = buf;

  const scoreEl = document.getElementById("scoreVal");
  scoreEl.textContent = a.score;
  scoreEl.className = "score-val mono warn";
  document.getElementById("scoreComment").textContent = t.comments[a.band];

  DevSimLab.renderShare(document.getElementById("shareBtns"), {
    url: "https://sakuichi.github.io/dev-sim-lab/hofstadters-law/",
    shareText: t.shareText,
    shareHashtags: t.shareHashtags,
  });
}

/* ================= 静的コンテンツの言語適用 ================= */
function applyStaticText() {
  const t = T();
  document.title = t.docTitle;
  document.querySelector('meta[name="description"]').setAttribute("content", t.heroLead);
  document.getElementById("heroTitle").innerHTML = t.heroTitle;
  document.getElementById("heroLead").textContent = t.heroLead;
  document.getElementById("consoleLabel").textContent = t.consoleLabel;
  document.getElementById("sumLabel").textContent = t.sumLabel;
  document.getElementById("scoreLabel").textContent = t.scoreLabel;
  document.getElementById("estName").textContent = t.estName;
  document.getElementById("estSub").textContent = t.estSub;
  document.getElementById("bufName").textContent = t.bufName;
  document.getElementById("bufSub").textContent = t.bufSub;
  document.getElementById("numLabel1").textContent = t.numLabel;
  document.getElementById("numLabel2").textContent = t.numLabel;
  document.getElementById("estSlider").setAttribute("aria-label", t.estName);
  document.getElementById("bufSlider").setAttribute("aria-label", t.bufName);
  document.getElementById("numLabel1").setAttribute("aria-label", `${t.estName} ${t.numLabel}`);
  document.getElementById("numLabel2").setAttribute("aria-label", `${t.bufName} ${t.numLabel}`);
  document.getElementById("resetBtn").textContent = t.resetBtn;
  document.getElementById("scenarioBtn").textContent = t.scenarioBtn;
  document.getElementById("chartCaption").textContent = t.chartCaption;
  document.getElementById("chartNote").textContent = t.chartNote;
  document.getElementById("legendPlanned").textContent = t.legendPlanned;
  document.getElementById("legendActual").textContent = t.legendActual;
  document.getElementById("plannedCardLabel").textContent = t.plannedCardLabel;
  document.getElementById("actualCardLabel").textContent = t.actualCardLabel;

  document.getElementById("secAdvice").innerHTML = `
    <h2>${t.adviceHeading}</h2>
    <p>${t.adviceIntro}</p>
    <ul>${t.adviceItems.map((i) => `<li>${i}</li>`).join("")}</ul>
  `;

  document.getElementById("booksH").textContent = t.booksH;
  const booksGrid = document.getElementById("booksGrid");
  booksGrid.innerHTML = "";
  t.books.forEach((b) => {
    const div = document.createElement("div");
    div.className = "book";
    div.innerHTML = `<span class="tag">${b.tag}</span><h3>${b.title}</h3><p>${b.desc}</p>
      <a href="${b.url}" target="_blank" rel="noopener nofollow sponsored">${b.link}</a>`;
    booksGrid.appendChild(div);
  });

  DevSimLab.renderRelated(document.getElementById("relatedGrid"), { exclude: "hofstadters-law" });
}

/* ================= イベント ================= */
document.getElementById("estSlider").addEventListener("input", (e) => { est = +e.target.value; render(); });
document.getElementById("estNum").addEventListener("change", (e) => {
  est = Math.min(EST_MAX, Math.max(EST_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("bufSlider").addEventListener("input", (e) => { buf = +e.target.value; render(); });
document.getElementById("bufNum").addEventListener("change", (e) => {
  buf = Math.min(BUF_MAX, Math.max(BUF_MIN, Math.round(+e.target.value * 10) / 10));
  render();
});
document.getElementById("resetBtn").addEventListener("click", () => {
  est = 20; buf = 1.2;
  document.getElementById("hint").textContent = "";
  render();
});
document.getElementById("scenarioBtn").addEventListener("click", () => {
  buf = Math.min(BUF_MAX, Math.round(buf * OVERRUN * 10) / 10);
  render();
  const a = assess(est, buf);
  document.getElementById("hint").textContent = T().hintScenario(est, buf, a);
});

/* ---- drag the marker directly on the chart ---- */
const hlChart = document.getElementById("hlChart");
function svgPoint(evt) {
  const pt = hlChart.createSVGPoint();
  pt.x = evt.clientX; pt.y = evt.clientY;
  return pt.matrixTransform(hlChart.getScreenCTM().inverse());
}
let dragging = false;
function startDrag(evt) {
  dragging = true;
  hlChart.setPointerCapture(evt.pointerId);
  document.getElementById("hlMarker").classList.add("dragging");
  document.getElementById("hlMarkerHit").classList.add("dragging");
  updateFromPointer(evt);
  evt.preventDefault();
}
function updateFromPointer(evt) {
  const p = svgPoint(evt);
  buf = bOfX(p.x);
  render();
}
document.getElementById("hlMarkerHit").addEventListener("pointerdown", startDrag);
hlChart.addEventListener("pointermove", (evt) => { if (dragging) updateFromPointer(evt); });
["pointerup", "pointercancel"].forEach((ev) => hlChart.addEventListener(ev, () => {
  dragging = false;
  document.getElementById("hlMarker").classList.remove("dragging");
  document.getElementById("hlMarkerHit").classList.remove("dragging");
}));

DevSimLab.initChrome({
  onRender: (lang, tone) => {
    LANG = lang; TONE = tone;
    applyStaticText();
    render();
  },
});
</script>
