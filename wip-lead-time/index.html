"use strict";

/* ================= モデル (リトルの法則 / Little's Law) =================
   L = λW という待ち行列理論の定理(John Little, 1961)を、カンバン/リーンの文脈で
   よく使われる形に変形したもの: リードタイム = WIP ÷ スループット。
   数学的に証明された恒等式であり、"平均着手数 ≈ 平均完了数" の定常状態を前提とする。
   このページではスループットを固定した状態でWIPだけを動かし、
   「多重着手そのものが持つ純粋な待ち行列効果」を切り出して示している。
   実際の現場では、WIPを減らすとマルチタスクの切り替えコストが減り、
   スループット自体が上がることも多い(この点は関連ページ「コンテキストスイッチ」を参照)。
*/
const WIP_MIN = 1, WIP_MAX = 30;
const TP_MIN = 1, TP_MAX = 15;

function leadTimeDaysOf(wip, throughput) { return (wip / throughput) * 7; }
function scoreOf(wip, throughput) {
  const weeks = wip / throughput;
  return Math.max(0, Math.min(100, Math.round(100 / weeks)));
}
function assess(wip, throughput) {
  const leadDays = leadTimeDaysOf(wip, throughput);
  const score = scoreOf(wip, throughput);
  const band = score >= 90 ? 0 : score >= 60 ? 1 : score >= 35 ? 2 : score >= 15 ? 3 : 4;
  return { leadDays, score, band };
}

const T = () => (TONE === "dev" ? { ...I18N[LANG], ...DEV[LANG] } : I18N[LANG]);

let wip = 10;
let throughput = 5;

/* ================= チャート描画 ================= */
const NS = "http://www.w3.org/2000/svg";
const el = (tag, attrs) => {
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
};
const PW = 640, PH = 240, PAD_L = 44, PAD_R = 16, PAD_T = 30, PAD_B = 42;
const X_TICKS = [1, 5, 10, 15, 20, 25, 30];
const Y_MAX_DAYS = 220;
const xOf = (w) => PAD_L + ((w - WIP_MIN) / (WIP_MAX - WIP_MIN)) * (PW - PAD_L - PAD_R);
const wOfX = (x) => {
  const frac = (x - PAD_L) / (PW - PAD_L - PAD_R);
  const raw = WIP_MIN + frac * (WIP_MAX - WIP_MIN);
  return Math.min(WIP_MAX, Math.max(WIP_MIN, Math.round(raw)));
};
const yOf = (days) => PAD_T + (1 - Math.min(days, Y_MAX_DAYS) / Y_MAX_DAYS) * (PH - PAD_T - PAD_B);

function drawChart() {
  const t = T();
  const gridLayer = document.getElementById("wlGridLayer");
  gridLayer.innerHTML = "";
  [0, 55, 110, 165, 220].forEach((v) => {
    const y = yOf(v);
    gridLayer.appendChild(el("line", { class: "wl-grid", x1: PAD_L, y1: y, x2: PW - PAD_R, y2: y }));
    const label = el("text", { class: "wl-axis-label", x: PAD_L - 6, y: y + 3, "text-anchor": "end" });
    label.textContent = v;
    gridLayer.appendChild(label);
  });
  X_TICKS.forEach((w) => {
    const x = xOf(w);
    gridLayer.appendChild(el("line", { class: "wl-tick", x1: x, y1: PAD_T, x2: x, y2: PH - PAD_B }));
    const label = el("text", { class: "wl-axis-label", x, y: PH - PAD_B + 14, "text-anchor": w === WIP_MIN ? "start" : w === WIP_MAX ? "end" : "middle" });
    label.textContent = String(w);
    gridLayer.appendChild(label);
  });
  const yTitle = el("text", { class: "wl-axis-title", x: 2, y: 12 });
  yTitle.textContent = t.wlYTitle;
  gridLayer.appendChild(yTitle);
  const xTitle = el("text", { class: "wl-axis-title", x: PW / 2, y: PH - 4, "text-anchor": "middle" });
  xTitle.textContent = t.wlXTitle;
  gridLayer.appendChild(xTitle);

  const pts = [];
  for (let w = WIP_MIN; w <= WIP_MAX; w += 1) pts.push(`${xOf(w)},${yOf(leadTimeDaysOf(w, throughput))}`);
  document.getElementById("wlLine").setAttribute("d", "M " + pts.join(" L "));
  document.getElementById("wlArea").setAttribute("d", "M " + xOf(WIP_MIN) + "," + yOf(0) + " L " + pts.join(" L ") + " L " + xOf(WIP_MAX) + "," + yOf(0) + " Z");

  const mx = xOf(wip), my = yOf(leadTimeDaysOf(wip, throughput));
  const marker = document.getElementById("wlMarker");
  marker.setAttribute("x1", mx); marker.setAttribute("x2", mx);
  marker.setAttribute("y1", my); marker.setAttribute("y2", PH - PAD_B);
  const point = document.getElementById("wlPoint");
  point.setAttribute("cx", mx); point.setAttribute("cy", my);

  const hit = document.getElementById("wlMarkerHit");
  hit.setAttribute("x", PAD_L); hit.setAttribute("y", 0);
  hit.setAttribute("width", PW - PAD_L - PAD_R); hit.setAttribute("height", PH);
}

function drawWipDots() {
  const wrap = document.getElementById("wipWrap");
  wrap.innerHTML = "";
  for (let i = 0; i < wip; i++) {
    const dot = document.createElement("div");
    dot.className = "wip-dot";
    wrap.appendChild(dot);
  }
}

/* ================= 描画 ================= */
function render() {
  const t = T();
  const a = assess(wip, throughput);

  drawChart();
  drawWipDots();

  document.getElementById("sumVal").textContent = `${Math.round(a.leadDays)}${t.htmlLang === "ja" ? "日" : "d"}`;
  document.getElementById("hint").textContent = t.hint(wip, throughput, a);

  document.getElementById("wipCardVal").textContent = t.htmlLang === "ja" ? `${wip}件` : `${wip}`;
  document.getElementById("tpCardVal").textContent = t.htmlLang === "ja" ? `週${throughput}件` : `${throughput}/week`;

  document.getElementById("wipReadout").textContent = wip;
  document.getElementById("tpReadout").textContent = throughput;
  if (document.activeElement !== document.getElementById("wipSlider")) document.getElementById("wipSlider").value = wip;
  if (document.activeElement !== document.getElementById("wipNum")) document.getElementById("wipNum").value = wip;
  if (document.activeElement !== document.getElementById("tpSlider")) document.getElementById("tpSlider").value = throughput;
  if (document.activeElement !== document.getElementById("tpNum")) document.getElementById("tpNum").value = throughput;

  const scoreEl = document.getElementById("scoreVal");
  scoreEl.textContent = a.score;
  scoreEl.className = "score-val mono" + (a.score < 35 ? " danger" : a.score < 60 ? " warn" : "");
  document.getElementById("scoreComment").textContent = t.comments[a.band];

  DevSimLab.renderShare(document.getElementById("shareBtns"), {
    url: "https://sakuichi.github.io/dev-sim-lab/wip-lead-time/",
    shareText: t.shareText,
    shareHashtags: t.shareHashtags,
  });
}

/* ================= 静的コンテンツの言語適用 ================= */
function applyStaticText() {
  const t = T();
  document.title = t.docTitle;
  document.querySelector('meta[name="description"]').setAttribute("content", t.heroLead);
  document.getElementById("heroTitle").innerHTML = t.heroTitle;
  document.getElementById("heroLead").textContent = t.heroLead;
  document.getElementById("consoleLabel").textContent = t.consoleLabel;
  document.getElementById("sumLabel").textContent = t.sumLabel;
  document.getElementById("scoreLabel").textContent = t.scoreLabel;
  document.getElementById("wipName").textContent = t.wipName;
  document.getElementById("wipSub").textContent = t.wipSub;
  document.getElementById("tpName").textContent = t.tpName;
  document.getElementById("tpSub").textContent = t.tpSub;
  document.getElementById("numLabel1").textContent = t.numLabel;
  document.getElementById("numLabel2").textContent = t.numLabel;
  document.getElementById("wipSlider").setAttribute("aria-label", t.wipName);
  document.getElementById("tpSlider").setAttribute("aria-label", t.tpName);
  document.getElementById("numLabel1").setAttribute("aria-label", `${t.wipName} ${t.numLabel}`);
  document.getElementById("numLabel2").setAttribute("aria-label", `${t.tpName} ${t.numLabel}`);
  document.getElementById("resetBtn").textContent = t.resetBtn;
  document.getElementById("scenarioBtn").textContent = t.scenarioBtn;
  document.getElementById("chartCaption").textContent = t.chartCaption;
  document.getElementById("chartNote").textContent = t.chartNote;
  document.getElementById("wipCardLabel").textContent = t.wipCardLabel;
  document.getElementById("tpCardLabel").textContent = t.tpCardLabel;

  document.getElementById("secAdvice").innerHTML = `
    <h2>${t.adviceHeading}</h2>
    <p>${t.adviceIntro}</p>
    <ul>${t.adviceItems.map((i) => `<li>${i}</li>`).join("")}</ul>
  `;

  document.getElementById("booksH").textContent = t.booksH;
  const booksGrid = document.getElementById("booksGrid");
  booksGrid.innerHTML = "";
  t.books.forEach((b) => {
    const div = document.createElement("div");
    div.className = "book";
    div.innerHTML = `<span class="tag">${b.tag}</span><h3>${b.title}</h3><p>${b.desc}</p>
      <a href="${b.url}" target="_blank" rel="noopener nofollow sponsored">${b.link}</a>`;
    booksGrid.appendChild(div);
  });

  DevSimLab.renderRelated(document.getElementById("relatedGrid"), { exclude: "wip-lead-time" });
}

/* ================= イベント ================= */
document.getElementById("wipSlider").addEventListener("input", (e) => { wip = +e.target.value; render(); });
document.getElementById("wipNum").addEventListener("change", (e) => {
  wip = Math.min(WIP_MAX, Math.max(WIP_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("tpSlider").addEventListener("input", (e) => { throughput = +e.target.value; render(); });
document.getElementById("tpNum").addEventListener("change", (e) => {
  throughput = Math.min(TP_MAX, Math.max(TP_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("resetBtn").addEventListener("click", () => {
  wip = 10; throughput = 5;
  document.getElementById("hint").textContent = "";
  render();
});
document.getElementById("scenarioBtn").addEventListener("click", () => {
  wip = 30;
  render();
  const a = assess(wip, throughput);
  document.getElementById("hint").textContent = T().hintScenario(a);
});

/* ---- drag the marker directly on the chart ---- */
const wlChart = document.getElementById("wlChart");
function svgPoint(evt) {
  const pt = wlChart.createSVGPoint();
  pt.x = evt.clientX; pt.y = evt.clientY;
  return pt.matrixTransform(wlChart.getScreenCTM().inverse());
}
let dragging = false;
function startDrag(evt) {
  dragging = true;
  wlChart.setPointerCapture(evt.pointerId);
  document.getElementById("wlMarker").classList.add("dragging");
  document.getElementById("wlMarkerHit").classList.add("dragging");
  updateFromPointer(evt);
  evt.preventDefault();
}
function updateFromPointer(evt) {
  const p = svgPoint(evt);
  wip = wOfX(p.x);
  render();
}
document.getElementById("wlMarkerHit").addEventListener("pointerdown", startDrag);
document.getElementById("wlPoint").addEventListener("pointerdown", startDrag);
wlChart.addEventListener("pointermove", (evt) => { if (dragging) updateFromPointer(evt); });
["pointerup", "pointercancel"].forEach((ev) => wlChart.addEventListener(ev, () => {
  dragging = false;
  document.getElementById("wlMarker").classList.remove("dragging");
  document.getElementById("wlMarkerHit").classList.remove("dragging");
}));

DevSimLab.initChrome({
  onRender: (lang, tone) => {
    LANG = lang; TONE = tone;
    applyStaticText();
    render();
  },
});
</script>
