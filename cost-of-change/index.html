"use strict";

/* ================= モデル =================
   「classic」は Boehm, Software Engineering Economics (1981) で示され、多くの教科書・研修で
   引用されてきた古典的な相対コスト曲線(1970年代の大規模ウォーターフォール開発が対象)。
   「modern」は Menzies, Nichols, Shull, Layman, "Are Delayed Issues Harder to Resolve?
   Revisiting Cost-to-Fix of Defects throughout the Lifecycle" (Empirical Software Engineering, 2017)。
   2006〜2014年の171件のプロジェクトを分析し、「後工程になるほど修正コストが増える」という
   効果(delayed issue effect)を裏づける一貫した証拠は見られなかったと報告している。
   ここではその2つの主張を、同じ5工程の軸の上で比較できるようにしている。
*/
const STAGE_MIN = 1, STAGE_MAX = 5;
const CLASSIC_MULT = [1, 5, 10, 20, 100];
const MODERN_MULT = [1, 1, 1, 1, 1];
const MODERN_BAND = 0.6; // 「有意な効果は見られなかった」を示す簡易的な誤差帯(±)
const EARLY_SCORE = [100, 75, 50, 25, 0];

function classicOf(stage) { return CLASSIC_MULT[stage - 1]; }
function modernOf(stage) { return MODERN_MULT[stage - 1]; }
function scoreOf(stage) { return EARLY_SCORE[stage - 1]; }
function assess(stage) {
  const score = scoreOf(stage);
  const band = stage - 1;
  return { score, band, classic: classicOf(stage), modern: modernOf(stage) };
}

let stage = 3;

/* ================= チャート描画 ================= */
const NS = "http://www.w3.org/2000/svg";
const el = (tag, attrs) => {
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
};
const PW = 640, PH = 240, PAD_L = 40, PAD_R = 16, PAD_T = 30, PAD_B = 42;
const Y_MAX = 110;
const xOf = (s) => PAD_L + ((s - STAGE_MIN) / (STAGE_MAX - STAGE_MIN)) * (PW - PAD_L - PAD_R);
const sOfX = (x) => {
  const frac = (x - PAD_L) / (PW - PAD_L - PAD_R);
  const raw = STAGE_MIN + frac * (STAGE_MAX - STAGE_MIN);
  return Math.min(STAGE_MAX, Math.max(STAGE_MIN, Math.round(raw)));
};
const yOf = (v) => PAD_T + (1 - v / Y_MAX) * (PH - PAD_T - PAD_B);

function drawChart() {
  const t = T();
  const bandLayer = document.getElementById("cocBandLayer");
  bandLayer.innerHTML = "";
  const bandPtsTop = [], bandPtsBottom = [];
  for (let s = STAGE_MIN; s <= STAGE_MAX; s++) {
    bandPtsTop.push(`${xOf(s)},${yOf(modernOf(s) + MODERN_BAND)}`);
    bandPtsBottom.unshift(`${xOf(s)},${yOf(Math.max(0, modernOf(s) - MODERN_BAND))}`);
  }
  bandLayer.appendChild(el("path", { class: "coc-band", d: "M " + bandPtsTop.join(" L ") + " L " + bandPtsBottom.join(" L ") + " Z" }));

  const gridLayer = document.getElementById("cocGridLayer");
  gridLayer.innerHTML = "";
  [0, 20, 40, 60, 80, 100].forEach((v) => {
    const y = yOf(v);
    gridLayer.appendChild(el("line", { class: "coc-grid", x1: PAD_L, y1: y, x2: PW - PAD_R, y2: y }));
    const label = el("text", { class: "coc-axis-label", x: PAD_L - 6, y: y + 3, "text-anchor": "end" });
    label.textContent = v + (t.htmlLang === "ja" ? "倍" : "×");
    gridLayer.appendChild(label);
  });
  for (let s = STAGE_MIN; s <= STAGE_MAX; s++) {
    const x = xOf(s);
    gridLayer.appendChild(el("line", { class: "coc-tick", x1: x, y1: PAD_T, x2: x, y2: PH - PAD_B }));
    const label = el("text", { class: "coc-axis-label", x, y: PH - PAD_B + 14, "text-anchor": s === STAGE_MIN ? "start" : s === STAGE_MAX ? "end" : "middle" });
    label.textContent = t.stageNames[s - 1];
    gridLayer.appendChild(label);
  }
  const yTitle = el("text", { class: "coc-axis-title", x: 2, y: 12 });
  yTitle.textContent = t.cocYTitle;
  gridLayer.appendChild(yTitle);
  const xTitle = el("text", { class: "coc-axis-title", x: PW / 2, y: PH - 4, "text-anchor": "middle" });
  xTitle.textContent = t.cocXTitle;
  gridLayer.appendChild(xTitle);

  const classicPts = [], modernPts = [];
  for (let s = STAGE_MIN; s <= STAGE_MAX; s++) {
    classicPts.push(`${xOf(s)},${yOf(classicOf(s))}`);
    modernPts.push(`${xOf(s)},${yOf(modernOf(s))}`);
  }
  document.getElementById("cocLineClassic").setAttribute("d", "M " + classicPts.join(" L "));
  document.getElementById("cocLineModern").setAttribute("d", "M " + modernPts.join(" L "));

  const dotsLayer = document.getElementById("cocDotsLayer");
  dotsLayer.innerHTML = "";
  for (let s = STAGE_MIN; s <= STAGE_MAX; s++) {
    dotsLayer.appendChild(el("circle", { class: "coc-dot", cx: xOf(s), cy: yOf(classicOf(s)), fill: "var(--alert)" }));
    dotsLayer.appendChild(el("circle", { class: "coc-dot", cx: xOf(s), cy: yOf(modernOf(s)), fill: "var(--q)" }));
  }

  const mx = xOf(stage);
  const marker = document.getElementById("cocMarker");
  marker.setAttribute("x1", mx); marker.setAttribute("x2", mx);
  marker.setAttribute("y1", PAD_T); marker.setAttribute("y2", PH - PAD_B);

  const hit = document.getElementById("cocMarkerHit");
  hit.setAttribute("x", PAD_L); hit.setAttribute("y", 0);
  hit.setAttribute("width", PW - PAD_L - PAD_R); hit.setAttribute("height", PH);
}

/* ================= 描画 ================= */
function render() {
  const t = T();
  const a = assess(stage);
  const stageName = t.stageNames[stage - 1];

  drawChart();

  const unit = t.htmlLang === "ja" ? "倍" : "×";
  document.getElementById("sumVal").textContent = a.classic + unit;
  document.getElementById("classicVal").textContent = a.classic + unit;
  document.getElementById("modernVal").textContent = t.htmlLang === "ja" ? `約${a.modern}倍` : `~${a.modern}×`;
  document.getElementById("hint").textContent = t.hint(stageName, a);

  document.getElementById("stageReadout").textContent = stageName;
  if (document.activeElement !== document.getElementById("stageSlider")) document.getElementById("stageSlider").value = stage;
  if (document.activeElement !== document.getElementById("stageNum")) document.getElementById("stageNum").value = stage;

  const scoreEl = document.getElementById("scoreVal");
  scoreEl.textContent = a.score;
  scoreEl.className = "score-val mono" + (a.score < 50 ? " danger" : a.score < 70 ? " warn" : "");
  document.getElementById("scoreComment").textContent = t.comments[a.band];

  DevSimLab.renderShare(document.getElementById("shareBtns"), {
    url: "https://sakuichi.github.io/dev-sim-lab/cost-of-change/",
    shareText: t.shareText,
    shareHashtags: t.shareHashtags,
  });
}

/* ================= 静的コンテンツの言語適用 ================= */
function applyStaticText() {
  const t = T();
  document.title = t.docTitle;
  document.querySelector('meta[name="description"]').setAttribute("content", t.heroLead);
  document.getElementById("heroTitle").innerHTML = t.heroTitle;
  document.getElementById("heroLead").textContent = t.heroLead;
  document.getElementById("consoleLabel").textContent = t.consoleLabel;
  document.getElementById("sumLabel").textContent = t.sumLabel;
  document.getElementById("scoreLabel").textContent = t.scoreLabel;
  document.getElementById("stageName").textContent = t.stageName;
  document.getElementById("stageSub").textContent = t.stageSub;
  document.getElementById("numLabel1").textContent = t.numLabel;
  document.getElementById("stageSlider").setAttribute("aria-label", t.stageName);
  document.getElementById("numLabel1").setAttribute("aria-label", `${t.stageName} ${t.numLabel}`);
  document.getElementById("resetBtn").textContent = t.resetBtn;
  document.getElementById("scenarioBtn").textContent = t.scenarioBtn;
  document.getElementById("chartCaption").textContent = t.chartCaption;
  document.getElementById("chartNote").textContent = t.chartNote;
  document.getElementById("legendClassic").textContent = t.legendClassic;
  document.getElementById("legendModern").textContent = t.legendModern;
  document.getElementById("classicLabel").textContent = t.classicLabel;
  document.getElementById("modernLabel").textContent = t.modernLabel;

  document.getElementById("secAdvice").innerHTML = `
    <h2>${t.adviceHeading}</h2>
    <p>${t.adviceIntro}</p>
    <ul>${t.adviceItems.map((i) => `<li>${i}</li>`).join("")}</ul>
  `;

  document.getElementById("booksH").textContent = t.booksH;
  const booksGrid = document.getElementById("booksGrid");
  booksGrid.innerHTML = "";
  t.books.forEach((b) => {
    const div = document.createElement("div");
    div.className = "book";
    div.innerHTML = `<span class="tag">${b.tag}</span><h3>${b.title}</h3><p>${b.desc}</p>
      <a href="${b.url}" target="_blank" rel="noopener nofollow sponsored">${b.link}</a>`;
    booksGrid.appendChild(div);
  });

  DevSimLab.renderRelated(document.getElementById("relatedGrid"), { exclude: "cost-of-change" });
}

/* ================= イベント ================= */
document.getElementById("stageSlider").addEventListener("input", (e) => { stage = +e.target.value; render(); });
document.getElementById("stageNum").addEventListener("change", (e) => {
  stage = Math.min(STAGE_MAX, Math.max(STAGE_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("resetBtn").addEventListener("click", () => {
  stage = 3;
  document.getElementById("hint").textContent = "";
  render();
});
document.getElementById("scenarioBtn").addEventListener("click", () => {
  stage = 5;
  render();
  const a = assess(stage);
  document.getElementById("hint").textContent = T().hintScenario(a);
});

/* ---- drag the marker directly on the chart (5 discrete stages) ---- */
const cocChart = document.getElementById("cocChart");
function svgPoint(evt) {
  const pt = cocChart.createSVGPoint();
  pt.x = evt.clientX; pt.y = evt.clientY;
  return pt.matrixTransform(cocChart.getScreenCTM().inverse());
}
let dragging = false;
function startDrag(evt) {
  dragging = true;
  cocChart.setPointerCapture(evt.pointerId);
  document.getElementById("cocMarker").classList.add("dragging");
  document.getElementById("cocMarkerHit").classList.add("dragging");
  updateFromPointer(evt);
  evt.preventDefault();
}
function updateFromPointer(evt) {
  const p = svgPoint(evt);
  stage = sOfX(p.x);
  render();
}
document.getElementById("cocMarkerHit").addEventListener("pointerdown", startDrag);
cocChart.addEventListener("pointermove", (evt) => { if (dragging) updateFromPointer(evt); });
["pointerup", "pointercancel"].forEach((ev) => cocChart.addEventListener(ev, () => {
  dragging = false;
  document.getElementById("cocMarker").classList.remove("dragging");
  document.getElementById("cocMarkerHit").classList.remove("dragging");
}));

DevSimLab.initChrome({
  onRender: (lang, tone) => {
    LANG = lang; TONE = tone;
    applyStaticText();
    render();
  },
});
</script>
