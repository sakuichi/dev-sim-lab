<script>
"use strict";

/* ================= モデル (Cone of Uncertainty・簡略版) ================= */
const PHASES = [
  { low: 0.25, high: 4 },
  { low: 0.5, high: 2 },
  { low: 0.67, high: 1.5 },
  { low: 0.85, high: 1.15 },
  { low: 1, high: 1 },
];
const PHASE_MIN = 1, PHASE_MAX = 5;
const BASE_MIN = 2, BASE_MAX = 500;

function phaseRange(phase, baseline) {
  const p = PHASES[phase - 1];
  return { low: p.low * baseline, high: p.high * baseline };
}
function widthRatio(phase) {
  const p = PHASES[phase - 1];
  return p.high - p.low;
}
function scoreOf(phase) {
  const maxWidth = PHASES[0].high - PHASES[0].low;
  return Math.max(0, Math.min(100, Math.round(100 * (1 - widthRatio(phase) / maxWidth))));
}
function assess(phase, baseline) {
  const score = scoreOf(phase);
  const band = score >= 90 ? 0 : score >= 70 ? 1 : score >= 50 ? 2 : score >= 30 ? 3 : 4;
  return { score, band, range: phaseRange(phase, baseline) };
}

/* ================= 開発者モード上書き辞書 ================= */

let LANG = "ja";
let TONE = "std";
const T = () => (TONE === "dev" ? { ...I18N[LANG], ...DEV[LANG] } : I18N[LANG]);

let phase = 1;
let baseline = 10;
let scenarioActive = false;

/* ================= コーンチャート ================= */
const NS = "http://www.w3.org/2000/svg";
const el = (tag, attrs) => {
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
};
const PW = 640, PH = 260, PAD_L = 46, PAD_R = 16, PAD_T = 16, PAD_B = 44;
const xOf = p => PAD_L + ((p - PHASE_MIN) / (PHASE_MAX - PHASE_MIN)) * (PW - PAD_L - PAD_R);
const fmtPct = v => (v > 0 ? "+" : "") + v + "%";
const pOfX = x => {
  const frac = (x - PAD_L) / (PW - PAD_L - PAD_R);
  return Math.min(PHASE_MAX, Math.max(PHASE_MIN, Math.round(PHASE_MIN + frac * (PHASE_MAX - PHASE_MIN))));
};

function buildAxisLabels() {
  const layer = document.getElementById("phaseAxisLayer");
  layer.innerHTML = "";
  for (let p = PHASE_MIN; p <= PHASE_MAX; p++) {
    const anchor = p === PHASE_MIN ? "start" : p === PHASE_MAX ? "end" : "middle";
    const t = el("text", { class: "cone-axis-label", x: xOf(p), y: PH - PAD_B + 34, "text-anchor": anchor });
    t.setAttribute("data-phase", p);
    layer.appendChild(t);
  }
}

function drawCone() {
  const t = T();
  const yMax = baseline * PHASES[0].high;
  const yOf = v => PAD_T + (1 - v / yMax) * (PH - PAD_T - PAD_B);

  const gridLayer = document.getElementById("coneGridLayer");
  gridLayer.innerHTML = "";
  [0.25, 0.5, 0.75, 1].forEach(f => {
    const y = PAD_T + (1 - f) * (PH - PAD_T - PAD_B);
    gridLayer.appendChild(el("line", { class: "cone-grid", x1: PAD_L, y1: y, x2: PW - PAD_R, y2: y }));
  });

  const uppers = [], lowers = [];
  for (let p = PHASE_MIN; p <= PHASE_MAX; p++) {
    const r = phaseRange(p, baseline);
    uppers.push(`${xOf(p)},${yOf(r.high)}`);
    lowers.push(`${xOf(p)},${yOf(r.low)}`);
  }
  document.getElementById("coneUpper").setAttribute("d", "M " + uppers.join(" L "));
  document.getElementById("coneLower").setAttribute("d", "M " + lowers.join(" L "));
  document.getElementById("coneArea").setAttribute("d", "M " + uppers.join(" L ") + " L " + lowers.slice().reverse().join(" L ") + " Z");

  const trueY = yOf(baseline);
  const trueLine = document.getElementById("trueLine");
  trueLine.setAttribute("x1", PAD_L); trueLine.setAttribute("x2", PW - PAD_R);
  trueLine.setAttribute("y1", trueY); trueLine.setAttribute("y2", trueY);
  const trueLabel = document.getElementById("trueLineLabel");
  trueLabel.setAttribute("x", PAD_L + 4);
  trueLabel.setAttribute("y", trueY - 6);
  trueLabel.textContent = t.trueLineLabel(baseline);

  document.querySelectorAll("#phaseAxisLayer text").forEach(elm => {
    const p = +elm.getAttribute("data-phase");
    elm.textContent = t.phaseNamesShort[p - 1];
  });

  const r = phaseRange(phase, baseline);
  const mx = xOf(phase), yTop = yOf(r.high), yBottom = yOf(r.low);
  const marker = document.getElementById("phaseMarker");
  marker.setAttribute("x1", mx); marker.setAttribute("x2", mx);
  marker.setAttribute("y1", yTop); marker.setAttribute("y2", yBottom);
  const capTop = document.getElementById("phaseCapTop");
  capTop.setAttribute("x1", mx - 7); capTop.setAttribute("x2", mx + 7);
  capTop.setAttribute("y1", yTop); capTop.setAttribute("y2", yTop);
  const capBottom = document.getElementById("phaseCapBottom");
  capBottom.setAttribute("x1", mx - 7); capBottom.setAttribute("x2", mx + 7);
  capBottom.setAttribute("y1", yBottom); capBottom.setAttribute("y2", yBottom);
  const point = document.getElementById("phasePoint");
  point.setAttribute("cx", mx); point.setAttribute("cy", (yTop + yBottom) / 2);

  const maxPct = Math.round((PHASES[phase - 1].high - 1) * 100);
  const minPct = Math.round((PHASES[phase - 1].low - 1) * 100);
  const pctTop = document.getElementById("phasePctTop");
  pctTop.setAttribute("x", mx); pctTop.setAttribute("y", Math.max(PAD_T - 6, yTop - 10));
  pctTop.textContent = fmtPct(maxPct);
  const pctBottom = document.getElementById("phasePctBottom");
  pctBottom.setAttribute("x", mx); pctBottom.setAttribute("y", yBottom + 18);
  pctBottom.textContent = fmtPct(minPct);

  const hit = document.getElementById("phaseHit");
  hit.setAttribute("x", PAD_L); hit.setAttribute("y", 0);
  hit.setAttribute("width", PW - PAD_L - PAD_R); hit.setAttribute("height", PH);
}

/* ================= 描画 ================= */
function render() {
  const t = T();
  const r = assess(phase, baseline);

  drawCone();

  const maxPct = Math.round((PHASES[phase - 1].high - 1) * 100);
  const minPct = Math.round((PHASES[phase - 1].low - 1) * 100);
  document.getElementById("sumVal").textContent = t.sumVal(minPct, maxPct, fmtPct);
  document.getElementById("hint").textContent = scenarioActive
    ? t.hintScenario(r.range, minPct, maxPct, fmtPct)
    : t.hint(phase, r.range, baseline, minPct, maxPct, fmtPct);
  document.getElementById("scenarioBtn").setAttribute("aria-pressed", scenarioActive);

  document.getElementById("phaseReadout").textContent = t.phaseNames[phase - 1];
  document.getElementById("baseReadout").textContent = baseline;
  if (document.activeElement !== document.getElementById("phaseSlider")) document.getElementById("phaseSlider").value = phase;
  if (document.activeElement !== document.getElementById("phaseNum")) document.getElementById("phaseNum").value = phase;
  if (document.activeElement !== document.getElementById("baseSlider")) document.getElementById("baseSlider").value = baseline;
  if (document.activeElement !== document.getElementById("baseNum")) document.getElementById("baseNum").value = baseline;

  const scoreEl = document.getElementById("scoreVal");
  scoreEl.textContent = r.score;
  scoreEl.className = "score-val mono" + (r.score < 50 ? " danger" : r.score < 70 ? " warn" : "");
  document.getElementById("scoreComment").textContent = t.comments[r.band];

  DevSimLab.renderShare(document.getElementById("shareBtns"), {
    url: "https://sakuichi.github.io/dev-sim-lab/estimation-uncertainty/",
    shareText: t.shareText,
    shareHashtags: t.shareHashtags,
  });
}

/* ================= 静的コンテンツの言語適用 ================= */
function applyStaticText() {
  const t = T();
  document.title = t.docTitle;
  document.querySelector('meta[name="description"]').setAttribute("content", t.heroLead);
  document.getElementById("heroTitle").innerHTML = t.heroTitle;
  document.getElementById("heroLead").textContent = t.heroLead;
  document.getElementById("consoleLabel").textContent = t.consoleLabel;
  document.getElementById("sumLabel").textContent = t.sumLabel;
  document.getElementById("scoreLabel").textContent = t.scoreLabel;
  document.getElementById("phaseName").textContent = t.phaseName;
  document.getElementById("phaseSub").textContent = t.phaseSub;
  document.getElementById("baseName").textContent = t.baseName;
  document.getElementById("baseSub").textContent = t.baseSub;
  document.getElementById("numLabel1").textContent = t.numLabel;
  document.getElementById("numLabel2").textContent = t.numLabel;
  document.getElementById("phaseSlider").setAttribute("aria-label", t.phaseName);
  document.getElementById("baseSlider").setAttribute("aria-label", t.baseName);
  document.getElementById("numLabel1").setAttribute("aria-label", `${t.phaseName} ${t.numLabel}`);
  document.getElementById("numLabel2").setAttribute("aria-label", `${t.baseName} ${t.numLabel}`);
  document.getElementById("resetBtn").textContent = t.resetBtn;
  document.getElementById("scenarioBtn").textContent = t.scenarioBtn;
  document.getElementById("chartNote").textContent = t.chartNote;
  document.getElementById("chartCaption").textContent = t.chartCaption;

  document.getElementById("secAdvice").innerHTML = `
    <h2>${t.adviceHeading}</h2>
    <p>${t.adviceIntro}</p>
    <ul>${t.adviceItems.map(i => `<li>${i}</li>`).join("")}</ul>
  `;

  document.getElementById("booksH").textContent = t.booksH;
  const booksGrid = document.getElementById("booksGrid");
  booksGrid.innerHTML = "";
  t.books.forEach(b => {
    const div = document.createElement("div");
    div.className = "book";
    div.innerHTML = `<span class="tag">${b.tag}</span><h3>${b.title}</h3><p>${b.desc}</p>
      <a href="${b.url}" target="_blank" rel="noopener nofollow sponsored">${b.link}</a>`;
    booksGrid.appendChild(div);
  });

  DevSimLab.renderRelated(document.getElementById("relatedGrid"), { exclude: "estimation-uncertainty" });
}

/* ================= イベント ================= */
document.getElementById("phaseSlider").addEventListener("input", e => { phase = +e.target.value; scenarioActive = false; render(); });
document.getElementById("phaseNum").addEventListener("change", e => {
  phase = Math.min(PHASE_MAX, Math.max(PHASE_MIN, +e.target.value));
  scenarioActive = false;
  render();
});
document.getElementById("baseSlider").addEventListener("input", e => { baseline = +e.target.value; scenarioActive = false; render(); });
document.getElementById("baseNum").addEventListener("change", e => {
  baseline = Math.min(BASE_MAX, Math.max(BASE_MIN, +e.target.value));
  scenarioActive = false;
  render();
});
document.getElementById("resetBtn").addEventListener("click", () => {
  phase = 1; baseline = 10; scenarioActive = false;
  render();
});
document.getElementById("scenarioBtn").addEventListener("click", () => {
  scenarioActive = !scenarioActive;
  if (scenarioActive) { phase = 1; baseline = 100; }
  render();
});

/* ---- drag the phase marker directly on the cone chart ---- */
const coneChart = document.getElementById("coneChart");
function svgPoint(evt) {
  const pt = coneChart.createSVGPoint();
  pt.x = evt.clientX; pt.y = evt.clientY;
  return pt.matrixTransform(coneChart.getScreenCTM().inverse());
}
let draggingPhase = false;
function startPhaseDrag(evt) {
  draggingPhase = true;
  coneChart.setPointerCapture(evt.pointerId);
  document.getElementById("phaseMarker").classList.add("dragging");
  document.getElementById("phaseHit").classList.add("dragging");
  updatePhaseFromPointer(evt);
  evt.preventDefault();
}
function updatePhaseFromPointer(evt) {
  const p = svgPoint(evt);
  phase = pOfX(p.x);
  render();
}
document.getElementById("phaseHit").addEventListener("pointerdown", startPhaseDrag);
document.getElementById("phasePoint").addEventListener("pointerdown", startPhaseDrag);
coneChart.addEventListener("pointermove", evt => { if (draggingPhase) updatePhaseFromPointer(evt); });
["pointerup", "pointercancel"].forEach(ev => coneChart.addEventListener(ev, () => {
  draggingPhase = false;
  document.getElementById("phaseMarker").classList.remove("dragging");
  document.getElementById("phaseHit").classList.remove("dragging");
}));

buildAxisLabels();
DevSimLab.initChrome({
  onRender: (lang, tone) => {
    LANG = lang; TONE = tone;
    applyStaticText();
    render();
  },
});
</script>
