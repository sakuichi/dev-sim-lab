<script>
"use strict";

/* ================= モデル =================
   Amy Edmondson(1996年/1999年)の看護チーム研究にもとづく簡易モデル。
   高業績のチームほど、実は「報告される問題の件数」が多いという直感に反する結果が
   報告されている。これはミスの発生数自体が多いのではなく、心理的安全性が高い
   チームほど問題を言い出しやすいためだと解釈されている。
   ここでは「実際に発生している問題の総数」を固定し、心理的安全性の水準に応じて
   「報告される」割合と「隠れたまま気づかれない」割合の配分が変わる、という
   関係を可視化する。特定の実証研究の数値を再現したものではない簡易モデル。
*/
const SAFETY_MIN = 0, SAFETY_MAX = 100;
const BASE_MIN = 10, BASE_MAX = 50;

function reportingRateOf(safety) { return 0.15 + (safety / 100) * 0.80; }
function reportedCountOf(base, safety) { return base * reportingRateOf(safety); }
function hiddenCountOf(base, safety) { return base - reportedCountOf(base, safety); }
function scoreOf(safety) { return Math.round(safety); }
function tierOf(safety) { return Math.min(4, Math.floor(safety / 20)); }
function assess(base, safety) {
  const reported = reportedCountOf(base, safety);
  const hidden = hiddenCountOf(base, safety);
  const score = scoreOf(safety);
  const band = tierOf(safety);
  return { reported, hidden, score, band };
}

    "The moment an incident happens, someone immediately says \"that was me, sorry\" — and gets thanked for it.",
  ],
  hint: (safety, base, a) => `Safety ${safety}%. ${a.reported.toFixed(1)} reported, ${a.hidden.toFixed(1)} hidden. You don't really want to know how much is buried behind every "we're fine, no issues here."`,
  hintScenario: (base, a) => `Rock-bottom psychological safety. Out of ${base}, only ${a.reported.toFixed(1)} get reported. Every retro ends with "no particular issues this sprint."`,
},
};

let LANG = "ja";
let TONE = "std";
const T = () => (TONE === "dev" ? { ...I18N[LANG], ...DEV[LANG] } : I18N[LANG]);

let safety = 30;
let base = 20;

/* ================= チャート描画 ================= */
const NS = "http://www.w3.org/2000/svg";
const el = (tag, attrs) => {
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
};
const PW = 640, PH = 240, PAD_L = 40, PAD_R = 16, PAD_T = 30, PAD_B = 42;
const xOf = (s) => PAD_L + ((s - SAFETY_MIN) / (SAFETY_MAX - SAFETY_MIN)) * (PW - PAD_L - PAD_R);
const sOfX = (x) => {
  const frac = (x - PAD_L) / (PW - PAD_L - PAD_R);
  const raw = SAFETY_MIN + frac * (SAFETY_MAX - SAFETY_MIN);
  return Math.min(SAFETY_MAX, Math.max(SAFETY_MIN, Math.round(raw / 5) * 5));
};
let Y_MAX = 50;
const yOf = (v) => PAD_T + (1 - Math.min(v, Y_MAX) / Y_MAX) * (PH - PAD_T - PAD_B);

function drawChart() {
  const t = T();
  Y_MAX = Math.max(20, Math.ceil(base / 10) * 10);

  const gridLayer = document.getElementById("psGridLayer");
  gridLayer.innerHTML = "";
  const yStep = Y_MAX / 5;
  for (let v = 0; v <= Y_MAX + 1e-9; v += yStep) {
    const y = yOf(v);
    gridLayer.appendChild(el("line", { class: "ps-grid", x1: PAD_L, y1: y, x2: PW - PAD_R, y2: y }));
    const label = el("text", { class: "ps-axis-label", x: PAD_L - 6, y: y + 3, "text-anchor": "end" });
    label.textContent = Math.round(v);
    gridLayer.appendChild(label);
  }
  for (let s = SAFETY_MIN; s <= SAFETY_MAX; s += 20) {
    const x = xOf(s);
    gridLayer.appendChild(el("line", { class: "ps-tick", x1: x, y1: PAD_T, x2: x, y2: PH - PAD_B }));
    const label = el("text", { class: "ps-axis-label", x, y: PH - PAD_B + 14, "text-anchor": s === SAFETY_MIN ? "start" : s === SAFETY_MAX ? "end" : "middle" });
    label.textContent = s + "%";
    gridLayer.appendChild(label);
  }
  const yTitle = el("text", { class: "ps-axis-title", x: 2, y: 12 });
  yTitle.textContent = t.psYTitle;
  gridLayer.appendChild(yTitle);
  const xTitle = el("text", { class: "ps-axis-title", x: PW / 2, y: PH - 4, "text-anchor": "middle" });
  xTitle.textContent = t.psXTitle;
  gridLayer.appendChild(xTitle);

  const reportedPts = [];
  for (let s = SAFETY_MIN; s <= SAFETY_MAX; s += 2) reportedPts.push(`${xOf(s)},${yOf(reportedCountOf(base, s))}`);
  document.getElementById("psLineReported").setAttribute("d", "M " + reportedPts.join(" L "));
  document.getElementById("psAreaReported").setAttribute("d", "M " + xOf(SAFETY_MIN) + "," + yOf(0) + " L " + reportedPts.join(" L ") + " L " + xOf(SAFETY_MAX) + "," + yOf(0) + " Z");

  const topPts = [];
  for (let s = SAFETY_MIN; s <= SAFETY_MAX; s += 2) topPts.push(`${xOf(s)},${yOf(base)}`);
  const bottomPts = [...reportedPts].reverse();
  document.getElementById("psAreaHidden").setAttribute("d", "M " + topPts.join(" L ") + " L " + bottomPts.join(" L ") + " Z");

  const by = yOf(base);
  const baseline = document.getElementById("psBaseline");
  baseline.setAttribute("x1", PAD_L); baseline.setAttribute("x2", PW - PAD_R);
  baseline.setAttribute("y1", by); baseline.setAttribute("y2", by);
  const baselineLabel = document.getElementById("psBaselineLabel");
  baselineLabel.setAttribute("x", PW - PAD_R - 4);
  baselineLabel.setAttribute("y", by - 6);
  baselineLabel.setAttribute("text-anchor", "end");
  baselineLabel.textContent = t.baselineLabel;

  const mx = xOf(safety);
  const marker = document.getElementById("psMarker");
  marker.setAttribute("x1", mx); marker.setAttribute("x2", mx);
  marker.setAttribute("y1", PAD_T); marker.setAttribute("y2", PH - PAD_B);

  const hit = document.getElementById("psMarkerHit");
  hit.setAttribute("x", PAD_L); hit.setAttribute("y", 0);
  hit.setAttribute("width", PW - PAD_L - PAD_R); hit.setAttribute("height", PH);
}

/* ================= 描画 ================= */
function render() {
  const t = T();
  const a = assess(base, safety);

  drawChart();

  document.getElementById("sumVal").textContent = t.htmlLang === "ja" ? `${a.reported.toFixed(1)}件` : `${a.reported.toFixed(1)}`;
  document.getElementById("reportedCardVal").textContent = t.htmlLang === "ja" ? `${a.reported.toFixed(1)}件` : `${a.reported.toFixed(1)}`;
  document.getElementById("hiddenCardVal").textContent = t.htmlLang === "ja" ? `${a.hidden.toFixed(1)}件` : `${a.hidden.toFixed(1)}`;
  document.getElementById("hint").textContent = t.hint(safety, base, a);
  document.getElementById("scenarioBox").textContent = t.scenarios[tierOf(safety)];

  document.getElementById("safetyReadout").textContent = safety + "%";
  document.getElementById("baseReadout").textContent = base;
  if (document.activeElement !== document.getElementById("safetySlider")) document.getElementById("safetySlider").value = safety;
  if (document.activeElement !== document.getElementById("safetyNum")) document.getElementById("safetyNum").value = safety;
  if (document.activeElement !== document.getElementById("baseSlider")) document.getElementById("baseSlider").value = base;
  if (document.activeElement !== document.getElementById("baseNum")) document.getElementById("baseNum").value = base;

  const scoreEl = document.getElementById("scoreVal");
  scoreEl.textContent = a.score;
  scoreEl.className = "score-val mono" + (a.score < 30 ? " danger" : a.score < 50 ? " warn" : "");
  document.getElementById("scoreComment").textContent = t.comments[a.band];

  DevSimLab.renderShare(document.getElementById("shareBtns"), {
    url: "https://sakuichi.github.io/dev-sim-lab/psychological-safety/",
    shareText: t.shareText,
    shareHashtags: t.shareHashtags,
  });
}

/* ================= 静的コンテンツの言語適用 ================= */
function applyStaticText() {
  const t = T();
  document.title = t.docTitle;
  document.querySelector('meta[name="description"]').setAttribute("content", t.heroLead);
  document.getElementById("heroTitle").innerHTML = t.heroTitle;
  document.getElementById("heroLead").textContent = t.heroLead;
  document.getElementById("consoleLabel").textContent = t.consoleLabel;
  document.getElementById("sumLabel").textContent = t.sumLabel;
  document.getElementById("scoreLabel").textContent = t.scoreLabel;
  document.getElementById("safetyName").textContent = t.safetyName;
  document.getElementById("safetySub").textContent = t.safetySub;
  document.getElementById("baseName").textContent = t.baseName;
  document.getElementById("baseSub").textContent = t.baseSub;
  document.getElementById("numLabel1").textContent = t.numLabel;
  document.getElementById("numLabel2").textContent = t.numLabel;
  document.getElementById("safetySlider").setAttribute("aria-label", t.safetyName);
  document.getElementById("baseSlider").setAttribute("aria-label", t.baseName);
  document.getElementById("numLabel1").setAttribute("aria-label", `${t.safetyName} ${t.numLabel}`);
  document.getElementById("numLabel2").setAttribute("aria-label", `${t.baseName} ${t.numLabel}`);
  document.getElementById("resetBtn").textContent = t.resetBtn;
  document.getElementById("scenarioBtn").textContent = t.scenarioBtn;
  document.getElementById("chartCaption").textContent = t.chartCaption;
  document.getElementById("chartNote").textContent = t.chartNote;
  document.getElementById("legendReported").textContent = t.legendReported;
  document.getElementById("legendHidden").textContent = t.legendHidden;
  document.getElementById("reportedCardLabel").textContent = t.reportedCardLabel;
  document.getElementById("hiddenCardLabel").textContent = t.hiddenCardLabel;

  document.getElementById("secAdvice").innerHTML = `
    <h2>${t.adviceHeading}</h2>
    <p>${t.adviceIntro}</p>
    <ul>${t.adviceItems.map((i) => `<li>${i}</li>`).join("")}</ul>
  `;

  document.getElementById("booksH").textContent = t.booksH;
  const booksGrid = document.getElementById("booksGrid");
  booksGrid.innerHTML = "";
  t.books.forEach((b) => {
    const div = document.createElement("div");
    div.className = "book";
    div.innerHTML = `<span class="tag">${b.tag}</span><h3>${b.title}</h3><p>${b.desc}</p>
      <a href="${b.url}" target="_blank" rel="noopener nofollow sponsored">${b.link}</a>`;
    booksGrid.appendChild(div);
  });

  DevSimLab.renderRelated(document.getElementById("relatedGrid"), { exclude: "psychological-safety" });
}

/* ================= イベント ================= */
document.getElementById("safetySlider").addEventListener("input", (e) => { safety = +e.target.value; render(); });
document.getElementById("safetyNum").addEventListener("change", (e) => {
  safety = Math.min(SAFETY_MAX, Math.max(SAFETY_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("baseSlider").addEventListener("input", (e) => { base = +e.target.value; render(); });
document.getElementById("baseNum").addEventListener("change", (e) => {
  base = Math.min(BASE_MAX, Math.max(BASE_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("resetBtn").addEventListener("click", () => {
  safety = 30; base = 20;
  document.getElementById("hint").textContent = "";
  render();
});
document.getElementById("scenarioBtn").addEventListener("click", () => {
  safety = 5;
  render();
  const a = assess(base, safety);
  document.getElementById("hint").textContent = T().hintScenario(base, a);
});

/* ---- drag the marker directly on the chart ---- */
const psChart = document.getElementById("psChart");
function svgPoint(evt) {
  const pt = psChart.createSVGPoint();
  pt.x = evt.clientX; pt.y = evt.clientY;
  return pt.matrixTransform(psChart.getScreenCTM().inverse());
}
let dragging = false;
function startDrag(evt) {
  dragging = true;
  psChart.setPointerCapture(evt.pointerId);
  document.getElementById("psMarker").classList.add("dragging");
  document.getElementById("psMarkerHit").classList.add("dragging");
  updateFromPointer(evt);
  evt.preventDefault();
}
function updateFromPointer(evt) {
  const p = svgPoint(evt);
  safety = sOfX(p.x);
  render();
}
document.getElementById("psMarkerHit").addEventListener("pointerdown", startDrag);
psChart.addEventListener("pointermove", (evt) => { if (dragging) updateFromPointer(evt); });
["pointerup", "pointercancel"].forEach((ev) => psChart.addEventListener(ev, () => {
  dragging = false;
  document.getElementById("psMarker").classList.remove("dragging");
  document.getElementById("psMarkerHit").classList.remove("dragging");
}));

DevSimLab.initChrome({
  onRender: (lang, tone) => {
    LANG = lang; TONE = tone;
    applyStaticText();
    render();
  },
});
</script>
