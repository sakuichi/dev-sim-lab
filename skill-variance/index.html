<script>
"use strict";

/* ================= モデル =================
   開発者間の生産性のばらつき(いわゆる「10倍プログラマ」)にもとづくモデル。
   Sackman, Erikson, Grant(1968)の研究では、最良と最悪の開発者の間で
   コーディング時間に約20倍、デバッグ時間に約25倍の差が報告され、その後の
   複数の追試(Curtis 1981、DeMarco & Lister 1985、Boehm & Papaccio 1988など)でも
   同程度のオーダーの差が繰り返し確認されている。一方で、この生産性のばらつきは
   経験年数と強く相関するわけではないと報告されており(同一の実験で経験と生産性の
   相関は見出されなかった)、「シニアだから速い、ジュニアだから遅い」という単純な
   図式は成り立たない。ここでは生産性倍率0.3倍〜3.0倍(最良/最悪でおよそ10倍の開き)を
   軸に、見積もり(平均的な生産性を想定)との乖離を示す。
*/
const MULT_MIN = 0.3, MULT_MAX = 3.0;
const EST_MIN = 1, EST_MAX = 60;

function actualDaysOf(estimateDays, mult) { return estimateDays / mult; }
function deviationPctOf(mult) { return (1 / mult - 1) * 100; }
function scoreOf(mult) {
  const logDev = Math.abs(Math.log2(mult));
  return Math.max(0, Math.min(100, Math.round(100 - logDev * 40)));
}
function assess(estimateDays, mult) {
  const actual = actualDaysOf(estimateDays, mult);
  const deviation = deviationPctOf(mult);
  const score = scoreOf(mult);
  const band = score >= 90 ? 0 : score >= 70 ? 1 : score >= 50 ? 2 : score >= 30 ? 3 : 4;
  return { actual, deviation, score, band };
}

    "「一旦、担当を変えましょう」という提案が出始める空気。",
  ],
},
en: {
  hint: (est, mult, a) => `Estimated ${est} days. Assignee's productivity: ${mult.toFixed(1)}x. Actual: ${a.actual.toFixed(1)} days. Whoever said "anyone can do this in the same time" definitely didn't know about this ${Math.round(a.deviation)}% gap.`,
  hintScenario: (est, a) => `Estimated ${est} days. Somehow assigned to the person having the hardest time. Actual: ${a.actual.toFixed(1)} days. Every "why is this late" standup question makes you want to link this page.`,
  comments: [
    "Wraps it up without breaking a sweat. Legend status.",
    "Finishes on schedule. Underrated blessing.",
    "The person who said \"I'll take care of it\" is not, in fact, taking care of it.",
    "The status update that makes whoever wrote the estimate go quiet.",
    "The air in the room where someone starts suggesting \"maybe let's reassign this.\"",
  ],
},
};

let LANG = "ja";
let TONE = "std";
const T = () => (TONE === "dev" ? { ...I18N[LANG], ...DEV[LANG] } : I18N[LANG]);

let multiplier = 1.0;
let estimateDays = 10;

/* ================= チャート描画 ================= */
const NS = "http://www.w3.org/2000/svg";
const el = (tag, attrs) => {
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
};
const PW = 640, PH = 240, PAD_L = 44, PAD_R = 16, PAD_T = 30, PAD_B = 42;
const xOf = (m) => PAD_L + ((m - MULT_MIN) / (MULT_MAX - MULT_MIN)) * (PW - PAD_L - PAD_R);
const mOfX = (x) => {
  const frac = (x - PAD_L) / (PW - PAD_L - PAD_R);
  const raw = MULT_MIN + frac * (MULT_MAX - MULT_MIN);
  return Math.min(MULT_MAX, Math.max(MULT_MIN, Math.round(raw * 10) / 10));
};
let Y_MAX = 40;
const yOf = (v) => PAD_T + (1 - Math.min(v, Y_MAX) / Y_MAX) * (PH - PAD_T - PAD_B);

function drawChart() {
  const t = T();
  Y_MAX = Math.max(20, Math.ceil((estimateDays / MULT_MIN) / 10) * 10);

  const gridLayer = document.getElementById("svGridLayer");
  gridLayer.innerHTML = "";
  const yStep = Y_MAX / 5;
  for (let v = 0; v <= Y_MAX + 1e-9; v += yStep) {
    const y = yOf(v);
    gridLayer.appendChild(el("line", { class: "sv-grid", x1: PAD_L, y1: y, x2: PW - PAD_R, y2: y }));
    const label = el("text", { class: "sv-axis-label", x: PAD_L - 6, y: y + 3, "text-anchor": "end" });
    label.textContent = Math.round(v);
    gridLayer.appendChild(label);
  }
  [0.3, 0.5, 1.0, 1.5, 2.0, 2.5, 3.0].forEach((m) => {
    const x = xOf(m);
    gridLayer.appendChild(el("line", { class: "sv-tick", x1: x, y1: PAD_T, x2: x, y2: PH - PAD_B }));
    const label = el("text", { class: "sv-axis-label", x, y: PH - PAD_B + 14, "text-anchor": m === MULT_MIN ? "start" : m === MULT_MAX ? "end" : "middle" });
    label.textContent = m.toFixed(1) + "x";
    gridLayer.appendChild(label);
  });
  const yTitle = el("text", { class: "sv-axis-title", x: 2, y: 12 });
  yTitle.textContent = t.svYTitle;
  gridLayer.appendChild(yTitle);
  const xTitle = el("text", { class: "sv-axis-title", x: PW / 2, y: PH - 4, "text-anchor": "middle" });
  xTitle.textContent = t.svXTitle;
  gridLayer.appendChild(xTitle);

  const pts = [];
  for (let m = MULT_MIN; m <= MULT_MAX; m += 0.02) pts.push(`${xOf(m)},${yOf(actualDaysOf(estimateDays, m))}`);
  document.getElementById("svLine").setAttribute("d", "M " + pts.join(" L "));
  document.getElementById("svArea").setAttribute("d", "M " + xOf(MULT_MIN) + "," + yOf(0) + " L " + pts.join(" L ") + " L " + xOf(MULT_MAX) + "," + yOf(0) + " Z");

  const by = yOf(estimateDays);
  const baseline = document.getElementById("svBaseline");
  baseline.setAttribute("x1", PAD_L); baseline.setAttribute("x2", PW - PAD_R);
  baseline.setAttribute("y1", by); baseline.setAttribute("y2", by);
  const baselineLabel = document.getElementById("svBaselineLabel");
  baselineLabel.setAttribute("x", PW - PAD_R - 4);
  baselineLabel.setAttribute("y", by - 6);
  baselineLabel.setAttribute("text-anchor", "end");
  baselineLabel.textContent = t.baselineLabel;

  const mx = xOf(multiplier), my = yOf(actualDaysOf(estimateDays, multiplier));
  const marker = document.getElementById("svMarker");
  marker.setAttribute("x1", mx); marker.setAttribute("x2", mx);
  marker.setAttribute("y1", my); marker.setAttribute("y2", PH - PAD_B);
  const point = document.getElementById("svPoint");
  point.setAttribute("cx", mx); point.setAttribute("cy", my);

  const hit = document.getElementById("svMarkerHit");
  hit.setAttribute("x", PAD_L); hit.setAttribute("y", 0);
  hit.setAttribute("width", PW - PAD_L - PAD_R); hit.setAttribute("height", PH);
}

/* ================= 描画 ================= */
function render() {
  const t = T();
  const a = assess(estimateDays, multiplier);

  drawChart();

  document.getElementById("sumVal").textContent = t.htmlLang === "ja" ? `${estimateDays}日` : `${estimateDays}d`;
  document.getElementById("actualCardVal").textContent = t.htmlLang === "ja" ? `${a.actual.toFixed(1)}日` : `${a.actual.toFixed(1)}d`;
  document.getElementById("devCardVal").textContent = `${a.deviation >= 0 ? "+" : ""}${Math.round(a.deviation)}%`;
  document.getElementById("hint").textContent = t.hint(estimateDays, multiplier, a);
  document.getElementById("callout").textContent = t.calloutText;

  document.getElementById("multReadout").textContent = multiplier.toFixed(1) + (t.htmlLang === "ja" ? "倍" : "x");
  document.getElementById("estReadout").textContent = estimateDays;
  if (document.activeElement !== document.getElementById("multSlider")) document.getElementById("multSlider").value = multiplier;
  if (document.activeElement !== document.getElementById("multNum")) document.getElementById("multNum").value = multiplier;
  if (document.activeElement !== document.getElementById("estSlider")) document.getElementById("estSlider").value = estimateDays;
  if (document.activeElement !== document.getElementById("estNum")) document.getElementById("estNum").value = estimateDays;

  const scoreEl = document.getElementById("scoreVal");
  scoreEl.textContent = a.score;
  scoreEl.className = "score-val mono" + (a.score < 30 ? " danger" : a.score < 50 ? " warn" : "");
  document.getElementById("scoreComment").textContent = t.comments[a.band];

  DevSimLab.renderShare(document.getElementById("shareBtns"), {
    url: "https://sakuichi.github.io/dev-sim-lab/skill-variance/",
    shareText: t.shareText,
    shareHashtags: t.shareHashtags,
  });
}

/* ================= 静的コンテンツの言語適用 ================= */
function applyStaticText() {
  const t = T();
  document.title = t.docTitle;
  document.querySelector('meta[name="description"]').setAttribute("content", t.heroLead);
  document.getElementById("heroTitle").innerHTML = t.heroTitle;
  document.getElementById("heroLead").textContent = t.heroLead;
  document.getElementById("consoleLabel").textContent = t.consoleLabel;
  document.getElementById("sumLabel").textContent = t.sumLabel;
  document.getElementById("scoreLabel").textContent = t.scoreLabel;
  document.getElementById("multName").textContent = t.multName;
  document.getElementById("multSub").textContent = t.multSub;
  document.getElementById("estName").textContent = t.estName;
  document.getElementById("estSub").textContent = t.estSub;
  document.getElementById("numLabel1").textContent = t.numLabel;
  document.getElementById("numLabel2").textContent = t.numLabel;
  document.getElementById("multSlider").setAttribute("aria-label", t.multName);
  document.getElementById("estSlider").setAttribute("aria-label", t.estName);
  document.getElementById("numLabel1").setAttribute("aria-label", `${t.multName} ${t.numLabel}`);
  document.getElementById("numLabel2").setAttribute("aria-label", `${t.estName} ${t.numLabel}`);
  document.getElementById("resetBtn").textContent = t.resetBtn;
  document.getElementById("scenarioBtn").textContent = t.scenarioBtn;
  document.getElementById("chartCaption").textContent = t.chartCaption;
  document.getElementById("chartNote").textContent = t.chartNote;
  document.getElementById("actualCardLabel").textContent = t.actualCardLabel;
  document.getElementById("devCardLabel").textContent = t.devCardLabel;

  document.getElementById("secAdvice").innerHTML = `
    <h2>${t.adviceHeading}</h2>
    <p>${t.adviceIntro}</p>
    <ul>${t.adviceItems.map((i) => `<li>${i}</li>`).join("")}</ul>
  `;

  document.getElementById("booksH").textContent = t.booksH;
  const booksGrid = document.getElementById("booksGrid");
  booksGrid.innerHTML = "";
  t.books.forEach((b) => {
    const div = document.createElement("div");
    div.className = "book";
    div.innerHTML = `<span class="tag">${b.tag}</span><h3>${b.title}</h3><p>${b.desc}</p>
      <a href="${b.url}" target="_blank" rel="noopener nofollow sponsored">${b.link}</a>`;
    booksGrid.appendChild(div);
  });

  DevSimLab.renderRelated(document.getElementById("relatedGrid"), { exclude: "skill-variance" });
}

/* ================= イベント ================= */
document.getElementById("multSlider").addEventListener("input", (e) => { multiplier = +e.target.value; render(); });
document.getElementById("multNum").addEventListener("change", (e) => {
  multiplier = Math.min(MULT_MAX, Math.max(MULT_MIN, +e.target.value));
  render();
});
document.getElementById("estSlider").addEventListener("input", (e) => { estimateDays = +e.target.value; render(); });
document.getElementById("estNum").addEventListener("change", (e) => {
  estimateDays = Math.min(EST_MAX, Math.max(EST_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("resetBtn").addEventListener("click", () => {
  multiplier = 1.0; estimateDays = 10;
  document.getElementById("hint").textContent = "";
  render();
});
document.getElementById("scenarioBtn").addEventListener("click", () => {
  multiplier = 0.3;
  render();
  const a = assess(estimateDays, multiplier);
  document.getElementById("hint").textContent = T().hintScenario(estimateDays, a);
});

/* ---- drag the marker directly on the chart ---- */
const svChart = document.getElementById("svChart");
function svgPoint(evt) {
  const pt = svChart.createSVGPoint();
  pt.x = evt.clientX; pt.y = evt.clientY;
  return pt.matrixTransform(svChart.getScreenCTM().inverse());
}
let dragging = false;
function startDrag(evt) {
  dragging = true;
  svChart.setPointerCapture(evt.pointerId);
  document.getElementById("svMarker").classList.add("dragging");
  document.getElementById("svMarkerHit").classList.add("dragging");
  updateFromPointer(evt);
  evt.preventDefault();
}
function updateFromPointer(evt) {
  const p = svgPoint(evt);
  multiplier = mOfX(p.x);
  render();
}
document.getElementById("svMarkerHit").addEventListener("pointerdown", startDrag);
document.getElementById("svPoint").addEventListener("pointerdown", startDrag);
svChart.addEventListener("pointermove", (evt) => { if (dragging) updateFromPointer(evt); });
["pointerup", "pointercancel"].forEach((ev) => svChart.addEventListener(ev, () => {
  dragging = false;
  document.getElementById("svMarker").classList.remove("dragging");
  document.getElementById("svMarkerHit").classList.remove("dragging");
}));

DevSimLab.initChrome({
  onRender: (lang, tone) => {
    LANG = lang; TONE = tone;
    applyStaticText();
    render();
  },
});
</script>
