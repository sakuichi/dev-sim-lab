"use strict";

/* ================= モデル =================
   「マクナマラの誤謬」——測れるものだけで判断し、測れないものを軽視・無視する誤り。
   有名な4段階の記述「第一段階は、簡単に測れるものを測ること。ここまではよい。
   第二段階は、簡単に測れないものを無視するか恣意的な数値を与えること。
   第三段階は、測れないものは重要でないと考えること。これは盲目である。
   第四段階は、測れないものは存在しないと言うこと。これは自殺である」の
   真の出典はDaniel Yankelovich(1972, Corporate Priorities。1971年の
   Sales Management誌記事が先行)。Charles Handyが『The Empty Raincoat』(1994)で
   マクナマラ本人の言葉として誤って引用し、その名で広まった。
   名称はベトナム戦争でボディカウント等の数値指標に依存した
   マクナマラ国防長官の意思決定に由来する。
   開発文脈への適用(行数・ベロシティ・カバレッジ等への偏重)は本ページの敷衍。
   モデル: 見かけの成果は依存度に比例して伸び続けるが、実際の総合成果は
   「測りにくい価値」の毀損により逆U字を描く、という単純化した独自モデル。
   apparent(dep) = 40 + 0.55*dep
   actual(dep, hidden) = 45 + 0.5*dep - (dep^2/100)*(hidden/100)*1.5
   実際の成果のピークは dep* = 2500/(1.5*hidden)。隠れた価値が少ないほど
   定量化を強めてよい、という含意もこの式から出る。
*/
const DEP_MIN = 0, DEP_MAX = 100;
const HIDDEN_MIN = 10, HIDDEN_MAX = 70;

function apparentOf(dep) { return 40 + dep * 0.55; }
function actualOf(dep, hidden) { return 45 + 0.5 * dep - (dep * dep / 100) * (hidden / 100) * 1.5; }
function illusionOf(dep, hidden) { return apparentOf(dep) - actualOf(dep, hidden); }
/* score: actualのグリッド全域 [-10, 80] を0-100に正規化 */
const ACTUAL_MIN = 45 + 50 - 100 * (HIDDEN_MAX / 100) * 1.5; // dep=100, hidden=70 → -10
const ACTUAL_MAX = 45 + 50 - 100 * (HIDDEN_MIN / 100) * 1.5; // dep=100, hidden=10 → 80
function scoreOf(dep, hidden) {
  return Math.max(0, Math.min(100, Math.round(((actualOf(dep, hidden) - ACTUAL_MIN) / (ACTUAL_MAX - ACTUAL_MIN)) * 100)));
}
function tierOf(dep, hidden) {
  const s = scoreOf(dep, hidden);
  if (s >= 85) return 4;
  if (s >= 65) return 3;
  if (s >= 45) return 2;
  if (s >= 25) return 1;
  return 0;
}
function boxTierOf(dep) { return Math.min(4, Math.floor(dep / 20)); }
function assess(dep, hidden) {
  const apparent = apparentOf(dep);
  const actual = actualOf(dep, hidden);
  const illusion = illusionOf(dep, hidden);
  const score = scoreOf(dep, hidden);
  const band = tierOf(dep, hidden);
  const box = boxTierOf(dep);
  return { apparent, actual, illusion, score, band, box };
}

/* ================= 開発者モード上書き辞書 ================= */
const DEV = {
ja: {
  hint: (dep, hidden, a) => `依存度${dep}。見かけ${a.apparent.toFixed(1)}/実態${a.actual.toFixed(1)}。ベロシティを2倍にしろと言われたので、ストーリーポイントを半分にしました。数字は達成です。`,
  hintScenario: (hidden, a) => `全指標グリーン。カバレッジ98%(assertのないテストで)。チケット消化数は過去最高(1行修正を10チケットに分割)。実態${a.actual.toFixed(1)}。何も間違っていない。数字の上では。`,
  comments: [
    "グラフはすべて右肩上がり。右肩上がりでないもの(品質、士気、顧客)は、グラフにしていないだけ。",
    "「今月のベロシティは?」への回答時間が、実際の開発時間を侵食し始めている。",
    "数字に出ない仕事をした人が評価面談で沈黙している。リファクタリングは犯罪になった。",
    "たまに「数字はいいけど、現場の肌感どう?」と聞く人がいる。会議で一番価値のある発言。",
    "ダッシュボードと現場ヒアリングが同じ画面に並んでいる。両方見てから判断する文化、実在する。",
  ],
},
en: {
  hint: (dep, hidden, a) => `Dependence ${dep}. Apparent ${a.apparent.toFixed(1)} / actual ${a.actual.toFixed(1)}. Told to double velocity, so we halved the story points. Target: achieved.`,
  hintScenario: (hidden, a) => `All metrics green. Coverage 98% (tests without asserts). Record ticket throughput (one-line fixes split into ten tickets). Actual outcome ${a.actual.toFixed(1)}. Nothing is wrong. Numerically.`,
  comments: [
    "Every chart goes up and to the right. The things that don't (quality, morale, customers) simply don't have charts.",
    "Time spent answering \"what's this month's velocity?\" is starting to eat the time spent developing.",
    "The person who did the unmeasurable work sits silent in their review. Refactoring has become a crime.",
    "Occasionally someone asks \"numbers look fine — how does it feel on the ground?\" Most valuable sentence in the meeting.",
    "The dashboard and the field interviews share one screen, and decisions wait for both. Such cultures exist.",
  ],

let LANG = "ja";
let TONE = "std";
const T = () => (TONE === "dev" ? { ...I18N[LANG], ...DEV[LANG] } : I18N[LANG]);

let dep = 40;
let hidden = 40;

/* ================= チャート描画 ================= */
const NS = "http://www.w3.org/2000/svg";
const el = (tag, attrs) => {
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
};
const PW = 640, PH = 240, PAD_L = 40, PAD_R = 16, PAD_T = 30, PAD_B = 42;
const Y_MAX = 100;
const xOf = (v) => PAD_L + ((v - DEP_MIN) / (DEP_MAX - DEP_MIN)) * (PW - PAD_L - PAD_R);
const dOfX = (x) => {
  const frac = (x - PAD_L) / (PW - PAD_L - PAD_R);
  const raw = DEP_MIN + frac * (DEP_MAX - DEP_MIN);
  return Math.min(DEP_MAX, Math.max(DEP_MIN, Math.round(raw / 5) * 5));
};
const yOf = (v) => PAD_T + (1 - Math.max(0, Math.min(v, Y_MAX)) / Y_MAX) * (PH - PAD_T - PAD_B);

function drawChart() {
  const t = T();
  const gridLayer = document.getElementById("qtGridLayer");
  gridLayer.innerHTML = "";
  [0, 20, 40, 60, 80, 100].forEach((v) => {
    const y = yOf(v);
    gridLayer.appendChild(el("line", { class: "qt-grid", x1: PAD_L, y1: y, x2: PW - PAD_R, y2: y }));
    const label = el("text", { class: "qt-axis-label", x: PAD_L - 6, y: y + 3, "text-anchor": "end" });
    label.textContent = v;
    gridLayer.appendChild(label);
  });
  for (let v = DEP_MIN; v <= DEP_MAX; v += 20) {
    const x = xOf(v);
    gridLayer.appendChild(el("line", { class: "qt-tick", x1: x, y1: PAD_T, x2: x, y2: PH - PAD_B }));
    const label = el("text", { class: "qt-axis-label", x, y: PH - PAD_B + 14, "text-anchor": v === DEP_MIN ? "start" : v === DEP_MAX ? "end" : "middle" });
    label.textContent = v;
    gridLayer.appendChild(label);
  }
  const yTitle = el("text", { class: "qt-axis-title", x: 2, y: 12 });
  yTitle.textContent = t.qtYTitle;
  gridLayer.appendChild(yTitle);
  const xTitle = el("text", { class: "qt-axis-title", x: PW / 2, y: PH - 4, "text-anchor": "middle" });
  xTitle.textContent = t.qtXTitle;
  gridLayer.appendChild(xTitle);

  const apparentPts = [], actualPts = [];
  for (let v = DEP_MIN; v <= DEP_MAX; v += 2) {
    apparentPts.push(`${xOf(v)},${yOf(apparentOf(v))}`);
    actualPts.push(`${xOf(v)},${yOf(actualOf(v, hidden))}`);
  }
  document.getElementById("qtLineApparent").setAttribute("d", "M " + apparentPts.join(" L "));
  document.getElementById("qtLineActual").setAttribute("d", "M " + actualPts.join(" L "));

  const dotsLayer = document.getElementById("qtDotsLayer");
  dotsLayer.innerHTML = "";
  for (let v = DEP_MIN; v <= DEP_MAX; v += 20) {
    dotsLayer.appendChild(el("circle", { class: "qt-dot", cx: xOf(v), cy: yOf(apparentOf(v)), fill: "var(--alert)" }));
    dotsLayer.appendChild(el("circle", { class: "qt-dot", cx: xOf(v), cy: yOf(actualOf(v, hidden)), fill: "var(--q)" }));
  }

  const mx = xOf(dep);
  const marker = document.getElementById("qtMarker");
  marker.setAttribute("x1", mx); marker.setAttribute("x2", mx);
  marker.setAttribute("y1", PAD_T); marker.setAttribute("y2", PH - PAD_B);

  const apparentY = yOf(apparentOf(dep));
  const actualY = yOf(actualOf(dep, hidden));
  document.getElementById("qtPointApparent").setAttribute("cx", mx);
  document.getElementById("qtPointApparent").setAttribute("cy", apparentY);
  document.getElementById("qtPointActual").setAttribute("cx", mx);
  document.getElementById("qtPointActual").setAttribute("cy", actualY);

  const labelAnchor = mx > PW - PAD_R - 55 ? "end" : mx < PAD_L + 55 ? "start" : "middle";
  const labelDx = labelAnchor === "end" ? -10 : labelAnchor === "start" ? 10 : 0;
  const clampY = (y) => Math.max(PAD_T + 10, Math.min(PH - PAD_B - 4, y));
  const apparentIsHigher = apparentY <= actualY;

  const labelApparent = document.getElementById("qtLabelApparent");
  labelApparent.setAttribute("x", mx + labelDx);
  labelApparent.setAttribute("y", clampY(apparentIsHigher ? apparentY - 10 : apparentY + 20));
  labelApparent.setAttribute("text-anchor", labelAnchor);
  labelApparent.textContent = apparentOf(dep).toFixed(0);

  const labelActual = document.getElementById("qtLabelActual");
  labelActual.setAttribute("x", mx + labelDx);
  labelActual.setAttribute("y", clampY(apparentIsHigher ? actualY + 20 : actualY - 10));
  labelActual.setAttribute("text-anchor", labelAnchor);
  labelActual.textContent = actualOf(dep, hidden).toFixed(0);

  const hit = document.getElementById("qtMarkerHit");
  hit.setAttribute("x", PAD_L); hit.setAttribute("y", 0);
  hit.setAttribute("width", PW - PAD_L - PAD_R); hit.setAttribute("height", PH);
}

/* ================= 描画 ================= */
function render() {
  const t = T();
  const a = assess(dep, hidden);

  drawChart();

  document.getElementById("sumVal").textContent = `${a.illusion >= 0 ? "+" : ""}${a.illusion.toFixed(1)}pt`;
  document.getElementById("apparentCardVal").textContent = a.apparent.toFixed(1);
  document.getElementById("actualCardVal").textContent = a.actual.toFixed(1);
  document.getElementById("hint").textContent = t.hint(dep, hidden, a);
  document.getElementById("scenarioBoxText").textContent = t.scenarios[a.box];

  document.getElementById("depReadout").textContent = dep;
  document.getElementById("hiddenReadout").textContent = hidden + "%";
  if (document.activeElement !== document.getElementById("depSlider")) document.getElementById("depSlider").value = dep;
  if (document.activeElement !== document.getElementById("depNum")) document.getElementById("depNum").value = dep;
  if (document.activeElement !== document.getElementById("hiddenSlider")) document.getElementById("hiddenSlider").value = hidden;
  if (document.activeElement !== document.getElementById("hiddenNum")) document.getElementById("hiddenNum").value = hidden;

  const scoreEl = document.getElementById("scoreVal");
  scoreEl.textContent = a.score;
  scoreEl.className = "score-val mono" + (a.score < 45 ? " danger" : a.score < 65 ? " warn" : "");
  document.getElementById("scoreComment").textContent = t.comments[a.band];

  DevSimLab.renderShare(document.getElementById("shareBtns"), {
    url: "https://sakuichi.github.io/dev-sim-lab/quantification-trap/",
    shareText: t.shareText,
    shareHashtags: t.shareHashtags,
  });
}

/* ================= 静的コンテンツの言語適用 ================= */
function applyStaticText() {
  const t = T();
  document.title = t.docTitle;
  document.querySelector('meta[name="description"]').setAttribute("content", t.heroLead);
  document.getElementById("heroTitle").innerHTML = t.heroTitle;
  document.getElementById("heroLead").textContent = t.heroLead;
  document.getElementById("consoleLabel").textContent = t.consoleLabel;
  document.getElementById("sumLabel").textContent = t.sumLabel;
  document.getElementById("scoreLabel").textContent = t.scoreLabel;
  document.getElementById("depName").textContent = t.depName;
  document.getElementById("depSub").textContent = t.depSub;
  document.getElementById("hiddenName").textContent = t.hiddenName;
  document.getElementById("hiddenSub").textContent = t.hiddenSub;
  document.getElementById("numLabel1").textContent = t.numLabel;
  document.getElementById("numLabel2").textContent = t.numLabel;
  document.getElementById("depSlider").setAttribute("aria-label", t.depName);
  document.getElementById("hiddenSlider").setAttribute("aria-label", t.hiddenName);
  document.getElementById("numLabel1").setAttribute("aria-label", `${t.depName} ${t.numLabel}`);
  document.getElementById("numLabel2").setAttribute("aria-label", `${t.hiddenName} ${t.numLabel}`);
  document.getElementById("resetBtn").textContent = t.resetBtn;
  document.getElementById("scenarioBtn").textContent = t.scenarioBtn;
  document.getElementById("chartCaption").textContent = t.chartCaption;
  document.getElementById("chartNote").textContent = t.chartNote;
  document.getElementById("legendApparent").textContent = t.legendApparent;
  document.getElementById("legendActual").textContent = t.legendActual;
  document.getElementById("scenarioBoxTitle").textContent = t.scenarioBoxTitle;
  document.getElementById("apparentCardLabel").textContent = t.apparentCardLabel;
  document.getElementById("actualCardLabel").textContent = t.actualCardLabel;

  document.getElementById("secAdvice").innerHTML = `
    <h2>${t.adviceHeading}</h2>
    <p>${t.adviceIntro}</p>
    <ul>${t.adviceItems.map((i) => `<li>${i}</li>`).join("")}</ul>
  `;

  document.getElementById("booksH").textContent = t.booksH;
  const booksGrid = document.getElementById("booksGrid");
  booksGrid.innerHTML = "";
  t.books.forEach((b) => {
    const div = document.createElement("div");
    div.className = "book";
    div.innerHTML = `<span class="tag">${b.tag}</span><h3>${b.title}</h3><p>${b.desc}</p>
      <a href="${b.url}" target="_blank" rel="noopener nofollow sponsored">${b.link}</a>`;
    booksGrid.appendChild(div);
  });

  DevSimLab.renderRelated(document.getElementById("relatedGrid"), { exclude: "quantification-trap" });
}

/* ================= イベント ================= */
document.getElementById("depSlider").addEventListener("input", (e) => { dep = +e.target.value; render(); });
document.getElementById("depNum").addEventListener("change", (e) => {
  dep = Math.min(DEP_MAX, Math.max(DEP_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("hiddenSlider").addEventListener("input", (e) => { hidden = +e.target.value; render(); });
document.getElementById("hiddenNum").addEventListener("change", (e) => {
  hidden = Math.min(HIDDEN_MAX, Math.max(HIDDEN_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("resetBtn").addEventListener("click", () => {
  dep = 40; hidden = 40;
  document.getElementById("hint").textContent = "";
  render();
});
document.getElementById("scenarioBtn").addEventListener("click", () => {
  dep = 90;
  render();
  const a = assess(dep, hidden);
  document.getElementById("hint").textContent = T().hintScenario(hidden, a);
});

/* ---- drag the marker directly on the chart ---- */
const qtChart = document.getElementById("qtChart");
function svgPoint(evt) {
  const pt = qtChart.createSVGPoint();
  pt.x = evt.clientX; pt.y = evt.clientY;
  return pt.matrixTransform(qtChart.getScreenCTM().inverse());
}
let dragging = false;
function startDrag(evt) {
  dragging = true;
  qtChart.setPointerCapture(evt.pointerId);
  document.getElementById("qtMarker").classList.add("dragging");
  document.getElementById("qtMarkerHit").classList.add("dragging");
  updateFromPointer(evt);
  evt.preventDefault();
}
function updateFromPointer(evt) {
  const p = svgPoint(evt);
  dep = dOfX(p.x);
  render();
}
document.getElementById("qtMarkerHit").addEventListener("pointerdown", startDrag);
qtChart.addEventListener("pointermove", (evt) => { if (dragging) updateFromPointer(evt); });
["pointerup", "pointercancel"].forEach((ev) => qtChart.addEventListener(ev, () => {
  dragging = false;
  document.getElementById("qtMarker").classList.remove("dragging");
  document.getElementById("qtMarkerHit").classList.remove("dragging");
}));

DevSimLab.initChrome({
  onRender: (lang, tone) => {
    LANG = lang; TONE = tone;
    applyStaticText();
    render();
  },
});
</script>
