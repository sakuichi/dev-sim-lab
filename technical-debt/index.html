"use strict";

/* ================= モデル (複利のたとえ・簡略版) ================= */
const MONTHS_MIN = 0, MONTHS_MAX = 24;
const RATE_MIN = 1, RATE_MAX = 20;
const BASE_MIN = 1, BASE_MAX = 60;

function compoundMultiplier(months, ratePct) { return Math.pow(1 + ratePct / 100, months); }
function simpleMultiplier(months, ratePct) { return 1 + (ratePct / 100) * months; }
function scoreOf(months, ratePct) {
  return Math.max(0, Math.min(100, Math.round(100 / compoundMultiplier(months, ratePct))));
}
function assess(months, ratePct) {
  const score = scoreOf(months, ratePct);
  const band = score >= 90 ? 0 : score >= 70 ? 1 : score >= 50 ? 2 : score >= 30 ? 3 : 4;
  return { score, band, compound: compoundMultiplier(months, ratePct), simple: simpleMultiplier(months, ratePct) };
}

/* ================= 開発者モード上書き辞書 ================= */
const DEV = {

  hint: (months, rate, baseCost, compound, simple) => `${months}ヶ月放置、月利${rate}%。${baseCost}人日だった修正が${(baseCost * compound).toFixed(1)}人日に(単利脳だと${(baseCost * simple).toFixed(1)}人日で済むと思ってた)。`,
  hintScenario: (baseCost, compound, simple) => `「あとでまとめて」と言い続けて2年。その「あとで」はまだ来ていません。${baseCost}人日は今${(baseCost * compound).toFixed(1)}人日です。`,

  hint: (months, rate, baseCost, compound, simple) => `${months} months deferred, ${rate}% monthly. A ${baseCost}-person-day fix is now ${(baseCost * compound).toFixed(1)} (simple-interest brain thought it'd be ${(baseCost * simple).toFixed(1)}).`,
  hintScenario: (baseCost, compound, simple) => `Two years of saying "we'll fix it all later." "Later" has not yet arrived. ${baseCost} person-days is now ${(baseCost * compound).toFixed(1)}.`,
  comments: [
    "Zero debt. Take a screenshot. You may never see this again.",
    "Interest is starting to bite. Still in \"mildly concerning\" territory.",

    "This isn't technical debt anymore, it's a technical bomb. Even the Boy Scout Rule has surrendered.",
  ],

let LANG = "ja";
let TONE = "std";
const T = () => (TONE === "dev" ? { ...I18N[LANG], ...DEV[LANG] } : I18N[LANG]);

let baseCost = 5;
let months = 6;
let rate = 10;

/* ================= カーブ描画 ================= */
const NS = "http://www.w3.org/2000/svg";
const el = (tag, attrs) => {
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
};
const PW = 640, PH = 240, PAD_L = 46, PAD_R = 16, PAD_T = 30, PAD_B = 42;
const X_TICKS = [0, 6, 12, 18, 24];
const Y_TICK_FRACS = [0, 0.25, 0.5, 0.75, 1];
const xOf = m => PAD_L + ((m - MONTHS_MIN) / (MONTHS_MAX - MONTHS_MIN)) * (PW - PAD_L - PAD_R);
const mOfX = x => {
  const frac = (x - PAD_L) / (PW - PAD_L - PAD_R);
  return Math.min(MONTHS_MAX, Math.max(MONTHS_MIN, Math.round(MONTHS_MIN + frac * (MONTHS_MAX - MONTHS_MIN))));
};

function drawChart() {
  const t = T();
  const yMax = Math.max(compoundMultiplier(MONTHS_MAX, rate), 2);
  const yOf = v => PAD_T + (1 - (v - 1) / (yMax - 1)) * (PH - PAD_T - PAD_B);

  const gridLayer = document.getElementById("debtGridLayer");
  gridLayer.innerHTML = "";
  Y_TICK_FRACS.forEach(f => {
    const v = 1 + f * (yMax - 1);
    const y = PAD_T + (1 - f) * (PH - PAD_T - PAD_B);
    gridLayer.appendChild(el("line", { class: "debt-grid", x1: PAD_L, y1: y, x2: PW - PAD_R, y2: y }));
    const label = el("text", { class: "debt-axis-label", x: PAD_L - 6, y: y + 3, "text-anchor": "end" });
    const abs = baseCost * v;
    label.textContent = t.unitDays(abs < 10 ? abs.toFixed(1) : Math.round(abs));
    gridLayer.appendChild(label);
  });
  X_TICKS.forEach(m => {
    const x = xOf(m);
    gridLayer.appendChild(el("line", { class: "debt-tick", x1: x, y1: PAD_T, x2: x, y2: PH - PAD_B }));
    const label = el("text", { class: "debt-axis-label", x, y: PH - PAD_B + 14, "text-anchor": m === 0 ? "start" : m === MONTHS_MAX ? "end" : "middle" });
    label.textContent = String(m);
    gridLayer.appendChild(label);
  });
  const yTitle = el("text", { class: "debt-axis-title", x: 2, y: 12 });
  yTitle.textContent = t.debtYTitle;
  gridLayer.appendChild(yTitle);
  const xTitle = el("text", { class: "debt-axis-title", x: PW / 2, y: PH - 4, "text-anchor": "middle" });
  xTitle.textContent = t.debtXTitle;
  gridLayer.appendChild(xTitle);

  const compoundPts = [], simplePts = [];
  for (let m = MONTHS_MIN; m <= MONTHS_MAX; m++) {
    compoundPts.push(`${xOf(m)},${yOf(compoundMultiplier(m, rate))}`);
    simplePts.push(`${xOf(m)},${yOf(simpleMultiplier(m, rate))}`);
  }
  document.getElementById("debtCompound").setAttribute("d", "M " + compoundPts.join(" L "));
  document.getElementById("debtSimple").setAttribute("d", "M " + simplePts.join(" L "));
  document.getElementById("debtArea").setAttribute(
    "d",
    "M " + compoundPts.join(" L ") + " L " + simplePts.slice().reverse().join(" L ") + " Z"
  );

  const compound = compoundMultiplier(months, rate);
  const simple = simpleMultiplier(months, rate);
  const mx = xOf(months);
  const cy = yOf(compound), sy = yOf(simple);

  const marker = document.getElementById("debtMarker");
  marker.setAttribute("x1", mx); marker.setAttribute("x2", mx);
  marker.setAttribute("y1", Math.min(cy, sy)); marker.setAttribute("y2", Math.max(cy, sy) + 0.001);

  const ptC = document.getElementById("debtPointCompound");
  ptC.setAttribute("cx", mx); ptC.setAttribute("cy", cy);
  const ptS = document.getElementById("debtPointSimple");
  ptS.setAttribute("cx", mx); ptS.setAttribute("cy", sy);

  const valC = document.getElementById("debtValCompound");
  valC.setAttribute("x", mx);
  valC.setAttribute("y", cy - 10);
  valC.textContent = t.unitDays((baseCost * compound).toFixed(1));
  const valS = document.getElementById("debtValSimple");
  valS.setAttribute("x", mx);
  valS.setAttribute("y", sy + 16);
  valS.textContent = t.unitDays((baseCost * simple).toFixed(1));

  const hit = document.getElementById("debtMarkerHit");
  hit.setAttribute("x", PAD_L); hit.setAttribute("y", 0);
  hit.setAttribute("width", PW - PAD_L - PAD_R); hit.setAttribute("height", PH);
}

/* ================= 描画 ================= */
function render() {
  const t = T();
  const r = assess(months, rate);

  drawChart();

  document.getElementById("sumVal").textContent = t.sumVal(baseCost, r.compound);
  document.getElementById("hint").textContent = t.hint(months, rate, baseCost, r.compound, r.simple);

  document.getElementById("baseCostReadout").textContent = baseCost;
  document.getElementById("monthsReadout").textContent = months;
  document.getElementById("rateReadout").textContent = rate + "%";
  if (document.activeElement !== document.getElementById("baseCostSlider")) document.getElementById("baseCostSlider").value = baseCost;
  if (document.activeElement !== document.getElementById("baseCostNum")) document.getElementById("baseCostNum").value = baseCost;
  if (document.activeElement !== document.getElementById("monthsSlider")) document.getElementById("monthsSlider").value = months;
  if (document.activeElement !== document.getElementById("monthsNum")) document.getElementById("monthsNum").value = months;
  if (document.activeElement !== document.getElementById("rateSlider")) document.getElementById("rateSlider").value = rate;
  if (document.activeElement !== document.getElementById("rateNum")) document.getElementById("rateNum").value = rate;

  const scoreEl = document.getElementById("scoreVal");
  scoreEl.textContent = r.score;
  scoreEl.className = "score-val mono" + (r.score < 50 ? " danger" : r.score < 70 ? " warn" : "");
  document.getElementById("scoreComment").textContent = t.comments[r.band];

  DevSimLab.renderShare(document.getElementById("shareBtns"), {
    url: "https://sakuichi.github.io/dev-sim-lab/technical-debt/",
    shareText: t.shareText,
    shareHashtags: t.shareHashtags,
  });
}

/* ================= 静的コンテンツの言語適用 ================= */
function applyStaticText() {
  const t = T();
  document.title = t.docTitle;
  document.querySelector('meta[name="description"]').setAttribute("content", t.heroLead);
  document.getElementById("heroTitle").innerHTML = t.heroTitle;
  document.getElementById("heroLead").textContent = t.heroLead;
  document.getElementById("consoleLabel").textContent = t.consoleLabel;
  document.getElementById("sumLabel").textContent = t.sumLabel;
  document.getElementById("scoreLabel").textContent = t.scoreLabel;
  document.getElementById("baseCostName").textContent = t.baseCostName;
  document.getElementById("baseCostSub").textContent = t.baseCostSub;
  document.getElementById("monthsName").textContent = t.monthsName;
  document.getElementById("monthsSub").textContent = t.monthsSub;
  document.getElementById("rateName").textContent = t.rateName;
  document.getElementById("rateSub").textContent = t.rateSub;
  document.getElementById("numLabel1").textContent = t.numLabel;
  document.getElementById("numLabel2").textContent = t.numLabel;
  document.getElementById("numLabel3").textContent = t.numLabel;
  document.getElementById("baseCostSlider").setAttribute("aria-label", t.baseCostName);
  document.getElementById("monthsSlider").setAttribute("aria-label", t.monthsName);
  document.getElementById("rateSlider").setAttribute("aria-label", t.rateName);
  document.getElementById("numLabel1").setAttribute("aria-label", `${t.baseCostName} ${t.numLabel}`);
  document.getElementById("numLabel2").setAttribute("aria-label", `${t.monthsName} ${t.numLabel}`);
  document.getElementById("numLabel3").setAttribute("aria-label", `${t.rateName} ${t.numLabel}`);
  document.getElementById("resetBtn").textContent = t.resetBtn;
  document.getElementById("scenarioBtn").textContent = t.scenarioBtn;
  document.getElementById("chartCaption").textContent = t.chartCaption;
  document.getElementById("chartNote").textContent = t.chartNote;

  document.getElementById("secAdvice").innerHTML = `
    <h2>${t.adviceHeading}</h2>
    <p>${t.adviceIntro}</p>
    <ul>${t.adviceItems.map(i => `<li>${i}</li>`).join("")}</ul>
  `;

  document.getElementById("booksH").textContent = t.booksH;
  const booksGrid = document.getElementById("booksGrid");
  booksGrid.innerHTML = "";
  t.books.forEach(b => {
    const div = document.createElement("div");
    div.className = "book";
    div.innerHTML = `<span class="tag">${b.tag}</span><h3>${b.title}</h3><p>${b.desc}</p>
      <a href="${b.url}" target="_blank" rel="noopener nofollow sponsored">${b.link}</a>`;
    booksGrid.appendChild(div);
  });

  DevSimLab.renderRelated(document.getElementById("relatedGrid"), { exclude: "technical-debt" });
}

/* ================= イベント ================= */
document.getElementById("baseCostSlider").addEventListener("input", e => { baseCost = +e.target.value; render(); });
document.getElementById("baseCostNum").addEventListener("change", e => {
  baseCost = Math.min(BASE_MAX, Math.max(BASE_MIN, +e.target.value));
  render();
});
document.getElementById("monthsSlider").addEventListener("input", e => { months = +e.target.value; render(); });
document.getElementById("monthsNum").addEventListener("change", e => {
  months = Math.min(MONTHS_MAX, Math.max(MONTHS_MIN, +e.target.value));
  render();
});
document.getElementById("rateSlider").addEventListener("input", e => { rate = +e.target.value; render(); });
document.getElementById("rateNum").addEventListener("change", e => {
  rate = Math.min(RATE_MAX, Math.max(RATE_MIN, +e.target.value));
  render();
});
document.getElementById("resetBtn").addEventListener("click", () => {
  baseCost = 5; months = 6; rate = 10;
  document.getElementById("hint").textContent = "";
  render();
});
document.getElementById("scenarioBtn").addEventListener("click", () => {
  months = 24;
  render();
  const r = assess(months, rate);
  document.getElementById("hint").textContent = T().hintScenario(baseCost, r.compound, r.simple);
});

/* ---- drag the marker directly on the chart ---- */
const debtChart = document.getElementById("debtChart");
function svgPoint(evt) {
  const pt = debtChart.createSVGPoint();
  pt.x = evt.clientX; pt.y = evt.clientY;
  return pt.matrixTransform(debtChart.getScreenCTM().inverse());
}
let draggingMonths = false;
function startDrag(evt) {
  draggingMonths = true;
  debtChart.setPointerCapture(evt.pointerId);
  document.getElementById("debtMarker").classList.add("dragging");
  document.getElementById("debtMarkerHit").classList.add("dragging");
  updateFromPointer(evt);
  evt.preventDefault();
}
function updateFromPointer(evt) {
  const p = svgPoint(evt);
  months = mOfX(p.x);
  render();
}
document.getElementById("debtMarkerHit").addEventListener("pointerdown", startDrag);
document.getElementById("debtPointCompound").addEventListener("pointerdown", startDrag);
debtChart.addEventListener("pointermove", evt => { if (draggingMonths) updateFromPointer(evt); });
["pointerup", "pointercancel"].forEach(ev => debtChart.addEventListener(ev, () => {
  draggingMonths = false;
  document.getElementById("debtMarker").classList.remove("dragging");
  document.getElementById("debtMarkerHit").classList.remove("dragging");
}));

DevSimLab.initChrome({
  onRender: (lang, tone) => {
    LANG = lang; TONE = tone;
    applyStaticText();
    render();
  },
});
</script>
