<script>
"use strict";

/* ================= モデル (Cisco/SmartBearの調査を参考にした簡易モデル) ================= */
const SPEED_MIN = 50, SPEED_MAX = 1000;
const LOC_MIN = 50, LOC_MAX = 2000;
const RECOMMENDED_SPEED = 300;
const DEFECT_DENSITY = 0.015; // 1000行あたり15件、という簡易仮定

function detectionRateOf(speed) {
  if (speed <= 300) return 90;
  if (speed <= 500) return 90 - (speed - 300) / 200 * 25;
  return Math.max(20, 65 - (speed - 500) / 500 * 45);
}
function totalDefectsOf(loc) { return Math.max(1, Math.round(loc * DEFECT_DENSITY)); }
function reviewTimeMinOf(loc, speed) { return Math.round((loc / speed) * 60); }
function scoreOf(speed) { return Math.round(detectionRateOf(speed)); }
function assess(speed, loc) {
  const score = scoreOf(speed);
  const band = score >= 90 ? 0 : score >= 70 ? 1 : score >= 50 ? 2 : score >= 30 ? 3 : 4;
  const total = totalDefectsOf(loc);
  const found = Math.round(total * score / 100);
  return { score, band, total, found, missed: total - found, timeMin: reviewTimeMinOf(loc, speed) };
}

/* ================= 開発者モード上書き辞書 ================= */
const DEV = {
ja: {
  hint: (speed, loc, r) => `${speed}行/時で${loc}行を「確認」。検出率${r.score}%。LGTMボタンは指が押しただけで、目は通っていません。見逃し${r.missed}件。`,

  hintScenario: (r) => `1000-line PR, one hour, LGTM. Detection rate: ${r.score}%. What you actually reviewed was the color of the diff. ${r.missed} missed.`,
  comments: [
    "Actually reading it. A miraculous feat of focus.",
    "Still reading. The coffee is working.",

let LANG = "ja";
let TONE = "std";
const T = () => (TONE === "dev" ? { ...I18N[LANG], ...DEV[LANG] } : I18N[LANG]);

let speed = 300;
let loc = 200;

/* ================= カーブ描画 ================= */
const NS = "http://www.w3.org/2000/svg";
const el = (tag, attrs) => {
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
};
const PW = 640, PH = 240, PAD_L = 40, PAD_R = 16, PAD_T = 30, PAD_B = 42;
const X_TICKS = [50, 300, 500, 750, 1000];
const xOf = s => PAD_L + ((s - SPEED_MIN) / (SPEED_MAX - SPEED_MIN)) * (PW - PAD_L - PAD_R);
const sOfX = x => {
  const frac = (x - PAD_L) / (PW - PAD_L - PAD_R);
  const raw = SPEED_MIN + frac * (SPEED_MAX - SPEED_MIN);
  return Math.min(SPEED_MAX, Math.max(SPEED_MIN, Math.round(raw / 50) * 50));
};
const yOf = v => PAD_T + (1 - v / 100) * (PH - PAD_T - PAD_B);

function drawChart() {
  const t = T();
  const gridLayer = document.getElementById("reviewGridLayer");
  gridLayer.innerHTML = "";
  [0, 25, 50, 75, 100].forEach(v => {
    const y = yOf(v);
    gridLayer.appendChild(el("line", { class: "review-grid", x1: PAD_L, y1: y, x2: PW - PAD_R, y2: y }));
    const label = el("text", { class: "review-axis-label", x: PAD_L - 6, y: y + 3, "text-anchor": "end" });
    label.textContent = v + "%";
    gridLayer.appendChild(label);
  });
  X_TICKS.forEach(s => {
    const x = xOf(s);
    gridLayer.appendChild(el("line", { class: "review-tick", x1: x, y1: PAD_T, x2: x, y2: PH - PAD_B }));
    const label = el("text", { class: "review-axis-label", x, y: PH - PAD_B + 14, "text-anchor": s === SPEED_MIN ? "start" : s === SPEED_MAX ? "end" : "middle" });
    label.textContent = String(s);
    gridLayer.appendChild(label);
  });
  const yTitle = el("text", { class: "review-axis-title", x: 2, y: 12 });
  yTitle.textContent = t.reviewYTitle;
  gridLayer.appendChild(yTitle);
  const xTitle = el("text", { class: "review-axis-title", x: PW / 2, y: PH - 4, "text-anchor": "middle" });
  xTitle.textContent = t.reviewXTitle;
  gridLayer.appendChild(xTitle);

  const pts = [];
  for (let s = SPEED_MIN; s <= SPEED_MAX; s += 10) pts.push(`${xOf(s)},${yOf(detectionRateOf(s))}`);
  document.getElementById("reviewLine").setAttribute("d", "M " + pts.join(" L "));
  document.getElementById("reviewArea").setAttribute("d", "M " + xOf(SPEED_MIN) + "," + yOf(0) + " L " + pts.join(" L ") + " L " + xOf(SPEED_MAX) + "," + yOf(0) + " Z");

  const thX = xOf(RECOMMENDED_SPEED);
  const th = document.getElementById("reviewThreshold");
  th.setAttribute("x1", thX); th.setAttribute("x2", thX);
  th.setAttribute("y1", PAD_T); th.setAttribute("y2", PH - PAD_B);
  const thLabel = document.getElementById("reviewThresholdLabel");
  thLabel.setAttribute("x", thX + 6);
  thLabel.setAttribute("y", PAD_T + 12);
  thLabel.textContent = t.thresholdLabel;

  const mx = xOf(speed), my = yOf(detectionRateOf(speed));
  const marker = document.getElementById("reviewMarker");
  marker.setAttribute("x1", mx); marker.setAttribute("x2", mx);
  marker.setAttribute("y1", my); marker.setAttribute("y2", PH - PAD_B);
  const point = document.getElementById("reviewPoint");
  point.setAttribute("cx", mx); point.setAttribute("cy", my);

  const hit = document.getElementById("reviewMarkerHit");
  hit.setAttribute("x", PAD_L); hit.setAttribute("y", 0);
  hit.setAttribute("width", PW - PAD_L - PAD_R); hit.setAttribute("height", PH);
}

function drawDefects(r) {
  const wrap = document.getElementById("defectWrap");
  wrap.innerHTML = "";
  for (let i = 0; i < r.found; i++) {
    const dot = document.createElement("div");
    dot.className = "defect-dot found";
    wrap.appendChild(dot);
  }
  for (let i = 0; i < r.missed; i++) {
    const dot = document.createElement("div");
    dot.className = "defect-dot missed";
    wrap.appendChild(dot);
  }
}

/* ================= 描画 ================= */
function render() {
  const t = T();
  const r = assess(speed, loc);

  drawChart();
  drawDefects(r);

  document.getElementById("sumVal").textContent = r.score + "%";
  document.getElementById("hint").textContent = t.hint(speed, loc, r);

  document.getElementById("speedReadout").textContent = speed;
  document.getElementById("locReadout").textContent = loc;
  if (document.activeElement !== document.getElementById("speedSlider")) document.getElementById("speedSlider").value = speed;
  if (document.activeElement !== document.getElementById("speedNum")) document.getElementById("speedNum").value = speed;
  if (document.activeElement !== document.getElementById("locSlider")) document.getElementById("locSlider").value = loc;
  if (document.activeElement !== document.getElementById("locNum")) document.getElementById("locNum").value = loc;

  const scoreEl = document.getElementById("scoreVal");
  scoreEl.textContent = r.score;
  scoreEl.className = "score-val mono" + (r.score < 50 ? " danger" : r.score < 70 ? " warn" : "");
  document.getElementById("scoreComment").textContent = t.comments[r.band];

  DevSimLab.renderShare(document.getElementById("shareBtns"), {
    url: "https://sakuichi.github.io/dev-sim-lab/code-review/",
    shareText: t.shareText,
    shareHashtags: t.shareHashtags,
  });
}

/* ================= 静的コンテンツの言語適用 ================= */
function applyStaticText() {
  const t = T();
  document.title = t.docTitle;
  document.querySelector('meta[name="description"]').setAttribute("content", t.heroLead);
  document.getElementById("heroTitle").innerHTML = t.heroTitle;
  document.getElementById("heroLead").textContent = t.heroLead;
  document.getElementById("consoleLabel").textContent = t.consoleLabel;
  document.getElementById("sumLabel").textContent = t.sumLabel;
  document.getElementById("scoreLabel").textContent = t.scoreLabel;
  document.getElementById("speedName").textContent = t.speedName;
  document.getElementById("speedSub").textContent = t.speedSub;
  document.getElementById("locName").textContent = t.locName;
  document.getElementById("locSub").textContent = t.locSub;
  document.getElementById("numLabel1").textContent = t.numLabel;
  document.getElementById("numLabel2").textContent = t.numLabel;
  document.getElementById("speedSlider").setAttribute("aria-label", t.speedName);
  document.getElementById("locSlider").setAttribute("aria-label", t.locName);
  document.getElementById("numLabel1").setAttribute("aria-label", `${t.speedName} ${t.numLabel}`);
  document.getElementById("numLabel2").setAttribute("aria-label", `${t.locName} ${t.numLabel}`);
  document.getElementById("resetBtn").textContent = t.resetBtn;
  document.getElementById("scenarioBtn").textContent = t.scenarioBtn;
  document.getElementById("chartCaption").textContent = t.chartCaption;
  document.getElementById("chartNote").textContent = t.chartNote;
  document.getElementById("legendFound").textContent = t.legendFound;
  document.getElementById("legendMissed").textContent = t.legendMissed;

  document.getElementById("secAdvice").innerHTML = `
    <h2>${t.adviceHeading}</h2>
    <p>${t.adviceIntro}</p>
    <ul>${t.adviceItems.map(i => `<li>${i}</li>`).join("")}</ul>
  `;

  document.getElementById("booksH").textContent = t.booksH;
  const booksGrid = document.getElementById("booksGrid");
  booksGrid.innerHTML = "";
  t.books.forEach(b => {
    const div = document.createElement("div");
    div.className = "book";
    div.innerHTML = `<span class="tag">${b.tag}</span><h3>${b.title}</h3><p>${b.desc}</p>
      <a href="${b.url}" target="_blank" rel="noopener nofollow sponsored">${b.link}</a>`;
    booksGrid.appendChild(div);
  });

  DevSimLab.renderRelated(document.getElementById("relatedGrid"), { exclude: "code-review" });
}

/* ================= イベント ================= */
document.getElementById("speedSlider").addEventListener("input", e => { speed = +e.target.value; render(); });
document.getElementById("speedNum").addEventListener("change", e => {
  speed = Math.min(SPEED_MAX, Math.max(SPEED_MIN, +e.target.value));
  render();
});
document.getElementById("locSlider").addEventListener("input", e => { loc = +e.target.value; render(); });
document.getElementById("locNum").addEventListener("change", e => {
  loc = Math.min(LOC_MAX, Math.max(LOC_MIN, +e.target.value));
  render();
});
document.getElementById("resetBtn").addEventListener("click", () => {
  speed = 300; loc = 200;
  document.getElementById("hint").textContent = "";
  render();
});
document.getElementById("scenarioBtn").addEventListener("click", () => {
  speed = 1000; loc = 1000;
  render();
  const r = assess(speed, loc);
  document.getElementById("hint").textContent = T().hintScenario(r);
});

/* ---- drag the marker directly on the chart ---- */
const reviewChart = document.getElementById("reviewChart");
function svgPoint(evt) {
  const pt = reviewChart.createSVGPoint();
  pt.x = evt.clientX; pt.y = evt.clientY;
  return pt.matrixTransform(reviewChart.getScreenCTM().inverse());
}
let draggingSpeed = false;
function startDrag(evt) {
  draggingSpeed = true;
  reviewChart.setPointerCapture(evt.pointerId);
  document.getElementById("reviewMarker").classList.add("dragging");
  document.getElementById("reviewMarkerHit").classList.add("dragging");
  updateFromPointer(evt);
  evt.preventDefault();
}
function updateFromPointer(evt) {
  const p = svgPoint(evt);
  speed = sOfX(p.x);
  render();
}
document.getElementById("reviewMarkerHit").addEventListener("pointerdown", startDrag);
document.getElementById("reviewPoint").addEventListener("pointerdown", startDrag);
reviewChart.addEventListener("pointermove", evt => { if (draggingSpeed) updateFromPointer(evt); });
["pointerup", "pointercancel"].forEach(ev => reviewChart.addEventListener(ev, () => {
  draggingSpeed = false;
  document.getElementById("reviewMarker").classList.remove("dragging");
  document.getElementById("reviewMarkerHit").classList.remove("dragging");
}));

DevSimLab.initChrome({
  onRender: (lang, tone) => {
    LANG = lang; TONE = tone;
    applyStaticText();
    render();
  },
});
</script>
