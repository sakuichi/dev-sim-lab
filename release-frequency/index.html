<script>
"use strict";

/* ================= モデル (DORA State of DevOps Report / Accelerateの調査を参考にした簡易モデル) =================
   3つの帯(高頻度・中頻度・低頻度)は、DORAが長年報告してきた変更失敗率(Change Failure Rate)の
   代表的なレンジ(0-15% / 16-30% / 46-60%)にもとづく。復旧時間(MTTR)は高頻度帯と低頻度帯のみ
   公表値があり、中頻度帯は両者の中間として簡易的に補間した目安。
*/
const INTERVAL_MIN = 0.5, INTERVAL_MAX = 180;
const TIERS = [
  { key: "elite", max: 7, cfrLow: 0, cfrHigh: 15, cfrMid: 8,
    mttr: { ja: "1時間以内", en: "under 1 hour" }, mttrVerified: true },
  { key: "medium", max: 30, cfrLow: 16, cfrHigh: 30, cfrMid: 23,
    mttr: { ja: "数時間〜1日(目安)", en: "a few hours to a day (estimate)" }, mttrVerified: false },
  { key: "low", max: Infinity, cfrLow: 46, cfrHigh: 60, cfrMid: 53,
    mttr: { ja: "1週間〜1ヶ月", en: "a week to a month" }, mttrVerified: true },
];
function tierOf(days) { return TIERS.find((t) => days <= t.max); }
function scoreOf(days) { return Math.round(100 - tierOf(days).cfrMid); }
function releasesPerMonthOf(days) { return 30 / days; }
function assess(days) {
  const tier = tierOf(days);
  const score = scoreOf(days);
  const band = tier.key === "elite" ? 0 : tier.key === "medium" ? (days <= 14 ? 1 : 2) : (days <= 90 ? 3 : 4);
  return { tier, score, band, perMonth: releasesPerMonthOf(days) };
}

/* ================= 開発者モード上書き辞書 ================= */
const DEV = {
ja: {
  hint: (days, a) => `${days}日に1回。月${a.perMonth.toFixed(1)}回。この帯の失敗率は${a.tier.cfrLow}〜${a.tier.cfrHigh}%。障害が起きたら${T().mttrTextFor(a.tier)}、Slackで「調査中です🙏」と言い続けることになります。`,
  mttrTextFor: (tier) => tier.mttr.ja,
  hintScenario: (a) => `四半期に1回の「大型アップデート」。失敗率${a.tier.cfrLow}〜${a.tier.cfrHigh}%。リリース当日は関係者全員が終業後もPCの前に張り付く、あの日です。`,

    "「今期最大のリリース」という言葉自体がリスクの証拠。",
  ],
},
en: {
  hint: (days, a) => `Once every ${days} day(s), about ${a.perMonth.toFixed(1)}/month. Failure rate in this band: ${a.tier.cfrLow}–${a.tier.cfrHigh}%. When it breaks, expect ${T().mttrTextFor(a.tier)} of posting "still investigating 🙏" in Slack.`,
  mttrTextFor: (tier) => tier.mttr.en,
  hintScenario: (a) => `One "big update" per quarter. Failure rate ${a.tier.cfrLow}–${a.tier.cfrHigh}%. Release day is the day everyone stays glued to their laptop long after hours.`,
  comments: [
    "Nobody even notices a release happened. That's the dream.",
    "Fine, mostly. You don't need to start praying yet.",
    "This is the band where people start wanting a lucky charm before release day.",
    "The release itself has become a project of its own.",
    "The phrase \"biggest release of the quarter\" is itself a risk signal.",
  ],
},
};

let LANG = "ja";
let TONE = "std";
const T = () => (TONE === "dev" ? { ...I18N[LANG], ...DEV[LANG] } : I18N[LANG]);

let intervalDays = 14;

/* ================= チャート描画(対数軸) ================= */
const NS = "http://www.w3.org/2000/svg";
const el = (tag, attrs) => {
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
};
const PW = 640, PH = 240, PAD_L = 40, PAD_R = 16, PAD_T = 30, PAD_B = 42;
const LOG_MIN = Math.log10(INTERVAL_MIN), LOG_MAX = Math.log10(INTERVAL_MAX);
const X_TICKS = [0.5, 1, 7, 30, 90, 180];
const xOf = (d) => PAD_L + ((Math.log10(d) - LOG_MIN) / (LOG_MAX - LOG_MIN)) * (PW - PAD_L - PAD_R);
const dOfX = (x) => {
  const frac = (x - PAD_L) / (PW - PAD_L - PAD_R);
  const log = LOG_MIN + Math.min(1, Math.max(0, frac)) * (LOG_MAX - LOG_MIN);
  return Math.pow(10, log);
};
const yOf = (cfr) => PAD_T + (1 - cfr / 70) * (PH - PAD_T - PAD_B);
const COLOR_VAR = { elite: "var(--q)", medium: "var(--c)", low: "var(--alert)" };

function fmtDays(d) {
  return d < 1 ? d.toFixed(2) : d < 10 ? (Math.round(d * 10) / 10).toString() : Math.round(d).toString();
}

function drawChart() {
  const t = T();
  const bandLayer = document.getElementById("relBandLayer");
  bandLayer.innerHTML = "";
  let prevX = xOf(INTERVAL_MIN);
  TIERS.forEach((tier) => {
    const endD = tier.max === Infinity ? INTERVAL_MAX : tier.max;
    const x2 = xOf(endD);
    bandLayer.appendChild(el("rect", {
      class: "rel-band", x: prevX, y: yOf(tier.cfrHigh), width: Math.max(0, x2 - prevX),
      height: yOf(tier.cfrLow) - yOf(tier.cfrHigh), fill: COLOR_VAR[tier.key],
    }));
    prevX = x2;
  });

  const gridLayer = document.getElementById("relGridLayer");
  gridLayer.innerHTML = "";
  [0, 15, 30, 46, 60, 70].forEach((v) => {
    const y = yOf(v);
    gridLayer.appendChild(el("line", { class: "rel-grid", x1: PAD_L, y1: y, x2: PW - PAD_R, y2: y }));
    const label = el("text", { class: "rel-axis-label", x: PAD_L - 6, y: y + 3, "text-anchor": "end" });
    label.textContent = v + "%";
    gridLayer.appendChild(label);
  });
  X_TICKS.forEach((d) => {
    const x = xOf(d);
    gridLayer.appendChild(el("line", { class: "rel-tick", x1: x, y1: PAD_T, x2: x, y2: PH - PAD_B }));
    const label = el("text", { class: "rel-axis-label", x, y: PH - PAD_B + 14, "text-anchor": d === INTERVAL_MIN ? "start" : d === INTERVAL_MAX ? "end" : "middle" });
    label.textContent = fmtDays(d);
    gridLayer.appendChild(label);
  });
  const yTitle = el("text", { class: "rel-axis-title", x: 2, y: 12 });
  yTitle.textContent = t.relYTitle;
  gridLayer.appendChild(yTitle);
  const xTitle = el("text", { class: "rel-axis-title", x: PW / 2, y: PH - 4, "text-anchor": "middle" });
  xTitle.textContent = t.relXTitle;
  gridLayer.appendChild(xTitle);

  const pts = [];
  const samples = [];
  for (let ld = LOG_MIN; ld <= LOG_MAX; ld += (LOG_MAX - LOG_MIN) / 200) samples.push(Math.pow(10, ld));
  samples.forEach((d) => pts.push(`${xOf(d)},${yOf(tierOf(d).cfrMid)}`));
  document.getElementById("relLine").setAttribute("d", "M " + pts.join(" L "));

  const mx = xOf(intervalDays), my = yOf(tierOf(intervalDays).cfrMid);
  const marker = document.getElementById("relMarker");
  marker.setAttribute("x1", mx); marker.setAttribute("x2", mx);
  marker.setAttribute("y1", my); marker.setAttribute("y2", PH - PAD_B);
  const point = document.getElementById("relPoint");
  point.setAttribute("cx", mx); point.setAttribute("cy", my);
  point.setAttribute("stroke", COLOR_VAR[tierOf(intervalDays).key]);

  const hit = document.getElementById("relMarkerHit");
  hit.setAttribute("x", PAD_L); hit.setAttribute("y", 0);
  hit.setAttribute("width", PW - PAD_L - PAD_R); hit.setAttribute("height", PH);
}

/* ================= 描画 ================= */
function render() {
  const t = T();
  const a = assess(intervalDays);

  drawChart();

  document.getElementById("sumVal").textContent = `${a.tier.cfrLow}–${a.tier.cfrHigh}%`;
  document.getElementById("cfrVal").textContent = `${a.tier.cfrLow}–${a.tier.cfrHigh}%`;
  document.getElementById("mttrVal").textContent = t.mttrTextFor(a.tier);
  document.getElementById("hint").textContent = t.hint(fmtDays(intervalDays), a);

  const cardEl = document.getElementById("cfrCard");
  cardEl.className = "tier-card tier-" + a.tier.key;
  document.getElementById("mttrCard").className = "tier-card tier-" + a.tier.key;

  const sliderPos = Math.round(((Math.log10(intervalDays) - LOG_MIN) / (LOG_MAX - LOG_MIN)) * 1000);
  document.getElementById("intervalReadout").textContent = fmtDays(intervalDays);
  if (document.activeElement !== document.getElementById("intervalSlider")) document.getElementById("intervalSlider").value = sliderPos;
  if (document.activeElement !== document.getElementById("intervalNum")) document.getElementById("intervalNum").value = fmtDays(intervalDays);

  const scoreEl = document.getElementById("scoreVal");
  scoreEl.textContent = a.score;
  scoreEl.className = "score-val mono" + (a.score < 50 ? " danger" : a.score < 70 ? " warn" : "");
  document.getElementById("scoreComment").textContent = t.comments[a.band];

  DevSimLab.renderShare(document.getElementById("shareBtns"), {
    url: "https://sakuichi.github.io/dev-sim-lab/release-frequency/",
    shareText: t.shareText,
    shareHashtags: t.shareHashtags,
  });
}

/* ================= 静的コンテンツの言語適用 ================= */
function applyStaticText() {
  const t = T();
  document.title = t.docTitle;
  document.querySelector('meta[name="description"]').setAttribute("content", t.heroLead);
  document.getElementById("heroTitle").innerHTML = t.heroTitle;
  document.getElementById("heroLead").textContent = t.heroLead;
  document.getElementById("consoleLabel").textContent = t.consoleLabel;
  document.getElementById("sumLabel").textContent = t.sumLabel;
  document.getElementById("scoreLabel").textContent = t.scoreLabel;
  document.getElementById("intervalName").textContent = t.intervalName;
  document.getElementById("intervalSub").textContent = t.intervalSub;
  document.getElementById("numLabel1").textContent = t.numLabel;
  document.getElementById("intervalSlider").setAttribute("aria-label", t.intervalName);
  document.getElementById("numLabel1").setAttribute("aria-label", `${t.intervalName} ${t.numLabel}`);
  document.getElementById("resetBtn").textContent = t.resetBtn;
  document.getElementById("scenarioBtn").textContent = t.scenarioBtn;
  document.getElementById("chartCaption").textContent = t.chartCaption;
  document.getElementById("chartNote").textContent = t.chartNote;
  document.getElementById("cfrLabel").textContent = t.cfrLabel;
  document.getElementById("mttrLabel").textContent = t.mttrLabel;

  document.getElementById("secAdvice").innerHTML = `
    <h2>${t.adviceHeading}</h2>
    <p>${t.adviceIntro}</p>
    <ul>${t.adviceItems.map((i) => `<li>${i}</li>`).join("")}</ul>
  `;

  document.getElementById("booksH").textContent = t.booksH;
  const booksGrid = document.getElementById("booksGrid");
  booksGrid.innerHTML = "";
  t.books.forEach((b) => {
    const div = document.createElement("div");
    div.className = "book";
    div.innerHTML = `<span class="tag">${b.tag}</span><h3>${b.title}</h3><p>${b.desc}</p>
      <a href="${b.url}" target="_blank" rel="noopener nofollow sponsored">${b.link}</a>`;
    booksGrid.appendChild(div);
  });

  DevSimLab.renderRelated(document.getElementById("relatedGrid"), { exclude: "release-frequency" });
}

/* ================= イベント ================= */
document.getElementById("intervalSlider").addEventListener("input", (e) => {
  const frac = +e.target.value / 1000;
  intervalDays = Math.pow(10, LOG_MIN + frac * (LOG_MAX - LOG_MIN));
  render();
});
document.getElementById("intervalNum").addEventListener("change", (e) => {
  intervalDays = Math.min(INTERVAL_MAX, Math.max(INTERVAL_MIN, +e.target.value));
  render();
});
document.getElementById("resetBtn").addEventListener("click", () => {
  intervalDays = 14;
  document.getElementById("hint").textContent = "";
  render();
});
document.getElementById("scenarioBtn").addEventListener("click", () => {
  intervalDays = 90;
  render();
  const a = assess(intervalDays);
  document.getElementById("hint").textContent = T().hintScenario(a);
});

/* ---- drag the marker directly on the chart (log-scale x) ---- */
const relChart = document.getElementById("relChart");
function svgPoint(evt) {
  const pt = relChart.createSVGPoint();
  pt.x = evt.clientX; pt.y = evt.clientY;
  return pt.matrixTransform(relChart.getScreenCTM().inverse());
}
let dragging = false;
function startDrag(evt) {
  dragging = true;
  relChart.setPointerCapture(evt.pointerId);
  document.getElementById("relMarker").classList.add("dragging");
  document.getElementById("relMarkerHit").classList.add("dragging");
  updateFromPointer(evt);
  evt.preventDefault();
}
function updateFromPointer(evt) {
  const p = svgPoint(evt);
  intervalDays = dOfX(p.x);
  render();
}
document.getElementById("relMarkerHit").addEventListener("pointerdown", startDrag);
document.getElementById("relPoint").addEventListener("pointerdown", startDrag);
relChart.addEventListener("pointermove", (evt) => { if (dragging) updateFromPointer(evt); });
["pointerup", "pointercancel"].forEach((ev) => relChart.addEventListener(ev, () => {
  dragging = false;
  document.getElementById("relMarker").classList.remove("dragging");
  document.getElementById("relMarkerHit").classList.remove("dragging");
}));

DevSimLab.initChrome({
  onRender: (lang, tone) => {
    LANG = lang; TONE = tone;
    applyStaticText();
    render();
  },
});
</script>
