"use strict";

/* ================= モデル =================
   新しく加わったメンバーの実効生産性が、時間をかけて立ち上がっていく様子を表す簡易モデル。
   Swimm/HackerNoonによる80社調査では、フル立ち上がりまで平均3〜9ヶ月、
   APQCの調査では基本的な生産性に達するまで中央値35日、Brandon Hall Groupの調査では
   体系的なオンボーディングにより新人の生産性が最大70%向上すると報告されている。
   これらの調査結果の方向性(飽和的に立ち上がる・体制で加速する)を反映した簡易モデルであり、
   個々の組織の正確な数値を予測するものではない。
   累計ギャップ(人月)は、「入社直後から100%稼働」という前提の見積もりに対して、
   実際にはどれだけの生産性が積算されずに失われているかを表す。
*/
const MONTH_MIN = 0, MONTH_MAX = 9;
const QUALITY_MIN = 0, QUALITY_MAX = 100;
const P0 = 20; // 初日の実効生産性(%)
const K_BASE = 3.5; // 立ち上がりの時定数(ヶ月)

function productivityOf(month, quality) {
  const kEff = K_BASE * (1 - (quality / 100) * 0.5);
  return 100 - (100 - P0) * Math.exp(-month / kEff);
}
function cumulativeGapPersonMonths(month, quality) {
  const steps = Math.max(1, Math.round(month * 20));
  const dt = month / steps;
  let sum = 0;
  for (let i = 0; i < steps; i++) {
    const t = (i + 0.5) * dt;
    sum += (1 - productivityOf(t, quality) / 100) * dt;
  }
  return sum;
}
function scoreOf(month, quality) { return Math.round(productivityOf(month, quality)); }
function assess(month, quality) {
  const productivity = productivityOf(month, quality);
  const gap = cumulativeGapPersonMonths(month, quality);
  const score = scoreOf(month, quality);
  const band = score >= 90 ? 0 : score >= 70 ? 1 : score >= 50 ? 2 : score >= 30 ? 3 : 4;
  return { productivity, gap, score, band };
}

let LANG = "ja";
let TONE = "std";
const T = () => (TONE === "dev" ? { ...I18N[LANG], ...DEV[LANG] } : I18N[LANG]);

let month = 2;
let quality = 30;

/* ================= チャート描画 ================= */
const NS = "http://www.w3.org/2000/svg";
const el = (tag, attrs) => {
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
};
const PW = 640, PH = 240, PAD_L = 40, PAD_R = 16, PAD_T = 30, PAD_B = 42;
const Y_MAX = 100;
const xOf = (m) => PAD_L + ((m - MONTH_MIN) / (MONTH_MAX - MONTH_MIN)) * (PW - PAD_L - PAD_R);
const mOfX = (x) => {
  const frac = (x - PAD_L) / (PW - PAD_L - PAD_R);
  const raw = MONTH_MIN + frac * (MONTH_MAX - MONTH_MIN);
  return Math.min(MONTH_MAX, Math.max(MONTH_MIN, Math.round(raw)));
};
const yOf = (v) => PAD_T + (1 - Math.min(v, Y_MAX) / Y_MAX) * (PH - PAD_T - PAD_B);

function drawChart() {
  const t = T();
  const gridLayer = document.getElementById("obGridLayer");
  gridLayer.innerHTML = "";
  [0, 20, 40, 60, 80, 100].forEach((v) => {
    const y = yOf(v);
    gridLayer.appendChild(el("line", { class: "ob-grid", x1: PAD_L, y1: y, x2: PW - PAD_R, y2: y }));
    const label = el("text", { class: "ob-axis-label", x: PAD_L - 6, y: y + 3, "text-anchor": "end" });
    label.textContent = v + "%";
    gridLayer.appendChild(label);
  });
  for (let m = MONTH_MIN; m <= MONTH_MAX; m += 1) {
    const x = xOf(m);
    gridLayer.appendChild(el("line", { class: "ob-tick", x1: x, y1: PAD_T, x2: x, y2: PH - PAD_B }));
    const label = el("text", { class: "ob-axis-label", x, y: PH - PAD_B + 14, "text-anchor": m === MONTH_MIN ? "start" : m === MONTH_MAX ? "end" : "middle" });
    label.textContent = String(m);
    gridLayer.appendChild(label);
  }
  const yTitle = el("text", { class: "ob-axis-title", x: 2, y: 12 });
  yTitle.textContent = t.obYTitle;
  gridLayer.appendChild(yTitle);
  const xTitle = el("text", { class: "ob-axis-title", x: PW / 2, y: PH - 4, "text-anchor": "middle" });
  xTitle.textContent = t.obXTitle;
  gridLayer.appendChild(xTitle);

  const pts = [];
  for (let m = MONTH_MIN; m <= MONTH_MAX; m += 0.25) pts.push(`${xOf(m)},${yOf(productivityOf(m, quality))}`);
  document.getElementById("obLine").setAttribute("d", "M " + pts.join(" L "));
  document.getElementById("obArea").setAttribute("d", "M " + xOf(MONTH_MIN) + "," + yOf(0) + " L " + pts.join(" L ") + " L " + xOf(MONTH_MAX) + "," + yOf(0) + " Z");

  const mx = xOf(month), my = yOf(productivityOf(month, quality));
  const marker = document.getElementById("obMarker");
  marker.setAttribute("x1", mx); marker.setAttribute("x2", mx);
  marker.setAttribute("y1", my); marker.setAttribute("y2", PH - PAD_B);
  const point = document.getElementById("obPoint");
  point.setAttribute("cx", mx); point.setAttribute("cy", my);

  const hit = document.getElementById("obMarkerHit");
  hit.setAttribute("x", PAD_L); hit.setAttribute("y", 0);
  hit.setAttribute("width", PW - PAD_L - PAD_R); hit.setAttribute("height", PH);
}

/* ================= 描画 ================= */
function render() {
  const t = T();
  const a = assess(month, quality);

  drawChart();

  document.getElementById("sumVal").textContent = `${Math.round(a.productivity)}%`;
  document.getElementById("prodCardVal").textContent = `${Math.round(a.productivity)}%`;
  document.getElementById("gapCardVal").textContent = t.htmlLang === "ja" ? `${a.gap.toFixed(1)}人月` : `${a.gap.toFixed(1)} PM`;
  document.getElementById("hint").textContent = t.hint(month, quality, a);

  document.getElementById("monthReadout").textContent = month;
  document.getElementById("qualityReadout").textContent = quality + "%";
  if (document.activeElement !== document.getElementById("monthSlider")) document.getElementById("monthSlider").value = month;
  if (document.activeElement !== document.getElementById("monthNum")) document.getElementById("monthNum").value = month;
  if (document.activeElement !== document.getElementById("qualitySlider")) document.getElementById("qualitySlider").value = quality;
  if (document.activeElement !== document.getElementById("qualityNum")) document.getElementById("qualityNum").value = quality;

  const scoreEl = document.getElementById("scoreVal");
  scoreEl.textContent = a.score;
  scoreEl.className = "score-val mono" + (a.score < 30 ? " danger" : a.score < 50 ? " warn" : "");
  document.getElementById("scoreComment").textContent = t.comments[a.band];

  DevSimLab.renderShare(document.getElementById("shareBtns"), {
    url: "https://sakuichi.github.io/dev-sim-lab/onboarding-ramp/",
    shareText: t.shareText,
    shareHashtags: t.shareHashtags,
  });
}

/* ================= 静的コンテンツの言語適用 ================= */
function applyStaticText() {
  const t = T();
  document.title = t.docTitle;
  document.querySelector('meta[name="description"]').setAttribute("content", t.heroLead);
  document.getElementById("heroTitle").innerHTML = t.heroTitle;
  document.getElementById("heroLead").textContent = t.heroLead;
  document.getElementById("consoleLabel").textContent = t.consoleLabel;
  document.getElementById("sumLabel").textContent = t.sumLabel;
  document.getElementById("scoreLabel").textContent = t.scoreLabel;
  document.getElementById("monthName").textContent = t.monthName;
  document.getElementById("monthSub").textContent = t.monthSub;
  document.getElementById("qualityName").textContent = t.qualityName;
  document.getElementById("qualitySub").textContent = t.qualitySub;
  document.getElementById("numLabel1").textContent = t.numLabel;
  document.getElementById("numLabel2").textContent = t.numLabel;
  document.getElementById("monthSlider").setAttribute("aria-label", t.monthName);
  document.getElementById("qualitySlider").setAttribute("aria-label", t.qualityName);
  document.getElementById("numLabel1").setAttribute("aria-label", `${t.monthName} ${t.numLabel}`);
  document.getElementById("numLabel2").setAttribute("aria-label", `${t.qualityName} ${t.numLabel}`);
  document.getElementById("resetBtn").textContent = t.resetBtn;
  document.getElementById("scenarioBtn").textContent = t.scenarioBtn;
  document.getElementById("chartCaption").textContent = t.chartCaption;
  document.getElementById("chartNote").textContent = t.chartNote;
  document.getElementById("prodCardLabel").textContent = t.prodCardLabel;
  document.getElementById("gapCardLabel").textContent = t.gapCardLabel;

  document.getElementById("secAdvice").innerHTML = `
    <h2>${t.adviceHeading}</h2>
    <p>${t.adviceIntro}</p>
    <ul>${t.adviceItems.map((i) => `<li>${i}</li>`).join("")}</ul>
  `;

  document.getElementById("booksH").textContent = t.booksH;
  const booksGrid = document.getElementById("booksGrid");
  booksGrid.innerHTML = "";
  t.books.forEach((b) => {
    const div = document.createElement("div");
    div.className = "book";
    div.innerHTML = `<span class="tag">${b.tag}</span><h3>${b.title}</h3><p>${b.desc}</p>
      <a href="${b.url}" target="_blank" rel="noopener nofollow sponsored">${b.link}</a>`;
    booksGrid.appendChild(div);
  });

  DevSimLab.renderRelated(document.getElementById("relatedGrid"), { exclude: "onboarding-ramp" });
}

/* ================= イベント ================= */
document.getElementById("monthSlider").addEventListener("input", (e) => { month = +e.target.value; render(); });
document.getElementById("monthNum").addEventListener("change", (e) => {
  month = Math.min(MONTH_MAX, Math.max(MONTH_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("qualitySlider").addEventListener("input", (e) => { quality = +e.target.value; render(); });
document.getElementById("qualityNum").addEventListener("change", (e) => {
  quality = Math.min(QUALITY_MAX, Math.max(QUALITY_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("resetBtn").addEventListener("click", () => {
  month = 2; quality = 30;
  document.getElementById("hint").textContent = "";
  render();
});
document.getElementById("scenarioBtn").addEventListener("click", () => {
  month = 1; quality = 0;
  render();
  const a = assess(month, quality);
  document.getElementById("hint").textContent = T().hintScenario(a);
});

/* ---- drag the marker directly on the chart ---- */
const obChart = document.getElementById("obChart");
function svgPoint(evt) {
  const pt = obChart.createSVGPoint();
  pt.x = evt.clientX; pt.y = evt.clientY;
  return pt.matrixTransform(obChart.getScreenCTM().inverse());
}
let dragging = false;
function startDrag(evt) {
  dragging = true;
  obChart.setPointerCapture(evt.pointerId);
  document.getElementById("obMarker").classList.add("dragging");
  document.getElementById("obMarkerHit").classList.add("dragging");
  updateFromPointer(evt);
  evt.preventDefault();
}
function updateFromPointer(evt) {
  const p = svgPoint(evt);
  month = mOfX(p.x);
  render();
}
document.getElementById("obMarkerHit").addEventListener("pointerdown", startDrag);
document.getElementById("obPoint").addEventListener("pointerdown", startDrag);
obChart.addEventListener("pointermove", (evt) => { if (dragging) updateFromPointer(evt); });
["pointerup", "pointercancel"].forEach((ev) => obChart.addEventListener(ev, () => {
  dragging = false;
  document.getElementById("obMarker").classList.remove("dragging");
  document.getElementById("obMarkerHit").classList.remove("dragging");
}));

DevSimLab.initChrome({
  onRender: (lang, tone) => {
    LANG = lang; TONE = tone;
    applyStaticText();
    render();
  },
});
</script>
