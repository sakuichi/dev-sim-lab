"use strict";

/* ================= モデル =================
   「ラバーダック・デバッグ」——行き詰まった問題を、誰か(またはアヒルのおもちゃ)に
   向かって一行ずつ説明すると、説明の途中で自分で答えに気づく現象。
   『達人プログラマー』(Hunt & Thomas, 1999)の逸話——アヒルを持ち歩き、コードを
   一行ずつアヒルに説明するプログラマー——が名前の由来。
   学習科学では、自分の言葉で説明しながら学ぶ人ほど問題解決の成績が良いという
   「自己説明効果」(Chi et al., 1989)が知られており、言語化が思考の穴を露呈させる
   という方向性はこの研究系譜と整合する。
   本モデルのS字カーブは方向性を示す例示用の簡易モデルであり、実証研究の数値を
   再現したものではない。S字にしているのは「断片的なメモ程度ではあまり効かず、
   順序立てて言語化し始めたところで急に効き、それ以降は頭打ちになる」という
   質的な観察を形にしたもの。
*/
const THOR_MIN = 0, THOR_MAX = 100;
const STUCK_MIN = 15, STUCK_MAX = 120;
const RATE_LO = 5, RATE_HI = 75;

function rateOf(thor) { return RATE_LO + (RATE_HI - RATE_LO) / (1 + Math.exp(-(thor - 50) / 12)); }
function savedOf(stuck, thor) { return stuck * (rateOf(thor) / 100); }
function scoreOf(thor) {
  return Math.round(((rateOf(thor) - rateOf(THOR_MIN)) / (rateOf(THOR_MAX) - rateOf(THOR_MIN))) * 100);
}
function tierOf(thor) { return Math.min(4, Math.floor(thor / 20)); }
function assess(thor, stuck) {
  const rate = rateOf(thor);
  const saved = savedOf(stuck, thor);
  const score = scoreOf(thor);
  const band = tierOf(thor);
  return { rate, saved, score, band };
}

  savedCardLabel: "Expected time saved per stuck episode",
  hint: (thor, stuck, a) => `At thoroughness ${thor}, the chance of finding the answer yourself mid-explanation is about ${Math.round(a.rate)}%. Instead of grinding alone for ${stuck} minutes, starting to explain saves an expected ${Math.round(a.saved)} minutes.`,
  hintScenario: (stuck, a) => `Like the anecdote in The Pragmatic Programmer, you're explaining line by line to the duck. Chance of self-solving: about ${Math.round(a.rate)}% — and the duck never says a word. It works because the duck isn't there to give answers; it's there to force your thoughts into a straight line.`,
  comments: [
    "Zero verbalization. What feels understood inside your head can't be verified until it comes out.",
    "Notes have begun. One more step — explaining in full sentences — and the effect jumps.",
    "The steep part of the curve. The listener can be a person, a duck, or the draft of a message you never send.",
    "Structured explanation achieved. Most stuck episodes resolve themselves by this stage.",
    "Full rubber-duck mode. A problem that survives this much verbalization has earned the right to be escalated to a human.",
  ],
  adviceHeading: "How to actually deal with this",
  adviceIntro: "The essence of rubber duck debugging is that the listener doesn't need to know anything. The effect comes not from the listener's knowledge but from the process of forcibly serializing and externalizing your own thinking — which is why a duck, a houseplant, or the draft of a question you never send all work. If you've ever finished writing a question and solved the problem before hitting send, you've experienced exactly this. At the team level, this can be institutionalized as a \"write out your explanation before asking\" culture. One caution: raising the verbalization bar too high suppresses questions themselves (the speak-up cost problem). A light-touch rule works best — \"give the duck five minutes; if it's still unsolved, ask a human immediately.\"",
  adviceItems: [
    "When stuck, say (or write) in order: what you were trying to do, what you expected, and what actually happened",
    "Provide a question template (expected behavior / actual behavior / what you tried) — filling it in is itself a rubber duck",
    "Celebrate \"solved it while writing the question.\" A question that dies as a draft is a success, not a failure",
    "Don't raise the verbalization bar too high — a few minutes of explaining, then ask a human without hesitation",
  ],
  booksH: "Recommended reading",
  books: [
    { tag: "PROGRAMMER CULTURE", title: "The Pragmatic Programmer (20th Anniversary Edition)", desc: "Andrew Hunt and David Thomas. The 20th-anniversary edition of the classic where the rubber duck anecdote first appeared.", link: "View on Amazon →", url: "https://amzn.to/4wHbKKH" },
    { tag: "COGNITIVE SCIENCE", title: "The Programmer's Brain", desc: "Felienne Hermans. What's happening in your brain while you code — a cognitive-science lens on verbalization, memory, and mental models.", link: "View on Amazon →", url: "https://amzn.to/4h9LFPD" },
  ],
  toneBtn: "🔥 Developer mode",
  toneNote: "* Joke mode. Switch back to standard before client meetings.",
  shareText: "Why do you find the answer the moment you explain it to someone? — Rubber Duck Debugging Simulator",
  shareHashtags: "DevSimLab",
},
};

/* ================= 開発者モード上書き辞書 ================= */
const DEV = {
ja: {
  hint: (thor, stuck, a) => `丁寧さ${thor}。Slackの質問下書きが完成に近づくほど、送信ボタンが押される確率は下がっていく。自己解決率約${Math.round(a.rate)}%。今日も下書きフォルダに解決済みの質問が1件増えた。`,
  hintScenario: (stuck, a) => `アヒル稼働中。自己解決率約${Math.round(a.rate)}%。アヒルの今月の解決件数はチームの若手を超えたが、1on1は実施されていない。`,
  comments: [
    "無言で3時間。モニターを睨む力でバグが直るなら、もう直っている。",
    "付箋に「たぶんキャッシュ」とだけ書いてある。それは説明ではなく祈り。",
    "質問を書き始めて3行目で「あっ」と言った。同僚は全てを察して頷いた。",
    "「ちょっと聞いてもらっていいですか」の9割が、聞いてもらう前に終わる。",
    "アヒルが今日も無言で3件解決した。今月のMVP。人事評価制度はアヒルに対応していない。",
  ],
},
en: {
  hint: (thor, stuck, a) => `Thoroughness ${thor}. The closer the Slack draft gets to done, the lower the odds it ever gets sent. Self-solve rate ~${Math.round(a.rate)}%. Another solved question retired to the drafts folder today.`,
  hintScenario: (stuck, a) => `Duck deployed. Self-solve rate ~${Math.round(a.rate)}%. The duck's monthly solve count has passed the junior devs', yet it has never been given a 1-on-1.`,
  comments: [
    "Three hours of silent staring. If glaring at the monitor fixed bugs, it'd be fixed by now.",
    "A sticky note that just says \"probably cache.\" That's not an explanation, that's a prayer.",
    "Got three lines into writing the question and said \"oh.\" The colleague nodded, understanding everything.",
    "90% of \"got a minute?\" conversations end before the minute starts.",
    "The duck silently closed three tickets today. MVP of the month. HR has no review process for ducks.",
  ],
},
};

let LANG = "ja";
let TONE = "std";
const T = () => (TONE === "dev" ? { ...I18N[LANG], ...DEV[LANG] } : I18N[LANG]);

let thor = 50;
let stuck = 60;

/* ================= チャート描画 ================= */
const NS = "http://www.w3.org/2000/svg";
const el = (tag, attrs) => {
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
};
const PW = 640, PH = 240, PAD_L = 40, PAD_R = 16, PAD_T = 30, PAD_B = 42;
const Y_MAX = 100;
const xOf = (v) => PAD_L + ((v - THOR_MIN) / (THOR_MAX - THOR_MIN)) * (PW - PAD_L - PAD_R);
const tOfX = (x) => {
  const frac = (x - PAD_L) / (PW - PAD_L - PAD_R);
  const raw = THOR_MIN + frac * (THOR_MAX - THOR_MIN);
  return Math.min(THOR_MAX, Math.max(THOR_MIN, Math.round(raw / 5) * 5));
};
const yOf = (v) => PAD_T + (1 - Math.min(v, Y_MAX) / Y_MAX) * (PH - PAD_T - PAD_B);

function drawChart() {
  const t = T();
  const gridLayer = document.getElementById("rdGridLayer");
  gridLayer.innerHTML = "";
  [0, 20, 40, 60, 80, 100].forEach((v) => {
    const y = yOf(v);
    gridLayer.appendChild(el("line", { class: "rd-grid", x1: PAD_L, y1: y, x2: PW - PAD_R, y2: y }));
    const label = el("text", { class: "rd-axis-label", x: PAD_L - 6, y: y + 3, "text-anchor": "end" });
    label.textContent = v + "%";
    gridLayer.appendChild(label);
  });
  for (let v = THOR_MIN; v <= THOR_MAX; v += 20) {
    const x = xOf(v);
    gridLayer.appendChild(el("line", { class: "rd-tick", x1: x, y1: PAD_T, x2: x, y2: PH - PAD_B }));
    const label = el("text", { class: "rd-axis-label", x, y: PH - PAD_B + 14, "text-anchor": v === THOR_MIN ? "start" : v === THOR_MAX ? "end" : "middle" });
    label.textContent = v;
    gridLayer.appendChild(label);
  }
  const yTitle = el("text", { class: "rd-axis-title", x: 2, y: 12 });
  yTitle.textContent = t.rdYTitle;
  gridLayer.appendChild(yTitle);
  const xTitle = el("text", { class: "rd-axis-title", x: PW / 2, y: PH - 4, "text-anchor": "middle" });
  xTitle.textContent = t.rdXTitle;
  gridLayer.appendChild(xTitle);

  const pts = [];
  for (let v = THOR_MIN; v <= THOR_MAX; v += 2) {
    pts.push(`${xOf(v)},${yOf(rateOf(v))}`);
  }
  document.getElementById("rdLineRate").setAttribute("d", "M " + pts.join(" L "));

  const dotsLayer = document.getElementById("rdDotsLayer");
  dotsLayer.innerHTML = "";
  for (let v = THOR_MIN; v <= THOR_MAX; v += 20) {
    dotsLayer.appendChild(el("circle", { class: "rd-dot", cx: xOf(v), cy: yOf(rateOf(v)), fill: "var(--q)" }));
  }

  const mx = xOf(thor);
  const marker = document.getElementById("rdMarker");
  marker.setAttribute("x1", mx); marker.setAttribute("x2", mx);
  marker.setAttribute("y1", PAD_T); marker.setAttribute("y2", PH - PAD_B);

  const py = yOf(rateOf(thor));
  document.getElementById("rdPoint").setAttribute("cx", mx);
  document.getElementById("rdPoint").setAttribute("cy", py);

  const labelAnchor = mx > PW - PAD_R - 55 ? "end" : mx < PAD_L + 55 ? "start" : "middle";
  const labelDx = labelAnchor === "end" ? -10 : labelAnchor === "start" ? 10 : 0;
  const labelEl = document.getElementById("rdLabel");
  labelEl.setAttribute("x", mx + labelDx);
  labelEl.setAttribute("y", Math.max(PAD_T + 10, py - 10));
  labelEl.setAttribute("text-anchor", labelAnchor);
  labelEl.textContent = Math.round(rateOf(thor)) + "%";

  const hit = document.getElementById("rdMarkerHit");
  hit.setAttribute("x", PAD_L); hit.setAttribute("y", 0);
  hit.setAttribute("width", PW - PAD_L - PAD_R); hit.setAttribute("height", PH);
}

/* ================= 描画 ================= */
function render() {
  const t = T();
  const a = assess(thor, stuck);

  drawChart();

  const rateLabel = `${Math.round(a.rate)}%`;
  const savedLabel = t.htmlLang === "ja" ? `${Math.round(a.saved)}分` : `${Math.round(a.saved)} min`;
  document.getElementById("sumVal").textContent = rateLabel;
  document.getElementById("rateCardVal").textContent = rateLabel;
  document.getElementById("savedCardVal").textContent = savedLabel;
  document.getElementById("hint").textContent = t.hint(thor, stuck, a);
  document.getElementById("scenarioBoxText").textContent = t.scenarios[a.band];

  document.getElementById("thorReadout").textContent = thor;
  document.getElementById("stuckReadout").textContent = t.htmlLang === "ja" ? `${stuck}分` : `${stuck} min`;
  if (document.activeElement !== document.getElementById("thorSlider")) document.getElementById("thorSlider").value = thor;
  if (document.activeElement !== document.getElementById("thorNum")) document.getElementById("thorNum").value = thor;
  if (document.activeElement !== document.getElementById("stuckSlider")) document.getElementById("stuckSlider").value = stuck;
  if (document.activeElement !== document.getElementById("stuckNum")) document.getElementById("stuckNum").value = stuck;

  const scoreEl = document.getElementById("scoreVal");
  scoreEl.textContent = a.score;
  scoreEl.className = "score-val mono" + (a.score < 30 ? " danger" : a.score < 60 ? " warn" : "");
  document.getElementById("scoreComment").textContent = t.comments[a.band];

  DevSimLab.renderShare(document.getElementById("shareBtns"), {
    url: "https://sakuichi.github.io/dev-sim-lab/rubber-duck/",
    shareText: t.shareText,
    shareHashtags: t.shareHashtags,
  });
}

/* ================= 静的コンテンツの言語適用 ================= */
function applyStaticText() {
  const t = T();
  document.title = t.docTitle;
  document.querySelector('meta[name="description"]').setAttribute("content", t.heroLead);
  document.getElementById("heroTitle").innerHTML = t.heroTitle;
  document.getElementById("heroLead").textContent = t.heroLead;
  document.getElementById("consoleLabel").textContent = t.consoleLabel;
  document.getElementById("sumLabel").textContent = t.sumLabel;
  document.getElementById("scoreLabel").textContent = t.scoreLabel;
  document.getElementById("thorName").textContent = t.thorName;
  document.getElementById("thorSub").textContent = t.thorSub;
  document.getElementById("stuckName").textContent = t.stuckName;
  document.getElementById("stuckSub").textContent = t.stuckSub;
  document.getElementById("numLabel1").textContent = t.numLabel;
  document.getElementById("numLabel2").textContent = t.numLabel;
  document.getElementById("thorSlider").setAttribute("aria-label", t.thorName);
  document.getElementById("stuckSlider").setAttribute("aria-label", t.stuckName);
  document.getElementById("numLabel1").setAttribute("aria-label", `${t.thorName} ${t.numLabel}`);
  document.getElementById("numLabel2").setAttribute("aria-label", `${t.stuckName} ${t.numLabel}`);
  document.getElementById("resetBtn").textContent = t.resetBtn;
  document.getElementById("scenarioBtn").textContent = t.scenarioBtn;
  document.getElementById("chartCaption").textContent = t.chartCaption;
  document.getElementById("chartNote").textContent = t.chartNote;
  document.getElementById("legendRate").textContent = t.legendRate;
  document.getElementById("scenarioBoxTitle").textContent = t.scenarioBoxTitle;
  document.getElementById("rateCardLabel").textContent = t.rateCardLabel;
  document.getElementById("savedCardLabel").textContent = t.savedCardLabel;

  document.getElementById("secAdvice").innerHTML = `
    <h2>${t.adviceHeading}</h2>
    <p>${t.adviceIntro}</p>
    <ul>${t.adviceItems.map((i) => `<li>${i}</li>`).join("")}</ul>
  `;

  document.getElementById("booksH").textContent = t.booksH;
  const booksGrid = document.getElementById("booksGrid");
  booksGrid.innerHTML = "";
  t.books.forEach((b) => {
    const div = document.createElement("div");
    div.className = "book";
    div.innerHTML = `<span class="tag">${b.tag}</span><h3>${b.title}</h3><p>${b.desc}</p>
      <a href="${b.url}" target="_blank" rel="noopener nofollow sponsored">${b.link}</a>`;
    booksGrid.appendChild(div);
  });

  DevSimLab.renderRelated(document.getElementById("relatedGrid"), { exclude: "rubber-duck" });
}

/* ================= イベント ================= */
document.getElementById("thorSlider").addEventListener("input", (e) => { thor = +e.target.value; render(); });
document.getElementById("thorNum").addEventListener("change", (e) => {
  thor = Math.min(THOR_MAX, Math.max(THOR_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("stuckSlider").addEventListener("input", (e) => { stuck = +e.target.value; render(); });
document.getElementById("stuckNum").addEventListener("change", (e) => {
  stuck = Math.min(STUCK_MAX, Math.max(STUCK_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("resetBtn").addEventListener("click", () => {
  thor = 50; stuck = 60;
  document.getElementById("hint").textContent = "";
  render();
});
document.getElementById("scenarioBtn").addEventListener("click", () => {
  thor = 95;
  render();
  const a = assess(thor, stuck);
  document.getElementById("hint").textContent = T().hintScenario(stuck, a);
});

/* ---- drag the marker directly on the chart ---- */
const rdChart = document.getElementById("rdChart");
function svgPoint(evt) {
  const pt = rdChart.createSVGPoint();
  pt.x = evt.clientX; pt.y = evt.clientY;
  return pt.matrixTransform(rdChart.getScreenCTM().inverse());
}
let dragging = false;
function startDrag(evt) {
  dragging = true;
  rdChart.setPointerCapture(evt.pointerId);
  document.getElementById("rdMarker").classList.add("dragging");
  document.getElementById("rdMarkerHit").classList.add("dragging");
  updateFromPointer(evt);
  evt.preventDefault();
}
function updateFromPointer(evt) {
  const p = svgPoint(evt);
  thor = tOfX(p.x);
  render();
}
document.getElementById("rdMarkerHit").addEventListener("pointerdown", startDrag);
rdChart.addEventListener("pointermove", (evt) => { if (dragging) updateFromPointer(evt); });
["pointerup", "pointercancel"].forEach((ev) => rdChart.addEventListener(ev, () => {
  dragging = false;
  document.getElementById("rdMarker").classList.remove("dragging");
  document.getElementById("rdMarkerHit").classList.remove("dragging");
}));

DevSimLab.initChrome({
  onRender: (lang, tone) => {
    LANG = lang; TONE = tone;
    applyStaticText();
    render();
  },
});
</script>
