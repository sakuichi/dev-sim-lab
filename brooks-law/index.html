"use strict";

/* ================= モデル ================= */
const P = 10;              // 1人あたりの個人生産性(単位)
const BASE_TEAM = 5;       // 立ち上げコスト適用の基準人数
const RAMP_FACTOR = 0.5;   // 立ち上げコストON時、基準を超える増員メンバーの生産性係数
const N_MIN = 2, N_MAX = 20;

function grossProd(n, rampOn) {
  if (!rampOn || n <= BASE_TEAM) return n * P;
  return BASE_TEAM * P + (n - BASE_TEAM) * P * RAMP_FACTOR;
}
function pathCount(n) { return n * (n - 1) / 2; }
function netProd(n, c, rampOn) { return grossProd(n, rampOn) - pathCount(n) * c; }

function buildSeries(c, rampOn) {
  const arr = [];
  for (let n = N_MIN; n <= N_MAX; n++) arr.push({ n, net: netProd(n, c, rampOn) });
  return arr;
}
function optimalOf(series) {
  return series.reduce((best, cur) => (cur.net > best.net ? cur : best), series[0]);
}
function assess(n, c, rampOn) {
  const series = buildSeries(c, rampOn);
  const optimal = optimalOf(series);
  const currentNet = netProd(n, c, rampOn);
  const ratio = optimal.net > 0 ? currentNet / optimal.net : 1;
  const score = Math.max(0, Math.min(100, Math.round(ratio * 100)));
  const band = score >= 90 ? 0 : score >= 70 ? 1 : score >= 50 ? 2 : score >= 30 ? 3 : 4;
  return { series, optimal, currentNet, score, band, pastPeak: n > optimal.n };
}

/* ================= ネットワーク図 ================= */
const CX = 160, CY = 160, RN = 120;
const netChart = document.getElementById("netChart");
const NS = "http://www.w3.org/2000/svg";
const el = (tag, attrs) => {
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
};

function drawNetwork(n) {
  const edgeLayer = document.getElementById("edgeLayer");
  const nodeLayer = document.getElementById("nodeLayer");
  edgeLayer.innerHTML = "";
  nodeLayer.innerHTML = "";
  const pts = [];
  for (let i = 0; i < n; i++) {
    const angle = (i / n) * Math.PI * 2 - Math.PI / 2;
    pts.push({ x: CX + Math.cos(angle) * RN, y: CY + Math.sin(angle) * RN });
  }
  for (let i = 0; i < n; i++) {
    for (let j = i + 1; j < n; j++) {
      edgeLayer.appendChild(el("line", { class: "edge", x1: pts[i].x, y1: pts[i].y, x2: pts[j].x, y2: pts[j].y }));
    }
  }
  pts.forEach(p => nodeLayer.appendChild(el("circle", { class: "node", cx: p.x, cy: p.y, r: n > 14 ? 5 : 7 })));
}

/* ================= 生産性カーブ ================= */
const PW = 640, PH = 200, PAD_L = 34, PAD_R = 16, PAD_T = 14, PAD_B = 22;
function drawProductivity(r) {
  const xOf = n => PAD_L + ((n - N_MIN) / (N_MAX - N_MIN)) * (PW - PAD_L - PAD_R);
  const nets = r.series.map(s => s.net);
  const yMin = Math.min(0, ...nets), yMax = Math.max(...nets);
  const yOf = v => PH - PAD_B - ((v - yMin) / (yMax - yMin || 1)) * (PH - PAD_T - PAD_B);

  const gridLayer = document.getElementById("prodGridLayer");
  gridLayer.innerHTML = "";
  [0.25, 0.5, 0.75].forEach(f => {
    const y = PAD_T + f * (PH - PAD_T - PAD_B);
    gridLayer.appendChild(el("line", { class: "prod-grid", x1: PAD_L, y1: y, x2: PW - PAD_R, y2: y }));
  });
  gridLayer.appendChild(el("line", { class: "prod-grid", x1: PAD_L, y1: PH - PAD_B, x2: PW - PAD_R, y2: PH - PAD_B }));

  const linePts = r.series.map(s => `${xOf(s.n)},${yOf(s.net)}`).join(" ");
  document.getElementById("prodLine").setAttribute("d", `M ${linePts.split(" ").join(" L ")}`);
  const areaPts = `M ${xOf(N_MIN)},${yOf(yMin)} L ${linePts.split(" ").join(" L ")} L ${xOf(N_MAX)},${yOf(yMin)} Z`;
  document.getElementById("prodArea").setAttribute("d", areaPts);

  const optX = xOf(r.optimal.n);
  const optLine = document.getElementById("prodOptimalLine");
  optLine.setAttribute("x1", optX); optLine.setAttribute("x2", optX);
  optLine.setAttribute("y1", PAD_T); optLine.setAttribute("y2", PH - PAD_B);
  const optLabel = document.getElementById("prodOptimalLabel");
  optLabel.setAttribute("x", optX + 6);
  optLabel.setAttribute("y", PAD_T + 10);
  optLabel.textContent = T().optimalLabel(r.optimal.n);

  const cur = document.getElementById("prodCurrent");
  cur.setAttribute("cx", xOf(team));
  cur.setAttribute("cy", yOf(r.currentNet));
  cur.classList.toggle("danger", r.pastPeak && r.score < 70);

  const xMin = document.getElementById("prodXLabelMin");
  xMin.setAttribute("x", PAD_L); xMin.setAttribute("y", PH - 4);
  xMin.textContent = T().prodXLabelMin;
  const xMax = document.getElementById("prodXLabelMax");
  xMax.setAttribute("x", PW - PAD_R); xMax.setAttribute("y", PH - 4);
  xMax.setAttribute("text-anchor", "end");
  xMax.textContent = T().prodXLabelMax;
}

/* ================= 描画 ================= */
function render() {
  const t = T();
  const r = assess(team, cost, rampOn);

  drawNetwork(team);
  drawProductivity(r);

  document.getElementById("sumVal").textContent = pathCount(team);
  document.getElementById("hint").textContent = t.hint(team, pathCount(team));

  document.getElementById("teamReadout").textContent = team;
  document.getElementById("costReadout").textContent = cost.toFixed(1);
  if (document.activeElement !== document.getElementById("teamSlider")) document.getElementById("teamSlider").value = team;
  if (document.activeElement !== document.getElementById("teamNum")) document.getElementById("teamNum").value = team;
  if (document.activeElement !== document.getElementById("costSlider")) document.getElementById("costSlider").value = cost;
  if (document.activeElement !== document.getElementById("costNum")) document.getElementById("costNum").value = cost;

  const sv = document.getElementById("scoreVal");
  sv.textContent = r.score;
  sv.className = "score-val mono" + (r.score < 50 ? " danger" : r.score < 70 ? " warn" : "");
  document.getElementById("scoreComment").textContent = t.comments[r.band];

  const rampBtn = document.getElementById("rampBtn");
  rampBtn.setAttribute("aria-pressed", rampOn);

  DevSimLab.renderShare(document.getElementById("shareBtns"), {
    url: "https://sakuichi.github.io/dev-sim-lab/brooks-law/",
    shareText: t.shareText,
    shareHashtags: t.shareHashtags,
  });
}

/* ================= 静的コンテンツの言語適用 ================= */
function applyStaticText() {
  const t = T();
  document.title = t.docTitle;
  document.querySelector('meta[name="description"]').setAttribute("content", t.heroLead);
  document.getElementById("heroTitle").innerHTML = t.heroTitle;
  document.getElementById("heroLead").textContent = t.heroLead;
  document.getElementById("consoleLabel").textContent = t.consoleLabel;
  document.getElementById("sumLabel").textContent = t.sumLabel;
  document.getElementById("scoreLabel").textContent = t.scoreLabel;
  document.getElementById("teamName").textContent = t.teamName;
  document.getElementById("teamSub").textContent = t.teamSub;
  document.getElementById("costName").textContent = t.costName;
  document.getElementById("costSub").textContent = t.costSub;
  document.getElementById("numLabel1").textContent = t.numLabel;
  document.getElementById("numLabel2").textContent = t.numLabel;
  document.getElementById("resetBtn").textContent = t.resetBtn;
  document.getElementById("scenarioBtn").textContent = t.scenarioBtn;
  document.getElementById("rampBtn").textContent = t.rampBtn;
  document.getElementById("rampSub").textContent = t.rampSub;

  document.getElementById("secAdvice").innerHTML = `
    <h2>${t.adviceHeading}</h2>
    <p>${t.adviceIntro}</p>
    <ul>${t.adviceItems.map(i => `<li>${i}</li>`).join("")}</ul>
  `;

  document.getElementById("booksH").textContent = t.booksH;
  const booksGrid = document.getElementById("booksGrid");
  booksGrid.innerHTML = "";
  t.books.forEach(b => {
    const div = document.createElement("div");
    div.className = "book";
    div.innerHTML = `<span class="tag">${b.tag}</span><h3>${b.title}</h3><p>${b.desc}</p>
      <a href="${b.url}" target="_blank" rel="noopener nofollow sponsored">${b.link}</a>`;
    booksGrid.appendChild(div);
  });

  document.getElementById("relatedH").textContent = t.relatedH;
  const relGrid = document.getElementById("relatedGrid");
  relGrid.innerHTML = "";
  t.related.forEach(item => {
    const a = document.createElement("a");
    a.className = "sim-card";
    a.href = item.href;
    a.innerHTML = `<h2>${item.title}</h2><p>${item.desc}</p>`;
    relGrid.appendChild(a);
  });
}

/* ================= イベント ================= */
document.getElementById("teamSlider").addEventListener("input", e => { team = +e.target.value; render(); });
document.getElementById("teamNum").addEventListener("change", e => {
  team = Math.min(N_MAX, Math.max(N_MIN, +e.target.value));
  render();
});
document.getElementById("costSlider").addEventListener("input", e => { cost = +e.target.value; render(); });
document.getElementById("costNum").addEventListener("change", e => {
  cost = Math.min(3, Math.max(0, +e.target.value));
  render();
});
document.getElementById("rampBtn").addEventListener("click", () => { rampOn = !rampOn; render(); });
document.getElementById("resetBtn").addEventListener("click", () => {
  team = 6; cost = 1.0; rampOn = false;
  document.getElementById("hint").textContent = "";
  render();
});
document.getElementById("scenarioBtn").addEventListener("click", () => {
  team = Math.min(N_MAX, team + 5);
  rampOn = true;
  render();
  document.getElementById("hint").textContent = T().hintScenario;
});

DevSimLab.initChrome({
  onRender: (lang, tone) => {
    LANG = lang; TONE = tone;
    applyStaticText();
    render();
  },
});
</script>
