"use strict";

/* ================= モデル =================
   「XY問題」——本当にやりたいこと(X)ではなく、自分で選んだ手段(Y)について
   質問してしまい、回答者が背景を知らないまま的外れなやり取りが続く現象。
   2001年8月、PerlプログラマーのMark Jason Dominusがニュースグループへの投稿で
   命名し、同年のEric S. Raymond「How To Ask Questions The Smart Way」を通じて
   概念が広く知られるようになった。
   本モデルは「質問時の背景・目的の共有度」が上がるほど、解決までの往復回数が
   減る(5往復→1往復に線形で近づく)と仮定する単純化モデルであり、
   実証研究の数値を再現したものではない。
*/
const SHARE_MIN = 0, SHARE_MAX = 100;
const RT_MIN = 10, RT_MAX = 120;
const ROUNDS_MAX = 5, ROUNDS_MIN = 1;

function roundsOf(share) { return ROUNDS_MAX - (share / 100) * (ROUNDS_MAX - ROUNDS_MIN); }
function timeOf(share, rt) { return roundsOf(share) * rt; }
function bestTimeOf(rt) { return ROUNDS_MIN * rt; }
function wasteOf(share, rt) { return timeOf(share, rt) - bestTimeOf(rt); }
function scoreOf(share) { return Math.round(share); }
function tierOf(share) { return Math.min(4, Math.floor(share / 20)); }
function assess(share, rt) {
  const rounds = roundsOf(share);
  const time = timeOf(share, rt);
  const best = bestTimeOf(rt);
  const waste = wasteOf(share, rt);
  const score = scoreOf(share);
  const band = tierOf(share);
  return { rounds, time, best, waste, score, band };
}

  hintScenario: (rt, a) => `"How do I get the last 3 characters?" — the classic example used to explain the XY problem. The real goal is the file extension, which breaks on .jpeg. About ${a.rounds.toFixed(1)} round trips, roughly ${Math.round(a.time)} minutes expected. Resolution hinges on whether the answerer thinks to ask, "what are you actually trying to do?"`,
  comments: [
    "A means-only question. The answer can be perfectly accurate without fitting the real problem at all.",
    "A sliver of context is visible, but the answerer is still guessing. Expect more back-and-forth.",
    "The ask-back zone. One \"what are you actually trying to do?\" and this heads straight for resolution.",
    "The goal is shared — the answerer can now propose rethinking the approach itself.",
    "Goal, constraints, and history all present. The shortest path — and often a better solution than the one you asked about.",
  ],
  adviceHeading: "How to actually deal with this",
  adviceIntro: "What makes the XY problem tricky is that it arises from good intentions. \"Explaining everything would take too long, so let me narrow it down\" is considerate — and it strips the answerer of context. Meanwhile the answerer treats \"answering exactly what was asked\" as diligence, so two sincere people keep talking past each other. Fixes exist on both sides. Askers: one line stating the goal transforms the value of a means-question. Answerers: when a question feels oddly specific, asking \"what are you ultimately trying to achieve?\" once is usually enough. But don't mandate full context on every question — that raises the bar for asking at all (the speak-up cost problem). \"Ask back when something feels off\" is the realistic policy.",
  adviceItems: [
    "Attach one line of \"what I'm trying to do\" to every question — never send the means-question alone",
    "As an answerer, when a question is unnaturally specific, check the underlying goal once before answering",
    "Provide a team question template (goal / constraints / what you tried) — filling it in sometimes solves the problem by itself (the rubber duck effect)",
    "Build a culture where being asked back isn't taken as criticism — the ask-back is the fastest exit from an XY loop",
  ],
  booksH: "Recommended reading",
  books: [
    { tag: "COMMUNICATION", title: "世界一流エンジニアの思考法 (How World-Class Engineers Think)", desc: "Tsuyoshi Ushio. A Microsoft engineer's bestseller on how top engineers work — including how they ask, consult, and share context.", link: "View on Amazon →", url: "https://amzn.to/4ygGDal" },
    { tag: "PROGRAMMER CULTURE", title: "The Pragmatic Programmer (20th Anniversary Edition)", desc: "Andrew Hunt and David Thomas. The classic that keeps insisting you dig for the real problem behind the stated requirement.", link: "View on Amazon →", url: "https://amzn.to/4wHbKKH" },
  ],
  toneBtn: "🔥 Developer mode",
  toneNote: "* Joke mode. Switch back to standard before client meetings.",
  shareText: "You answered exactly what was asked — so why is nothing solved? — XY Problem Simulator",
  shareHashtags: "DevSimLab",
},
};

/* ================= 開発者モード上書き辞書 ================= */
const DEV = {
ja: {
  hint: (share, rt, a) => `共有度${share}。往復${a.rounds.toFixed(1)}回。Slackのスレッドが伸びるほど、最初の質問が何だったのか誰も思い出せなくなっていく。期待時間約${Math.round(a.time)}分。`,
  hintScenario: (rt, a) => `「正規表現で最後の3文字を…」から始まったスレッド、23件目で「そもそも拡張子ならpath.extname()では?」が登場。全員が知っていた。誰も最初に聞かなかった。期待時間約${Math.round(a.time)}分。`,
  comments: [
    "質問が具体的すぎて逆に怖い。「なぜDNSの設定を聞いてくるのか」を誰も聞けないまま3日目。",
    "回答者が超能力者テストを受けている。文脈は各自の想像で補完中。",
    "「ちなみに何がしたいんですか?」——この一言を放った人が今日のMVP。",
    "目的を書いたら、質問を送る前に自分で解決した。スレッドは平和のまま終了。",
    "「それ、そもそもやらなくていい作業では?」——最高の回答は、手段の否定だった。",
  ],
},
en: {
  hint: (share, rt, a) => `Context ${share}. ${a.rounds.toFixed(1)} round trips. The longer the Slack thread grows, the less anyone remembers the original question. Expected: ~${Math.round(a.time)} min.`,
  hintScenario: (rt, a) => `The thread started with "regex for the last 3 characters..." — reply #23 finally asks "wait, if it's extensions, why not path.extname()?" Everyone knew it. Nobody asked first. Expected: ~${Math.round(a.time)} min.`,
  comments: [
    "The question is so oddly specific it's scary. Day three of nobody daring to ask why they need the DNS config.",
    "The answerer is taking a telepathy exam. Context is being filled in by imagination, individually.",
    "\"Out of curiosity, what are you actually trying to do?\" — whoever says this is today's MVP.",
    "Wrote down the goal, solved it before hitting send. The thread ends in peace.",
    "\"Do you even need to do this at all?\" — the best answer turned out to be rejecting the approach.",
  ],
},
};

let LANG = "ja";
let TONE = "std";
const T = () => (TONE === "dev" ? { ...I18N[LANG], ...DEV[LANG] } : I18N[LANG]);

let share = 50;
let rt = 30;

/* ================= チャート描画 ================= */
const NS = "http://www.w3.org/2000/svg";
const el = (tag, attrs) => {
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
};
const PW = 640, PH = 240, PAD_L = 44, PAD_R = 16, PAD_T = 30, PAD_B = 42;
/* Y軸は「現在の1往復時間×最大往復数」に動的にスケールする。
   グリッド線1本が1往復ぶんの時間に対応する。 */
const yMax = () => ROUNDS_MAX * rt;
const xOf = (v) => PAD_L + ((v - SHARE_MIN) / (SHARE_MAX - SHARE_MIN)) * (PW - PAD_L - PAD_R);
const sOfX = (x) => {
  const frac = (x - PAD_L) / (PW - PAD_L - PAD_R);
  const raw = SHARE_MIN + frac * (SHARE_MAX - SHARE_MIN);
  return Math.min(SHARE_MAX, Math.max(SHARE_MIN, Math.round(raw / 5) * 5));
};
const yOf = (v) => PAD_T + (1 - Math.min(v, yMax()) / yMax()) * (PH - PAD_T - PAD_B);

function drawChart() {
  const t = T();
  const gridLayer = document.getElementById("xyGridLayer");
  gridLayer.innerHTML = "";
  [0, 1, 2, 3, 4, 5].map((i) => i * rt).forEach((v) => {
    const y = yOf(v);
    gridLayer.appendChild(el("line", { class: "xy-grid", x1: PAD_L, y1: y, x2: PW - PAD_R, y2: y }));
    const label = el("text", { class: "xy-axis-label", x: PAD_L - 6, y: y + 3, "text-anchor": "end" });
    label.textContent = v;
    gridLayer.appendChild(label);
  });
  for (let v = SHARE_MIN; v <= SHARE_MAX; v += 20) {
    const x = xOf(v);
    gridLayer.appendChild(el("line", { class: "xy-tick", x1: x, y1: PAD_T, x2: x, y2: PH - PAD_B }));
    const label = el("text", { class: "xy-axis-label", x, y: PH - PAD_B + 14, "text-anchor": v === SHARE_MIN ? "start" : v === SHARE_MAX ? "end" : "middle" });
    label.textContent = v;
    gridLayer.appendChild(label);
  }
  const yTitle = el("text", { class: "xy-axis-title", x: 2, y: 12 });
  yTitle.textContent = t.xyYTitle;
  gridLayer.appendChild(yTitle);
  const xTitle = el("text", { class: "xy-axis-title", x: PW / 2, y: PH - 4, "text-anchor": "middle" });
  xTitle.textContent = t.xyXTitle;
  gridLayer.appendChild(xTitle);

  const bestY = yOf(bestTimeOf(rt));
  document.getElementById("xyLineBest").setAttribute("d", `M ${PAD_L} ${bestY} L ${PW - PAD_R} ${bestY}`);

  const pts = [];
  for (let v = SHARE_MIN; v <= SHARE_MAX; v += 2) {
    pts.push(`${xOf(v)},${yOf(timeOf(v, rt))}`);
  }
  document.getElementById("xyLineActual").setAttribute("d", "M " + pts.join(" L "));

  const dotsLayer = document.getElementById("xyDotsLayer");
  dotsLayer.innerHTML = "";
  for (let v = SHARE_MIN; v <= SHARE_MAX; v += 20) {
    dotsLayer.appendChild(el("circle", { class: "xy-dot", cx: xOf(v), cy: yOf(timeOf(v, rt)), fill: "var(--alert)" }));
  }

  const mx = xOf(share);
  const marker = document.getElementById("xyMarker");
  marker.setAttribute("x1", mx); marker.setAttribute("x2", mx);
  marker.setAttribute("y1", PAD_T); marker.setAttribute("y2", PH - PAD_B);

  const py = yOf(timeOf(share, rt));
  document.getElementById("xyPoint").setAttribute("cx", mx);
  document.getElementById("xyPoint").setAttribute("cy", py);

  const labelAnchor = mx > PW - PAD_R - 55 ? "end" : mx < PAD_L + 55 ? "start" : "middle";
  const labelDx = labelAnchor === "end" ? -10 : labelAnchor === "start" ? 10 : 0;
  const labelEl = document.getElementById("xyLabel");
  labelEl.setAttribute("x", mx + labelDx);
  labelEl.setAttribute("y", Math.max(PAD_T + 10, py - 10));
  labelEl.setAttribute("text-anchor", labelAnchor);
  labelEl.textContent = T().htmlLang === "ja" ? `${Math.round(timeOf(share, rt))}分` : `${Math.round(timeOf(share, rt))} min`;

  const hit = document.getElementById("xyMarkerHit");
  hit.setAttribute("x", PAD_L); hit.setAttribute("y", 0);
  hit.setAttribute("width", PW - PAD_L - PAD_R); hit.setAttribute("height", PH);
}

/* ================= 描画 ================= */
function render() {
  const t = T();
  const a = assess(share, rt);

  drawChart();

  const timeLabel = t.htmlLang === "ja" ? `${Math.round(a.time)}分` : `${Math.round(a.time)} min`;
  const roundsLabel = t.htmlLang === "ja" ? `${a.rounds.toFixed(1)}往復` : `${a.rounds.toFixed(1)}`;
  document.getElementById("sumVal").textContent = timeLabel;
  document.getElementById("roundsCardVal").textContent = roundsLabel;
  document.getElementById("timeCardVal").textContent = timeLabel;
  document.getElementById("hint").textContent = t.hint(share, rt, a);
  document.getElementById("scenarioBoxText").textContent = t.scenarios[a.band];

  document.getElementById("shareReadout").textContent = share;
  document.getElementById("rtReadout").textContent = t.htmlLang === "ja" ? `${rt}分` : `${rt} min`;
  if (document.activeElement !== document.getElementById("shareSlider")) document.getElementById("shareSlider").value = share;
  if (document.activeElement !== document.getElementById("shareNum")) document.getElementById("shareNum").value = share;
  if (document.activeElement !== document.getElementById("rtSlider")) document.getElementById("rtSlider").value = rt;
  if (document.activeElement !== document.getElementById("rtNum")) document.getElementById("rtNum").value = rt;

  const scoreEl = document.getElementById("scoreVal");
  scoreEl.textContent = a.score;
  scoreEl.className = "score-val mono" + (a.score < 30 ? " danger" : a.score < 60 ? " warn" : "");
  document.getElementById("scoreComment").textContent = t.comments[a.band];

  DevSimLab.renderShare(document.getElementById("shareBtns"), {
    url: "https://sakuichi.github.io/dev-sim-lab/xy-problem/",
    shareText: t.shareText,
    shareHashtags: t.shareHashtags,
  });
}

/* ================= 静的コンテンツの言語適用 ================= */
function applyStaticText() {
  const t = T();
  document.title = t.docTitle;
  document.querySelector('meta[name="description"]').setAttribute("content", t.heroLead);
  document.getElementById("heroTitle").innerHTML = t.heroTitle;
  document.getElementById("heroLead").textContent = t.heroLead;
  document.getElementById("consoleLabel").textContent = t.consoleLabel;
  document.getElementById("sumLabel").textContent = t.sumLabel;
  document.getElementById("scoreLabel").textContent = t.scoreLabel;
  document.getElementById("shareName").textContent = t.shareName;
  document.getElementById("shareSub").textContent = t.shareSub;
  document.getElementById("rtName").textContent = t.rtName;
  document.getElementById("rtSub").textContent = t.rtSub;
  document.getElementById("numLabel1").textContent = t.numLabel;
  document.getElementById("numLabel2").textContent = t.numLabel;
  document.getElementById("shareSlider").setAttribute("aria-label", t.shareName);
  document.getElementById("rtSlider").setAttribute("aria-label", t.rtName);
  document.getElementById("numLabel1").setAttribute("aria-label", `${t.shareName} ${t.numLabel}`);
  document.getElementById("numLabel2").setAttribute("aria-label", `${t.rtName} ${t.numLabel}`);
  document.getElementById("resetBtn").textContent = t.resetBtn;
  document.getElementById("scenarioBtn").textContent = t.scenarioBtn;
  document.getElementById("chartCaption").textContent = t.chartCaption;
  document.getElementById("chartNote").textContent = t.chartNote;
  document.getElementById("legendActual").textContent = t.legendActual;
  document.getElementById("legendBest").textContent = t.legendBest;
  document.getElementById("scenarioBoxTitle").textContent = t.scenarioBoxTitle;
  document.getElementById("roundsCardLabel").textContent = t.roundsCardLabel;
  document.getElementById("timeCardLabel").textContent = t.timeCardLabel;

  document.getElementById("secAdvice").innerHTML = `
    <h2>${t.adviceHeading}</h2>
    <p>${t.adviceIntro}</p>
    <ul>${t.adviceItems.map((i) => `<li>${i}</li>`).join("")}</ul>
  `;

  document.getElementById("booksH").textContent = t.booksH;
  const booksGrid = document.getElementById("booksGrid");
  booksGrid.innerHTML = "";
  t.books.forEach((b) => {
    const div = document.createElement("div");
    div.className = "book";
    div.innerHTML = `<span class="tag">${b.tag}</span><h3>${b.title}</h3><p>${b.desc}</p>
      <a href="${b.url}" target="_blank" rel="noopener nofollow sponsored">${b.link}</a>`;
    booksGrid.appendChild(div);
  });

  DevSimLab.renderRelated(document.getElementById("relatedGrid"), { exclude: "xy-problem" });
}

/* ================= イベント ================= */
document.getElementById("shareSlider").addEventListener("input", (e) => { share = +e.target.value; render(); });
document.getElementById("shareNum").addEventListener("change", (e) => {
  share = Math.min(SHARE_MAX, Math.max(SHARE_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("rtSlider").addEventListener("input", (e) => { rt = +e.target.value; render(); });
document.getElementById("rtNum").addEventListener("change", (e) => {
  rt = Math.min(RT_MAX, Math.max(RT_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("resetBtn").addEventListener("click", () => {
  share = 50; rt = 30;
  document.getElementById("hint").textContent = "";
  render();
});
document.getElementById("scenarioBtn").addEventListener("click", () => {
  share = 5;
  render();
  const a = assess(share, rt);
  document.getElementById("hint").textContent = T().hintScenario(rt, a);
});

/* ---- drag the marker directly on the chart ---- */
const xyChart = document.getElementById("xyChart");
function svgPoint(evt) {
  const pt = xyChart.createSVGPoint();
  pt.x = evt.clientX; pt.y = evt.clientY;
  return pt.matrixTransform(xyChart.getScreenCTM().inverse());
}
let dragging = false;
function startDrag(evt) {
  dragging = true;
  xyChart.setPointerCapture(evt.pointerId);
  document.getElementById("xyMarker").classList.add("dragging");
  document.getElementById("xyMarkerHit").classList.add("dragging");
  updateFromPointer(evt);
  evt.preventDefault();
}
function updateFromPointer(evt) {
  const p = svgPoint(evt);
  share = sOfX(p.x);
  render();
}
document.getElementById("xyMarkerHit").addEventListener("pointerdown", startDrag);
xyChart.addEventListener("pointermove", (evt) => { if (dragging) updateFromPointer(evt); });
["pointerup", "pointercancel"].forEach((ev) => xyChart.addEventListener(ev, () => {
  dragging = false;
  document.getElementById("xyMarker").classList.remove("dragging");
  document.getElementById("xyMarkerHit").classList.remove("dragging");
}));

DevSimLab.initChrome({
  onRender: (lang, tone) => {
    LANG = lang; TONE = tone;
    applyStaticText();
    render();
  },
});
</script>
