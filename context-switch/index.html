<script>
"use strict";

/* ================= モデル (Weinbergのロスモデル・簡略版) ================= */
const N_MIN = 1, N_MAX = 5;
const PROJECT_COLORS = ["#0E7C66", "#B07A14", "#3B6EA5", "#7C5CBF", "#B34A70"];
const LOSS_FILL = "url(#lossPattern)";

function lossPct(n, coef) { return Math.min(95, (n - 1) * coef); }
function effectivePct(n, coef) { return 100 - lossPct(n, coef); }
function perProjectPct(n, coef) { return effectivePct(n, coef) / n; }
function naivePct(n) { return 100 / n; }

function scoreOf(n, coef) {
  return Math.max(0, Math.min(100, Math.round(effectivePct(n, coef))));
}
function assess(n, coef) {
  const score = scoreOf(n, coef);
  const band = score >= 90 ? 0 : score >= 70 ? 1 : score >= 50 ? 2 : score >= 30 ? 3 : 4;
  return { score, band, loss: lossPct(n, coef), effective: effectivePct(n, coef), perProject: perProjectPct(n, coef), naive: naivePct(n) };
}

/* ================= 開発者モード上書き辞書 ================= */

ja: {
  hint: (n, r) => `${n}件同時進行中。実質 ${r.perProject.toFixed(1)}%/件。残りの ${r.loss.toFixed(0)}%は、Slackのタブを切り替えている時間に消えました。`,

  comments: [

  ],
},

  hint: (n, r) => `${n} projects at once. ${r.perProject.toFixed(1)}% effective each. The remaining ${r.loss.toFixed(0)}% vanished into tab-switching.`,
  hintScenario: "Five projects, loaded. Not even you remember which one is the priority anymore.",
  comments: [
    "Miraculous focus. Nobody dares interrupt.",
    "Still fine. But 'wait, what was I just doing' is creeping in.",
    "Too many mental tabs open. All of them stuck loading.",
    "Every meeting rolls back your memory to before the last one.",
    "Looks like you're doing it all at once. You're actually stalled on all of it at once.",
  ],

};

let LANG = "ja";
let TONE = "std";
const T = () => (TONE === "dev" ? { ...I18N[LANG], ...DEV[LANG] } : I18N[LANG]);

let projects = 3;
let lossCoef = 20;

/* ================= 積み上げ棒グラフ ================= */
const NS = "http://www.w3.org/2000/svg";
const el = (tag, attrs) => {
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
};
const BW = 640, BH = 280, PAD_L = 40, PAD_R = 16, PAD_T = 16, PAD_B = 40;
const BAR_W = 76, BAR_GAP = 40;
const barAreaH = BH - PAD_T - PAD_B;

function barX(n) { return PAD_L + (n - N_MIN) * (BAR_W + BAR_GAP); }
function yOf(pct) { return PAD_T + barAreaH - (pct / 100) * barAreaH; }

function drawGrid() {
  const layer = document.getElementById("barGridLayer");
  layer.innerHTML = "";
  [0, 25, 50, 75, 100].forEach(pct => {
    const y = yOf(pct);
    layer.appendChild(el("line", { class: "bar-grid", x1: PAD_L - 8, y1: y, x2: BW - PAD_R, y2: y }));
    const label = el("text", { class: "bar-axis-label", x: PAD_L - 12, y: y + 3, "text-anchor": "end" });
    label.textContent = pct + "%";
    layer.appendChild(label);
  });
}

function buildBars() {
  const layer = document.getElementById("barsLayer");
  layer.innerHTML = "";
  for (let n = N_MIN; n <= N_MAX; n++) {
    const g = el("g", { class: "bar-group", "data-n": n });
    g.addEventListener("click", () => { projects = n; render(); });
    layer.appendChild(g);
    const nLabel = el("text", { class: "bar-n-label", x: barX(n) + BAR_W / 2, y: BH - PAD_B + 20 });
    g.appendChild(nLabel);
  }
}

function drawBars(coef) {
  const t = T();
  for (let n = N_MIN; n <= N_MAX; n++) {
    const g = document.querySelector(`.bar-group[data-n="${n}"]`);
    g.querySelectorAll(".bar-seg, .bar-outline").forEach(e => e.remove());
    g.classList.toggle("is-selected", n === projects);

    const r = assess(n, coef);
    const x = barX(n);
    // stack from bottom: n equal project segments, then loss segment on top
    let cursorPct = 0;
    for (let i = 0; i < n; i++) {
      const segPct = r.effective / n;
      const yTop = yOf(cursorPct + segPct);
      const yBottom = yOf(cursorPct);
      g.appendChild(el("rect", {
        class: "bar-seg", x, y: yTop, width: BAR_W, height: Math.max(0, yBottom - yTop),
        fill: PROJECT_COLORS[i % PROJECT_COLORS.length],
      }));
      cursorPct += segPct;
    }
    if (r.loss > 0) {
      const yTop = yOf(cursorPct + r.loss);
      const yBottom = yOf(cursorPct);
      g.appendChild(el("rect", {
        class: "bar-seg", x, y: yTop, width: BAR_W, height: Math.max(0, yBottom - yTop),
        fill: LOSS_FILL, stroke: "var(--alert)", "stroke-width": 1,
      }));
      if (n === projects) {
        const midY = (yTop + yBottom) / 2;
        const labelY = (yBottom - yTop) > 16 ? midY : yTop - 6;
        g.appendChild(el("text", {
          class: "bar-loss-label", x: x + BAR_W / 2, y: labelY + 4,
        })).textContent = Math.round(r.loss) + "%";
      }
    }
    g.appendChild(el("rect", { class: "bar-outline", x, y: yOf(100), width: BAR_W, height: barAreaH, rx: 3 }));
    const nLabel = g.querySelector(".bar-n-label");
    if (nLabel) nLabel.textContent = t.barNLabel(n);
  }
}

/* ================= 描画 ================= */
function render() {
  const t = T();
  const r = assess(projects, lossCoef);

  drawBars(lossCoef);

  document.getElementById("sumVal").textContent = r.loss.toFixed(0) + "%";
  document.getElementById("hint").textContent = t.hint(projects, r);

  document.getElementById("projReadout").textContent = projects;
  document.getElementById("lossReadout").textContent = lossCoef + "%";
  if (document.activeElement !== document.getElementById("projSlider")) document.getElementById("projSlider").value = projects;
  if (document.activeElement !== document.getElementById("projNum")) document.getElementById("projNum").value = projects;
  if (document.activeElement !== document.getElementById("lossSlider")) document.getElementById("lossSlider").value = lossCoef;
  if (document.activeElement !== document.getElementById("lossNum")) document.getElementById("lossNum").value = lossCoef;

  const scoreEl = document.getElementById("scoreVal");
  scoreEl.textContent = r.score;
  scoreEl.className = "score-val mono" + (r.score < 50 ? " danger" : r.score < 70 ? " warn" : "");
  document.getElementById("scoreComment").textContent = t.comments[r.band];

  DevSimLab.renderShare(document.getElementById("shareBtns"), {
    url: "https://sakuichi.github.io/dev-sim-lab/context-switch/",
    shareText: t.shareText,
    shareHashtags: t.shareHashtags,
  });
}

/* ================= 静的コンテンツの言語適用 ================= */
function applyStaticText() {
  const t = T();
  document.title = t.docTitle;
  document.querySelector('meta[name="description"]').setAttribute("content", t.heroLead);
  document.getElementById("heroTitle").innerHTML = t.heroTitle;
  document.getElementById("heroLead").textContent = t.heroLead;
  document.getElementById("consoleLabel").textContent = t.consoleLabel;
  document.getElementById("sumLabel").textContent = t.sumLabel;
  document.getElementById("scoreLabel").textContent = t.scoreLabel;
  document.getElementById("projName").textContent = t.projName;
  document.getElementById("projSub").textContent = t.projSub;
  document.getElementById("lossName").textContent = t.lossName;
  document.getElementById("lossSub").textContent = t.lossSub;
  document.getElementById("numLabel1").textContent = t.numLabel;
  document.getElementById("numLabel2").textContent = t.numLabel;
  document.getElementById("resetBtn").textContent = t.resetBtn;
  document.getElementById("scenarioBtn").textContent = t.scenarioBtn;
  document.getElementById("chartNote").textContent = t.chartNote;
  document.getElementById("legendWork").textContent = t.legendWork;
  document.getElementById("legendLoss").textContent = t.legendLoss;

  document.getElementById("secAdvice").innerHTML = `
    <h2>${t.adviceHeading}</h2>
    <p>${t.adviceIntro}</p>
    <ul>${t.adviceItems.map(i => `<li>${i}</li>`).join("")}</ul>
  `;

  document.getElementById("booksH").textContent = t.booksH;
  const booksGrid = document.getElementById("booksGrid");
  booksGrid.innerHTML = "";
  t.books.forEach(b => {
    const div = document.createElement("div");
    div.className = "book";
    div.innerHTML = `<span class="tag">${b.tag}</span><h3>${b.title}</h3><p>${b.desc}</p>
      <a href="${b.url}" target="_blank" rel="noopener nofollow sponsored">${b.link}</a>`;
    booksGrid.appendChild(div);
  });

  document.getElementById("relatedH").textContent = t.relatedH;
  const relGrid = document.getElementById("relatedGrid");
  relGrid.innerHTML = "";
  t.related.forEach(item => {
    const a = document.createElement("a");
    a.className = "sim-card";
    a.href = item.href;
    a.innerHTML = `<h2>${item.title}</h2><p>${item.desc}</p>`;
    relGrid.appendChild(a);
  });
}

/* ================= イベント ================= */
document.getElementById("projSlider").addEventListener("input", e => { projects = +e.target.value; render(); });
document.getElementById("projNum").addEventListener("change", e => {
  projects = Math.min(N_MAX, Math.max(N_MIN, +e.target.value));
  render();
});
document.getElementById("lossSlider").addEventListener("input", e => { lossCoef = +e.target.value; render(); });
document.getElementById("lossNum").addEventListener("change", e => {
  lossCoef = Math.min(30, Math.max(5, +e.target.value));
  render();
});
document.getElementById("resetBtn").addEventListener("click", () => {
  projects = 3; lossCoef = 20;
  document.getElementById("hint").textContent = "";
  render();
});
document.getElementById("scenarioBtn").addEventListener("click", () => {
  projects = 5;
  render();
  document.getElementById("hint").textContent = T().hintScenario;
});

drawGrid();
buildBars();
DevSimLab.initChrome({
  onRender: (lang, tone) => {
    LANG = lang; TONE = tone;
    applyStaticText();
    render();
  },
});
</script>
</body>
</html>
