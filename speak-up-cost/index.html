"use strict";

/* ================= モデル =================
   「発言する(問題やリスクを報告する)と、その対応タスクを本人が負わされる」という構造が
   発言意欲をどう下げるかを表す簡易モデル。ゲーム理論の「ボランティアのジレンマ」
   (Diekmann, 1985 — 誰かが手を挙げれば集団が助かるが、挙げた本人はコストを負うため、
   黙って他者に任せる方が個人としては合理的になりうる状況)と、社会心理学の「MUM効果」
   (Rosen & Tesser, 1970 — 悪い知らせを伝えると自分が責められる・負担を負うことを恐れて
   伝達をためらう現象)を参考にした方向性を示す簡易モデルであり、特定の実証研究の
   数値を再現したものではない。
*/
const PENALTY_MIN = 0, PENALTY_MAX = 100;
const IMPACT_MIN = 5, IMPACT_MAX = 100;

function willingnessOf(penalty) { return 100 - penalty * 0.8; }
function missProbOf(penalty) { return 100 - willingnessOf(penalty); }
function expectedLossOf(impact, penalty) { return impact * (missProbOf(penalty) / 100); }
function scoreOf(penalty) { return Math.round(willingnessOf(penalty)); }
function assess(impact, penalty) {
  const willingness = willingnessOf(penalty);
  const missProb = missProbOf(penalty);
  const loss = expectedLossOf(impact, penalty);
  const score = scoreOf(penalty);
  const band = score >= 85 ? 0 : score >= 65 ? 1 : score >= 45 ? 2 : score >= 25 ? 3 : 4;
  return { willingness, missProb, loss, score, band };
}

    "Speakers and silent types split about 50/50. The meeting room is one long staring contest.",
    "\"I figured someone else noticed\" becomes the standard post-mortem line.",
    "Everyone has mastered looking the other way. Suddenly everyone's an expert the moment there's an incident to respond to.",
  ],
},
};

let LANG = "ja";
let TONE = "std";
const T = () => (TONE === "dev" ? { ...I18N[LANG], ...DEV[LANG] } : I18N[LANG]);

let penalty = 50;
let impact = 30;

/* ================= チャート描画 ================= */
const NS = "http://www.w3.org/2000/svg";
const el = (tag, attrs) => {
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
};
const PW = 640, PH = 240, PAD_L = 40, PAD_R = 16, PAD_T = 30, PAD_B = 42;
const Y_MAX = 100;
const xOf = (p) => PAD_L + ((p - PENALTY_MIN) / (PENALTY_MAX - PENALTY_MIN)) * (PW - PAD_L - PAD_R);
const pOfX = (x) => {
  const frac = (x - PAD_L) / (PW - PAD_L - PAD_R);
  const raw = PENALTY_MIN + frac * (PENALTY_MAX - PENALTY_MIN);
  return Math.min(PENALTY_MAX, Math.max(PENALTY_MIN, Math.round(raw / 5) * 5));
};
const yOf = (v) => PAD_T + (1 - Math.min(v, Y_MAX) / Y_MAX) * (PH - PAD_T - PAD_B);

function drawChart() {
  const t = T();
  const gridLayer = document.getElementById("suGridLayer");
  gridLayer.innerHTML = "";
  [0, 20, 40, 60, 80, 100].forEach((v) => {
    const y = yOf(v);
    gridLayer.appendChild(el("line", { class: "su-grid", x1: PAD_L, y1: y, x2: PW - PAD_R, y2: y }));
    const label = el("text", { class: "su-axis-label", x: PAD_L - 6, y: y + 3, "text-anchor": "end" });
    label.textContent = v + "%";
    gridLayer.appendChild(label);
  });
  for (let p = PENALTY_MIN; p <= PENALTY_MAX; p += 20) {
    const x = xOf(p);
    gridLayer.appendChild(el("line", { class: "su-tick", x1: x, y1: PAD_T, x2: x, y2: PH - PAD_B }));
    const label = el("text", { class: "su-axis-label", x, y: PH - PAD_B + 14, "text-anchor": p === PENALTY_MIN ? "start" : p === PENALTY_MAX ? "end" : "middle" });
    label.textContent = p + "%";
    gridLayer.appendChild(label);
  }
  const yTitle = el("text", { class: "su-axis-title", x: 2, y: 12 });
  yTitle.textContent = t.suYTitle;
  gridLayer.appendChild(yTitle);
  const xTitle = el("text", { class: "su-axis-title", x: PW / 2, y: PH - 4, "text-anchor": "middle" });
  xTitle.textContent = t.suXTitle;
  gridLayer.appendChild(xTitle);

  const speakPts = [], missPts = [];
  for (let p = PENALTY_MIN; p <= PENALTY_MAX; p += 2) {
    speakPts.push(`${xOf(p)},${yOf(willingnessOf(p))}`);
    missPts.push(`${xOf(p)},${yOf(missProbOf(p))}`);
  }
  document.getElementById("suLineSpeak").setAttribute("d", "M " + speakPts.join(" L "));
  document.getElementById("suLineMiss").setAttribute("d", "M " + missPts.join(" L "));

  const dotsLayer = document.getElementById("suDotsLayer");
  dotsLayer.innerHTML = "";
  for (let p = PENALTY_MIN; p <= PENALTY_MAX; p += 20) {
    dotsLayer.appendChild(el("circle", { class: "su-dot", cx: xOf(p), cy: yOf(willingnessOf(p)), fill: "var(--q)" }));
    dotsLayer.appendChild(el("circle", { class: "su-dot", cx: xOf(p), cy: yOf(missProbOf(p)), fill: "var(--alert)" }));
  }

  const mx = xOf(penalty);
  const marker = document.getElementById("suMarker");
  marker.setAttribute("x1", mx); marker.setAttribute("x2", mx);
  marker.setAttribute("y1", PAD_T); marker.setAttribute("y2", PH - PAD_B);

  const speakY = yOf(willingnessOf(penalty));
  const missY = yOf(missProbOf(penalty));
  document.getElementById("suPointSpeak").setAttribute("cx", mx);
  document.getElementById("suPointSpeak").setAttribute("cy", speakY);
  document.getElementById("suPointMiss").setAttribute("cx", mx);
  document.getElementById("suPointMiss").setAttribute("cy", missY);

  const labelAnchor = mx > PW - PAD_R - 55 ? "end" : mx < PAD_L + 55 ? "start" : "middle";
  const labelDx = labelAnchor === "end" ? -10 : labelAnchor === "start" ? 10 : 0;
  const clampY = (y) => Math.max(PAD_T + 10, Math.min(PH - PAD_B - 4, y));
  const speakIsHigher = speakY <= missY;

  const labelSpeak = document.getElementById("suLabelSpeak");
  labelSpeak.setAttribute("x", mx + labelDx);
  labelSpeak.setAttribute("y", clampY(speakIsHigher ? speakY - 10 : speakY + 20));
  labelSpeak.setAttribute("text-anchor", labelAnchor);
  labelSpeak.textContent = Math.round(willingnessOf(penalty)) + "%";

  const labelMiss = document.getElementById("suLabelMiss");
  labelMiss.setAttribute("x", mx + labelDx);
  labelMiss.setAttribute("y", clampY(speakIsHigher ? missY + 20 : missY - 10));
  labelMiss.setAttribute("text-anchor", labelAnchor);
  labelMiss.textContent = Math.round(missProbOf(penalty)) + "%";

  const hit = document.getElementById("suMarkerHit");
  hit.setAttribute("x", PAD_L); hit.setAttribute("y", 0);
  hit.setAttribute("width", PW - PAD_L - PAD_R); hit.setAttribute("height", PH);
}

/* ================= 描画 ================= */
function render() {
  const t = T();
  const a = assess(impact, penalty);

  drawChart();

  document.getElementById("sumVal").textContent = `${Math.round(a.willingness)}%`;
  document.getElementById("speakCardVal").textContent = `${Math.round(a.willingness)}%`;
  document.getElementById("lossCardVal").textContent = t.htmlLang === "ja" ? `${a.loss.toFixed(1)}人日` : `${a.loss.toFixed(1)} PD`;
  document.getElementById("hint").textContent = t.hint(penalty, impact, a);

  document.getElementById("penaltyReadout").textContent = penalty + "%";
  document.getElementById("impactReadout").textContent = impact;
  if (document.activeElement !== document.getElementById("penaltySlider")) document.getElementById("penaltySlider").value = penalty;
  if (document.activeElement !== document.getElementById("penaltyNum")) document.getElementById("penaltyNum").value = penalty;
  if (document.activeElement !== document.getElementById("impactSlider")) document.getElementById("impactSlider").value = impact;
  if (document.activeElement !== document.getElementById("impactNum")) document.getElementById("impactNum").value = impact;

  const scoreEl = document.getElementById("scoreVal");
  scoreEl.textContent = a.score;
  scoreEl.className = "score-val mono" + (a.score < 45 ? " danger" : a.score < 65 ? " warn" : "");
  document.getElementById("scoreComment").textContent = t.comments[a.band];

  DevSimLab.renderShare(document.getElementById("shareBtns"), {
    url: "https://sakuichi.github.io/dev-sim-lab/speak-up-cost/",
    shareText: t.shareText,
    shareHashtags: t.shareHashtags,
  });
}

/* ================= 静的コンテンツの言語適用 ================= */
function applyStaticText() {
  const t = T();
  document.title = t.docTitle;
  document.querySelector('meta[name="description"]').setAttribute("content", t.heroLead);
  document.getElementById("heroTitle").innerHTML = t.heroTitle;
  document.getElementById("heroLead").textContent = t.heroLead;
  document.getElementById("consoleLabel").textContent = t.consoleLabel;
  document.getElementById("sumLabel").textContent = t.sumLabel;
  document.getElementById("scoreLabel").textContent = t.scoreLabel;
  document.getElementById("penaltyName").textContent = t.penaltyName;
  document.getElementById("penaltySub").textContent = t.penaltySub;
  document.getElementById("impactName").textContent = t.impactName;
  document.getElementById("impactSub").textContent = t.impactSub;
  document.getElementById("numLabel1").textContent = t.numLabel;
  document.getElementById("numLabel2").textContent = t.numLabel;
  document.getElementById("penaltySlider").setAttribute("aria-label", t.penaltyName);
  document.getElementById("impactSlider").setAttribute("aria-label", t.impactName);
  document.getElementById("numLabel1").setAttribute("aria-label", `${t.penaltyName} ${t.numLabel}`);
  document.getElementById("numLabel2").setAttribute("aria-label", `${t.impactName} ${t.numLabel}`);
  document.getElementById("resetBtn").textContent = t.resetBtn;
  document.getElementById("scenarioBtn").textContent = t.scenarioBtn;
  document.getElementById("chartCaption").textContent = t.chartCaption;
  document.getElementById("chartNote").textContent = t.chartNote;
  document.getElementById("legendSpeak").textContent = t.legendSpeak;
  document.getElementById("legendMiss").textContent = t.legendMiss;
  document.getElementById("speakCardLabel").textContent = t.speakCardLabel;
  document.getElementById("lossCardLabel").textContent = t.lossCardLabel;

  document.getElementById("secAdvice").innerHTML = `
    <h2>${t.adviceHeading}</h2>
    <p>${t.adviceIntro}</p>
    <ul>${t.adviceItems.map((i) => `<li>${i}</li>`).join("")}</ul>
  `;

  document.getElementById("booksH").textContent = t.booksH;
  const booksGrid = document.getElementById("booksGrid");
  booksGrid.innerHTML = "";
  t.books.forEach((b) => {
    const div = document.createElement("div");
    div.className = "book";
    div.innerHTML = `<span class="tag">${b.tag}</span><h3>${b.title}</h3><p>${b.desc}</p>
      <a href="${b.url}" target="_blank" rel="noopener nofollow sponsored">${b.link}</a>`;
    booksGrid.appendChild(div);
  });

  DevSimLab.renderRelated(document.getElementById("relatedGrid"), { exclude: "speak-up-cost" });
}

/* ================= イベント ================= */
document.getElementById("penaltySlider").addEventListener("input", (e) => { penalty = +e.target.value; render(); });
document.getElementById("penaltyNum").addEventListener("change", (e) => {
  penalty = Math.min(PENALTY_MAX, Math.max(PENALTY_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("impactSlider").addEventListener("input", (e) => { impact = +e.target.value; render(); });
document.getElementById("impactNum").addEventListener("change", (e) => {
  impact = Math.min(IMPACT_MAX, Math.max(IMPACT_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("resetBtn").addEventListener("click", () => {
  penalty = 50; impact = 30;
  document.getElementById("hint").textContent = "";
  render();
});
document.getElementById("scenarioBtn").addEventListener("click", () => {
  penalty = 100;
  render();
  const a = assess(impact, penalty);
  document.getElementById("hint").textContent = T().hintScenario(impact, a);
});

/* ---- drag the marker directly on the chart ---- */
const suChart = document.getElementById("suChart");
function svgPoint(evt) {
  const pt = suChart.createSVGPoint();
  pt.x = evt.clientX; pt.y = evt.clientY;
  return pt.matrixTransform(suChart.getScreenCTM().inverse());
}
let dragging = false;
function startDrag(evt) {
  dragging = true;
  suChart.setPointerCapture(evt.pointerId);
  document.getElementById("suMarker").classList.add("dragging");
  document.getElementById("suMarkerHit").classList.add("dragging");
  updateFromPointer(evt);
  evt.preventDefault();
}
function updateFromPointer(evt) {
  const p = svgPoint(evt);
  penalty = pOfX(p.x);
  render();
}
document.getElementById("suMarkerHit").addEventListener("pointerdown", startDrag);
suChart.addEventListener("pointermove", (evt) => { if (dragging) updateFromPointer(evt); });
["pointerup", "pointercancel"].forEach((ev) => suChart.addEventListener(ev, () => {
  dragging = false;
  document.getElementById("suMarker").classList.remove("dragging");
  document.getElementById("suMarkerHit").classList.remove("dragging");
}));

DevSimLab.initChrome({
  onRender: (lang, tone) => {
    LANG = lang; TONE = tone;
    applyStaticText();
    render();
  },
});
</script>
