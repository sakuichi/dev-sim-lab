"use strict";

/* ================= モデル =================
   「ヤク剃り(yak shaving)」——本題に取りかかろうとすると「先にアレが必要」が
   連鎖して、気づけば本題と一見無関係な作業をしている現象。1990年代にMIT AIラボの
   Carlin Vieriが命名し(由来は1991年のアニメ『レンとスティンピー』のワンシーン)、
   同僚Jeremy H. Brownによる説明「本来のタスクと12段の因果関係でつながった先にある、
   一見無関係で些末な作業をしている状態」がよく知られる。2000年代半ばに
   Seth Godinのブログを通じて広まった。
   本モデルは「寄り道の深さ(段数)×寄り道1つあたりの平均時間」という単純な掛け算で、
   本題に着手できるまでの時間と、1日(480分)のうち本題に残された時間を示す。
   深さの上限12はBrownの「12段の因果関係」という表現に合わせた演出であり、
   実証研究にもとづく数値ではない。
*/
const DEPTH_MIN = 0, DEPTH_MAX = 12;
const AVG_MIN = 10, AVG_MAX = 60;
const WORKDAY_MIN = 480;

function delayOf(depth, avg) { return depth * avg; }
function remainOf(depth, avg) { return Math.max(0, WORKDAY_MIN - delayOf(depth, avg)); }
function scoreOf(depth) { return Math.round(100 * (1 - depth / DEPTH_MAX)); }
function tierOf(depth) {
  if (depth === 0) return 0;
  if (depth <= 3) return 1;
  if (depth <= 6) return 2;
  if (depth <= 9) return 3;
  return 4;
}
function assess(depth, avg) {
  const delay = delayOf(depth, avg);
  const remain = remainOf(depth, avg);
  const overflow = delay > WORKDAY_MIN;
  const score = scoreOf(depth);
  const band = tierOf(depth);
  return { delay, remain, overflow, score, band };
}

    : `寄り道${depth}段。本題まであと${a.delay}分。ブラウザのタブは現在${12 + depth * 6}枚。最初のタブに何が書いてあったかはもう誰も知らない。`,
  hintScenario: (a) => `「READMEのtypo直すだけ」のはずが、リポジトリのlint設定と格闘して${a.delay}分。typoはまだ直っていない。`,
  comments: [
    "着席即コーディング。伝説の一日。",
    "寄り道はしたが、ちゃんと帰ってきた。えらい。",
    "「あれ、俺なんでvimの設定いじってるんだっけ」——気づけたあなたはまだ引き返せる。",
    "本題のブランチ名すら思い出せなくなってきた。git branchで過去の自分と対話中。",
    "気づけば夕方。今日書いたコードは全部.dotfiles。本題のissueは明日も無傷で待っている。",
  ],
},
en: {
  hint: (depth, avg, a) => a.overflow
    ? `Detour depth ${depth}. Rebuilding Docker to fix one line of CSS, which required an OS update. Real task ETA: not today.`
    : `Detour depth ${depth}. Real task in ${a.delay} min. Browser tab count: ${12 + depth * 6}. Nobody remembers what the first tab was for.`,
  hintScenario: (a) => `"Just fixing a README typo" — ${a.delay} minutes into fighting the repo's lint config. The typo remains unfixed.`,
  comments: [
    "Sat down, started coding. A legendary day.",
    "Took a detour, but actually came back. Impressive.",
    "\"Wait, why am I editing my vim config?\" — if you caught yourself, you can still turn back.",
    "Can't even remember the branch name for the real task. Currently interviewing past-you via git branch.",
    "Suddenly it's evening. Everything written today lives in .dotfiles. The real issue awaits tomorrow, untouched.",
  ],
},
};

let LANG = "ja";
let TONE = "std";
const T = () => (TONE === "dev" ? { ...I18N[LANG], ...DEV[LANG] } : I18N[LANG]);

let depth = 4;
let avg = 20;

/* ================= チャート描画 ================= */
const NS = "http://www.w3.org/2000/svg";
const el = (tag, attrs) => {
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
};
const PW = 640, PH = 240, PAD_L = 44, PAD_R = 16, PAD_T = 30, PAD_B = 42;
const Y_MAX = 720;
const xOf = (d) => PAD_L + ((d - DEPTH_MIN) / (DEPTH_MAX - DEPTH_MIN)) * (PW - PAD_L - PAD_R);
const dOfX = (x) => {
  const frac = (x - PAD_L) / (PW - PAD_L - PAD_R);
  const raw = DEPTH_MIN + frac * (DEPTH_MAX - DEPTH_MIN);
  return Math.min(DEPTH_MAX, Math.max(DEPTH_MIN, Math.round(raw)));
};
const yOf = (v) => PAD_T + (1 - Math.min(v, Y_MAX) / Y_MAX) * (PH - PAD_T - PAD_B);

function drawChart() {
  const t = T();
  const gridLayer = document.getElementById("ysGridLayer");
  gridLayer.innerHTML = "";
  [0, 120, 240, 360, 480, 600, 720].forEach((v) => {
    const y = yOf(v);
    gridLayer.appendChild(el("line", { class: "ys-grid", x1: PAD_L, y1: y, x2: PW - PAD_R, y2: y }));
    const label = el("text", { class: "ys-axis-label", x: PAD_L - 6, y: y + 3, "text-anchor": "end" });
    label.textContent = v;
    gridLayer.appendChild(label);
  });
  for (let d = DEPTH_MIN; d <= DEPTH_MAX; d += 2) {
    const x = xOf(d);
    gridLayer.appendChild(el("line", { class: "ys-tick", x1: x, y1: PAD_T, x2: x, y2: PH - PAD_B }));
    const label = el("text", { class: "ys-axis-label", x, y: PH - PAD_B + 14, "text-anchor": d === DEPTH_MIN ? "start" : d === DEPTH_MAX ? "end" : "middle" });
    label.textContent = d;
    gridLayer.appendChild(label);
  }
  const yTitle = el("text", { class: "ys-axis-title", x: 2, y: 12 });
  yTitle.textContent = t.ysYTitle;
  gridLayer.appendChild(yTitle);
  const xTitle = el("text", { class: "ys-axis-title", x: PW / 2, y: PH - 4, "text-anchor": "middle" });
  xTitle.textContent = t.ysXTitle;
  gridLayer.appendChild(xTitle);

  /* workday reference line */
  const dayY = yOf(WORKDAY_MIN);
  document.getElementById("ysLineDay").setAttribute("d", `M ${PAD_L} ${dayY} L ${PW - PAD_R} ${dayY}`);

  /* staircase: value at depth d is d*avg; steps rise at each integer depth */
  let path = `M ${xOf(0)} ${yOf(0)}`;
  for (let d = 1; d <= DEPTH_MAX; d++) {
    path += ` L ${xOf(d)} ${yOf(delayOf(d - 1, avg))}`;
    path += ` L ${xOf(d)} ${yOf(delayOf(d, avg))}`;
  }
  document.getElementById("ysLineStair").setAttribute("d", path);

  const dotsLayer = document.getElementById("ysDotsLayer");
  dotsLayer.innerHTML = "";
  for (let d = DEPTH_MIN; d <= DEPTH_MAX; d += 2) {
    dotsLayer.appendChild(el("circle", { class: "ys-dot", cx: xOf(d), cy: yOf(delayOf(d, avg)), fill: "var(--alert)" }));
  }

  const mx = xOf(depth);
  const marker = document.getElementById("ysMarker");
  marker.setAttribute("x1", mx); marker.setAttribute("x2", mx);
  marker.setAttribute("y1", PAD_T); marker.setAttribute("y2", PH - PAD_B);

  const py = yOf(delayOf(depth, avg));
  document.getElementById("ysPoint").setAttribute("cx", mx);
  document.getElementById("ysPoint").setAttribute("cy", py);

  const labelAnchor = mx > PW - PAD_R - 55 ? "end" : mx < PAD_L + 55 ? "start" : "middle";
  const labelDx = labelAnchor === "end" ? -10 : labelAnchor === "start" ? 10 : 0;
  const labelEl = document.getElementById("ysLabel");
  labelEl.setAttribute("x", mx + labelDx);
  labelEl.setAttribute("y", Math.max(PAD_T + 10, py - 10));
  labelEl.setAttribute("text-anchor", labelAnchor);
  labelEl.textContent = T().htmlLang === "ja" ? `${delayOf(depth, avg)}分` : `${delayOf(depth, avg)} min`;

  const hit = document.getElementById("ysMarkerHit");
  hit.setAttribute("x", PAD_L); hit.setAttribute("y", 0);
  hit.setAttribute("width", PW - PAD_L - PAD_R); hit.setAttribute("height", PH);
}

/* ================= 描画 ================= */
function render() {
  const t = T();
  const a = assess(depth, avg);

  drawChart();

  const delayLabel = t.htmlLang === "ja" ? `${a.delay}分` : `${a.delay} min`;
  const remainLabel = t.htmlLang === "ja" ? `${a.remain}分` : `${a.remain} min`;
  document.getElementById("sumVal").textContent = delayLabel;
  document.getElementById("delayCardVal").textContent = delayLabel;
  document.getElementById("remainCardVal").textContent = remainLabel;
  document.getElementById("hint").textContent = t.hint(depth, avg, a);

  document.getElementById("depthReadout").textContent = t.htmlLang === "ja" ? `${depth}段` : `${depth}`;
  document.getElementById("avgReadout").textContent = t.htmlLang === "ja" ? `${avg}分` : `${avg} min`;
  if (document.activeElement !== document.getElementById("depthSlider")) document.getElementById("depthSlider").value = depth;
  if (document.activeElement !== document.getElementById("depthNum")) document.getElementById("depthNum").value = depth;
  if (document.activeElement !== document.getElementById("avgSlider")) document.getElementById("avgSlider").value = avg;
  if (document.activeElement !== document.getElementById("avgNum")) document.getElementById("avgNum").value = avg;

  const scoreEl = document.getElementById("scoreVal");
  scoreEl.textContent = a.score;
  scoreEl.className = "score-val mono" + (a.score < 45 ? " danger" : a.score < 70 ? " warn" : "");
  document.getElementById("scoreComment").textContent = t.comments[a.band];

  DevSimLab.renderShare(document.getElementById("shareBtns"), {
    url: "https://sakuichi.github.io/dev-sim-lab/yak-shaving/",
    shareText: t.shareText,
    shareHashtags: t.shareHashtags,
  });
}

/* ================= 静的コンテンツの言語適用 ================= */
function applyStaticText() {
  const t = T();
  document.title = t.docTitle;
  document.querySelector('meta[name="description"]').setAttribute("content", t.heroLead);
  document.getElementById("heroTitle").innerHTML = t.heroTitle;
  document.getElementById("heroLead").textContent = t.heroLead;
  document.getElementById("consoleLabel").textContent = t.consoleLabel;
  document.getElementById("sumLabel").textContent = t.sumLabel;
  document.getElementById("scoreLabel").textContent = t.scoreLabel;
  document.getElementById("depthName").textContent = t.depthName;
  document.getElementById("depthSub").textContent = t.depthSub;
  document.getElementById("avgName").textContent = t.avgName;
  document.getElementById("avgSub").textContent = t.avgSub;
  document.getElementById("numLabel1").textContent = t.numLabel;
  document.getElementById("numLabel2").textContent = t.numLabel;
  document.getElementById("depthSlider").setAttribute("aria-label", t.depthName);
  document.getElementById("avgSlider").setAttribute("aria-label", t.avgName);
  document.getElementById("numLabel1").setAttribute("aria-label", `${t.depthName} ${t.numLabel}`);
  document.getElementById("numLabel2").setAttribute("aria-label", `${t.avgName} ${t.numLabel}`);
  document.getElementById("resetBtn").textContent = t.resetBtn;
  document.getElementById("scenarioBtn").textContent = t.scenarioBtn;
  document.getElementById("chartCaption").textContent = t.chartCaption;
  document.getElementById("chartNote").textContent = t.chartNote;
  document.getElementById("legendStair").textContent = t.legendStair;
  document.getElementById("legendDay").textContent = t.legendDay;
  document.getElementById("delayCardLabel").textContent = t.delayCardLabel;
  document.getElementById("remainCardLabel").textContent = t.remainCardLabel;

  document.getElementById("secAdvice").innerHTML = `
    <h2>${t.adviceHeading}</h2>
    <p>${t.adviceIntro}</p>
    <ul>${t.adviceItems.map((i) => `<li>${i}</li>`).join("")}</ul>
  `;

  document.getElementById("booksH").textContent = t.booksH;
  const booksGrid = document.getElementById("booksGrid");
  booksGrid.innerHTML = "";
  t.books.forEach((b) => {
    const div = document.createElement("div");
    div.className = "book";
    div.innerHTML = `<span class="tag">${b.tag}</span><h3>${b.title}</h3><p>${b.desc}</p>
      <a href="${b.url}" target="_blank" rel="noopener nofollow sponsored">${b.link}</a>`;
    booksGrid.appendChild(div);
  });

  DevSimLab.renderRelated(document.getElementById("relatedGrid"), { exclude: "yak-shaving" });
}

/* ================= イベント ================= */
document.getElementById("depthSlider").addEventListener("input", (e) => { depth = +e.target.value; render(); });
document.getElementById("depthNum").addEventListener("change", (e) => {
  depth = Math.min(DEPTH_MAX, Math.max(DEPTH_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("avgSlider").addEventListener("input", (e) => { avg = +e.target.value; render(); });
document.getElementById("avgNum").addEventListener("change", (e) => {
  avg = Math.min(AVG_MAX, Math.max(AVG_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("resetBtn").addEventListener("click", () => {
  depth = 4; avg = 20;
  document.getElementById("hint").textContent = "";
  render();
});
document.getElementById("scenarioBtn").addEventListener("click", () => {
  depth = 12;
  render();
  const a = assess(depth, avg);
  document.getElementById("hint").textContent = T().hintScenario(a);
});

/* ---- drag the marker directly on the chart ---- */
const ysChart = document.getElementById("ysChart");
function svgPoint(evt) {
  const pt = ysChart.createSVGPoint();
  pt.x = evt.clientX; pt.y = evt.clientY;
  return pt.matrixTransform(ysChart.getScreenCTM().inverse());
}
let dragging = false;
function startDrag(evt) {
  dragging = true;
  ysChart.setPointerCapture(evt.pointerId);
  document.getElementById("ysMarker").classList.add("dragging");
  document.getElementById("ysMarkerHit").classList.add("dragging");
  updateFromPointer(evt);
  evt.preventDefault();
}
function updateFromPointer(evt) {
  const p = svgPoint(evt);
  depth = dOfX(p.x);
  render();
}
document.getElementById("ysMarkerHit").addEventListener("pointerdown", startDrag);
ysChart.addEventListener("pointermove", (evt) => { if (dragging) updateFromPointer(evt); });
["pointerup", "pointercancel"].forEach((ev) => ysChart.addEventListener(ev, () => {
  dragging = false;
  document.getElementById("ysMarker").classList.remove("dragging");
  document.getElementById("ysMarkerHit").classList.remove("dragging");
}));

DevSimLab.initChrome({
  onRender: (lang, tone) => {
    LANG = lang; TONE = tone;
    applyStaticText();
    render();
  },
});
</script>
