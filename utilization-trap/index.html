"use strict";

/* ================= モデル (M/M/1 近似) ================= */
const RHO_MIN = 0.50, RHO_MAX = 0.99;
const RHO_THRESHOLD = 0.90;
const QUEUE_CAP = 24; // 表示するタスクチップの上限

function L(rho) { return rho / (1 - rho); }        // 平均系内数
function Lq(rho) { return (rho * rho) / (1 - rho); } // 平均待ち行列長
function waitMinutes(rho, avgTime) { return L(rho) * avgTime; } // 平均待ち時間(分)

function buildSeries(avgTime) {
  const arr = [];
  for (let p = RHO_MIN * 100; p <= RHO_MAX * 100; p += 1) {
    const rho = p / 100;
    arr.push({ rho, wait: waitMinutes(rho, avgTime) });
  }
  return arr;
}

function scoreOf(rho) {
  const score = Math.round(100 - ((rho - RHO_MIN) / (RHO_MAX - RHO_MIN)) * 100);
  return Math.max(0, Math.min(100, score));
}
function assess(rho, avgTime) {
  const score = scoreOf(rho);
  const band = score >= 90 ? 0 : score >= 70 ? 1 : score >= 50 ? 2 : score >= 30 ? 3 : 4;
  return { score, band, series: buildSeries(avgTime), wait: waitMinutes(rho, avgTime), queued: Lq(rho) };
}

function formatDuration(minutes, t) {
  const m = Math.round(minutes);
  if (m < 60) return t.unitMinutes(m);
  const h = Math.floor(m / 60), rem = m % 60;
  return rem === 0 ? t.unitHours(h) : t.unitHoursMinutes(h, rem);
}

let LANG = "ja";
let TONE = "std";
const T = () => (TONE === "dev" ? { ...I18N[LANG], ...DEV[LANG] } : I18N[LANG]);

let util = 70;   // percent, integer 50-99
let avgTime = 30; // minutes

/* ================= キュー可視化 ================= */
function drawQueue(rho, t) {
  const wrap = document.getElementById("queueWrap");
  wrap.innerHTML = "";
  const queued = Math.round(Lq(rho));
  const shown = Math.min(queued, QUEUE_CAP);
  for (let i = 0; i < shown; i++) {
    const chip = document.createElement("div");
    chip.className = "task-chip";
    wrap.appendChild(chip);
  }
  if (queued > QUEUE_CAP) {
    const overflow = document.createElement("span");
    overflow.className = "queue-overflow";
    overflow.textContent = t.queueOverflow(queued - QUEUE_CAP);
    wrap.appendChild(overflow);
  }
  if (queued === 0) {
    const empty = document.createElement("span");
    empty.className = "queue-overflow";
    empty.textContent = "—";
    wrap.appendChild(empty);
  }
}

/* ================= 待ち時間カーブ ================= */
const NS = "http://www.w3.org/2000/svg";
const el = (tag, attrs) => {
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
};
const PW = 640, PH = 200, PAD_L = 46, PAD_R = 16, PAD_T = 14, PAD_B = 22;
const xOf = rho => PAD_L + ((rho - RHO_MIN) / (RHO_MAX - RHO_MIN)) * (PW - PAD_L - PAD_R);
const rhoOfX = x => {
  const frac = (x - PAD_L) / (PW - PAD_L - PAD_R);
  return Math.min(RHO_MAX, Math.max(RHO_MIN, RHO_MIN + frac * (RHO_MAX - RHO_MIN)));
};

function drawWaitChart(r) {
  const t = T();
  const waits = r.series.map(s => s.wait);
  const yMax = Math.max(...waits);
  const yOf = v => PH - PAD_B - (v / (yMax || 1)) * (PH - PAD_T - PAD_B);

  const gridLayer = document.getElementById("waitGridLayer");
  gridLayer.innerHTML = "";
  [0.25, 0.5, 0.75].forEach(f => {
    const y = PAD_T + f * (PH - PAD_T - PAD_B);
    gridLayer.appendChild(el("line", { class: "wait-grid", x1: PAD_L, y1: y, x2: PW - PAD_R, y2: y }));
  });
  gridLayer.appendChild(el("line", { class: "wait-grid", x1: PAD_L, y1: PH - PAD_B, x2: PW - PAD_R, y2: PH - PAD_B }));

  const okPts = r.series.filter(s => s.rho <= RHO_THRESHOLD);
  const dangerPts = r.series.filter(s => s.rho >= RHO_THRESHOLD);
  const toPath = pts => "M " + pts.map(s => `${xOf(s.rho)},${yOf(s.wait)}`).join(" L ");
  document.getElementById("waitLineOk").setAttribute("d", okPts.length ? toPath(okPts) : "");
  document.getElementById("waitLineDanger").setAttribute("d", dangerPts.length ? toPath(dangerPts) : "");

  const areaPts = r.series.map(s => `${xOf(s.rho)},${yOf(s.wait)}`).join(" L ");
  document.getElementById("waitArea").setAttribute("d", `M ${xOf(RHO_MIN)},${yOf(0)} L ${areaPts} L ${xOf(RHO_MAX)},${yOf(0)} Z`);

  const thX = xOf(RHO_THRESHOLD);
  const thLine = document.getElementById("waitThresholdLine");
  thLine.setAttribute("x1", thX); thLine.setAttribute("x2", thX);
  thLine.setAttribute("y1", PAD_T); thLine.setAttribute("y2", PH - PAD_B);
  const thLabel = document.getElementById("waitThresholdLabel");
  thLabel.setAttribute("x", thX + 6);
  thLabel.setAttribute("y", PAD_T + 10);
  thLabel.textContent = t.thresholdLabel;

  const curX = xOf(util / 100), curY = yOf(r.wait);
  const cur = document.getElementById("waitCurrent");
  cur.setAttribute("cx", curX);
  cur.setAttribute("cy", curY);
  cur.classList.toggle("danger", util / 100 >= RHO_THRESHOLD);
  const curHit = document.getElementById("waitCurrentHit");
  curHit.setAttribute("cx", curX);
  curHit.setAttribute("cy", curY);

  const xMin = document.getElementById("waitXLabelMin");
  xMin.setAttribute("x", PAD_L); xMin.setAttribute("y", PH - 4);
  xMin.textContent = t.waitXLabelMin;
  const xMax = document.getElementById("waitXLabelMax");
  xMax.setAttribute("x", PW - PAD_R); xMax.setAttribute("y", PH - 4);
  xMax.setAttribute("text-anchor", "end");
  xMax.textContent = t.waitXLabelMax;
}

/* ================= 描画 ================= */
function render() {
  const t = T();
  const rho = util / 100;
  const r = assess(rho, avgTime);

  drawQueue(rho, t);
  drawWaitChart(r);

  const sv = document.getElementById("sumVal");
  sv.textContent = formatDuration(r.wait, t);
  sv.className = rho >= RHO_THRESHOLD ? "danger" : "";
  document.getElementById("serverLabel").textContent = t.serverLabel;
  document.getElementById("hint").textContent = t.hint(rho, r.queued);

  document.getElementById("utilReadout").textContent = util + "%";
  document.getElementById("timeReadout").textContent = avgTime;
  if (document.activeElement !== document.getElementById("utilSlider")) document.getElementById("utilSlider").value = util;
  if (document.activeElement !== document.getElementById("utilNum")) document.getElementById("utilNum").value = util;
  if (document.activeElement !== document.getElementById("timeSlider")) document.getElementById("timeSlider").value = avgTime;
  if (document.activeElement !== document.getElementById("timeNum")) document.getElementById("timeNum").value = avgTime;

  const scoreEl = document.getElementById("scoreVal");
  scoreEl.textContent = r.score;
  scoreEl.className = "score-val mono" + (r.score < 50 ? " danger" : r.score < 70 ? " warn" : "");
  document.getElementById("scoreComment").textContent = t.comments[r.band];

  DevSimLab.renderShare(document.getElementById("shareBtns"), {
    url: "https://sakuichi.github.io/dev-sim-lab/utilization-trap/",
    shareText: t.shareText,
    shareHashtags: t.shareHashtags,
  });
}

/* ================= 静的コンテンツの言語適用 ================= */
function applyStaticText() {
  const t = T();
  document.title = t.docTitle;
  document.querySelector('meta[name="description"]').setAttribute("content", t.heroLead);
  document.getElementById("heroTitle").innerHTML = t.heroTitle;
  document.getElementById("heroLead").textContent = t.heroLead;
  document.getElementById("consoleLabel").textContent = t.consoleLabel;
  document.getElementById("sumLabel").textContent = t.sumLabel;
  document.getElementById("scoreLabel").textContent = t.scoreLabel;
  document.getElementById("utilName").textContent = t.utilName;
  document.getElementById("utilSub").textContent = t.utilSub;
  document.getElementById("timeName").textContent = t.timeName;
  document.getElementById("timeSub").textContent = t.timeSub;
  document.getElementById("numLabel1").textContent = t.numLabel;
  document.getElementById("numLabel2").textContent = t.numLabel;
  document.getElementById("utilSlider").setAttribute("aria-label", t.utilName);
  document.getElementById("timeSlider").setAttribute("aria-label", t.timeName);
  document.getElementById("numLabel1").setAttribute("aria-label", `${t.utilName} ${t.numLabel}`);
  document.getElementById("numLabel2").setAttribute("aria-label", `${t.timeName} ${t.numLabel}`);
  document.getElementById("resetBtn").textContent = t.resetBtn;
  document.getElementById("scenarioBtn").textContent = t.scenarioBtn;
  document.getElementById("chartNote").textContent = t.chartNote;

  document.getElementById("secAdvice").innerHTML = `
    <h2>${t.adviceHeading}</h2>
    <p>${t.adviceIntro}</p>
    <ul>${t.adviceItems.map(i => `<li>${i}</li>`).join("")}</ul>
  `;

  document.getElementById("booksH").textContent = t.booksH;
  const booksGrid = document.getElementById("booksGrid");
  booksGrid.innerHTML = "";
  t.books.forEach(b => {
    const div = document.createElement("div");
    div.className = "book";
    div.innerHTML = `<span class="tag">${b.tag}</span><h3>${b.title}</h3><p>${b.desc}</p>
      <a href="${b.url}" target="_blank" rel="noopener nofollow sponsored">${b.link}</a>`;
    booksGrid.appendChild(div);
  });

  DevSimLab.renderRelated(document.getElementById("relatedGrid"), { exclude: "utilization-trap" });
}

/* ================= イベント ================= */
document.getElementById("utilSlider").addEventListener("input", e => { util = +e.target.value; render(); });
document.getElementById("utilNum").addEventListener("change", e => {
  util = Math.min(99, Math.max(50, +e.target.value));
  render();
});
document.getElementById("timeSlider").addEventListener("input", e => { avgTime = +e.target.value; render(); });
document.getElementById("timeNum").addEventListener("change", e => {
  avgTime = Math.min(120, Math.max(5, +e.target.value));
  render();
});
/* ---- drag the current-position marker directly on the chart ---- */
const waitChart = document.getElementById("waitChart");
function svgPoint(evt) {
  const pt = waitChart.createSVGPoint();
  pt.x = evt.clientX; pt.y = evt.clientY;
  return pt.matrixTransform(waitChart.getScreenCTM().inverse());
}
let dragging = false;
function startDrag(evt) {
  dragging = true;
  waitChart.setPointerCapture(evt.pointerId);
  document.getElementById("waitCurrent").classList.add("dragging");
  document.getElementById("waitCurrentHit").classList.add("dragging");
  updateFromPointer(evt);
  evt.preventDefault();
}
function updateFromPointer(evt) {
  const p = svgPoint(evt);
  util = Math.round(rhoOfX(p.x) * 100);
  render();
}
document.getElementById("waitCurrentHit").addEventListener("pointerdown", startDrag);
document.getElementById("waitCurrent").addEventListener("pointerdown", startDrag);
waitChart.addEventListener("pointermove", evt => { if (dragging) updateFromPointer(evt); });
["pointerup", "pointercancel"].forEach(ev => waitChart.addEventListener(ev, () => {
  dragging = false;
  document.getElementById("waitCurrent").classList.remove("dragging");
  document.getElementById("waitCurrentHit").classList.remove("dragging");
}));

document.getElementById("resetBtn").addEventListener("click", () => {
  util = 70; avgTime = 30;
  document.getElementById("hint").textContent = "";
  render();
});
document.getElementById("scenarioBtn").addEventListener("click", () => {
  util = 95;
  render();
  document.getElementById("hint").textContent = T().hintScenario;
});

DevSimLab.initChrome({
  onRender: (lang, tone) => {
    LANG = lang; TONE = tone;
    applyStaticText();
    render();
  },
});
</script>
