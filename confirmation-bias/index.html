"use strict";

/* ================= モデル =================
   「確証バイアス」——自分の仮説を支持する証拠ばかりを集め、反証となる証拠を
   探さない・軽視する傾向。Wason(1960)の2-4-6課題で実験的に示され、
   Nickerson(1998)のレビューで「あらゆる場面に現れる、最も広範で影響の大きい
   推論バイアスの一つ」と位置づけられた。
   現代的な増幅要因として、生成AIの「追従性(sycophancy)」がある。RLHFで訓練された
   言語モデルはユーザーの信念に迎合しやすいことが報告されており(Anthropic, 2023ほか)、
   さらに追従的なAIとの対話がユーザーの確信を強めがちで、ユーザー自身も追従的な
   回答を高く評価しやすいという研究もある。自説の補強のためにAIに意見を求めると、
   ハルシネーション(もっともらしい誤情報)が「裏付け」として返ってくる可能性もある。
   本モデルは「反証を探す努力」を土台に、「相談相手の中立性」がそこに上乗せされる
   という単純化した独自モデルであり、実証研究の数値を再現したものではない。
   catchRate = BASE_MIN + effort*BASE_SLOPE + PARTNER_MAX*(1 - syco/100)
*/
const EFFORT_MIN = 0, EFFORT_MAX = 100;
const SYCO_MIN = 0, SYCO_MAX = 100;
const BASE_MIN = 10, BASE_SLOPE = 0.7, PARTNER_MAX = 15, CATCH_CAP = 95;

function catchRateOf(effort, syco) {
  return Math.min(CATCH_CAP, BASE_MIN + effort * BASE_SLOPE + PARTNER_MAX * (1 - syco / 100));
}
function blindRateOf(effort, syco) { return 100 - catchRateOf(effort, syco); }
function scoreOf(effort, syco) { return Math.round(catchRateOf(effort, syco)); }
function tierOf(effort, syco) {
  const c = catchRateOf(effort, syco);
  if (c < 25) return 0;
  if (c < 45) return 1;
  if (c < 65) return 2;
  if (c < 85) return 3;
  return 4;
}
function assess(effort, syco) {
  const catchRate = catchRateOf(effort, syco);
  const blind = blindRateOf(effort, syco);
  const neutral = catchRateOf(effort, 0);
  const penalty = neutral - catchRate;
  const score = scoreOf(effort, syco);
  const band = tierOf(effort, syco);
  return { catchRate, blind, neutral, penalty, score, band };
}

  heroLead: "In 1960, psychologist Peter Wason ran a famous experiment. Participants saw the sequence \"2, 4, 6\" and had to discover the underlying rule. Most hypothesized \"numbers increasing by two\" and tested only sequences that fit — 8, 10, 12. The actual rule was simply \"three numbers in ascending order.\" One hypothesis-breaking test (\"what about 1, 2, 3?\") would have revealed it, but people gravitate toward evidence that supports their hypothesis and rarely hunt for evidence against it. This is confirmation bias — in Nickerson's 1998 review, one of the most pervasive and consequential reasoning biases of all. And today there's a new amplifier. Language models trained with RLHF show documented \"sycophancy\" — a tendency to agree with the user's beliefs (Anthropic, 2023, among others). Ask an AI to back up your position and you'll likely get the answer you wanted — sometimes complete with hallucinated \"supporting evidence.\" Move the \"effort to disconfirm\" and \"consultation partner's sycophancy\" dials to see how the chance of catching a wrong hypothesis changes.",

  sycoName: "Partner's sycophancy", sycoSub: "0 = a neutral partner who genuinely tests your idea, 100 = one who always agrees (sycophantic AI and yes-men included)",

  chartNote: "A simplified original model where disconfirmation effort forms the base and partner neutrality adds on top — not a reproduction of empirical numbers. Confirmation bias itself is documented from Wason (1960) through Nickerson's (1998) review; AI sycophancy is reported by Anthropic (2023) and others.",
  cbYTitle: "Chance of catching the error (%)", cbXTitle: "Effort to disconfirm",
  legendCurrent: "Catch rate with your current partner",
  legendNeutral: "With a neutral partner (reference)",
  scenarioBoxTitle: "What verification looks like right now",
  scenarios: [
    "\"This design is fine, right?\" — asked only to people likely to agree. All that comes back is agreement; verification hasn't started.",
    "Supporting evidence is piling up, but nobody is looking for counterarguments. Two agreements is not the same as zero objections confirmed.",
    "Some disconfirmation has begun — but with a sycophantic partner, it ends at \"great research, I think you're right.\"",
    "You're explicitly asking \"if this hypothesis is wrong, where?\" With a neutral partner, flaws start surfacing here.",

  hintScenario: (a) => `Wason's 2-4-6 situation. Testing only sequences that fit your hypothesis means every \"correct!\" tells you nothing. Catch rate: about ${Math.round(a.catchRate)}%. A single hypothesis-breaking test — \"1, 2, 3?\" — changes everything.`,
  comments: [
    "Verification is barely functioning. What's accumulating is agreement, not evidence.",
    "Only supporting evidence is stacking up. Confidence is rising; correctness isn't changing.",
    "Disconfirmation has begun, but the conclusion still depends on who you ask — an unstable state.",
    "Approaching sound verification. The habit of asking \"where would this be wrong?\" is working.",
    "An ideal process: only hypotheses that survive genuine attack remain standing.",
  ],
  adviceHeading: "How to actually deal with this",
  adviceIntro: "Willpower — \"I'll just stay objective\" — is known not to work against confirmation bias. Supporting evidence finds you on its own; counterevidence appears only when deliberately hunted. What works is building disconfirmation into the process: a mandatory \"what would make this design fail?\" pass in reviews, or verifying at least one alternative hypothesis during incident investigations. Generative AI deserves special care. As the sycophancy research shows, AI readily tells you you're right if you ask the right way, and hallucinations can fabricate plausible \"supporting evidence.\" Use AI as a disconfirmation device rather than a reinforcement device — \"list this design's weaknesses,\" \"construct the strongest counterargument to this claim\" — and the same tool flips from a bias amplifier into a verification instrument.",
  adviceItems: [

  ],
  booksH: "Recommended reading",
  books: [
    { tag: "COGNITIVE BIAS", title: "情報を正しく選択するための認知バイアス事典 (Cognitive Bias Encyclopedia)", desc: "A long-selling illustrated guide to 60 cognitive biases, confirmation bias included.", link: "View on Amazon →", url: "https://amzn.to/3Rf2lL0" },
    { tag: "DECISION MAKING", title: "Thinking, Fast and Slow", desc: "Daniel Kahneman. The Nobel laureate's classic on the systematic errors of intuition (System 1) and the deliberate thinking (System 2) that catches them.", link: "View on Amazon →", url: "https://amzn.to/4vV3CWL" },

/* ================= 開発者モード上書き辞書 ================= */
const DEV = {
ja: {
  hint: (effort, syco, a) => `反証努力${effort}・追従度${syco}。「AIも賛成してくれた」を根拠に設計レビューを通そうとしている。気づける確率約${Math.round(a.catchRate)}%。そのAI、聞き方を変えたら反対もしてくれますよ。`,
  hintScenario: (a) => `「8, 10, 12は?」「正解です」「10, 12, 14は?」「正解です」「わかった、2ずつ増える数列だ!」——不正解。気づける確率約${Math.round(a.catchRate)}%。テストが全部通るのは、テストが仮説を攻撃していないからかもしれない。`,
  comments: [
    "「念のため確認ですが」で始まる質問の答えは、聞く前から決まっている。",
    "ブックマークが自説に賛成する記事だけで埋まっていく。反対記事は「よく調べてない人が書いたやつ」。",
    "「チームに聞いたら賛成でした」——聞いたのは賛成しそうな2人だけ、という事実は議事録に残らない。",
    "「この設計の穴を探して」とAIに聞き始めた。昨日までは「この設計いいよね?」と聞いていた。成長。",
    "反対意見を言われて「ありがとう」と返せた。今日のあなたはWasonの実験の上位数%側にいる。",
  ],
},
en: {
  hint: (effort, syco, a) => `Effort ${effort}, sycophancy ${syco}. Trying to pass design review on the strength of "the AI agreed with me." Catch rate ~${Math.round(a.catchRate)}%. That same AI will disagree too, if you change the question.`,
  hintScenario: (a) => `"8, 10, 12?" "Correct." "10, 12, 14?" "Correct." "Got it — increasing by two!" — Wrong. Catch rate ~${Math.round(a.catchRate)}%. When every test passes, maybe the tests aren't attacking the hypothesis.`,
  comments: [
    "Questions that start with \"just to confirm\" have their answer decided before they're asked.",
    "The bookmarks folder fills with articles that agree. Disagreeing articles are \"clearly written by someone who didn't do their research.\"",
    "\"I asked the team and they agreed\" — the minutes won't record that you asked exactly the two people who would.",
    "Started asking the AI to \"find holes in this design.\" Yesterday it was \"this design is good, right?\" Growth.",
    "Someone pushed back and you said \"thank you.\" Today you're in the top few percent of Wason's participants.",
  ],
},
};

let LANG = "ja";
let TONE = "std";
const T = () => (TONE === "dev" ? { ...I18N[LANG], ...DEV[LANG] } : I18N[LANG]);

let effort = 30;
let syco = 70;

/* ================= チャート描画 ================= */
const NS = "http://www.w3.org/2000/svg";
const el = (tag, attrs) => {
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
};
const PW = 640, PH = 240, PAD_L = 40, PAD_R = 16, PAD_T = 30, PAD_B = 42;
const Y_MAX = 100;
const xOf = (v) => PAD_L + ((v - EFFORT_MIN) / (EFFORT_MAX - EFFORT_MIN)) * (PW - PAD_L - PAD_R);
const eOfX = (x) => {
  const frac = (x - PAD_L) / (PW - PAD_L - PAD_R);
  const raw = EFFORT_MIN + frac * (EFFORT_MAX - EFFORT_MIN);
  return Math.min(EFFORT_MAX, Math.max(EFFORT_MIN, Math.round(raw / 5) * 5));
};
const yOf = (v) => PAD_T + (1 - Math.min(v, Y_MAX) / Y_MAX) * (PH - PAD_T - PAD_B);

function drawChart() {
  const t = T();
  const gridLayer = document.getElementById("cbGridLayer");
  gridLayer.innerHTML = "";
  [0, 20, 40, 60, 80, 100].forEach((v) => {
    const y = yOf(v);
    gridLayer.appendChild(el("line", { class: "cb-grid", x1: PAD_L, y1: y, x2: PW - PAD_R, y2: y }));
    const label = el("text", { class: "cb-axis-label", x: PAD_L - 6, y: y + 3, "text-anchor": "end" });
    label.textContent = v + "%";
    gridLayer.appendChild(label);
  });
  for (let v = EFFORT_MIN; v <= EFFORT_MAX; v += 20) {
    const x = xOf(v);
    gridLayer.appendChild(el("line", { class: "cb-tick", x1: x, y1: PAD_T, x2: x, y2: PH - PAD_B }));
    const label = el("text", { class: "cb-axis-label", x, y: PH - PAD_B + 14, "text-anchor": v === EFFORT_MIN ? "start" : v === EFFORT_MAX ? "end" : "middle" });
    label.textContent = v;
    gridLayer.appendChild(label);
  }
  const yTitle = el("text", { class: "cb-axis-title", x: 2, y: 12 });
  yTitle.textContent = t.cbYTitle;
  gridLayer.appendChild(yTitle);
  const xTitle = el("text", { class: "cb-axis-title", x: PW / 2, y: PH - 4, "text-anchor": "middle" });
  xTitle.textContent = t.cbXTitle;
  gridLayer.appendChild(xTitle);

  const neutralPts = [], currentPts = [];
  for (let v = EFFORT_MIN; v <= EFFORT_MAX; v += 2) {
    neutralPts.push(`${xOf(v)},${yOf(catchRateOf(v, 0))}`);
    currentPts.push(`${xOf(v)},${yOf(catchRateOf(v, syco))}`);
  }
  document.getElementById("cbLineNeutral").setAttribute("d", "M " + neutralPts.join(" L "));
  document.getElementById("cbLineCurrent").setAttribute("d", "M " + currentPts.join(" L "));

  const dotsLayer = document.getElementById("cbDotsLayer");
  dotsLayer.innerHTML = "";
  for (let v = EFFORT_MIN; v <= EFFORT_MAX; v += 20) {
    dotsLayer.appendChild(el("circle", { class: "cb-dot", cx: xOf(v), cy: yOf(catchRateOf(v, syco)), fill: "var(--alert)" }));
  }

  const mx = xOf(effort);
  const marker = document.getElementById("cbMarker");
  marker.setAttribute("x1", mx); marker.setAttribute("x2", mx);
  marker.setAttribute("y1", PAD_T); marker.setAttribute("y2", PH - PAD_B);

  const py = yOf(catchRateOf(effort, syco));
  document.getElementById("cbPoint").setAttribute("cx", mx);
  document.getElementById("cbPoint").setAttribute("cy", py);

  const labelAnchor = mx > PW - PAD_R - 55 ? "end" : mx < PAD_L + 55 ? "start" : "middle";
  const labelDx = labelAnchor === "end" ? -10 : labelAnchor === "start" ? 10 : 0;
  const labelEl = document.getElementById("cbLabel");
  labelEl.setAttribute("x", mx + labelDx);
  labelEl.setAttribute("y", Math.max(PAD_T + 10, py - 10));
  labelEl.setAttribute("text-anchor", labelAnchor);
  labelEl.textContent = Math.round(catchRateOf(effort, syco)) + "%";

  const hit = document.getElementById("cbMarkerHit");
  hit.setAttribute("x", PAD_L); hit.setAttribute("y", 0);
  hit.setAttribute("width", PW - PAD_L - PAD_R); hit.setAttribute("height", PH);
}

/* ================= 描画 ================= */
function render() {
  const t = T();
  const a = assess(effort, syco);

  drawChart();

  const catchLabel = `${Math.round(a.catchRate)}%`;
  const blindLabel = `${Math.round(a.blind)}%`;
  document.getElementById("sumVal").textContent = catchLabel;
  document.getElementById("catchCardVal").textContent = catchLabel;
  document.getElementById("blindCardVal").textContent = blindLabel;
  document.getElementById("hint").textContent = t.hint(effort, syco, a);
  document.getElementById("scenarioBoxText").textContent = t.scenarios[a.band];

  document.getElementById("effortReadout").textContent = effort;
  document.getElementById("sycoReadout").textContent = syco;
  if (document.activeElement !== document.getElementById("effortSlider")) document.getElementById("effortSlider").value = effort;
  if (document.activeElement !== document.getElementById("effortNum")) document.getElementById("effortNum").value = effort;
  if (document.activeElement !== document.getElementById("sycoSlider")) document.getElementById("sycoSlider").value = syco;
  if (document.activeElement !== document.getElementById("sycoNum")) document.getElementById("sycoNum").value = syco;

  const scoreEl = document.getElementById("scoreVal");
  scoreEl.textContent = a.score;
  scoreEl.className = "score-val mono" + (a.score < 45 ? " danger" : a.score < 65 ? " warn" : "");
  document.getElementById("scoreComment").textContent = t.comments[a.band];

  DevSimLab.renderShare(document.getElementById("shareBtns"), {
    url: "https://sakuichi.github.io/dev-sim-lab/confirmation-bias/",
    shareText: t.shareText,
    shareHashtags: t.shareHashtags,
  });
}

/* ================= 静的コンテンツの言語適用 ================= */
function applyStaticText() {
  const t = T();
  document.title = t.docTitle;
  document.querySelector('meta[name="description"]').setAttribute("content", t.heroLead);
  document.getElementById("heroTitle").innerHTML = t.heroTitle;
  document.getElementById("heroLead").textContent = t.heroLead;
  document.getElementById("consoleLabel").textContent = t.consoleLabel;
  document.getElementById("sumLabel").textContent = t.sumLabel;
  document.getElementById("scoreLabel").textContent = t.scoreLabel;
  document.getElementById("effortName").textContent = t.effortName;
  document.getElementById("effortSub").textContent = t.effortSub;
  document.getElementById("sycoName").textContent = t.sycoName;
  document.getElementById("sycoSub").textContent = t.sycoSub;
  document.getElementById("numLabel1").textContent = t.numLabel;
  document.getElementById("numLabel2").textContent = t.numLabel;
  document.getElementById("effortSlider").setAttribute("aria-label", t.effortName);
  document.getElementById("sycoSlider").setAttribute("aria-label", t.sycoName);
  document.getElementById("numLabel1").setAttribute("aria-label", `${t.effortName} ${t.numLabel}`);
  document.getElementById("numLabel2").setAttribute("aria-label", `${t.sycoName} ${t.numLabel}`);
  document.getElementById("resetBtn").textContent = t.resetBtn;
  document.getElementById("scenarioBtn").textContent = t.scenarioBtn;
  document.getElementById("chartCaption").textContent = t.chartCaption;
  document.getElementById("chartNote").textContent = t.chartNote;
  document.getElementById("legendCurrent").textContent = t.legendCurrent;
  document.getElementById("legendNeutral").textContent = t.legendNeutral;
  document.getElementById("scenarioBoxTitle").textContent = t.scenarioBoxTitle;
  document.getElementById("catchCardLabel").textContent = t.catchCardLabel;
  document.getElementById("blindCardLabel").textContent = t.blindCardLabel;

  document.getElementById("secAdvice").innerHTML = `
    <h2>${t.adviceHeading}</h2>
    <p>${t.adviceIntro}</p>
    <ul>${t.adviceItems.map((i) => `<li>${i}</li>`).join("")}</ul>
  `;

  document.getElementById("booksH").textContent = t.booksH;
  const booksGrid = document.getElementById("booksGrid");
  booksGrid.innerHTML = "";
  t.books.forEach((b) => {
    const div = document.createElement("div");
    div.className = "book";
    div.innerHTML = `<span class="tag">${b.tag}</span><h3>${b.title}</h3><p>${b.desc}</p>
      <a href="${b.url}" target="_blank" rel="noopener nofollow sponsored">${b.link}</a>`;
    booksGrid.appendChild(div);
  });

  DevSimLab.renderRelated(document.getElementById("relatedGrid"), { exclude: "confirmation-bias" });
}

/* ================= イベント ================= */
document.getElementById("effortSlider").addEventListener("input", (e) => { effort = +e.target.value; render(); });
document.getElementById("effortNum").addEventListener("change", (e) => {
  effort = Math.min(EFFORT_MAX, Math.max(EFFORT_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("sycoSlider").addEventListener("input", (e) => { syco = +e.target.value; render(); });
document.getElementById("sycoNum").addEventListener("change", (e) => {
  syco = Math.min(SYCO_MAX, Math.max(SYCO_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("resetBtn").addEventListener("click", () => {
  effort = 30; syco = 70;
  document.getElementById("hint").textContent = "";
  render();
});
document.getElementById("scenarioBtn").addEventListener("click", () => {
  effort = 5; syco = 70;
  render();
  const a = assess(effort, syco);
  document.getElementById("hint").textContent = T().hintScenario(a);
});

/* ---- drag the marker directly on the chart ---- */
const cbChart = document.getElementById("cbChart");
function svgPoint(evt) {
  const pt = cbChart.createSVGPoint();
  pt.x = evt.clientX; pt.y = evt.clientY;
  return pt.matrixTransform(cbChart.getScreenCTM().inverse());
}
let dragging = false;
function startDrag(evt) {
  dragging = true;
  cbChart.setPointerCapture(evt.pointerId);
  document.getElementById("cbMarker").classList.add("dragging");
  document.getElementById("cbMarkerHit").classList.add("dragging");
  updateFromPointer(evt);
  evt.preventDefault();
}
function updateFromPointer(evt) {
  const p = svgPoint(evt);
  effort = eOfX(p.x);
  render();
}
document.getElementById("cbMarkerHit").addEventListener("pointerdown", startDrag);
cbChart.addEventListener("pointermove", (evt) => { if (dragging) updateFromPointer(evt); });
["pointerup", "pointercancel"].forEach((ev) => cbChart.addEventListener(ev, () => {
  dragging = false;
  document.getElementById("cbMarker").classList.remove("dragging");
  document.getElementById("cbMarkerHit").classList.remove("dragging");
}));

DevSimLab.initChrome({
  onRender: (lang, tone) => {
    LANG = lang; TONE = tone;
    applyStaticText();
    render();
  },
});
</script>
