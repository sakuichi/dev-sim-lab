"use strict";

/* ================= モデル =================
   「生存者バイアス」(生き残った人だけが目に入り、離脱した人は見えなくなる)と
   「根本的な帰属の誤り」(Ross, 1977 — 他者の失敗を状況要因よりも個人の資質のせいにしがちな
   認知バイアス)を組み合わせた簡易モデル。
   離脱を「指導方法によらない、配置段階で生じる基礎的なミスマッチ(一定)」と
   「指導方法の厳しさに応じて追加的に生じる離脱(変動)」に分けて示す。
   重要な留意点: このモデルは特定の個人の適性を判定するものではなく、
   組織・チーム全体の傾向を示す簡易的な集団レベルのモデルである。
   また「配置ミスマッチ」がゼロにできることを示すものでもない
   ——どのような指導方法であっても一定の離脱は生じ得る、という前提に立っている。
*/
const HARSH_MIN = 0, HARSH_MAX = 100;
const BASE_MIN = 0, BASE_MAX = 30;
const METHOD_MAX_RATE = 50; // 厳しさ100%のときに生じる、方法起因の追加離脱率(%)の上限目安

function methodDrivenRateOf(harshness) { return (harshness / 100) * METHOD_MAX_RATE; }
function scoreOf(harshness) { return Math.round(100 - methodDrivenRateOf(harshness)); }
function tierOf(harshness) { return Math.min(4, Math.floor(harshness / 20)); }
function assess(harshness, baseMismatch) {
  const methodRate = methodDrivenRateOf(harshness);
  const total = Math.min(100, methodRate + baseMismatch);
  const score = scoreOf(harshness);
  const band = tierOf(harshness);
  return { methodRate, baseMismatch, total, score, band };
}

},
en: {
  hint: (harsh, base, a) => `Harshness ${harsh}%. The rate at which "back in my day" managers get mass-produced. Method-driven attrition ~${a.methodRate.toFixed(1)}%. Sound familiar if 1-on-1s have quietly turned into lectures?`,
  hintScenario: (base, a) => `A workplace where "toughen up" gets said out loud. Method-driven attrition ~${a.methodRate.toFixed(1)}%. Exit interviews always land on "personal reasons" and nothing more specific.`,
  comments: [
    "1-on-1s are actually 1-on-1s. A small miracle.",
    "\"It used to be rough around here\" is at least spoken in the past tense now.",
    "\"Kids these days\" is becoming a regular phrase. That vibe.",
    "\"Why I quit\" blog posts are getting a little too frequent.",
    "New hires get told to \"stick it out for three years\" on day one. Nobody makes it to year two.",
  ],
},
};

let LANG = "ja";
let TONE = "std";
const T = () => (TONE === "dev" ? { ...I18N[LANG], ...DEV[LANG] } : I18N[LANG]);

let harshness = 50;
let baseMismatch = 15;

/* ================= チャート描画 ================= */
const NS = "http://www.w3.org/2000/svg";
const el = (tag, attrs) => {
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
};
const PW = 640, PH = 240, PAD_L = 40, PAD_R = 16, PAD_T = 30, PAD_B = 42;
const Y_MAX = 60;
const xOf = (h) => PAD_L + ((h - HARSH_MIN) / (HARSH_MAX - HARSH_MIN)) * (PW - PAD_L - PAD_R);
const hOfX = (x) => {
  const frac = (x - PAD_L) / (PW - PAD_L - PAD_R);
  const raw = HARSH_MIN + frac * (HARSH_MAX - HARSH_MIN);
  return Math.min(HARSH_MAX, Math.max(HARSH_MIN, Math.round(raw / 5) * 5));
};
const yOf = (v) => PAD_T + (1 - Math.min(v, Y_MAX) / Y_MAX) * (PH - PAD_T - PAD_B);

function drawChart() {
  const t = T();
  const gridLayer = document.getElementById("sbGridLayer");
  gridLayer.innerHTML = "";
  [0, 12, 24, 36, 48, 60].forEach((v) => {
    const y = yOf(v);
    gridLayer.appendChild(el("line", { class: "sb-grid", x1: PAD_L, y1: y, x2: PW - PAD_R, y2: y }));
    const label = el("text", { class: "sb-axis-label", x: PAD_L - 6, y: y + 3, "text-anchor": "end" });
    label.textContent = v + "%";
    gridLayer.appendChild(label);
  });
  for (let h = HARSH_MIN; h <= HARSH_MAX; h += 20) {
    const x = xOf(h);
    gridLayer.appendChild(el("line", { class: "sb-tick", x1: x, y1: PAD_T, x2: x, y2: PH - PAD_B }));
    const label = el("text", { class: "sb-axis-label", x, y: PH - PAD_B + 14, "text-anchor": h === HARSH_MIN ? "start" : h === HARSH_MAX ? "end" : "middle" });
    label.textContent = h + "%";
    gridLayer.appendChild(label);
  }
  const yTitle = el("text", { class: "sb-axis-title", x: 2, y: 12 });
  yTitle.textContent = t.sbYTitle;
  gridLayer.appendChild(yTitle);
  const xTitle = el("text", { class: "sb-axis-title", x: PW / 2, y: PH - 4, "text-anchor": "middle" });
  xTitle.textContent = t.sbXTitle;
  gridLayer.appendChild(xTitle);

  const methodPts = [], basePts = [];
  for (let h = HARSH_MIN; h <= HARSH_MAX; h += 2) {
    methodPts.push(`${xOf(h)},${yOf(methodDrivenRateOf(h))}`);
    basePts.push(`${xOf(h)},${yOf(baseMismatch)}`);
  }
  document.getElementById("sbLineMethod").setAttribute("d", "M " + methodPts.join(" L "));
  document.getElementById("sbLineBase").setAttribute("d", "M " + basePts.join(" L "));

  const dotsLayer = document.getElementById("sbDotsLayer");
  dotsLayer.innerHTML = "";
  for (let h = HARSH_MIN; h <= HARSH_MAX; h += 20) {
    dotsLayer.appendChild(el("circle", { class: "sb-dot", cx: xOf(h), cy: yOf(methodDrivenRateOf(h)), fill: "var(--alert)" }));
  }

  const mx = xOf(harshness);
  const marker = document.getElementById("sbMarker");
  marker.setAttribute("x1", mx); marker.setAttribute("x2", mx);
  marker.setAttribute("y1", PAD_T); marker.setAttribute("y2", PH - PAD_B);

  const hit = document.getElementById("sbMarkerHit");
  hit.setAttribute("x", PAD_L); hit.setAttribute("y", 0);
  hit.setAttribute("width", PW - PAD_L - PAD_R); hit.setAttribute("height", PH);
}

/* ================= 描画 ================= */
function render() {
  const t = T();
  const a = assess(harshness, baseMismatch);

  drawChart();

  document.getElementById("sumVal").textContent = `${a.methodRate.toFixed(1)}%`;
  document.getElementById("methodCardVal").textContent = `${a.methodRate.toFixed(1)}%`;
  document.getElementById("baseCardVal").textContent = `${baseMismatch}%`;
  document.getElementById("hint").textContent = t.hint(harshness, baseMismatch, a);

  document.getElementById("harshReadout").textContent = harshness + "%";
  document.getElementById("baseReadout").textContent = baseMismatch + "%";
  if (document.activeElement !== document.getElementById("harshSlider")) document.getElementById("harshSlider").value = harshness;
  if (document.activeElement !== document.getElementById("harshNum")) document.getElementById("harshNum").value = harshness;
  if (document.activeElement !== document.getElementById("baseSlider")) document.getElementById("baseSlider").value = baseMismatch;
  if (document.activeElement !== document.getElementById("baseNum2")) document.getElementById("baseNum2").value = baseMismatch;

  const scoreEl = document.getElementById("scoreVal");
  scoreEl.textContent = a.score;
  scoreEl.className = "score-val mono" + (a.score < 60 ? " danger" : a.score < 80 ? " warn" : "");
  document.getElementById("scoreComment").textContent = t.comments[a.band];

  DevSimLab.renderShare(document.getElementById("shareBtns"), {
    url: "https://sakuichi.github.io/dev-sim-lab/survivorship-bias/",
    shareText: t.shareText,
    shareHashtags: t.shareHashtags,
  });
}

/* ================= 静的コンテンツの言語適用 ================= */
function applyStaticText() {
  const t = T();
  document.title = t.docTitle;
  document.querySelector('meta[name="description"]').setAttribute("content", t.heroLead);
  document.getElementById("heroTitle").innerHTML = t.heroTitle;
  document.getElementById("heroLead").textContent = t.heroLead;
  document.getElementById("disclaimer").innerHTML = t.disclaimer;
  document.getElementById("consoleLabel").textContent = t.consoleLabel;
  document.getElementById("sumLabel").textContent = t.sumLabel;
  document.getElementById("scoreLabel").textContent = t.scoreLabel;
  document.getElementById("harshName").textContent = t.harshName;
  document.getElementById("harshSub").textContent = t.harshSub;
  document.getElementById("baseName").textContent = t.baseName;
  document.getElementById("baseSub").textContent = t.baseSub;
  document.getElementById("numLabel1").textContent = t.numLabel;
  document.getElementById("numLabel2").textContent = t.numLabel;
  document.getElementById("harshSlider").setAttribute("aria-label", t.harshName);
  document.getElementById("baseSlider").setAttribute("aria-label", t.baseName);
  document.getElementById("numLabel1").setAttribute("aria-label", `${t.harshName} ${t.numLabel}`);
  document.getElementById("numLabel2").setAttribute("aria-label", `${t.baseName} ${t.numLabel}`);
  document.getElementById("resetBtn").textContent = t.resetBtn;
  document.getElementById("scenarioBtn").textContent = t.scenarioBtn;
  document.getElementById("chartCaption").textContent = t.chartCaption;
  document.getElementById("chartNote").textContent = t.chartNote;
  document.getElementById("legendMethod").textContent = t.legendMethod;
  document.getElementById("legendBase").textContent = t.legendBase;
  document.getElementById("methodCardLabel").textContent = t.methodCardLabel;
  document.getElementById("baseCardLabel").textContent = t.baseCardLabel;

  document.getElementById("secAdvice").innerHTML = `
    <h2>${t.adviceHeading}</h2>
    <p>${t.adviceIntro}</p>
    <ul>${t.adviceItems.map((i) => `<li>${i}</li>`).join("")}</ul>
  `;

  document.getElementById("booksH").textContent = t.booksH;
  const booksGrid = document.getElementById("booksGrid");
  booksGrid.innerHTML = "";
  t.books.forEach((b) => {
    const div = document.createElement("div");
    div.className = "book";
    div.innerHTML = `<span class="tag">${b.tag}</span><h3>${b.title}</h3><p>${b.desc}</p>
      <a href="${b.url}" target="_blank" rel="noopener nofollow sponsored">${b.link}</a>`;
    booksGrid.appendChild(div);
  });

  DevSimLab.renderRelated(document.getElementById("relatedGrid"), { exclude: "survivorship-bias" });
}

/* ================= イベント ================= */
document.getElementById("harshSlider").addEventListener("input", (e) => { harshness = +e.target.value; render(); });
document.getElementById("harshNum").addEventListener("change", (e) => {
  harshness = Math.min(HARSH_MAX, Math.max(HARSH_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("baseSlider").addEventListener("input", (e) => { baseMismatch = +e.target.value; render(); });
document.getElementById("baseNum2").addEventListener("change", (e) => {
  baseMismatch = Math.min(BASE_MAX, Math.max(BASE_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("resetBtn").addEventListener("click", () => {
  harshness = 50; baseMismatch = 15;
  document.getElementById("hint").textContent = "";
  render();
});
document.getElementById("scenarioBtn").addEventListener("click", () => {
  harshness = 100;
  render();
  const a = assess(harshness, baseMismatch);
  document.getElementById("hint").textContent = T().hintScenario(baseMismatch, a);
});

/* ---- drag the marker directly on the chart ---- */
const sbChart = document.getElementById("sbChart");
function svgPoint(evt) {
  const pt = sbChart.createSVGPoint();
  pt.x = evt.clientX; pt.y = evt.clientY;
  return pt.matrixTransform(sbChart.getScreenCTM().inverse());
}
let dragging = false;
function startDrag(evt) {
  dragging = true;
  sbChart.setPointerCapture(evt.pointerId);
  document.getElementById("sbMarker").classList.add("dragging");
  document.getElementById("sbMarkerHit").classList.add("dragging");
  updateFromPointer(evt);
  evt.preventDefault();
}
function updateFromPointer(evt) {
  const p = svgPoint(evt);
  harshness = hOfX(p.x);
  render();
}
document.getElementById("sbMarkerHit").addEventListener("pointerdown", startDrag);
sbChart.addEventListener("pointermove", (evt) => { if (dragging) updateFromPointer(evt); });
["pointerup", "pointercancel"].forEach((ev) => sbChart.addEventListener(ev, () => {
  dragging = false;
  document.getElementById("sbMarker").classList.remove("dragging");
  document.getElementById("sbMarkerHit").classList.remove("dragging");
}));

DevSimLab.initChrome({
  onRender: (lang, tone) => {
    LANG = lang; TONE = tone;
    applyStaticText();
    render();
  },
});
</script>
</body>
