"use strict";

/* ================= モデル =================
   長期間の中断が生む2つの異なるコストを、それぞれ別のメカニズムとして表現する簡易モデル。
   1) 思い出し工数(reacquisition): プログラム理解研究における「メンタルモデルの再構築コスト」
      (von Mayrhauser & Vans, 1994の統合メタモデルなど)を参考にした、中断期間とともに
      頭打ちになりながら増えていく飽和カーブ。
   2) 作業漏れ・手順ミスのリスク(omission risk): 認知心理学の「展望的記憶」研究
      (Einstein & McDanielほか)を参考にした、同様の飽和カーブ。展望的記憶はチェックリスト等の
      外部記憶補助で大きく改善することが知られているため、引き継ぎ資料の充実度による軽減幅を
      思い出し工数より大きく設定している。
   いずれも特定の実証研究の数値を再現したものではなく、両分野の定性的な知見(飽和的に増加する・
   対策で軽減される)を可視化するための簡易モデルであることに注意。
*/
const PAUSE_MIN = 0, PAUSE_MAX = 12;
const DOC_MIN = 0, DOC_MAX = 100;
const MAX_REACQ = 100;
const MAX_RISK = 90;
const K_REACQ = 4;
const K_RISK = 3;
const MIT_REACQ = 0.6;
const MIT_RISK = 0.85;

function reacqPctOf(pauseMonths, docQuality) {
  const raw = MAX_REACQ * (1 - Math.exp(-pauseMonths / K_REACQ));
  return raw * (1 - (docQuality / 100) * MIT_REACQ);
}
function riskPctOf(pauseMonths, docQuality) {
  const raw = MAX_RISK * (1 - Math.exp(-pauseMonths / K_RISK));
  return raw * (1 - (docQuality / 100) * MIT_RISK);
}
function scoreOf(pauseMonths, docQuality) {
  const avg = (reacqPctOf(pauseMonths, docQuality) + riskPctOf(pauseMonths, docQuality)) / 2;
  return Math.max(0, Math.min(100, Math.round(100 - avg)));
}
function riskLevelOf(riskPct) {
  return riskPct >= 60 ? 3 : riskPct >= 35 ? 2 : riskPct >= 15 ? 1 : 0;
}
function assess(pauseMonths, docQuality) {
  const reacq = reacqPctOf(pauseMonths, docQuality);
  const risk = riskPctOf(pauseMonths, docQuality);
  const score = scoreOf(pauseMonths, docQuality);
  const band = score >= 85 ? 0 : score >= 65 ? 1 : score >= 45 ? 2 : score >= 25 ? 3 : 4;
  return { reacq, risk, score, band, riskLevel: riskLevelOf(risk) };
}

    "「一旦、最初から仕様を洗い出しましょうか」という提案が飛び出す状態。",
  ],
},
en: {
  hint: (pause, doc, a) => `Shelved ${pause} months. Docs at ${doc}%. Reacquisition +${Math.round(a.reacq)}%. Day one back starts with "wait, what was this again." Omission risk ${Math.round(a.risk)}% (${T().riskLevels[a.riskLevel]}).`,
  hintScenario: (a) => `Six months, zero documentation. Day one back starts with three hours of digging through old Slack threads. Reacquisition +${Math.round(a.reacq)}%. Omission risk ${Math.round(a.risk)}%.`,
  comments: [
    "\"Alright, picking up where we left off\" — and you actually can. Rare and precious.",
    "Still fresh enough. A couple passes through the git log and you're fine.",
    "\"Wait, who decided this?\" starts becoming a regular refrain.",
    "You spend more time digging through old meeting notes than actually coding.",
    "Someone suggests \"let's just re-gather the requirements from scratch.\" That's where you are.",
  ],
},
};

let LANG = "ja";
let TONE = "std";
const T = () => (TONE === "dev" ? { ...I18N[LANG], ...DEV[LANG] } : I18N[LANG]);

let pauseMonths = 3;
let docQuality = 30;

/* ================= チャート描画 ================= */
const NS = "http://www.w3.org/2000/svg";
const el = (tag, attrs) => {
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
};
const PW = 640, PH = 240, PAD_L = 40, PAD_R = 16, PAD_T = 30, PAD_B = 42;
const Y_MAX = 100;
const xOf = (m) => PAD_L + ((m - PAUSE_MIN) / (PAUSE_MAX - PAUSE_MIN)) * (PW - PAD_L - PAD_R);
const mOfX = (x) => {
  const frac = (x - PAD_L) / (PW - PAD_L - PAD_R);
  const raw = PAUSE_MIN + frac * (PAUSE_MAX - PAUSE_MIN);
  return Math.min(PAUSE_MAX, Math.max(PAUSE_MIN, Math.round(raw)));
};
const yOf = (v) => PAD_T + (1 - Math.min(v, Y_MAX) / Y_MAX) * (PH - PAD_T - PAD_B);

function drawChart() {
  const t = T();
  const gridLayer = document.getElementById("pcGridLayer");
  gridLayer.innerHTML = "";
  [0, 20, 40, 60, 80, 100].forEach((v) => {
    const y = yOf(v);
    gridLayer.appendChild(el("line", { class: "pc-grid", x1: PAD_L, y1: y, x2: PW - PAD_R, y2: y }));
    const label = el("text", { class: "pc-axis-label", x: PAD_L - 6, y: y + 3, "text-anchor": "end" });
    label.textContent = v + "%";
    gridLayer.appendChild(label);
  });
  for (let m = PAUSE_MIN; m <= PAUSE_MAX; m += 2) {
    const x = xOf(m);
    gridLayer.appendChild(el("line", { class: "pc-tick", x1: x, y1: PAD_T, x2: x, y2: PH - PAD_B }));
    const label = el("text", { class: "pc-axis-label", x, y: PH - PAD_B + 14, "text-anchor": m === PAUSE_MIN ? "start" : m === PAUSE_MAX ? "end" : "middle" });
    label.textContent = String(m);
    gridLayer.appendChild(label);
  }
  const yTitle = el("text", { class: "pc-axis-title", x: 2, y: 12 });
  yTitle.textContent = t.pcYTitle;
  gridLayer.appendChild(yTitle);
  const xTitle = el("text", { class: "pc-axis-title", x: PW / 2, y: PH - 4, "text-anchor": "middle" });
  xTitle.textContent = t.pcXTitle;
  gridLayer.appendChild(xTitle);

  const reacqPts = [], riskPts = [];
  for (let m = PAUSE_MIN; m <= PAUSE_MAX; m += 0.25) {
    reacqPts.push(`${xOf(m)},${yOf(reacqPctOf(m, docQuality))}`);
    riskPts.push(`${xOf(m)},${yOf(riskPctOf(m, docQuality))}`);
  }
  document.getElementById("pcLineReacq").setAttribute("d", "M " + reacqPts.join(" L "));
  document.getElementById("pcLineRisk").setAttribute("d", "M " + riskPts.join(" L "));

  const dotsLayer = document.getElementById("pcDotsLayer");
  dotsLayer.innerHTML = "";
  for (let m = PAUSE_MIN; m <= PAUSE_MAX; m += 2) {
    dotsLayer.appendChild(el("circle", { class: "pc-dot", cx: xOf(m), cy: yOf(reacqPctOf(m, docQuality)), fill: "var(--d)" }));
    dotsLayer.appendChild(el("circle", { class: "pc-dot", cx: xOf(m), cy: yOf(riskPctOf(m, docQuality)), fill: "var(--alert)" }));
  }

  const mx = xOf(pauseMonths);
  const marker = document.getElementById("pcMarker");
  marker.setAttribute("x1", mx); marker.setAttribute("x2", mx);
  marker.setAttribute("y1", PAD_T); marker.setAttribute("y2", PH - PAD_B);

  const hit = document.getElementById("pcMarkerHit");
  hit.setAttribute("x", PAD_L); hit.setAttribute("y", 0);
  hit.setAttribute("width", PW - PAD_L - PAD_R); hit.setAttribute("height", PH);
}

/* ================= 描画 ================= */
function render() {
  const t = T();
  const a = assess(pauseMonths, docQuality);

  drawChart();

  document.getElementById("sumVal").textContent = `+${Math.round(a.reacq)}%`;
  document.getElementById("reacqCardVal").textContent = `+${Math.round(a.reacq)}%`;
  document.getElementById("riskCardVal").textContent = `${Math.round(a.risk)}% (${t.riskLevels[a.riskLevel]})`;
  document.getElementById("hint").textContent = t.hint(pauseMonths, docQuality, a);

  document.getElementById("pauseReadout").textContent = pauseMonths;
  document.getElementById("docReadout").textContent = docQuality + "%";
  if (document.activeElement !== document.getElementById("pauseSlider")) document.getElementById("pauseSlider").value = pauseMonths;
  if (document.activeElement !== document.getElementById("pauseNum")) document.getElementById("pauseNum").value = pauseMonths;
  if (document.activeElement !== document.getElementById("docSlider")) document.getElementById("docSlider").value = docQuality;
  if (document.activeElement !== document.getElementById("docNum")) document.getElementById("docNum").value = docQuality;

  const scoreEl = document.getElementById("scoreVal");
  scoreEl.textContent = a.score;
  scoreEl.className = "score-val mono" + (a.score < 45 ? " danger" : a.score < 65 ? " warn" : "");
  document.getElementById("scoreComment").textContent = t.comments[a.band];

  DevSimLab.renderShare(document.getElementById("shareBtns"), {
    url: "https://sakuichi.github.io/dev-sim-lab/pause-cost/",
    shareText: t.shareText,
    shareHashtags: t.shareHashtags,
  });
}

/* ================= 静的コンテンツの言語適用 ================= */
function applyStaticText() {
  const t = T();
  document.title = t.docTitle;
  document.querySelector('meta[name="description"]').setAttribute("content", t.heroLead);
  document.getElementById("heroTitle").innerHTML = t.heroTitle;
  document.getElementById("heroLead").textContent = t.heroLead;
  document.getElementById("consoleLabel").textContent = t.consoleLabel;
  document.getElementById("sumLabel").textContent = t.sumLabel;
  document.getElementById("scoreLabel").textContent = t.scoreLabel;
  document.getElementById("pauseName").textContent = t.pauseName;
  document.getElementById("pauseSub").textContent = t.pauseSub;
  document.getElementById("docName").textContent = t.docName;
  document.getElementById("docSub").textContent = t.docSub;
  document.getElementById("numLabel1").textContent = t.numLabel;
  document.getElementById("numLabel2").textContent = t.numLabel;
  document.getElementById("pauseSlider").setAttribute("aria-label", t.pauseName);
  document.getElementById("docSlider").setAttribute("aria-label", t.docName);
  document.getElementById("numLabel1").setAttribute("aria-label", `${t.pauseName} ${t.numLabel}`);
  document.getElementById("numLabel2").setAttribute("aria-label", `${t.docName} ${t.numLabel}`);
  document.getElementById("resetBtn").textContent = t.resetBtn;
  document.getElementById("scenarioBtn").textContent = t.scenarioBtn;
  document.getElementById("chartCaption").textContent = t.chartCaption;
  document.getElementById("chartNote").textContent = t.chartNote;
  document.getElementById("legendReacq").textContent = t.legendReacq;
  document.getElementById("legendRisk").textContent = t.legendRisk;
  document.getElementById("reacqCardLabel").textContent = t.reacqCardLabel;
  document.getElementById("riskCardLabel").textContent = t.riskCardLabel;

  document.getElementById("secAdvice").innerHTML = `
    <h2>${t.adviceHeading}</h2>
    <p>${t.adviceIntro}</p>
    <ul>${t.adviceItems.map((i) => `<li>${i}</li>`).join("")}</ul>
  `;

  document.getElementById("booksH").textContent = t.booksH;
  const booksGrid = document.getElementById("booksGrid");
  booksGrid.innerHTML = "";
  t.books.forEach((b) => {
    const div = document.createElement("div");
    div.className = "book";
    div.innerHTML = `<span class="tag">${b.tag}</span><h3>${b.title}</h3><p>${b.desc}</p>
      <a href="${b.url}" target="_blank" rel="noopener nofollow sponsored">${b.link}</a>`;
    booksGrid.appendChild(div);
  });

  DevSimLab.renderRelated(document.getElementById("relatedGrid"), { exclude: "pause-cost" });
}

/* ================= イベント ================= */
document.getElementById("pauseSlider").addEventListener("input", (e) => { pauseMonths = +e.target.value; render(); });
document.getElementById("pauseNum").addEventListener("change", (e) => {
  pauseMonths = Math.min(PAUSE_MAX, Math.max(PAUSE_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("docSlider").addEventListener("input", (e) => { docQuality = +e.target.value; render(); });
document.getElementById("docNum").addEventListener("change", (e) => {
  docQuality = Math.min(DOC_MAX, Math.max(DOC_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("resetBtn").addEventListener("click", () => {
  pauseMonths = 3; docQuality = 30;
  document.getElementById("hint").textContent = "";
  render();
});
document.getElementById("scenarioBtn").addEventListener("click", () => {
  pauseMonths = 6; docQuality = 0;
  render();
  const a = assess(pauseMonths, docQuality);
  document.getElementById("hint").textContent = T().hintScenario(a);
});

/* ---- drag the marker directly on the chart ---- */
const pcChart = document.getElementById("pcChart");
function svgPoint(evt) {
  const pt = pcChart.createSVGPoint();
  pt.x = evt.clientX; pt.y = evt.clientY;
  return pt.matrixTransform(pcChart.getScreenCTM().inverse());
}
let dragging = false;
function startDrag(evt) {
  dragging = true;
  pcChart.setPointerCapture(evt.pointerId);
  document.getElementById("pcMarker").classList.add("dragging");
  document.getElementById("pcMarkerHit").classList.add("dragging");
  updateFromPointer(evt);
  evt.preventDefault();
}
function updateFromPointer(evt) {
  const p = svgPoint(evt);
  pauseMonths = mOfX(p.x);
  render();
}
document.getElementById("pcMarkerHit").addEventListener("pointerdown", startDrag);
pcChart.addEventListener("pointermove", (evt) => { if (dragging) updateFromPointer(evt); });
["pointerup", "pointercancel"].forEach((ev) => pcChart.addEventListener(ev, () => {
  dragging = false;
  document.getElementById("pcMarker").classList.remove("dragging");
  document.getElementById("pcMarkerHit").classList.remove("dragging");
}));

DevSimLab.initChrome({
  onRender: (lang, tone) => {
    LANG = lang; TONE = tone;
    applyStaticText();
    render();
  },
});
</script>
</body>
