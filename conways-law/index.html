"use strict";

/* ================= モデル =================
   「コンウェイの法則」——Melvin Conwayが"How Do Committees Invent?"
   (Datamation, 1968年4月)で示した観察:
   「システムを設計する組織は、その組織のコミュニケーション構造を
   コピーした設計を生み出すよう制約される」。
   (この論文はHarvard Business Reviewに「主張の証明がない」として却下され、
   Datamationに掲載された——後年、実証が追いつく)
   実証1: ハーバード・ビジネス・スクールのミラーリング仮説研究
   (MacCormack, Rusnak, Baldwin)——疎結合な組織は有意にモジュラーな製品を作る。
   実証2: Microsoft Research (Nagappan, Murphy, Basili, 2008, Windows Vista)——
   組織構造のメトリクスが、コードのメトリクス(churn・複雑度・カバレッジ)より
   高い精度(精度・再現率85%)でバグの発生しやすさを予測した。
   モデル: 部門内で完結する機能の品質はサイロ化の影響が小さい(ほぼ水平)が、
   部門横断が必要な機能の品質はサイロ化で大きく劣化する——組織の境界が
   そのまま製品の亀裂になる、という単純化した独自モデル。数値は演出であり
   実証値の再現ではない。
*/
const SILO_MIN = 0, SILO_MAX = 100;
const CROSS_MIN = 10, CROSS_MAX = 70;

function withinQualityOf(silo) { return 88 - silo * 0.08; }
function crossQualityOf(silo) { return 85 - silo * 0.6; }
function overallOf(silo, crossNeed) {
  return withinQualityOf(silo) * (1 - crossNeed / 100) + crossQualityOf(silo) * (crossNeed / 100);
}
function scoreOf(silo, crossNeed) { return Math.round(overallOf(silo, crossNeed)); }
function tierOf(silo, crossNeed) {
  const o = overallOf(silo, crossNeed);
  if (o >= 80) return 4;
  if (o >= 70) return 3;
  if (o >= 60) return 2;
  if (o >= 50) return 1;
  return 0;
}
function boxTierOf(silo) { return Math.min(4, Math.floor(silo / 20)); }
function assess(silo, crossNeed) {
  const within = withinQualityOf(silo);
  const cross = crossQualityOf(silo);
  const overall = overallOf(silo, crossNeed);
  const score = scoreOf(silo, crossNeed);
  const band = tierOf(silo, crossNeed);
  const box = boxTierOf(silo);
  return { within, cross, overall, score, band, box };
}

/* ================= 開発者モード上書き辞書 ================= */
const DEV = {
ja: {
  hint: (silo, crossNeed, a) => `分断度${silo}。APIの設計書より先に、他部門との調整議事録が必要になる。横断機能の品質約${a.cross.toFixed(0)}%。`,
  hintScenario: (crossNeed, a) => `マイクロサービスの境界図を眺めていたら、去年の組織図と完全に一致した。誰も意図していない。それがコンウェイの法則。横断品質約${a.cross.toFixed(0)}%。`,
  comments: [
    "システム構成図に部署名を重ねたら、1ピクセルもずれなかった。アーキテクトの敗北ではない。法則の勝利。",
    "「その機能はうちの管轄じゃないです」がAPIのエラーメッセージより先に返ってくる。",
    "部門間の連携機能のバグチケットだけ、なぜか担当者欄が空欄のまま熟成されていく。",
    "組織変更の資料に「システムへの影響」の章がある。この会社は法則を知っている。",
    "ユーザーが「どこの部門が作ったか」を一度も意識せずに使い終えた。組織図が製品から消えた日。",
  ],
},
en: {
  hint: (silo, crossNeed, a) => `Silo ${silo}. The API design doc now requires cross-department meeting minutes as a prerequisite. Cross-team quality ~${a.cross.toFixed(0)}%.`,
  hintScenario: (crossNeed, a) => `Stared at the microservice boundary diagram and realized it exactly matches last year's org chart. Nobody planned that. That's Conway's law. Cross-team quality ~${a.cross.toFixed(0)}%.`,
  comments: [
    "Overlaid the org chart on the system diagram: not one pixel off. Not the architect's defeat — the law's victory.",
    "\"That feature isn't our jurisdiction\" returns faster than the API's error message.",
    "Bug tickets for cross-team features age gracefully with the assignee field permanently blank.",
    "The reorg proposal includes a \"system impact\" chapter. This company knows the law.",
    "A user finished the whole flow without once sensing which team built what. The day the org chart vanished from the product.",
  ],
},
};

let LANG = "ja";
let TONE = "std";
const T = () => (TONE === "dev" ? { ...I18N[LANG], ...DEV[LANG] } : I18N[LANG]);

let silo = 60;
let crossNeed = 40;

/* ================= チャート描画 ================= */
const NS = "http://www.w3.org/2000/svg";
const el = (tag, attrs) => {
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
};
const PW = 640, PH = 240, PAD_L = 40, PAD_R = 16, PAD_T = 30, PAD_B = 42;
const Y_MAX = 100;
const xOf = (v) => PAD_L + ((v - SILO_MIN) / (SILO_MAX - SILO_MIN)) * (PW - PAD_L - PAD_R);
const sOfX = (x) => {
  const frac = (x - PAD_L) / (PW - PAD_L - PAD_R);
  const raw = SILO_MIN + frac * (SILO_MAX - SILO_MIN);
  return Math.min(SILO_MAX, Math.max(SILO_MIN, Math.round(raw / 5) * 5));
};
const yOf = (v) => PAD_T + (1 - Math.min(v, Y_MAX) / Y_MAX) * (PH - PAD_T - PAD_B);

function drawChart() {
  const t = T();
  const gridLayer = document.getElementById("cwGridLayer");
  gridLayer.innerHTML = "";
  [0, 20, 40, 60, 80, 100].forEach((v) => {
    const y = yOf(v);
    gridLayer.appendChild(el("line", { class: "cw-grid", x1: PAD_L, y1: y, x2: PW - PAD_R, y2: y }));
    const label = el("text", { class: "cw-axis-label", x: PAD_L - 6, y: y + 3, "text-anchor": "end" });
    label.textContent = v + "%";
    gridLayer.appendChild(label);
  });
  for (let v = SILO_MIN; v <= SILO_MAX; v += 20) {
    const x = xOf(v);
    gridLayer.appendChild(el("line", { class: "cw-tick", x1: x, y1: PAD_T, x2: x, y2: PH - PAD_B }));
    const label = el("text", { class: "cw-axis-label", x, y: PH - PAD_B + 14, "text-anchor": v === SILO_MIN ? "start" : v === SILO_MAX ? "end" : "middle" });
    label.textContent = v;
    gridLayer.appendChild(label);
  }
  const yTitle = el("text", { class: "cw-axis-title", x: 2, y: 12 });
  yTitle.textContent = t.cwYTitle;
  gridLayer.appendChild(yTitle);
  const xTitle = el("text", { class: "cw-axis-title", x: PW / 2, y: PH - 4, "text-anchor": "middle" });
  xTitle.textContent = t.cwXTitle;
  gridLayer.appendChild(xTitle);

  const withinPts = [], crossPts = [];
  for (let v = SILO_MIN; v <= SILO_MAX; v += 2) {
    withinPts.push(`${xOf(v)},${yOf(withinQualityOf(v))}`);
    crossPts.push(`${xOf(v)},${yOf(crossQualityOf(v))}`);
  }
  document.getElementById("cwLineWithin").setAttribute("d", "M " + withinPts.join(" L "));
  document.getElementById("cwLineCross").setAttribute("d", "M " + crossPts.join(" L "));

  const dotsLayer = document.getElementById("cwDotsLayer");
  dotsLayer.innerHTML = "";
  for (let v = SILO_MIN; v <= SILO_MAX; v += 20) {
    dotsLayer.appendChild(el("circle", { class: "cw-dot", cx: xOf(v), cy: yOf(withinQualityOf(v)), fill: "var(--q)" }));
    dotsLayer.appendChild(el("circle", { class: "cw-dot", cx: xOf(v), cy: yOf(crossQualityOf(v)), fill: "var(--alert)" }));
  }

  const mx = xOf(silo);
  const marker = document.getElementById("cwMarker");
  marker.setAttribute("x1", mx); marker.setAttribute("x2", mx);
  marker.setAttribute("y1", PAD_T); marker.setAttribute("y2", PH - PAD_B);

  const withinY = yOf(withinQualityOf(silo));
  const crossY = yOf(crossQualityOf(silo));
  document.getElementById("cwPointWithin").setAttribute("cx", mx);
  document.getElementById("cwPointWithin").setAttribute("cy", withinY);
  document.getElementById("cwPointCross").setAttribute("cx", mx);
  document.getElementById("cwPointCross").setAttribute("cy", crossY);

  const labelAnchor = mx > PW - PAD_R - 55 ? "end" : mx < PAD_L + 55 ? "start" : "middle";
  const labelDx = labelAnchor === "end" ? -10 : labelAnchor === "start" ? 10 : 0;
  const clampY = (y) => Math.max(PAD_T + 10, Math.min(PH - PAD_B - 4, y));
  const withinIsHigher = withinY <= crossY;

  const labelWithin = document.getElementById("cwLabelWithin");
  labelWithin.setAttribute("x", mx + labelDx);
  labelWithin.setAttribute("y", clampY(withinIsHigher ? withinY - 10 : withinY + 20));
  labelWithin.setAttribute("text-anchor", labelAnchor);
  labelWithin.textContent = Math.round(withinQualityOf(silo)) + "%";

  const labelCross = document.getElementById("cwLabelCross");
  labelCross.setAttribute("x", mx + labelDx);
  labelCross.setAttribute("y", clampY(withinIsHigher ? crossY + 20 : crossY - 10));
  labelCross.setAttribute("text-anchor", labelAnchor);
  labelCross.textContent = Math.round(crossQualityOf(silo)) + "%";

  const hit = document.getElementById("cwMarkerHit");
  hit.setAttribute("x", PAD_L); hit.setAttribute("y", 0);
  hit.setAttribute("width", PW - PAD_L - PAD_R); hit.setAttribute("height", PH);
}

/* ================= 描画 ================= */
function render() {
  const t = T();
  const a = assess(silo, crossNeed);

  drawChart();

  document.getElementById("sumVal").textContent = `${Math.round(a.cross)}%`;
  document.getElementById("withinCardVal").textContent = `${Math.round(a.within)}%`;
  document.getElementById("crossCardVal").textContent = `${Math.round(a.cross)}%`;
  document.getElementById("hint").textContent = t.hint(silo, crossNeed, a);
  document.getElementById("scenarioBoxText").textContent = t.scenarios[a.box];

  document.getElementById("siloReadout").textContent = silo;
  document.getElementById("crossReadout").textContent = crossNeed + "%";
  if (document.activeElement !== document.getElementById("siloSlider")) document.getElementById("siloSlider").value = silo;
  if (document.activeElement !== document.getElementById("siloNum")) document.getElementById("siloNum").value = silo;
  if (document.activeElement !== document.getElementById("crossSlider")) document.getElementById("crossSlider").value = crossNeed;
  if (document.activeElement !== document.getElementById("crossNum")) document.getElementById("crossNum").value = crossNeed;

  const scoreEl = document.getElementById("scoreVal");
  scoreEl.textContent = a.score;
  scoreEl.className = "score-val mono" + (a.score < 60 ? " danger" : a.score < 75 ? " warn" : "");
  document.getElementById("scoreComment").textContent = t.comments[a.band];

  DevSimLab.renderShare(document.getElementById("shareBtns"), {
    url: "https://sakuichi.github.io/dev-sim-lab/conways-law/",
    shareText: t.shareText,
    shareHashtags: t.shareHashtags,
  });
}

/* ================= 静的コンテンツの言語適用 ================= */
function applyStaticText() {
  const t = T();
  document.title = t.docTitle;
  document.querySelector('meta[name="description"]').setAttribute("content", t.heroLead);
  document.getElementById("heroTitle").innerHTML = t.heroTitle;
  document.getElementById("heroLead").textContent = t.heroLead;
  document.getElementById("consoleLabel").textContent = t.consoleLabel;
  document.getElementById("sumLabel").textContent = t.sumLabel;
  document.getElementById("scoreLabel").textContent = t.scoreLabel;
  document.getElementById("siloName").textContent = t.siloName;
  document.getElementById("siloSub").textContent = t.siloSub;
  document.getElementById("crossName").textContent = t.crossName;
  document.getElementById("crossSub").textContent = t.crossSub;
  document.getElementById("numLabel1").textContent = t.numLabel;
  document.getElementById("numLabel2").textContent = t.numLabel;
  document.getElementById("siloSlider").setAttribute("aria-label", t.siloName);
  document.getElementById("crossSlider").setAttribute("aria-label", t.crossName);
  document.getElementById("numLabel1").setAttribute("aria-label", `${t.siloName} ${t.numLabel}`);
  document.getElementById("numLabel2").setAttribute("aria-label", `${t.crossName} ${t.numLabel}`);
  document.getElementById("resetBtn").textContent = t.resetBtn;
  document.getElementById("scenarioBtn").textContent = t.scenarioBtn;
  document.getElementById("chartCaption").textContent = t.chartCaption;
  document.getElementById("chartNote").textContent = t.chartNote;
  document.getElementById("legendWithin").textContent = t.legendWithin;
  document.getElementById("legendCross").textContent = t.legendCross;
  document.getElementById("scenarioBoxTitle").textContent = t.scenarioBoxTitle;
  document.getElementById("withinCardLabel").textContent = t.withinCardLabel;
  document.getElementById("crossCardLabel").textContent = t.crossCardLabel;

  document.getElementById("secAdvice").innerHTML = `
    <h2>${t.adviceHeading}</h2>
    <p>${t.adviceIntro}</p>
    <ul>${t.adviceItems.map((i) => `<li>${i}</li>`).join("")}</ul>
  `;

  document.getElementById("booksH").textContent = t.booksH;
  const booksGrid = document.getElementById("booksGrid");
  booksGrid.innerHTML = "";
  t.books.forEach((b) => {
    const div = document.createElement("div");
    div.className = "book";
    div.innerHTML = `<span class="tag">${b.tag}</span><h3>${b.title}</h3><p>${b.desc}</p>
      <a href="${b.url}" target="_blank" rel="noopener nofollow sponsored">${b.link}</a>`;
    booksGrid.appendChild(div);
  });

  DevSimLab.renderRelated(document.getElementById("relatedGrid"), { exclude: "conways-law" });
}

/* ================= イベント ================= */
document.getElementById("siloSlider").addEventListener("input", (e) => { silo = +e.target.value; render(); });
document.getElementById("siloNum").addEventListener("change", (e) => {
  silo = Math.min(SILO_MAX, Math.max(SILO_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("crossSlider").addEventListener("input", (e) => { crossNeed = +e.target.value; render(); });
document.getElementById("crossNum").addEventListener("change", (e) => {
  crossNeed = Math.min(CROSS_MAX, Math.max(CROSS_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("resetBtn").addEventListener("click", () => {
  silo = 60; crossNeed = 40;
  document.getElementById("hint").textContent = "";
  render();
});
document.getElementById("scenarioBtn").addEventListener("click", () => {
  silo = 85;
  render();
  const a = assess(silo, crossNeed);
  document.getElementById("hint").textContent = T().hintScenario(crossNeed, a);
});

/* ---- drag the marker directly on the chart ---- */
const cwChart = document.getElementById("cwChart");
function svgPoint(evt) {
  const pt = cwChart.createSVGPoint();
  pt.x = evt.clientX; pt.y = evt.clientY;
  return pt.matrixTransform(cwChart.getScreenCTM().inverse());
}
let dragging = false;
function startDrag(evt) {
  dragging = true;
  cwChart.setPointerCapture(evt.pointerId);
  document.getElementById("cwMarker").classList.add("dragging");
  document.getElementById("cwMarkerHit").classList.add("dragging");
  updateFromPointer(evt);
  evt.preventDefault();
}
function updateFromPointer(evt) {
  const p = svgPoint(evt);
  silo = sOfX(p.x);
  render();
}
document.getElementById("cwMarkerHit").addEventListener("pointerdown", startDrag);
cwChart.addEventListener("pointermove", (evt) => { if (dragging) updateFromPointer(evt); });
["pointerup", "pointercancel"].forEach((ev) => cwChart.addEventListener(ev, () => {
  dragging = false;
  document.getElementById("cwMarker").classList.remove("dragging");
  document.getElementById("cwMarkerHit").classList.remove("dragging");
}));

DevSimLab.initChrome({
  onRender: (lang, tone) => {
    LANG = lang; TONE = tone;
    applyStaticText();
    render();
  },
});
</script>
