"use strict";

/* ================= モデル =================
   「何を言うかではなく、誰が言うか」で発言の影響力が決まる現象を、
   「地位 → 発言機会 → さらに地位」の強化ループとしてモデル化する。
   背骨は地位特性理論/期待状態理論(Berger ら、1960年代〜):
   タスク集団では「実際の能力」ではなく「期待される能力」で影響力の序列が
   急速に形成され、その期待は在籍年数・肩書きなどタスクと無関係な属性にも
   引きずられる。発言機会の配分自体が地位で決まることも含まれる。
   補助線1: 特異性信用(Hollander, 1958) — 貢献の蓄積が「逸脱を許される信用残高」
   になるという古典理論(小集団実験が中心で、職場への外挿は拡張である点に注意)。
   補助線2: バブル仮説(MacLaren et al., 2020) — 発言時間の長さがリーダー認知を
   予測するという実証(因果の向きには議論がある)。
   本モデル: 同じ質の提案をする2人(A=初期地位高、B=初期地位低)について、
   発言機会シェアの差 d を毎月更新する。
     d_{t+1} = d_t × (1 + LOOP×(1-c) - PULL×c)   (c=中身を見る仕組みの強さ 0..1)
   仕組みが弱いほどループが差を複利で増幅し、強いほど平等(50/50)へ収束する。
   数値は方向性を示す演出であり、実証研究のパラメータを再現したものではない。
*/
const GAP_MIN = 0, GAP_MAX = 80;
const CORR_MIN = 0, CORR_MAX = 100;
const MONTHS = 12;
const LOOP_RATE = 0.15, PULL_RATE = 0.25;

function seriesOf(gap, corr) {
  const c = corr / 100;
  const f = 1 + LOOP_RATE * (1 - c) - PULL_RATE * c;
  const ds = [gap / 2];
  for (let t = 1; t <= MONTHS; t++) {
    ds.push(Math.max(0, Math.min(50, ds[t - 1] * f)));
  }
  return ds; // d_t: Aのシェア = 50 + d_t, Bのシェア = 50 - d_t
}
function shareAAt(gap, corr, t) { return 50 + seriesOf(gap, corr)[t]; }
function shareBAt(gap, corr, t) { return 50 - seriesOf(gap, corr)[t]; }
function finalGapOf(gap, corr) { return seriesOf(gap, corr)[MONTHS]; }
function scoreOf(gap, corr) { return Math.round(100 - finalGapOf(gap, corr) * 2); }
function tierOf(gap, corr) {
  const s = scoreOf(gap, corr);
  if (s >= 85) return 4;
  if (s >= 65) return 3;
  if (s >= 45) return 2;
  if (s >= 25) return 1;
  return 0;
}
function assess(gap, corr, month) {
  const ds = seriesOf(gap, corr);
  const d = ds[month];
  const shareA = 50 + d;
  const shareB = 50 - d;
  const dFinal = ds[MONTHS];
  const score = scoreOf(gap, corr);
  const band = tierOf(gap, corr);
  return { shareA, shareB, d, dFinal, score, band };
}

/* ================= 開発者モード上書き辞書 ================= */
const DEV = {
ja: {
  hint: (gap, corr, month, a) => `${month}か月目。シェアA${a.shareA.toFixed(0)}%/B${a.shareB.toFixed(0)}%。Bの提案がスルーされた3週間後、Aが同じ内容を言って「それだ!」と全員が言った。議事録にBの名前はない。`,
  hintScenario: (a) => `「誰が言うか」全開の職場。若手のSlack提案は既読スルー、同じ内容の部長の思いつきは緊急会議が開かれる。12か月後のシェアはA${(50 + a.dFinal).toFixed(0)}%。`,
  comments: [
    "会議の議事録が実質一人の講演録になっている。質疑応答: なし。",
    "「前も言ったんですけど」が若手の口癖になり始めた。誰も気づいていない。",
    "たまにBの案が通る。Aが休みの日に。",
    "書面レビューを導入したら、「あの新人の案、実は良くない?」が月1で発生するようになった。",
    "初提案が即採用された新人が、驚いて3回聞き返した。「え、通るんですか?」",
  ],
},
en: {
  hint: (gap, corr, month, a) => `Month ${month}. Shares: A ${a.shareA.toFixed(0)}% / B ${a.shareB.toFixed(0)}%. Three weeks after B's proposal was ignored, A said the same thing and everyone shouted "that's it!" The minutes do not mention B.`,
  hintScenario: (a) => `Full who-says-it mode. The junior's Slack proposal gets left on read; the director's identical shower thought triggers an emergency meeting. A's share after 12 months: ${(50 + a.dFinal).toFixed(0)}%.`,
  comments: [
    "The meeting minutes are effectively one person's lecture transcript. Q&A: none.",
    "\"As I mentioned before\" is becoming the junior members' catchphrase. Nobody has noticed.",
    "B's proposals do pass occasionally. On days A is out.",
    "Since written review was introduced, \"wait, isn't the new hire's idea actually good?\" happens about monthly.",
    "A newcomer's first proposal was adopted immediately. They asked three times in disbelief: \"wait, it passed?\"",
  ],

};

let LANG = "ja";
let TONE = "std";
const T = () => (TONE === "dev" ? { ...I18N[LANG], ...DEV[LANG] } : I18N[LANG]);

let gap = 30;
let corr = 30;
let month = 12;

/* ================= チャート描画 ================= */
const NS = "http://www.w3.org/2000/svg";
const el = (tag, attrs) => {
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
};
const PW = 640, PH = 240, PAD_L = 40, PAD_R = 16, PAD_T = 30, PAD_B = 42;
const Y_MAX = 100;
const xOf = (m) => PAD_L + (m / MONTHS) * (PW - PAD_L - PAD_R);
const mOfX = (x) => {
  const frac = (x - PAD_L) / (PW - PAD_L - PAD_R);
  const raw = frac * MONTHS;
  return Math.min(MONTHS, Math.max(0, Math.round(raw)));
};
const yOf = (v) => PAD_T + (1 - Math.min(v, Y_MAX) / Y_MAX) * (PH - PAD_T - PAD_B);

function drawChart() {
  const t = T();
  const gridLayer = document.getElementById("wsGridLayer");
  gridLayer.innerHTML = "";
  [0, 25, 50, 75, 100].forEach((v) => {
    const y = yOf(v);
    gridLayer.appendChild(el("line", { class: "ws-grid", x1: PAD_L, y1: y, x2: PW - PAD_R, y2: y }));
    const label = el("text", { class: "ws-axis-label", x: PAD_L - 6, y: y + 3, "text-anchor": "end" });
    label.textContent = v + "%";
    gridLayer.appendChild(label);
  });
  for (let m = 0; m <= MONTHS; m += 2) {
    const x = xOf(m);
    gridLayer.appendChild(el("line", { class: "ws-tick", x1: x, y1: PAD_T, x2: x, y2: PH - PAD_B }));
    const label = el("text", { class: "ws-axis-label", x, y: PH - PAD_B + 14, "text-anchor": m === 0 ? "start" : m === MONTHS ? "end" : "middle" });
    label.textContent = m;
    gridLayer.appendChild(label);
  }
  const yTitle = el("text", { class: "ws-axis-title", x: 2, y: 12 });
  yTitle.textContent = t.wsYTitle;
  gridLayer.appendChild(yTitle);
  const xTitle = el("text", { class: "ws-axis-title", x: PW / 2, y: PH - 4, "text-anchor": "middle" });
  xTitle.textContent = t.wsXTitle;
  gridLayer.appendChild(xTitle);

  const fairY = yOf(50);
  document.getElementById("wsLineFair").setAttribute("d", `M ${PAD_L} ${fairY} L ${PW - PAD_R} ${fairY}`);

  const ds = seriesOf(gap, corr);
  const ptsA = [], ptsB = [];
  for (let m = 0; m <= MONTHS; m++) {
    ptsA.push(`${xOf(m)},${yOf(50 + ds[m])}`);
    ptsB.push(`${xOf(m)},${yOf(50 - ds[m])}`);
  }
  document.getElementById("wsLineA").setAttribute("d", "M " + ptsA.join(" L "));
  document.getElementById("wsLineB").setAttribute("d", "M " + ptsB.join(" L "));

  const dotsLayer = document.getElementById("wsDotsLayer");
  dotsLayer.innerHTML = "";
  for (let m = 0; m <= MONTHS; m += 2) {
    dotsLayer.appendChild(el("circle", { class: "ws-dot", cx: xOf(m), cy: yOf(50 + ds[m]), fill: "var(--alert)" }));
    dotsLayer.appendChild(el("circle", { class: "ws-dot", cx: xOf(m), cy: yOf(50 - ds[m]), fill: "var(--d)" }));
  }

  const mx = xOf(month);
  const marker = document.getElementById("wsMarker");
  marker.setAttribute("x1", mx); marker.setAttribute("x2", mx);
  marker.setAttribute("y1", PAD_T); marker.setAttribute("y2", PH - PAD_B);

  const aY = yOf(50 + ds[month]);
  const bY = yOf(50 - ds[month]);
  document.getElementById("wsPointA").setAttribute("cx", mx);
  document.getElementById("wsPointA").setAttribute("cy", aY);
  document.getElementById("wsPointB").setAttribute("cx", mx);
  document.getElementById("wsPointB").setAttribute("cy", bY);

  const labelAnchor = mx > PW - PAD_R - 55 ? "end" : mx < PAD_L + 55 ? "start" : "middle";
  const labelDx = labelAnchor === "end" ? -10 : labelAnchor === "start" ? 10 : 0;
  const clampY = (y) => Math.max(PAD_T + 10, Math.min(PH - PAD_B - 4, y));

  const labelA = document.getElementById("wsLabelA");
  labelA.setAttribute("x", mx + labelDx);
  labelA.setAttribute("y", clampY(aY - 10));
  labelA.setAttribute("text-anchor", labelAnchor);
  labelA.textContent = Math.round(50 + ds[month]) + "%";

  const labelB = document.getElementById("wsLabelB");
  labelB.setAttribute("x", mx + labelDx);
  labelB.setAttribute("y", clampY(bY + 20));
  labelB.setAttribute("text-anchor", labelAnchor);
  labelB.textContent = Math.round(50 - ds[month]) + "%";

  const hit = document.getElementById("wsMarkerHit");
  hit.setAttribute("x", PAD_L); hit.setAttribute("y", 0);
  hit.setAttribute("width", PW - PAD_L - PAD_R); hit.setAttribute("height", PH);
}

/* ================= 描画 ================= */
function render() {
  const t = T();
  const a = assess(gap, corr, month);

  drawChart();

  document.getElementById("sumVal").textContent = `${(50 + a.dFinal).toFixed(0)}% / ${(50 - a.dFinal).toFixed(0)}%`;
  document.getElementById("aCardVal").textContent = `${(50 + a.dFinal).toFixed(0)}%`;
  document.getElementById("bCardVal").textContent = `${(50 - a.dFinal).toFixed(0)}%`;
  document.getElementById("hint").textContent = t.hint(gap, corr, month, a);
  document.getElementById("scenarioBoxText").textContent = t.scenarios[a.band];

  document.getElementById("gapReadout").textContent = gap + "pt";
  document.getElementById("corrReadout").textContent = corr;
  if (document.activeElement !== document.getElementById("gapSlider")) document.getElementById("gapSlider").value = gap;
  if (document.activeElement !== document.getElementById("gapNum")) document.getElementById("gapNum").value = gap;
  if (document.activeElement !== document.getElementById("corrSlider")) document.getElementById("corrSlider").value = corr;
  if (document.activeElement !== document.getElementById("corrNum")) document.getElementById("corrNum").value = corr;

  const scoreEl = document.getElementById("scoreVal");
  scoreEl.textContent = a.score;
  scoreEl.className = "score-val mono" + (a.score < 45 ? " danger" : a.score < 70 ? " warn" : "");
  document.getElementById("scoreComment").textContent = t.comments[a.band];

  DevSimLab.renderShare(document.getElementById("shareBtns"), {
    url: "https://sakuichi.github.io/dev-sim-lab/who-says-it/",
    shareText: t.shareText,
    shareHashtags: t.shareHashtags,
  });
}

/* ================= 静的コンテンツの言語適用 ================= */
function applyStaticText() {
  const t = T();
  document.title = t.docTitle;
  document.querySelector('meta[name="description"]').setAttribute("content", t.heroLead);
  document.getElementById("heroTitle").innerHTML = t.heroTitle;
  document.getElementById("heroLead").textContent = t.heroLead;
  document.getElementById("disclaimer").innerHTML = t.disclaimer;
  document.getElementById("consoleLabel").textContent = t.consoleLabel;
  document.getElementById("sumLabel").textContent = t.sumLabel;
  document.getElementById("scoreLabel").textContent = t.scoreLabel;
  document.getElementById("gapName").textContent = t.gapName;
  document.getElementById("gapSub").textContent = t.gapSub;
  document.getElementById("corrName").textContent = t.corrName;
  document.getElementById("corrSub").textContent = t.corrSub;
  document.getElementById("numLabel1").textContent = t.numLabel;
  document.getElementById("numLabel2").textContent = t.numLabel;
  document.getElementById("gapSlider").setAttribute("aria-label", t.gapName);
  document.getElementById("corrSlider").setAttribute("aria-label", t.corrName);
  document.getElementById("numLabel1").setAttribute("aria-label", `${t.gapName} ${t.numLabel}`);
  document.getElementById("numLabel2").setAttribute("aria-label", `${t.corrName} ${t.numLabel}`);
  document.getElementById("resetBtn").textContent = t.resetBtn;
  document.getElementById("scenarioBtn").textContent = t.scenarioBtn;
  document.getElementById("chartCaption").textContent = t.chartCaption;
  document.getElementById("chartNote").textContent = t.chartNote;
  document.getElementById("legendA").textContent = t.legendA;
  document.getElementById("legendB").textContent = t.legendB;
  document.getElementById("legendFair").textContent = t.legendFair;
  document.getElementById("scenarioBoxTitle").textContent = t.scenarioBoxTitle;
  document.getElementById("aCardLabel").textContent = t.aCardLabel;
  document.getElementById("bCardLabel").textContent = t.bCardLabel;

  document.getElementById("secAdvice").innerHTML = `
    <h2>${t.adviceHeading}</h2>
    <p>${t.adviceIntro}</p>
    <ul>${t.adviceItems.map((i) => `<li>${i}</li>`).join("")}</ul>
  `;

  document.getElementById("booksH").textContent = t.booksH;
  const booksGrid = document.getElementById("booksGrid");
  booksGrid.innerHTML = "";
  t.books.forEach((b) => {
    const div = document.createElement("div");
    div.className = "book";
    div.innerHTML = `<span class="tag">${b.tag}</span><h3>${b.title}</h3><p>${b.desc}</p>
      <a href="${b.url}" target="_blank" rel="noopener nofollow sponsored">${b.link}</a>`;
    booksGrid.appendChild(div);
  });

  DevSimLab.renderRelated(document.getElementById("relatedGrid"), { exclude: "who-says-it" });
}

/* ================= イベント ================= */
document.getElementById("gapSlider").addEventListener("input", (e) => { gap = +e.target.value; render(); });
document.getElementById("gapNum").addEventListener("change", (e) => {
  gap = Math.min(GAP_MAX, Math.max(GAP_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("corrSlider").addEventListener("input", (e) => { corr = +e.target.value; render(); });
document.getElementById("corrNum").addEventListener("change", (e) => {
  corr = Math.min(CORR_MAX, Math.max(CORR_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("resetBtn").addEventListener("click", () => {
  gap = 30; corr = 30; month = 12;
  document.getElementById("hint").textContent = "";
  render();
});
document.getElementById("scenarioBtn").addEventListener("click", () => {
  gap = 40; corr = 5; month = 12;
  render();
  const a = assess(gap, corr, month);
  document.getElementById("hint").textContent = T().hintScenario(a);
});

/* ---- drag the month cursor directly on the chart ---- */
const wsChart = document.getElementById("wsChart");
function svgPoint(evt) {
  const pt = wsChart.createSVGPoint();
  pt.x = evt.clientX; pt.y = evt.clientY;
  return pt.matrixTransform(wsChart.getScreenCTM().inverse());
}
let dragging = false;
function startDrag(evt) {
  dragging = true;
  wsChart.setPointerCapture(evt.pointerId);
  document.getElementById("wsMarker").classList.add("dragging");
  document.getElementById("wsMarkerHit").classList.add("dragging");
  updateFromPointer(evt);
  evt.preventDefault();
}
function updateFromPointer(evt) {
  const p = svgPoint(evt);
  month = mOfX(p.x);
  render();
}
document.getElementById("wsMarkerHit").addEventListener("pointerdown", startDrag);
wsChart.addEventListener("pointermove", (evt) => { if (dragging) updateFromPointer(evt); });
["pointerup", "pointercancel"].forEach((ev) => wsChart.addEventListener(ev, () => {
  dragging = false;
  document.getElementById("wsMarker").classList.remove("dragging");
  document.getElementById("wsMarkerHit").classList.remove("dragging");
}));

DevSimLab.initChrome({
  onRender: (lang, tone) => {
    LANG = lang; TONE = tone;
    applyStaticText();
    render();
  },
});
</script>
