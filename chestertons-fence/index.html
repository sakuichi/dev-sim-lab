"use strict";

/* ================= モデル =================
   「チェスタトンのフェンス」——G.K.チェスタトンが『The Thing』(1929年)の
   「The Drift from Domesticity」章で示した原則。道をふさぐフェンスを見て
   「用途が分からないから撤去しよう」と言う改革者に対し、賢明な改革者はこう答える:
   「用途が分からないなら、撤去させるわけにはいかない。考えてきなさい。
   用途が分かったと言えるようになったら、壊すことを許可しよう」。
   ソフトウェアでは「誰も理由を知らない謎コード・謎設定の削除」がこれにあたる。
   現代的な対応物として「ハイラムの法則」(Hyrum Wright, Google/
   『Software Engineering at Google』): 利用者が十分に多ければ、契約で何を約束したかに
   関係なく、システムの観測可能な挙動すべてに誰かが依存する——一見無意味な挙動にも
   依存者がいる可能性がある、という経験則が知られている。
   本モデルは「撤去前の調査努力」が上がるほど用途に気づける確率が上がり、
   「一見不要なコードが実は何かを支えている割合」との積で障害確率が決まる、
   という単純化した独自モデルであり、実証研究の数値を再現したものではない。
*/
const EFFORT_MIN = 0, EFFORT_MAX = 100;
const LOAD_MIN = 10, LOAD_MAX = 70;
const DISCOVER_BASE = 10, DISCOVER_SLOPE = 0.85;
/* スコア正規化用: 最悪ケース(調査0・支持率70%)の障害確率 */
const INCIDENT_WORST = LOAD_MAX * (1 - DISCOVER_BASE / 100);

function discoverRateOf(effort) { return DISCOVER_BASE + effort * DISCOVER_SLOPE; }
function incidentRateOf(effort, load) { return load * (1 - discoverRateOf(effort) / 100); }
function scoreOf(effort, load) {
  return Math.max(0, Math.min(100, Math.round(100 - (incidentRateOf(effort, load) / INCIDENT_WORST) * 100)));
}
function tierOf(effort) { return Math.min(4, Math.floor(effort / 20)); }
function assess(effort, load) {
  const discover = discoverRateOf(effort);
  const incident = incidentRateOf(effort, load);
  const score = scoreOf(effort, load);
  const band = tierOf(effort);
  return { discover, incident, score, band };
}

  chartCaption: "The green line is the chance of discovering the purpose before removal; the red line is the chance of removing it blind and causing an incident. More investigation pushes the red line down; a higher load-bearing share lifts the whole red line.",
  chartNote: "A simplified original model of the effort-to-incident relationship — not a reproduction of empirical numbers. Chesterton's fence itself is the 1929 principle; Hyrum's Law is an engineering heuristic from Google.",
  cfYTitle: "Probability (%)", cfXTitle: "Investigation effort before removal",
  legendDiscover: "Chance of discovering the purpose first",
  legendIncident: "Chance removal causes an incident",
  scenarioBoxTitle: "What the investigation looks like right now",
  scenarios: [
    "Deleting on visual impression alone. git blame hasn't even been opened.",
    "Skimmed the commit messages. The trail went cold at a ten-year-old commit that just says \"fix.\"",
    "Checking history and references, hunting for documentation. Finding the original ticket would be a real lead.",
    "Asking the author or people who were around at the time. One \"oh, that's for the month-end batch\" can solve the whole mystery.",
    "Measuring actual usage via logs and traffic before deciding. You can explain what the fence is for.",
  ],
  discoverCardLabel: "Chance of discovering the purpose first",
  incidentCardLabel: "Chance removal causes an incident",
  hint: (effort, load, a) => `At investigation effort ${effort}, the chance of discovering the purpose before removal is about ${Math.round(a.discover)}%. Combined with a ${load}% load-bearing share, removal causes an incident with roughly ${a.incident.toFixed(1)}% probability.`,
  hintScenario: (load, a) => `"Nobody uses this anyway" — per Hyrum's Law, somebody depends on every observable behavior. Discovery odds drop to about ${Math.round(a.discover)}%, incident odds hit ${a.incident.toFixed(1)}%. The moment you delete it, some team's alert may light up.`,
  comments: [
    "Deletion by visual impression. What's behind the fence becomes known only after it's gone.",
    "Minimal checks done; most of the history is still a mystery.",
    "Investigation is starting to work — but \"I looked and couldn't tell\" is not proof of \"unused.\"",
    "Checking the history is now part of the process. Remove or keep, the decision has grounds.",
    "Explain the purpose first, then remove — Chesterton's \"more intelligent type of reformer.\"",
  ],
  adviceHeading: "How to actually deal with this",
  adviceIntro: "Chesterton's fence is not \"never delete anything.\" The principle points the other way: once you can explain the fence's purpose, you may tear it down — it's a procedure for earning the right to delete. Leaving mystery code untouched is itself technical debt: the more code people are afraid to touch, the higher every change costs. The healthy path is neither deleting blind nor keeping out of fear, but investing in making investigation cheap. A culture of recording why — commit messages, ADRs (architecture decision records), tickets — slashes the investigation cost for the next person standing at the fence. And since Hyrum's Law says observable behaviors have dependents, practical removal is staged: deprecate, measure, then remove.",
  adviceItems: [
    "Before deleting, check at minimum the history (git blame/log) and references — \"looks unused\" is not evidence",
    "If investigation can't determine the purpose, don't delete — instrument it (logs/flags) and observe real usage first",
    "Remove in stages: deprecate with warnings → measure for a period → remove, keeping a rollback path",
    "Leave the fence's reason for the next person: write the why into commit messages, ADRs, and comments",
  ],
  booksH: "Recommended reading",
  books: [
    { tag: "ENGINEERING CULTURE", title: "Software Engineering at Google", desc: "The book that codified Google's engineering culture — and the source of Hyrum's Law quoted on this page.", link: "View on Amazon →", url: "https://amzn.to/4vqTQe8" },
  ],
  toneBtn: "🔥 Developer mode",
  toneNote: "* Joke mode. Switch back to standard before client meetings.",
  shareText: "Nobody knows why this code exists — safe to delete? — Chesterton's Fence Simulator",
  shareHashtags: "DevSimLab",
},
};

/* ================= 開発者モード上書き辞書 ================= */
const DEV = {
ja: {
  hint: (effort, load, a) => `調査${effort}。「dead code」とコメントされたコードが本番の祝日判定を支えていた事件、覚えていますか。障害確率約${a.incident.toFixed(1)}%。削除PRのdiffは美しい。美しさと安全性は別物。`,
  hintScenario: (load, a) => `「grepしたけど参照なかったです」——動的に組み立てられた文字列からの呼び出しは、grepには映らない。障害確率約${a.incident.toFixed(1)}%。消した3分後、別チームのSlackが光る。`,
  comments: [
    "削除コミットのメッセージは「cleanup」。3日後のrevertコミットのメッセージは「Revert cleanup」。",
    "「たぶん大丈夫」のたぶんが取れないまま、金曜の夕方にマージされた。",
    "調査を始めたら、そのコードを書いたのが過去の自分だと判明した。それでも理由は思い出せない。",
    "「これ消していいですか?」をチームに聞けている。この一言が言える空気が、実は一番の安全装置。",
    "非推奨化して1か月ログを取った。使用者: 毎月末に1回、経理部の全社集計バッチ。消していたら大惨事だった。",
  ],
},
en: {
  hint: (effort, load, a) => `Investigation ${effort}. Remember when the code commented "dead code" turned out to run production holiday logic? Incident odds ~${a.incident.toFixed(1)}%. The deletion PR's diff is beautiful. Beautiful and safe are different things.`,
  hintScenario: (load, a) => `"I grepped, no references" — calls built from dynamic strings don't show up in grep. Incident odds ~${a.incident.toFixed(1)}%. Three minutes after deletion, another team's Slack lights up.`,
  comments: [
    "The deletion commit says \"cleanup.\" The commit three days later says \"Revert cleanup.\"",
    "The \"probably\" in \"probably fine\" never got resolved, and it merged on a Friday evening.",
    "Investigation revealed the author of the mystery code: past you. The reason remains a mystery anyway.",
    "\"Mind if I delete this?\" gets asked out loud. That one sentence being sayable is the real safety system.",
    "Deprecated it and logged for a month. Sole user: the accounting department's company-wide month-end batch. Deleting it would have been a catastrophe.",
  ],
},
};

let LANG = "ja";
let TONE = "std";
const T = () => (TONE === "dev" ? { ...I18N[LANG], ...DEV[LANG] } : I18N[LANG]);

let effort = 30;
let load = 30;

/* ================= チャート描画 ================= */
const NS = "http://www.w3.org/2000/svg";
const el = (tag, attrs) => {
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
};
const PW = 640, PH = 240, PAD_L = 40, PAD_R = 16, PAD_T = 30, PAD_B = 42;
const Y_MAX = 100;
const xOf = (v) => PAD_L + ((v - EFFORT_MIN) / (EFFORT_MAX - EFFORT_MIN)) * (PW - PAD_L - PAD_R);
const eOfX = (x) => {
  const frac = (x - PAD_L) / (PW - PAD_L - PAD_R);
  const raw = EFFORT_MIN + frac * (EFFORT_MAX - EFFORT_MIN);
  return Math.min(EFFORT_MAX, Math.max(EFFORT_MIN, Math.round(raw / 5) * 5));
};
const yOf = (v) => PAD_T + (1 - Math.min(v, Y_MAX) / Y_MAX) * (PH - PAD_T - PAD_B);

function drawChart() {
  const t = T();
  const gridLayer = document.getElementById("cfGridLayer");
  gridLayer.innerHTML = "";
  [0, 20, 40, 60, 80, 100].forEach((v) => {
    const y = yOf(v);
    gridLayer.appendChild(el("line", { class: "cf-grid", x1: PAD_L, y1: y, x2: PW - PAD_R, y2: y }));
    const label = el("text", { class: "cf-axis-label", x: PAD_L - 6, y: y + 3, "text-anchor": "end" });
    label.textContent = v + "%";
    gridLayer.appendChild(label);
  });
  for (let v = EFFORT_MIN; v <= EFFORT_MAX; v += 20) {
    const x = xOf(v);
    gridLayer.appendChild(el("line", { class: "cf-tick", x1: x, y1: PAD_T, x2: x, y2: PH - PAD_B }));
    const label = el("text", { class: "cf-axis-label", x, y: PH - PAD_B + 14, "text-anchor": v === EFFORT_MIN ? "start" : v === EFFORT_MAX ? "end" : "middle" });
    label.textContent = v;
    gridLayer.appendChild(label);
  }
  const yTitle = el("text", { class: "cf-axis-title", x: 2, y: 12 });
  yTitle.textContent = t.cfYTitle;
  gridLayer.appendChild(yTitle);
  const xTitle = el("text", { class: "cf-axis-title", x: PW / 2, y: PH - 4, "text-anchor": "middle" });
  xTitle.textContent = t.cfXTitle;
  gridLayer.appendChild(xTitle);

  const discoverPts = [], incidentPts = [];
  for (let v = EFFORT_MIN; v <= EFFORT_MAX; v += 2) {
    discoverPts.push(`${xOf(v)},${yOf(discoverRateOf(v))}`);
    incidentPts.push(`${xOf(v)},${yOf(incidentRateOf(v, load))}`);
  }
  document.getElementById("cfLineDiscover").setAttribute("d", "M " + discoverPts.join(" L "));
  document.getElementById("cfLineIncident").setAttribute("d", "M " + incidentPts.join(" L "));

  const dotsLayer = document.getElementById("cfDotsLayer");
  dotsLayer.innerHTML = "";
  for (let v = EFFORT_MIN; v <= EFFORT_MAX; v += 20) {
    dotsLayer.appendChild(el("circle", { class: "cf-dot", cx: xOf(v), cy: yOf(discoverRateOf(v)), fill: "var(--q)" }));
    dotsLayer.appendChild(el("circle", { class: "cf-dot", cx: xOf(v), cy: yOf(incidentRateOf(v, load)), fill: "var(--alert)" }));
  }

  const mx = xOf(effort);
  const marker = document.getElementById("cfMarker");
  marker.setAttribute("x1", mx); marker.setAttribute("x2", mx);
  marker.setAttribute("y1", PAD_T); marker.setAttribute("y2", PH - PAD_B);

  const discoverY = yOf(discoverRateOf(effort));
  const incidentY = yOf(incidentRateOf(effort, load));
  document.getElementById("cfPointDiscover").setAttribute("cx", mx);
  document.getElementById("cfPointDiscover").setAttribute("cy", discoverY);
  document.getElementById("cfPointIncident").setAttribute("cx", mx);
  document.getElementById("cfPointIncident").setAttribute("cy", incidentY);

  const labelAnchor = mx > PW - PAD_R - 55 ? "end" : mx < PAD_L + 55 ? "start" : "middle";
  const labelDx = labelAnchor === "end" ? -10 : labelAnchor === "start" ? 10 : 0;
  const clampY = (y) => Math.max(PAD_T + 10, Math.min(PH - PAD_B - 4, y));
  const discoverIsHigher = discoverY <= incidentY;

  const labelDiscover = document.getElementById("cfLabelDiscover");
  labelDiscover.setAttribute("x", mx + labelDx);
  labelDiscover.setAttribute("y", clampY(discoverIsHigher ? discoverY - 10 : discoverY + 20));
  labelDiscover.setAttribute("text-anchor", labelAnchor);
  labelDiscover.textContent = Math.round(discoverRateOf(effort)) + "%";

  const labelIncident = document.getElementById("cfLabelIncident");
  labelIncident.setAttribute("x", mx + labelDx);
  labelIncident.setAttribute("y", clampY(discoverIsHigher ? incidentY + 20 : incidentY - 10));
  labelIncident.setAttribute("text-anchor", labelAnchor);
  labelIncident.textContent = incidentRateOf(effort, load).toFixed(1) + "%";

  const hit = document.getElementById("cfMarkerHit");
  hit.setAttribute("x", PAD_L); hit.setAttribute("y", 0);
  hit.setAttribute("width", PW - PAD_L - PAD_R); hit.setAttribute("height", PH);
}

/* ================= 描画 ================= */
function render() {
  const t = T();
  const a = assess(effort, load);

  drawChart();

  document.getElementById("sumVal").textContent = `${a.incident.toFixed(1)}%`;
  document.getElementById("discoverCardVal").textContent = `${Math.round(a.discover)}%`;
  document.getElementById("incidentCardVal").textContent = `${a.incident.toFixed(1)}%`;
  document.getElementById("hint").textContent = t.hint(effort, load, a);
  document.getElementById("scenarioBoxText").textContent = t.scenarios[a.band];

  document.getElementById("effortReadout").textContent = effort;
  document.getElementById("loadReadout").textContent = load + "%";
  if (document.activeElement !== document.getElementById("effortSlider")) document.getElementById("effortSlider").value = effort;
  if (document.activeElement !== document.getElementById("effortNum")) document.getElementById("effortNum").value = effort;
  if (document.activeElement !== document.getElementById("loadSlider")) document.getElementById("loadSlider").value = load;
  if (document.activeElement !== document.getElementById("loadNum")) document.getElementById("loadNum").value = load;

  const scoreEl = document.getElementById("scoreVal");
  scoreEl.textContent = a.score;
  scoreEl.className = "score-val mono" + (a.score < 45 ? " danger" : a.score < 70 ? " warn" : "");
  document.getElementById("scoreComment").textContent = t.comments[a.band];

  DevSimLab.renderShare(document.getElementById("shareBtns"), {
    url: "https://sakuichi.github.io/dev-sim-lab/chestertons-fence/",
    shareText: t.shareText,
    shareHashtags: t.shareHashtags,
  });
}

/* ================= 静的コンテンツの言語適用 ================= */
function applyStaticText() {
  const t = T();
  document.title = t.docTitle;
  document.querySelector('meta[name="description"]').setAttribute("content", t.heroLead);
  document.getElementById("heroTitle").innerHTML = t.heroTitle;
  document.getElementById("heroLead").textContent = t.heroLead;
  document.getElementById("consoleLabel").textContent = t.consoleLabel;
  document.getElementById("sumLabel").textContent = t.sumLabel;
  document.getElementById("scoreLabel").textContent = t.scoreLabel;
  document.getElementById("effortName").textContent = t.effortName;
  document.getElementById("effortSub").textContent = t.effortSub;
  document.getElementById("loadName").textContent = t.loadName;
  document.getElementById("loadSub").textContent = t.loadSub;
  document.getElementById("numLabel1").textContent = t.numLabel;
  document.getElementById("numLabel2").textContent = t.numLabel;
  document.getElementById("effortSlider").setAttribute("aria-label", t.effortName);
  document.getElementById("loadSlider").setAttribute("aria-label", t.loadName);
  document.getElementById("numLabel1").setAttribute("aria-label", `${t.effortName} ${t.numLabel}`);
  document.getElementById("numLabel2").setAttribute("aria-label", `${t.loadName} ${t.numLabel}`);
  document.getElementById("resetBtn").textContent = t.resetBtn;
  document.getElementById("scenarioBtn").textContent = t.scenarioBtn;
  document.getElementById("chartCaption").textContent = t.chartCaption;
  document.getElementById("chartNote").textContent = t.chartNote;
  document.getElementById("legendDiscover").textContent = t.legendDiscover;
  document.getElementById("legendIncident").textContent = t.legendIncident;
  document.getElementById("scenarioBoxTitle").textContent = t.scenarioBoxTitle;
  document.getElementById("discoverCardLabel").textContent = t.discoverCardLabel;
  document.getElementById("incidentCardLabel").textContent = t.incidentCardLabel;

  document.getElementById("secAdvice").innerHTML = `
    <h2>${t.adviceHeading}</h2>
    <p>${t.adviceIntro}</p>
    <ul>${t.adviceItems.map((i) => `<li>${i}</li>`).join("")}</ul>
  `;

  document.getElementById("booksH").textContent = t.booksH;
  const booksGrid = document.getElementById("booksGrid");
  booksGrid.innerHTML = "";
  t.books.forEach((b) => {
    const div = document.createElement("div");
    div.className = "book";
    div.innerHTML = `<span class="tag">${b.tag}</span><h3>${b.title}</h3><p>${b.desc}</p>
      <a href="${b.url}" target="_blank" rel="noopener nofollow sponsored">${b.link}</a>`;
    booksGrid.appendChild(div);
  });

  DevSimLab.renderRelated(document.getElementById("relatedGrid"), { exclude: "chestertons-fence" });
}

/* ================= イベント ================= */
document.getElementById("effortSlider").addEventListener("input", (e) => { effort = +e.target.value; render(); });
document.getElementById("effortNum").addEventListener("change", (e) => {
  effort = Math.min(EFFORT_MAX, Math.max(EFFORT_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("loadSlider").addEventListener("input", (e) => { load = +e.target.value; render(); });
document.getElementById("loadNum").addEventListener("change", (e) => {
  load = Math.min(LOAD_MAX, Math.max(LOAD_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("resetBtn").addEventListener("click", () => {
  effort = 30; load = 30;
  document.getElementById("hint").textContent = "";
  render();
});
document.getElementById("scenarioBtn").addEventListener("click", () => {
  effort = 0;
  render();
  const a = assess(effort, load);
  document.getElementById("hint").textContent = T().hintScenario(load, a);
});

/* ---- drag the marker directly on the chart ---- */
const cfChart = document.getElementById("cfChart");
function svgPoint(evt) {
  const pt = cfChart.createSVGPoint();
  pt.x = evt.clientX; pt.y = evt.clientY;
  return pt.matrixTransform(cfChart.getScreenCTM().inverse());
}
let dragging = false;
function startDrag(evt) {
  dragging = true;
  cfChart.setPointerCapture(evt.pointerId);
  document.getElementById("cfMarker").classList.add("dragging");
  document.getElementById("cfMarkerHit").classList.add("dragging");
  updateFromPointer(evt);
  evt.preventDefault();
}
function updateFromPointer(evt) {
  const p = svgPoint(evt);
  effort = eOfX(p.x);
  render();
}
document.getElementById("cfMarkerHit").addEventListener("pointerdown", startDrag);
cfChart.addEventListener("pointermove", (evt) => { if (dragging) updateFromPointer(evt); });
["pointerup", "pointercancel"].forEach((ev) => cfChart.addEventListener(ev, () => {
  dragging = false;
  document.getElementById("cfMarker").classList.remove("dragging");
  document.getElementById("cfMarkerHit").classList.remove("dragging");
}));

DevSimLab.initChrome({
  onRender: (lang, tone) => {
    LANG = lang; TONE = tone;
    applyStaticText();
    render();
  },
});
</script>
