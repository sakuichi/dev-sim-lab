<script>
"use strict";

/* ================= モデル =================
   「バス係数(トラック係数)」——チームの何人が同時に離脱したら(俗に「バスに轢かれたら」。
   縁起が悪いので「宝くじが当たって退職したら」= lottery factor とも言い換えられる)
   プロジェクトが立ち行かなくなるか、という開発者フォークロア由来の指標。
   実証: Avelino et al. (2016, "A Novel Approach for Estimating Truck Factors")は
   GitHubの人気133プロジェクトを分析し、65%がバス係数2以下(46%が1、28%が2)、
   10を超えるのは10%未満であることを示した。
   モデル: バス係数 k = max(1, min(team, round(1 + (team-1) * (share/100) * 0.6)))
   ——知識共有ゼロでも1(誰か1人は分かる)、共有100%でチームの約6割が代替可能。
   停止確率: 離脱人数 n < k なら小さなリスク(5 + n*5 %)、n >= k で崖(60 + (n-k)*15、上限95%)。
   数値は方向性を示す独自の簡易モデルであり、実証値の再現ではない。
*/
const SHARE_MIN = 0, SHARE_MAX = 100;
const TEAM_MIN = 3, TEAM_MAX = 12;
const N_MAX = 5;

function busFactorOf(share, team) {
  return Math.max(1, Math.min(team, Math.round(1 + (team - 1) * (share / 100) * 0.6)));
}
function stopProbOf(n, share, team) {
  const k = busFactorOf(share, team);
  if (n < k) return 5 + n * 5;
  return Math.min(95, 60 + (n - k) * 15);
}
function scoreOf(share, team) {
  /* そのチーム人数で到達可能な最大バス係数(share=100)を100点として正規化 */
  const kMax = busFactorOf(100, team);
  return Math.round(((busFactorOf(share, team) - 1) / Math.max(1, kMax - 1)) * 100);
}
function tierOf(share, team) {
  const s = scoreOf(share, team);
  if (s >= 85) return 4;
  if (s >= 65) return 3;
  if (s >= 45) return 2;
  if (s >= 25) return 1;
  return 0;
}
function boxTierOf(share) { return Math.min(4, Math.floor(share / 20)); }
function assess(share, team, n) {
  const k = busFactorOf(share, team);
  const risk = stopProbOf(n, share, team);
  const score = scoreOf(share, team);
  const band = tierOf(share, team);
  const box = boxTierOf(share);
  return { k, risk, score, band, box };
}

  hintScenario: (team, n, a) => `A team of ${team} with everything on the ace — bus factor ${a.k}. In Avelino et al.'s study, 46% of popular GitHub projects were in exactly this state. The ace's one-week vacation can become the whole team's one-week outage.`,
  comments: [
    "One departure can halt everything. The same state as 46% of popular GitHub projects — common, but not safe.",
    "Knowledge replication has barely begun. Most areas are still \"only that person knows.\"",
    "About half the key areas have a backup. One more person's worth of sharing moves the cliff right.",
    "Knowledge is well distributed. Short of a rare mass departure, development continues.",
    "Most of the team can cover for each other. Vacations and resignations are no longer incidents.",
  ],
  adviceHeading: "How to actually deal with this",
  adviceIntro: "Knowledge concentration is not the ace's fault. The ace's knowledge and speed are team assets; the problem is that the organization stores that knowledge in exactly one place. The activities that raise the bus factor — documentation, pairing, rotation — make the ace slower in the short term: two people cost more hours, and teaching takes time. That's precisely why it gets postponed, until the team joins the 46% statistic. It works like insurance: you can't buy it after the accident. And note the bus factor isn't about making people interchangeable parts — it's also about the freedom to take a vacation, to hand things over with confidence, and to leave on good terms.",
  adviceItems: [
    "For each key area, count \"how many people could handle this right now?\" If the answer is one, that's the top sharing priority",
    "Budget pairing and mob sessions as insurance premiums, not training costs",
    "Rotate ownership deliberately — an emergency handover is the worst classroom, a planned rotation is the best",
    "Offer the ace liberation, not replaceability: the more that's shared, the sooner they can move to the next hard problem",
  ],
  booksH: "Recommended reading",
  books: [
    { tag: "ENGINEERING CULTURE", title: "Software Engineering at Google", desc: "Winters, Manshreck, and Wright. The knowledge-sharing chapters cover exactly this: turning personal knowledge into team knowledge through docs, review, and teaching culture.", link: "View on Amazon →", url: "https://amzn.to/4vqTQe8" },
  ],
  toneBtn: "🔥 Developer mode",
  toneNote: "* Joke mode. Switch back to standard before client meetings.",
  shareText: "If that one person takes a week off, does development stop? — Bus Factor Simulator",
  shareHashtags: "DevSimLab",
},
};

/* ================= 開発者モード上書き辞書 ================= */
const DEV = {
ja: {
  hint: (share, team, n, a) => `バス係数${a.k}。あの人のカレンダーに「私用」の予定が入った瞬間、チームのSlackに緊張が走る。停止確率約${a.risk}%。`,
  hintScenario: (team, n, a) => `エースが「ちょっと歯医者に」と席を立った30分間、誰もデプロイボタンを押せなかった。バス係数${a.k}。歯医者がチームのSPOF。`,
  comments: [
    "あの人の有給申請が、実質的にチームの停止申請になっている。",
    "引き継ぎドキュメントのタイトルだけがある。本文は「あとで書く」。3年前から。",
    "副担当制度が始まった。副担当の最初の仕事は「正担当の頭の中の目次を作る」こと。",
    "ペア作業が定着して、「それ俺しか知らない」が「それ俺らしか知らない」に進化した。前進ではある。",
    "エースが2週間の休暇から戻ったら、チームが普通に回っていて少し寂しそうだった。それが理想。",
  ],
},
en: {
  hint: (share, team, n, a) => `Bus factor ${a.k}. A "personal appointment" appears on that one calendar and the team Slack goes quiet with tension. Halt probability ~${a.risk}%.`,
  hintScenario: (team, n, a) => `The ace stepped out for a 30-minute dentist appointment and nobody could press the deploy button. Bus factor ${a.k}. The dentist is now the team's single point of failure.`,
  comments: [
    "That person's PTO request is effectively a team outage request.",
    "The handover doc has a title. The body says \"TODO: write later.\" Since three years ago.",
    "The backup-owner program launched. The backup's first task: creating a table of contents for the owner's brain.",
    "Pairing took hold, and \"only I know that\" evolved into \"only we know that.\" Progress, technically.",
    "The ace returned from two weeks off to find the team running fine — and looked a little sad. That's the ideal.",
  ],
},
};

let LANG = "ja";
let TONE = "std";
const T = () => (TONE === "dev" ? { ...I18N[LANG], ...DEV[LANG] } : I18N[LANG]);

let share = 30;
let team = 6;
let nLeave = 1;

/* ================= チャート描画 ================= */
const NS = "http://www.w3.org/2000/svg";
const el = (tag, attrs) => {
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
};
const PW = 640, PH = 240, PAD_L = 40, PAD_R = 16, PAD_T = 30, PAD_B = 42;
const Y_MAX = 100;
const slotW = () => (PW - PAD_L - PAD_R) / (N_MAX + 1);
const xOf = (n) => PAD_L + (n + 0.5) * slotW();
const nOfX = (x) => {
  const raw = (x - PAD_L) / slotW() - 0.5;
  return Math.min(N_MAX, Math.max(0, Math.round(raw)));
};
const yOf = (v) => PAD_T + (1 - Math.min(v, Y_MAX) / Y_MAX) * (PH - PAD_T - PAD_B);

function drawChart() {
  const t = T();
  const gridLayer = document.getElementById("bfGridLayer");
  gridLayer.innerHTML = "";
  [0, 20, 40, 60, 80, 100].forEach((v) => {
    const y = yOf(v);
    gridLayer.appendChild(el("line", { class: "bf-grid", x1: PAD_L, y1: y, x2: PW - PAD_R, y2: y }));
    const label = el("text", { class: "bf-axis-label", x: PAD_L - 6, y: y + 3, "text-anchor": "end" });
    label.textContent = v + "%";
    gridLayer.appendChild(label);
  });
  for (let n = 0; n <= N_MAX; n++) {
    const x = xOf(n);
    const label = el("text", { class: "bf-axis-label", x, y: PH - PAD_B + 14, "text-anchor": "middle" });
    label.textContent = n;
    gridLayer.appendChild(label);
  }
  const yTitle = el("text", { class: "bf-axis-title", x: 2, y: 12 });
  yTitle.textContent = t.bfYTitle;
  gridLayer.appendChild(yTitle);
  const xTitle = el("text", { class: "bf-axis-title", x: PW / 2, y: PH - 4, "text-anchor": "middle" });
  xTitle.textContent = t.bfXTitle;
  gridLayer.appendChild(xTitle);

  const k = busFactorOf(share, team);
  const barsLayer = document.getElementById("bfBarsLayer");
  barsLayer.innerHTML = "";
  const bw = slotW() * 0.55;
  for (let n = 0; n <= N_MAX; n++) {
    const p = stopProbOf(n, share, team);
    const x = xOf(n) - bw / 2;
    const y = yOf(p);
    const bar = el("rect", {
      class: "bf-bar" + (n >= k ? " danger" : ""),
      x, y, width: bw, height: Math.max(1, yOf(0) - y), rx: 3,
    });
    barsLayer.appendChild(bar);
    const vl = el("text", { class: "bf-bar-label", x: xOf(n), y: y - 5 });
    vl.textContent = p + "%";
    barsLayer.appendChild(vl);
  }

  /* cliff line between k-1 and k */
  const cliffX = xOf(k) - slotW() / 2;
  const cliff = document.getElementById("bfCliff");
  if (k <= N_MAX) {
    cliff.setAttribute("x1", cliffX); cliff.setAttribute("x2", cliffX);
    cliff.setAttribute("y1", PAD_T); cliff.setAttribute("y2", PH - PAD_B);
    cliff.style.display = "";
    const cl = document.getElementById("bfCliffLabel");
    cl.style.display = "";
    cl.setAttribute("x", cliffX + 5);
    cl.setAttribute("y", PAD_T + 12);
    cl.textContent = t.bfCliffTag(k);
  } else {
    cliff.style.display = "none";
    const cl = document.getElementById("bfCliffLabel");
    cl.style.display = "none";
  }

  const mx = xOf(nLeave);
  const marker = document.getElementById("bfMarker");
  marker.setAttribute("x1", mx); marker.setAttribute("x2", mx);
  marker.setAttribute("y1", PAD_T); marker.setAttribute("y2", PH - PAD_B);

  const hit = document.getElementById("bfMarkerHit");
  hit.setAttribute("x", PAD_L); hit.setAttribute("y", 0);
  hit.setAttribute("width", PW - PAD_L - PAD_R); hit.setAttribute("height", PH);
}

/* ================= 描画 ================= */
function render() {
  const t = T();
  const a = assess(share, team, nLeave);

  drawChart();

  const kLabel = t.htmlLang === "ja" ? `${a.k}人` : `${a.k}`;
  document.getElementById("sumVal").textContent = kLabel;
  document.getElementById("bfCardVal").textContent = kLabel;
  document.getElementById("riskCardVal").textContent = `${a.risk}%`;
  document.getElementById("riskCardLabel").textContent = t.riskCardLabel(nLeave);
  document.getElementById("hint").textContent = t.hint(share, team, nLeave, a);
  document.getElementById("scenarioBoxText").textContent = t.scenarios[a.box];

  document.getElementById("shareReadout").textContent = share;
  document.getElementById("teamReadout").textContent = t.htmlLang === "ja" ? `${team}人` : `${team}`;
  if (document.activeElement !== document.getElementById("shareSlider")) document.getElementById("shareSlider").value = share;
  if (document.activeElement !== document.getElementById("shareNum")) document.getElementById("shareNum").value = share;
  if (document.activeElement !== document.getElementById("teamSlider")) document.getElementById("teamSlider").value = team;
  if (document.activeElement !== document.getElementById("teamNum")) document.getElementById("teamNum").value = team;

  const scoreEl = document.getElementById("scoreVal");
  scoreEl.textContent = a.score;
  scoreEl.className = "score-val mono" + (a.score < 25 ? " danger" : a.score < 65 ? " warn" : "");
  document.getElementById("scoreComment").textContent = t.comments[a.band];

  DevSimLab.renderShare(document.getElementById("shareBtns"), {
    url: "https://sakuichi.github.io/dev-sim-lab/bus-factor/",
    shareText: t.shareText,
    shareHashtags: t.shareHashtags,
  });
}

/* ================= 静的コンテンツの言語適用 ================= */
function applyStaticText() {
  const t = T();
  document.title = t.docTitle;
  document.querySelector('meta[name="description"]').setAttribute("content", t.heroLead);
  document.getElementById("heroTitle").innerHTML = t.heroTitle;
  document.getElementById("heroLead").textContent = t.heroLead;
  document.getElementById("consoleLabel").textContent = t.consoleLabel;
  document.getElementById("sumLabel").textContent = t.sumLabel;
  document.getElementById("scoreLabel").textContent = t.scoreLabel;
  document.getElementById("shareName").textContent = t.shareName;
  document.getElementById("shareSub").textContent = t.shareSub;
  document.getElementById("teamName").textContent = t.teamName;
  document.getElementById("teamSub").textContent = t.teamSub;
  document.getElementById("numLabel1").textContent = t.numLabel;
  document.getElementById("numLabel2").textContent = t.numLabel;
  document.getElementById("shareSlider").setAttribute("aria-label", t.shareName);
  document.getElementById("teamSlider").setAttribute("aria-label", t.teamName);
  document.getElementById("numLabel1").setAttribute("aria-label", `${t.shareName} ${t.numLabel}`);
  document.getElementById("numLabel2").setAttribute("aria-label", `${t.teamName} ${t.numLabel}`);
  document.getElementById("resetBtn").textContent = t.resetBtn;
  document.getElementById("scenarioBtn").textContent = t.scenarioBtn;
  document.getElementById("chartCaption").textContent = t.chartCaption;
  document.getElementById("chartNote").textContent = t.chartNote;
  document.getElementById("legendSafe").textContent = t.legendSafe;
  document.getElementById("legendDanger").textContent = t.legendDanger;
  document.getElementById("scenarioBoxTitle").textContent = t.scenarioBoxTitle;
  document.getElementById("bfCardLabel").textContent = t.bfCardLabel;

  document.getElementById("secAdvice").innerHTML = `
    <h2>${t.adviceHeading}</h2>
    <p>${t.adviceIntro}</p>
    <ul>${t.adviceItems.map((i) => `<li>${i}</li>`).join("")}</ul>
  `;

  document.getElementById("booksH").textContent = t.booksH;
  const booksGrid = document.getElementById("booksGrid");
  booksGrid.innerHTML = "";
  t.books.forEach((b) => {
    const div = document.createElement("div");
    div.className = "book";
    div.innerHTML = `<span class="tag">${b.tag}</span><h3>${b.title}</h3><p>${b.desc}</p>
      <a href="${b.url}" target="_blank" rel="noopener nofollow sponsored">${b.link}</a>`;
    booksGrid.appendChild(div);
  });

  DevSimLab.renderRelated(document.getElementById("relatedGrid"), { exclude: "bus-factor" });
}

/* ================= イベント ================= */
document.getElementById("shareSlider").addEventListener("input", (e) => { share = +e.target.value; render(); });
document.getElementById("shareNum").addEventListener("change", (e) => {
  share = Math.min(SHARE_MAX, Math.max(SHARE_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("teamSlider").addEventListener("input", (e) => { team = +e.target.value; render(); });
document.getElementById("teamNum").addEventListener("change", (e) => {
  team = Math.min(TEAM_MAX, Math.max(TEAM_MIN, Math.round(+e.target.value)));
  render();
});
document.getElementById("resetBtn").addEventListener("click", () => {
  share = 30; team = 6; nLeave = 1;
  document.getElementById("hint").textContent = "";
  render();
});
document.getElementById("scenarioBtn").addEventListener("click", () => {
  share = 0; nLeave = 1;
  render();
  const a = assess(share, team, nLeave);
  document.getElementById("hint").textContent = T().hintScenario(team, nLeave, a);
});

/* ---- drag the departures marker directly on the chart ---- */
const bfChart = document.getElementById("bfChart");
function svgPoint(evt) {
  const pt = bfChart.createSVGPoint();
  pt.x = evt.clientX; pt.y = evt.clientY;
  return pt.matrixTransform(bfChart.getScreenCTM().inverse());
}
let dragging = false;
function startDrag(evt) {
  dragging = true;
  bfChart.setPointerCapture(evt.pointerId);
  document.getElementById("bfMarker").classList.add("dragging");
  document.getElementById("bfMarkerHit").classList.add("dragging");
  updateFromPointer(evt);
  evt.preventDefault();
}
function updateFromPointer(evt) {
  const p = svgPoint(evt);
  nLeave = nOfX(p.x);
  render();
}
document.getElementById("bfMarkerHit").addEventListener("pointerdown", startDrag);
bfChart.addEventListener("pointermove", (evt) => { if (dragging) updateFromPointer(evt); });
["pointerup", "pointercancel"].forEach((ev) => bfChart.addEventListener(ev, () => {
  dragging = false;
  document.getElementById("bfMarker").classList.remove("dragging");
  document.getElementById("bfMarkerHit").classList.remove("dragging");
}));

DevSimLab.initChrome({
  onRender: (lang, tone) => {
    LANG = lang; TONE = tone;
    applyStaticText();
    render();
  },
});
</script>
